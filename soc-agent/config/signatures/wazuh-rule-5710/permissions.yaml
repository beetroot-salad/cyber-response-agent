# Permissions for Wazuh Rule 5710: SSH Invalid User
#
# PLAYGROUND CONFIG — Permissive settings for testing.
# In production, tighten mitigation actions and set mode to appropriate level.

schema_version: "2.0"

# Operating mode
#   recommend — agent investigates and outputs a recommendation (MVP)
#   act       — close-ticket dispatch via Stop-stage hook (see handbook/act-mode.md)
mode:
  allowed: [recommend, act]
  default: act

# Mitigation actions — connectors bound in config/actions.yaml
#
# close_ticket is dispatched by hooks/scripts/close_ticket_action.py at Stop
# for grounded high-confidence resolved reports.
mitigation:
  actions:
    close_ticket: auto
    block_ip: auto
    disable_user: approve

# Budget overrides (per-signature). Defaults from config/budget-defaults.yaml.
# Warnings print at 75% and 100% of each limit.
# budget:
#   max_tool_calls: 150
#   max_subagent_spawns: 10
#   wall_clock_timeout: 600
