# Permissions for elastic-falco-shell-lineage
#
# Falco attack-lineage rule family on the falco.alerts data stream
# (terminal shell in container, ingress copy, payload decode,
# authorized_keys write, drop-and-execute, etc.). MVP ships in recommend
# mode — every archetype is TODO pending Phase 3 investigation runs, so
# auto-close is unsafe by construction.

schema_version: "2.0"

mode:
  allowed: [recommend]
  default: recommend

mitigation:
  actions: {}
  # Future graduation candidates (require archetype directories + precedent
  # snapshots + auto-close judge calibration before flipping on):
  #   close_ticket: auto      # only for archetypes with anchor confirmation
  #   isolate_host: approve   # post-exploit-interactive escalations
  #   kill_process: approve

