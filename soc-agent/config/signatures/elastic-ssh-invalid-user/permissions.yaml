# Permissions for elastic-ssh-invalid-user
#
# SSH authentication failure on the Elastic system.auth data stream.
# MVP ships in recommend mode — escalations route to a human; auto-close
# is gated behind a separate review since the signature can resolve to
# both benign archetypes (monitoring-probe, service-account-rotation) and
# adversarial archetypes (credential-stuffing, external-bruteforce).

schema_version: "2.0"

mode:
  allowed: [recommend]
  default: recommend

mitigation:
  actions: {}
  # Future graduation candidates (require precedent snapshots + auto-close
  # judge calibration before flipping on):
  #   close_ticket: auto      # benign-archetype resolutions only
  #   block_ip: approve       # external-bruteforce only, with operator review
  #   disable_user: approve

