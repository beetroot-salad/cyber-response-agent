# Permissions for {SIGNATURE_ID}
#
# Copy this file to config/signatures/{signature-id}/permissions.yaml
# and customize for the signature.

schema_version: "2.0"

# Operating mode
#   recommend — agent investigates and outputs a recommendation (default)
#   act       — agent can execute mitigation actions via mitigation skill
mode:
  allowed: [recommend]
  default: recommend

# Mitigation actions (enforced by the Stop-stage action hook, not the
# investigation agent)
#
# The investigation agent has full read/query access and is not restricted
# here. Only *actions* (mitigations) are gated per-signature.
#
# Per action:
#   auto    — execute without human approval (requires mode: act)
#   approve — execute only after human approval via Claude Code permission prompt
# Unlisted actions are denied. Denied actions are logged to
# runs/action_audit.jsonl with skip_reason=action_not_enabled.
#
# Which connector handles each action is bound globally in
# config/actions.yaml — this file just says whether *this* signature opts
# into running the action after a grounded high-confidence resolution.
#
# Common actions: close_ticket, block_ip, disable_user, isolate_host,
# revoke_session, kill_process
mitigation:
  actions: {}
  # Examples:
  #   close_ticket: auto    # post-investigation auto-close; see config/actions.yaml
  #   block_ip: auto
  #   disable_user: approve
  #   isolate_host: approve

# Budget overrides (per-signature). Defaults from config/budget-defaults.yaml.
# Warnings print at 75% and 100% of each limit.
# budget:
#   max_tool_calls: 150
#   max_subagent_spawns: 10
#   wall_clock_timeout: 600
