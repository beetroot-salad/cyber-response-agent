[project]
name = "soc-agent"
version = "0.1.0"
description = "Hypothesis-driven security alert triage agent"
requires-python = ">=3.11"
dependencies = []  # Core is stdlib-only — by design

[project.optional-dependencies]
dev = [
    "pytest>=9.0",
    "pytest-asyncio",
    "black",
    "isort",
    "flake8",
    "mypy",
    "ipython",
    "debugpy",
    "httpx",
]
wazuh = [
    "opensearch-py>=3.0.0",
]

[tool.setuptools]
packages = []  # Not a traditional package — scripts are invoked directly
