services:
  # Pure development environment - "coding machine"
  devcontainer:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: response-devcontainer
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ../:/workspace # Mount full workspace directory
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - response-network
    command: ["sleep", "infinity"]

  # Target Endpoint (generates realistic workload activity)
  target-endpoint:
    build:
      context: ../target-endpoint
      dockerfile: Dockerfile
    container_name: target-endpoint
    hostname: target-endpoint
    restart: unless-stopped
    volumes:
      - C:\Users\naama\yotam\code\cyber-response-agent\target-endpoint\workloads:/opt/workloads
    networks:
      - response-network

  # Falco (eBPF monitoring - replaces auditd)
  falco:
    image: falcosecurity/falco:latest
    container_name: falco
    hostname: falco
    restart: unless-stopped
    privileged: false
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_PTRACE
    volumes:
      # Kernel monitoring
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /proc:/host/proc:ro
      - /dev:/host/dev:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      # Docker socket for container metadata
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      # Output logs
      - falco-logs:/var/log/falco
    networks:
      - response-network
    depends_on:
      - target-endpoint
    environment:
      - FALCO_BPF_PROBE=""
    command:
      - /usr/bin/falco
      - -o
      - json_output=true
      - -o
      - json_include_output_property=true
      - -o
      - file_output.enabled=true
      - -o
      - file_output.filename=/var/log/falco/events.json

networks:
  response-network:
    name: response-network
    driver: bridge

volumes:
  falco-logs:
