name: cyber-response-agent_devcontainer

services:
  # Pure development environment - "coding machine"
  devcontainer:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: response-devcontainer
    env_file:
      - ../.env
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ../:/workspace # Mount full workspace directory
      - /var/run/docker.sock:/var/run/docker.sock
      # Second mount of the same source at the host's own path. This lets
      # `docker compose` invoked from inside the devcontainer use host-style
      # paths for build contexts and bind mounts (the daemon runs on the host
      # and only speaks host paths). HOST_WORKSPACE must be set in .env to
      # the host filesystem path that maps to /workspace.
      - ../:${HOST_WORKSPACE}
    networks:
      - response-network
    command: ["sleep", "infinity"]

  # Target Endpoint (generates realistic workload activity)
  target-endpoint:
    build:
      context: ../playground/target-endpoint
      dockerfile: Dockerfile
    container_name: target-endpoint
    hostname: target-endpoint
    volumes:
      - ../playground/target-endpoint/workloads:/opt/workloads
      # Persist Wazuh agent state across container recreates:
      #   - client.keys (agent identity / enrollment)
      #   - syscheck/fim DB (FIM baseline — avoids re-scan on every restart)
      #   - rids (anti-replay counters)
      # The whole queue dir + client.keys live behind a single named volume.
      # See entrypoint.sh for the symlink setup.
      - target-endpoint-state:/var/ossec-state
    networks:
      - response-network

  # Monitoring Host (generates realistic SSH traffic against target-endpoint
  # from a stable "internal monitoring" IP — used as SCREEN-pattern ground
  # truth for rule 5710 and as a reusable source entity for other signatures).
  monitoring-host:
    build:
      context: ../playground/monitoring-host
      dockerfile: Dockerfile
    container_name: monitoring-host
    hostname: monitoring-host
    volumes:
      - ../playground/monitoring-host/workloads:/opt/workloads
    networks:
      response-network:
        ipv4_address: 172.22.0.10
    depends_on:
      - target-endpoint

  # Falco (eBPF monitoring - replaces auditd)
  falco:
    image: falcosecurity/falco:latest
    container_name: falco
    hostname: falco
    privileged: false
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_PTRACE
    volumes:
      # Kernel monitoring
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /proc:/host/proc:ro
      - /dev:/host/dev:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      # Docker socket for container metadata
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      # Output logs
      - falco-logs:/var/log/falco
    networks:
      - response-network
    depends_on:
      - target-endpoint
    environment:
      - FALCO_BPF_PROBE=""
    command:
      - /usr/bin/falco
      - -o
      - json_output=true
      - -o
      - json_include_output_property=true
      - -o
      - file_output.enabled=true
      - -o
      - file_output.filename=/var/log/falco/events.json

  # Private Docker Registry (for reproduction agent image management)
  registry:
    image: registry:2
    container_name: registry
    hostname: registry
    networks:
      - response-network
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"

  # Wazuh MCP Server (Interface for agent to query SIEM)
  wazuh-mcp-server:
    build:
      context: ./wazuh-mcp
      dockerfile: Dockerfile
    container_name: wazuh-mcp-server
    hostname: wazuh-mcp-server
    networks:
      - response-network
    ports:
      - "8000:8000"
    environment:
      # Wazuh Manager connection
      - WAZUH_PROD_URL=https://wazuh-manager:55000
      - WAZUH_PROD_USERNAME=${WAZUH_API_USER:-wazuh-wui}
      - WAZUH_PROD_PASSWORD=${WAZUH_API_PASSWORD}
      - WAZUH_PROD_SSL_VERIFY=false
      - WAZUH_PROD_TIMEOUT=30
      # MCP Server configuration
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
      - LOG_LEVEL=INFO
    depends_on:
      - wazuh.manager

  # Ticket server (stateful FastAPI mock — playground-only, in-memory store).
  # Used by end-to-end investigation validation when we want real
  # create→close→verify round-trips instead of the no-op stub_ticket_cli.
  ticket-server:
    build:
      context: ../playground/ticket-server
      dockerfile: Dockerfile
    container_name: ticket-server
    hostname: ticket-server
    volumes:
      - ../playground/ticket-server/seed:/app/seed:ro
    networks:
      - response-network
    ports:
      - "8080:8080"

networks:
  response-network:
    name: response-network
    driver: bridge
    # Pin the subnet so monitoring-host can have a stable ipv4_address
    # (172.22.0.10). Docker was already auto-assigning 172.22.0.0/16 —
    # this just formalizes it so IPAM survives network recreates and the
    # "internal monitoring host" ground truth has a fixed IP that the
    # environment/context classification can reference.
    ipam:
      driver: default
      config:
        - subnet: 172.22.0.0/16
          gateway: 172.22.0.1

volumes:
  falco-logs:
  registry_data:
  target-endpoint-state:
