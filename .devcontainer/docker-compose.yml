services:
  # Pure development environment - "coding machine"
  devcontainer:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: response-devcontainer
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ../:/workspace # Mount full workspace directory
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - response-network
    command: ["sleep", "infinity"]

  # Target Endpoint (generates realistic workload activity)
  target-endpoint:
    build:
      context: ../target-endpoint
      dockerfile: Dockerfile
    container_name: target-endpoint
    hostname: target-endpoint
    restart: on-failure
    volumes:
      - C:\Users\naama\yotam\code\cyber-response-agent\target-endpoint\workloads:/opt/workloads
    networks:
      - response-network

  # Falco (eBPF monitoring - replaces auditd)
  falco:
    image: falcosecurity/falco:latest
    container_name: falco
    hostname: falco
    restart: on-failure
    privileged: false
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_PTRACE
    volumes:
      # Kernel monitoring
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /proc:/host/proc:ro
      - /dev:/host/dev:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      # Docker socket for container metadata
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      # Output logs
      - falco-logs:/var/log/falco
    networks:
      - response-network
    depends_on:
      - target-endpoint
    environment:
      - FALCO_BPF_PROBE=""
    command:
      - /usr/bin/falco
      - -o
      - json_output=true
      - -o
      - json_include_output_property=true
      - -o
      - file_output.enabled=true
      - -o
      - file_output.filename=/var/log/falco/events.json

  # PostgreSQL Database (Tickets + Case Knowledge for our cyber response agent)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    hostname: postgres
    restart: on-failure
    networks:
      - response-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cyber_response
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d cyber_response"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Wazuh MCP Server (Interface for agent to query SIEM)
  wazuh-mcp-server:
    build:
      context: ./wazuh-mcp
      dockerfile: Dockerfile
    container_name: wazuh-mcp-server
    hostname: wazuh-mcp-server
    restart: on-failure
    networks:
      - response-network
    ports:
      - "8000:8000"
    environment:
      # Wazuh Manager connection
      - WAZUH_PROD_URL=https://wazuh-manager:55000
      - WAZUH_PROD_USERNAME=wazuh-wui
      - WAZUH_PROD_PASSWORD=MyS3cr37P450r.*-
      - WAZUH_PROD_SSL_VERIFY=false
      - WAZUH_PROD_TIMEOUT=30
      # MCP Server configuration
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
      - LOG_LEVEL=INFO
    depends_on:
      - wazuh.manager

networks:
  response-network:
    name: response-network
    driver: bridge

volumes:
  falco-logs:
  postgres_data:
