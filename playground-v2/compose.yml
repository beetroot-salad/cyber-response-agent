name: soc-playground

# Services:
#  setup         — one-shot: generates self-signed CA + ES cert, waits for ES, sets kibana_system password, exits
#  elasticsearch — single-node, TLS on (HTTP + transport), xpack.security.enabled
#  kibana        — auth via kibana_system over TLS
#  fleet-init    — one-shot: fleet setup + fleet-server-policy
#  fleet-server  — Fleet Server + self-enrollment
#  keycloak-init — one-shot: converts keycloak/realm.yaml → realm.json on shared import volume
#  keycloak      — IdP (start-dev + --import-realm); H2 state persisted in keycloak_data volume
#  unbound       — recursive DNS resolver with query logs to stdout (playground-internal resolver)
#  squid         — forward HTTP(S) proxy with basic-auth attribution; access log to stdout
#  zeek          — passive network monitor (host netns); JSON conn/dns/http/ssl/files logs to volume
#  Role-clustered host population (8 containers — docs/playground-environment-v2.md §Environment population):
#    web-1, web-2     — nginx, ubuntu 22.04, prod
#    db-1             — postgres, ubuntu 22.04, prod
#    jump-box-1       — plain, ubuntu 24.04, prod (SSH hub)
#    dev-ws-1         — plain, ubuntu 24.04, dev (developer workstation)
#    office-ws-1, -2  — plain, ubuntu 22.04 / 24.04, preprod (office-user workstations)
#    canary-1         — plain, ubuntu 22.04, sandbox (designated attack target)
# Exposed on loopback only. External access via SSH tunnel:
#   ssh -L 9200:localhost:9200 -L 5601:localhost:5601 -L 8220:localhost:8220 -L 8080:localhost:8080 soc-playground

x-es-image: &es-image docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}

# Role-host defaults. Anchored here so the 8 host services below stay thin —
# they differ only in image target, BASE_OS, hostname, HOST_NAME/HOST_ROLE env,
# and a per-host agent-state volume. Shared bits (restart policy, healthcheck,
# dependencies on Fleet readiness) live here; per-service volume lists are
# NOT anchored because YAML <<: replaces lists rather than merging them, and
# each host needs both the shared mounts (certs, fleet_tokens) and its own
# agent state volume.
x-host-defaults: &host-defaults
  restart: unless-stopped
  # elastic-agent 9.3 + default beats + otel collector + sshd needs ~350-450MB
  # resident once everything is warm. 256m caused flappy "degraded" status and
  # metricbeat self-stats socket timeouts because beats were being OOM-nudged.
  # VPS has ~30GB so 512m × 8 hosts (= 4GB) is comfortable headroom.
  mem_limit: 512m
  depends_on:
    fleet-server:
      condition: service_healthy
    fleet-host-policies:
      condition: service_completed_successfully
  healthcheck:
    test: ["CMD", "nc", "-z", "127.0.0.1", "22"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 15s

services:
  setup:
    image: *es-image
    container_name: soc-playground-setup
    user: "0"
    environment:
      - ELASTIC_PASSWORD=${V2_ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${V2_KIBANA_PASSWORD}
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    command: >
      bash -c '
        if [ ! -f config/certs/ca.zip ] || [ ! -f config/certs/fleet-server/fleet-server.crt ]; then
          echo "-> (re)generating CA + node certs";
          rm -rf config/certs/ca config/certs/elasticsearch config/certs/fleet-server config/certs/ca.zip config/certs/certs.zip;
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip -q config/certs/ca.zip -d config/certs;
          printf "instances:\n  - name: elasticsearch\n    dns:\n      - elasticsearch\n      - localhost\n    ip:\n      - 127.0.0.1\n  - name: fleet-server\n    dns:\n      - fleet-server\n      - localhost\n    ip:\n      - 127.0.0.1\n" > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip -q config/certs/certs.zip -d config/certs;
        fi;
        # Ensure leaf certs ship the CA in the chain so clients using
        # `ca_trusted_fingerprint` (no CA file) can walk up to the trust root.
        # Without this, elastic-agent drops data with x509: certificate signed
        # by unknown authority. Idempotent: only appends if not already chained.
        for leaf in config/certs/elasticsearch/elasticsearch.crt config/certs/fleet-server/fleet-server.crt; do
          if [ "$$(grep -c "BEGIN CERTIFICATE" "$$leaf")" = "1" ]; then
            cat config/certs/ca/ca.crt >> "$$leaf";
          fi;
        done;
        echo "-> fixing permissions";
        chown -R 1000:0 config/certs;
        find config/certs -type d -exec chmod 750 {} \;;
        find config/certs -type f -exec chmod 640 {} \;;
        echo "-> waiting for elasticsearch";
        until curl -s --cacert config/certs/ca/ca.crt https://elasticsearch:9200 | grep -q "missing authentication credentials"; do sleep 5; done;
        echo "-> setting kibana_system password";
        until curl -s -X POST --cacert config/certs/ca/ca.crt -u "elastic:$${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"$${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 5; done;
        echo "-> setup complete";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/share/elasticsearch/config/certs/fleet-server/fleet-server.crt ]"]
      interval: 2s
      timeout: 5s
      retries: 120

  elasticsearch:
    depends_on:
      setup:
        # service_completed_successfully — setup is a one-shot. On first boot
        # it runs for tens of seconds (cert gen + wait-for-ES + kibana_system
        # password) and its healthcheck has time to fire. On recreate (certs
        # already in the shared volume) setup's fast-path exits in <1s, often
        # before the 2s healthcheck interval, leaving compose stuck on
        # service_healthy forever. Kibana already uses service_completed_successfully
        # for the same reason.
        condition: service_completed_successfully
    image: *es-image
    container_name: elasticsearch
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${V2_ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.http.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.transport.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - "ES_JAVA_OPTS=-Xms${ES_HEAP} -Xmx${ES_HEAP}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - certs:/usr/share/elasticsearch/config/certs:ro
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    mem_limit: 3g
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS --cacert /usr/share/elasticsearch/config/certs/ca/ca.crt -u elastic:$$ELASTIC_PASSWORD https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(yellow|green)\"'"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  kibana:
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kibana
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${V2_KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${V2_KIBANA_ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${V2_KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${V2_KIBANA_ENCRYPTION_KEY}
    volumes:
      - certs:/usr/share/kibana/config/certs:ro
      - kibana_data:/usr/share/kibana/data
    ports:
      - "127.0.0.1:5601:5601"
    mem_limit: 2g
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  fleet-init:
    # One-shot: initializes Fleet plugin + creates fleet-server-policy.
    # KIBANA_FLEET_SETUP=1 on the fleet-server container does NOT create this policy in 9.x —
    # see memory reference_fleet_server_docker_9x.md.
    depends_on:
      kibana:
        condition: service_healthy
    image: curlimages/curl:latest
    container_name: soc-playground-fleet-init
    environment:
      - ELASTIC_PASSWORD=${V2_ELASTIC_PASSWORD}
    command: >
      sh -c '
        set -e;
        echo "-> fleet setup";
        curl -fsS -u "elastic:$$ELASTIC_PASSWORD" -H "kbn-xsrf: x" -X POST http://kibana:5601/api/fleet/setup > /dev/null;
        echo "-> fleet-server-policy (idempotent: 409 on re-run is fine)";
        HTTP=$$(curl -sS -o /tmp/resp.json -w "%{http_code}" -u "elastic:$$ELASTIC_PASSWORD" -H "kbn-xsrf: x" -H "Content-Type: application/json" -X POST "http://kibana:5601/api/fleet/agent_policies?sys_monitoring=true" -d "{\"id\":\"fleet-server-policy\",\"name\":\"Fleet Server policy\",\"namespace\":\"default\",\"has_fleet_server\":true,\"monitoring_enabled\":[\"logs\",\"metrics\"]}");
        case "$$HTTP" in
          200|201) echo "created" ;;
          409) echo "already exists" ;;
          *) echo "FAIL http=$$HTTP"; cat /tmp/resp.json; exit 1 ;;
        esac;
      '
    restart: "no"

  fleet-host-policies:
    # One-shot: creates one agent policy per host role and mints an enrollment
    # token for each. Tokens land on the `fleet_tokens` shared volume so each
    # host container can read its role's token at entrypoint time without
    # holding a Kibana credential itself.
    #
    # sys_monitoring=true auto-attaches the system integration (logs+metrics)
    # to each new policy. Role-specific integrations (nginx, postgres, endpoint)
    # are layered in batches 7c+. Policies are upserted: POST returns 409 if
    # already present, enrollment-key fetch is always refreshed (token write
    # is idempotent, last writer wins).
    depends_on:
      kibana:
        condition: service_healthy
      fleet-init:
        condition: service_completed_successfully
    image: curlimages/curl:latest
    container_name: soc-playground-fleet-host-policies
    # curlimages/curl runs as the `curl_user` (uid 100) by default; named
    # volumes are created root-owned on first attach, so writes to /tokens
    # fail with EACCES. Running as root here is fine — it's a one-shot and
    # the tokens are read-only-mounted into host containers anyway.
    user: "0"
    environment:
      - ELASTIC_PASSWORD=${V2_ELASTIC_PASSWORD}
    volumes:
      - fleet_tokens:/tokens
    command: >
      sh -c '
        set -eu;
        ROLES="web db jump-box dev-ws office-ws canary";
        for role in $$ROLES; do
          policy_id="host-$${role}-policy";
          echo "-> creating policy $${policy_id}";
          HTTP=$$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -u "elastic:$$ELASTIC_PASSWORD" -H "kbn-xsrf: x" \
            -H "Content-Type: application/json" \
            -X POST "http://kibana:5601/api/fleet/agent_policies?sys_monitoring=true" \
            -d "{\"id\":\"$${policy_id}\",\"name\":\"Host role: $${role}\",\"namespace\":\"default\",\"monitoring_enabled\":[\"logs\",\"metrics\"]}");
          case "$$HTTP" in
            200|201) echo "   created" ;;
            409)     echo "   already exists" ;;
            *)       echo "   FAIL http=$$HTTP"; cat /tmp/resp.json; exit 1 ;;
          esac;
          echo "-> fetching enrollment token for $${policy_id}";
          TOKEN=$$(curl -fsS -u "elastic:$$ELASTIC_PASSWORD" -H "kbn-xsrf: x" \
            "http://kibana:5601/api/fleet/enrollment_api_keys?kuery=policy_id:$${policy_id}" \
            | sed -n "s/.*\"api_key\":\"\\([^\"]*\\)\".*/\\1/p" | head -n1);
          if [ -z "$$TOKEN" ]; then
            echo "   FAIL: no enrollment_api_key returned for $${policy_id}"; exit 1;
          fi;
          # Atomic-replace write — host agents poll for non-empty token file
          # and would race against a partial write otherwise.
          printf "%s" "$$TOKEN" > /tokens/$${role}.token.tmp;
          mv /tokens/$${role}.token.tmp /tokens/$${role}.token;
          echo "   wrote /tokens/$${role}.token";
        done;
      '
    restart: "no"

  fleet-server:
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
      fleet-init:
        condition: service_completed_successfully
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    container_name: fleet-server
    user: "0"
    environment:
      # Fleet Server mode — self-bootstraps via Kibana Fleet API on first start.
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=https://elasticsearch:9200
      - FLEET_SERVER_ELASTICSEARCH_CA=/usr/share/elastic-agent/certs/ca/ca.crt
      - FLEET_SERVER_CERT=/usr/share/elastic-agent/certs/fleet-server/fleet-server.crt
      - FLEET_SERVER_CERT_KEY=/usr/share/elastic-agent/certs/fleet-server/fleet-server.key
      - FLEET_URL=https://fleet-server:8220
      # Agent side: trust our self-signed CA when enrolling back into this same Fleet Server.
      - FLEET_CA=/usr/share/elastic-agent/certs/ca/ca.crt
      # Run Kibana Fleet setup + auto-generate service token on first boot.
      - KIBANA_FLEET_SETUP=1
      - KIBANA_HOST=http://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${V2_ELASTIC_PASSWORD}
    volumes:
      - certs:/usr/share/elastic-agent/certs:ro
      - fleet_data:/usr/share/elastic-agent/state
    ports:
      - "127.0.0.1:8220:8220"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSk https://localhost:8220/api/status | grep -q '\"status\":\"HEALTHY\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  keycloak-init:
    # One-shot: converts realm.yaml → realm.json on the shared import volume.
    # Idempotent — runs every `compose up` and rewrites the JSON; Keycloak's
    # --import-realm skips if the realm already exists, so re-imports are safe no-ops.
    # Built from ./keycloak/Dockerfile so realm.yaml + seed.py ship via the build
    # context (compose `configs:` resolves paths on the remote daemon, which
    # doesn't have /workspace/; a build-and-upload sidesteps that).
    build: ./keycloak
    image: soc-playground/keycloak-init:local
    container_name: soc-playground-keycloak-init
    volumes:
      - keycloak_import:/import
    command: ["python", "/config/seed.py", "/config/realm.yaml", "/import/realm.json"]
    restart: "no"

  keycloak:
    depends_on:
      keycloak-init:
        condition: service_completed_successfully
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    container_name: keycloak
    environment:
      - KEYCLOAK_ADMIN=${V2_KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${V2_KEYCLOAK_ADMIN_PASSWORD}
      - KC_HEALTH_ENABLED=true
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      # Raise org.keycloak.events to DEBUG so the jboss-logging listener actually
      # writes LOGIN/LOGOUT/etc. lines to stdout. Root stays INFO — we only want
      # the events stream, not all of Keycloak's internals.
      - KC_LOG_LEVEL=INFO,org.keycloak.events:debug
    command: ["start-dev", "--import-realm"]
    volumes:
      - keycloak_data:/opt/keycloak/data
      - keycloak_import:/opt/keycloak/data/import:ro
    ports:
      - "127.0.0.1:8080:8080"
    mem_limit: 1g
    healthcheck:
      # Keycloak 26 management/health port is 9000; no curl in the image, so use
      # bash + /dev/tcp. CMD-SHELL's /bin/sh doesn't honor `echo -e`'s escapes
      # portably — force bash + printf, which reliably emits real CRLF (without
      # that, Vert.x rejects the request with "Host header required").
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/9000 && printf "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && timeout --preserve-status 2 cat <&3 | grep -q ''"status": "UP"'''
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  unbound:
    build: ./unbound
    image: soc-playground/unbound:local
    container_name: unbound
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      # pgrep is in the alpine base; confirms the daemon is up. (No netcat in minimal
      # alpine for a proper `dig`-style probe; pgrep is enough for a playground.)
      test: ["CMD", "pgrep", "unbound"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  squid:
    build: ./squid
    image: soc-playground/squid:local
    container_name: squid
    restart: unless-stopped
    mem_limit: 256m
    # /var/log/squid is a VOLUME in the ubuntu/squid image, which creates anonymous
    # volumes that persist across `compose up --build` — i.e., image changes to this
    # dir won't propagate. Force tmpfs so it resets to the image's state (proxy:proxy)
    # every restart. Logs ship via the entrypoint's `tail -F → stdout` anyway, so
    # persistence isn't needed.
    tmpfs:
      - /var/log/squid:uid=13,gid=13,mode=0755
      - /var/spool/squid:uid=13,gid=13,mode=0755
    healthcheck:
      # Squid's PID file is at /run/squid.pid in the ubuntu/squid image; presence
      # alone is enough to confirm the master process is up.
      test: ["CMD-SHELL", "test -f /run/squid.pid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  falco:
    # Shared syscall monitor (modern eBPF / CO-RE). Sees every container on
    # the daemon; per-host attribution is via the container plugin's
    # `container.name` field on each event. Output JSON lands on the VPS
    # host filesystem so the existing host-side elastic-agent (enrolled into
    # `vps-host-policy` in batch 4e) can tail it via a custom-logs integration
    # — see playground-v2/CLAUDE.md §Syscall monitoring (Falco).
    build:
      context: ./falco
      args:
        FALCO_VERSION: ${FALCO_VERSION}
    image: soc-playground/falco:local
    container_name: falco
    restart: unless-stopped
    mem_limit: 512m
    # Avoid `privileged: true` — we only need the BPF-adjacent caps. Matches
    # v1's footprint.
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_PTRACE
    volumes:
      # Kernel surface for CO-RE BPF.
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /proc:/host/proc:ro
      - /dev:/host/dev:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      # Container metadata for the container plugin.
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      # Output — bind-mounted to the VPS host so the host agent can tail it
      # without going through a docker volume.
      - /var/log/falco:/var/log/falco
    # Engine selection is in /etc/falco/falco.yaml (engine.kind: modern_ebpf).
    # Falco 0.39 dropped the `--modern-bpf` CLI flag in favor of config-only;
    # rely on the image's default ENTRYPOINT which reads falco.yaml.
    healthcheck:
      # Falco image ships neither pgrep nor ps, so inspect its output file
      # instead — once Falco has emitted a single event, the file is non-empty
      # and we know the pipeline works end-to-end (engine + rules + file
      # output). start_period gives BPF load + initial rule-load time.
      test: ["CMD-SHELL", "[ -s /var/log/falco/falco.json ]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  zeek:
    build: ./zeek
    image: soc-playground/zeek:local
    container_name: zeek
    # Host netns so Zeek's libpcap sees real interfaces (eth0, docker0, all br-* bridges).
    # Bridge-mode would only let it sniff its own veth, which is useless for passive monitoring.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    mem_limit: 1g
    volumes:
      - zeek_logs:/usr/local/zeek/logs
    # entrypoint.sh picks the soc-playground compose bridge (br-*) if one is UP,
    # else eth0. It uses the AF_PACKET plugin — libpcap rejects promisc mode on
    # the `any` pseudo-interface on recent Linux kernels, AF_PACKET sidesteps it.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'zeek -C -i af_packet' >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────────
  # Role-clustered host population (batch 7a + 7b).
  # All 8 services share playground-v2/hosts/Dockerfile via target+BASE_OS args;
  # BuildKit caches identical (target, BASE_OS) combinations across services.
  # Identities + user shells are seeded at container start from inventory.yaml.
  # Each host ships elastic-agent (installed in the base stage), enrolled at
  # first boot into its HOST_ROLE policy using the token fleet-host-policies
  # wrote to /fleet-tokens/<role>.token. State (agent.id, fleet.enc) persists
  # in a per-host named volume so lever-down/up doesn't mint duplicate agents.
  # ──────────────────────────────────────────────────────────────────────────

  web-1:
    <<: *host-defaults
    build:
      context: .
      dockerfile: hosts/Dockerfile
      target: web
      args:
        BASE_OS: "22.04"
        STACK_VERSION: ${STACK_VERSION}
    image: soc-playground/host-web:22.04
    container_name: web-1
    hostname: web-1
    environment:
      HOST_NAME: web-1
      HOST_ROLE: web
    volumes:
      - certs:/fleet-certs:ro
      - fleet_tokens:/fleet-tokens:ro
      - agent_state_web_1:/var/lib/elastic-agent
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22 && nc -z 127.0.0.1 80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web-2:
    <<: *host-defaults
    build:
      context: .
      dockerfile: hosts/Dockerfile
      target: web
      args:
        BASE_OS: "22.04"
        STACK_VERSION: ${STACK_VERSION}
    image: soc-playground/host-web:22.04
    container_name: web-2
    hostname: web-2
    environment:
      HOST_NAME: web-2
      HOST_ROLE: web
    volumes:
      - certs:/fleet-certs:ro
      - fleet_tokens:/fleet-tokens:ro
      - agent_state_web_2:/var/lib/elastic-agent
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22 && nc -z 127.0.0.1 80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db-1:
    <<: *host-defaults
    build:
      context: .
      dockerfile: hosts/Dockerfile
      target: db
      args:
        BASE_OS: "22.04"
        STACK_VERSION: ${STACK_VERSION}
    image: soc-playground/host-db:22.04
    container_name: db-1
    hostname: db-1
    environment:
      HOST_NAME: db-1
      HOST_ROLE: db
    volumes:
      - certs:/fleet-certs:ro
      - fleet_tokens:/fleet-tokens:ro
      - agent_state_db_1:/var/lib/elastic-agent
    # Postgres's default cluster + elastic-agent add a bit over the bare base.
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22 && nc -z 127.0.0.1 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  jump-box-1:
