volumes:
  certs:
    driver: local
  es_data:
    driver: local
  kibana_data:
    driver: local
  fleet_data:
    driver: local
  keycloak_data:
    driver: local
  keycloak_import:
    driver: local
  zeek_logs:
    driver: local
  # Per-role Fleet enrollment tokens — written by fleet-host-policies init,
  # mounted read-only into each host at /fleet-tokens/<role>.token.
  fleet_tokens:
    driver: local
  # Per-host elastic-agent state (agent.id, fleet.enc, vault). One volume per
  # host keeps agent identities stable across container recreates — without
  # this, every recreate would mint a new agent.id and pile up offline ghosts
  # in Fleet.
  agent_state_web_1:
    driver: local
  agent_state_web_2:
    driver: local
  agent_state_db_1:
    driver: local
  agent_state_jump_box_1:
    driver: local
  agent_state_dev_ws_1:
    driver: local
  agent_state_office_ws_1:
    driver: local
  agent_state_office_ws_2:
    driver: local
  agent_state_canary_1:
    driver: local
