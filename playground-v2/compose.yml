name: soc-playground

# Services:
#  setup         — one-shot: generates self-signed CA + ES cert, waits for ES, sets kibana_system password, exits
#  elasticsearch — single-node, TLS on (HTTP + transport), xpack.security.enabled
#  kibana        — auth via kibana_system over TLS
#  fleet-init    — one-shot: fleet setup + fleet-server-policy
#  fleet-server  — Fleet Server + self-enrollment
#  keycloak-init — one-shot: converts keycloak/realm.yaml → realm.json on shared import volume
#  keycloak      — IdP (start-dev + --import-realm); H2 state persisted in keycloak_data volume
#  unbound       — recursive DNS resolver with query logs to stdout (playground-internal resolver)
#  squid         — forward HTTP(S) proxy with basic-auth attribution; access log to stdout
#  zeek          — passive network monitor (host netns); JSON conn/dns/http/ssl/files logs to volume
# Exposed on loopback only. External access via SSH tunnel:
#   ssh -L 9200:localhost:9200 -L 5601:localhost:5601 -L 8220:localhost:8220 -L 8080:localhost:8080 soc-playground

x-es-image: &es-image docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}

services:
  setup:
    image: *es-image
    container_name: soc-playground-setup
    user: "0"
    environment:
      - ELASTIC_PASSWORD=${V2_ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${V2_KIBANA_PASSWORD}
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    command: >
      bash -c '
        if [ ! -f config/certs/ca.zip ] || [ ! -f config/certs/fleet-server/fleet-server.crt ]; then
          echo "-> (re)generating CA + node certs";
          rm -rf config/certs/ca config/certs/elasticsearch config/certs/fleet-server config/certs/ca.zip config/certs/certs.zip;
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip -q config/certs/ca.zip -d config/certs;
          printf "instances:\n  - name: elasticsearch\n    dns:\n      - elasticsearch\n      - localhost\n    ip:\n      - 127.0.0.1\n  - name: fleet-server\n    dns:\n      - fleet-server\n      - localhost\n    ip:\n      - 127.0.0.1\n" > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip -q config/certs/certs.zip -d config/certs;
        fi;
        echo "-> fixing permissions";
        chown -R 1000:0 config/certs;
        find config/certs -type d -exec chmod 750 {} \;;
        find config/certs -type f -exec chmod 640 {} \;;
        echo "-> waiting for elasticsearch";
        until curl -s --cacert config/certs/ca/ca.crt https://elasticsearch:9200 | grep -q "missing authentication credentials"; do sleep 5; done;
        echo "-> setting kibana_system password";
        until curl -s -X POST --cacert config/certs/ca/ca.crt -u "elastic:$${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"$${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 5; done;
        echo "-> setup complete";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/share/elasticsearch/config/certs/fleet-server/fleet-server.crt ]"]
      interval: 2s
      timeout: 5s
      retries: 120

  elasticsearch:
    depends_on:
      setup:
        condition: service_healthy
    image: *es-image
    container_name: elasticsearch
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${V2_ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.http.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.transport.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - "ES_JAVA_OPTS=-Xms${ES_HEAP} -Xmx${ES_HEAP}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - certs:/usr/share/elasticsearch/config/certs:ro
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    mem_limit: 3g
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS --cacert /usr/share/elasticsearch/config/certs/ca/ca.crt -u elastic:$$ELASTIC_PASSWORD https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(yellow|green)\"'"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  kibana:
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kibana
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${V2_KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${V2_KIBANA_ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${V2_KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${V2_KIBANA_ENCRYPTION_KEY}
    volumes:
      - certs:/usr/share/kibana/config/certs:ro
      - kibana_data:/usr/share/kibana/data
    ports:
      - "127.0.0.1:5601:5601"
    mem_limit: 2g
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  fleet-init:
    # One-shot: initializes Fleet plugin + creates fleet-server-policy.
    # KIBANA_FLEET_SETUP=1 on the fleet-server container does NOT create this policy in 9.x —
    # see memory reference_fleet_server_docker_9x.md.
    depends_on:
      kibana:
        condition: service_healthy
    image: curlimages/curl:latest
    container_name: soc-playground-fleet-init
    environment:
      - ELASTIC_PASSWORD=${V2_ELASTIC_PASSWORD}
    command: >
      sh -c '
        set -e;
        echo "-> fleet setup";
        curl -fsS -u "elastic:$$ELASTIC_PASSWORD" -H "kbn-xsrf: x" -X POST http://kibana:5601/api/fleet/setup > /dev/null;
        echo "-> fleet-server-policy (idempotent: 409 on re-run is fine)";
        HTTP=$$(curl -sS -o /tmp/resp.json -w "%{http_code}" -u "elastic:$$ELASTIC_PASSWORD" -H "kbn-xsrf: x" -H "Content-Type: application/json" -X POST "http://kibana:5601/api/fleet/agent_policies?sys_monitoring=true" -d "{\"id\":\"fleet-server-policy\",\"name\":\"Fleet Server policy\",\"namespace\":\"default\",\"has_fleet_server\":true,\"monitoring_enabled\":[\"logs\",\"metrics\"]}");
        case "$$HTTP" in
          200|201) echo "created" ;;
          409) echo "already exists" ;;
          *) echo "FAIL http=$$HTTP"; cat /tmp/resp.json; exit 1 ;;
        esac;
      '
    restart: "no"

  fleet-server:
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
      fleet-init:
        condition: service_completed_successfully
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    container_name: fleet-server
    user: "0"
    environment:
      # Fleet Server mode — self-bootstraps via Kibana Fleet API on first start.
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=https://elasticsearch:9200
      - FLEET_SERVER_ELASTICSEARCH_CA=/usr/share/elastic-agent/certs/ca/ca.crt
      - FLEET_SERVER_CERT=/usr/share/elastic-agent/certs/fleet-server/fleet-server.crt
      - FLEET_SERVER_CERT_KEY=/usr/share/elastic-agent/certs/fleet-server/fleet-server.key
      - FLEET_URL=https://fleet-server:8220
      # Agent side: trust our self-signed CA when enrolling back into this same Fleet Server.
      - FLEET_CA=/usr/share/elastic-agent/certs/ca/ca.crt
      # Run Kibana Fleet setup + auto-generate service token on first boot.
      - KIBANA_FLEET_SETUP=1
      - KIBANA_HOST=http://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${V2_ELASTIC_PASSWORD}
    volumes:
      - certs:/usr/share/elastic-agent/certs:ro
      - fleet_data:/usr/share/elastic-agent/state
    ports:
      - "127.0.0.1:8220:8220"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSk https://localhost:8220/api/status | grep -q '\"status\":\"HEALTHY\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  keycloak-init:
    # One-shot: converts realm.yaml → realm.json on the shared import volume.
    # Idempotent — runs every `compose up` and rewrites the JSON; Keycloak's
    # --import-realm skips if the realm already exists, so re-imports are safe no-ops.
    # Built from ./keycloak/Dockerfile so realm.yaml + seed.py ship via the build
    # context (compose `configs:` resolves paths on the remote daemon, which
    # doesn't have /workspace/; a build-and-upload sidesteps that).
    build: ./keycloak
    image: soc-playground/keycloak-init:local
    container_name: soc-playground-keycloak-init
    volumes:
      - keycloak_import:/import
    command: ["python", "/config/seed.py", "/config/realm.yaml", "/import/realm.json"]
    restart: "no"

  keycloak:
    depends_on:
      keycloak-init:
        condition: service_completed_successfully
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    container_name: keycloak
    environment:
      - KEYCLOAK_ADMIN=${V2_KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${V2_KEYCLOAK_ADMIN_PASSWORD}
      - KC_HEALTH_ENABLED=true
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      # Raise org.keycloak.events to DEBUG so the jboss-logging listener actually
      # writes LOGIN/LOGOUT/etc. lines to stdout. Root stays INFO — we only want
      # the events stream, not all of Keycloak's internals.
      - KC_LOG_LEVEL=INFO,org.keycloak.events:debug
    command: ["start-dev", "--import-realm"]
    volumes:
      - keycloak_data:/opt/keycloak/data
      - keycloak_import:/opt/keycloak/data/import:ro
    ports:
      - "127.0.0.1:8080:8080"
    mem_limit: 1g
    healthcheck:
      # Keycloak 26 management/health port is 9000; no curl in the image, so use
      # bash + /dev/tcp. CMD-SHELL's /bin/sh doesn't honor `echo -e`'s escapes
      # portably — force bash + printf, which reliably emits real CRLF (without
      # that, Vert.x rejects the request with "Host header required").
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/9000 && printf "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && timeout --preserve-status 2 cat <&3 | grep -q ''"status": "UP"'''
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  unbound:
    build: ./unbound
    image: soc-playground/unbound:local
    container_name: unbound
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      # pgrep is in the alpine base; confirms the daemon is up. (No netcat in minimal
      # alpine for a proper `dig`-style probe; pgrep is enough for a playground.)
      test: ["CMD", "pgrep", "unbound"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  squid:
    build: ./squid
    image: soc-playground/squid:local
    container_name: squid
    restart: unless-stopped
    mem_limit: 256m
    # /var/log/squid is a VOLUME in the ubuntu/squid image, which creates anonymous
    # volumes that persist across `compose up --build` — i.e., image changes to this
    # dir won't propagate. Force tmpfs so it resets to the image's state (proxy:proxy)
    # every restart. Logs ship via the entrypoint's `tail -F → stdout` anyway, so
    # persistence isn't needed.
    tmpfs:
      - /var/log/squid:uid=13,gid=13,mode=0755
      - /var/spool/squid:uid=13,gid=13,mode=0755
    healthcheck:
      # Squid's PID file is at /run/squid.pid in the ubuntu/squid image; presence
      # alone is enough to confirm the master process is up.
      test: ["CMD-SHELL", "test -f /run/squid.pid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  zeek:
    build: ./zeek
    image: soc-playground/zeek:local
    container_name: zeek
    # Host netns so Zeek's libpcap sees real interfaces (eth0, docker0, all br-* bridges).
    # Bridge-mode would only let it sniff its own veth, which is useless for passive monitoring.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    mem_limit: 1g
    volumes:
      - zeek_logs:/usr/local/zeek/logs
    # entrypoint.sh picks the soc-playground compose bridge (br-*) if one is UP,
    # else eth0. It uses the AF_PACKET plugin — libpcap rejects promisc mode on
    # the `any` pseudo-interface on recent Linux kernels, AF_PACKET sidesteps it.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'zeek -C -i af_packet' >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  certs:
    driver: local
  es_data:
    driver: local
  kibana_data:
    driver: local
  fleet_data:
    driver: local
  keycloak_data:
    driver: local
  keycloak_import:
    driver: local
  zeek_logs:
    driver: local
