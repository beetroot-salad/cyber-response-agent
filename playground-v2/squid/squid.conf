# Playground forward proxy. Goal: egress HTTP(S) traffic from workload containers
# flows through here, attributed by authenticated username (v2 §Telemetry — "Squid
# access log: outbound HTTP/S with user attribution").
#
# Shape: basic-auth + bcrypt; username lands in access.log via %[un (note bracket —
# it URL-quotes the field, which is what we want for log consumers).

# ---------- auth ----------
auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwd
auth_param basic realm SOC Playground proxy
auth_param basic credentialsttl 2 hours
auth_param basic casesensitive on

acl authenticated proxy_auth REQUIRED

# ---------- ACLs ----------
acl SSL_ports port 443 8443
acl Safe_ports port 80 21 443 70 210 1025-65535 280 488 591 777 8080 8443
acl CONNECT method CONNECT

# ---------- access ----------
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow authenticated
http_access deny all

http_port 3128

# ---------- logs ----------
# Custom format mirrors Elastic's `squid.access` integration field names where possible:
#   timestamp, elapsed, client, user, result/status, bytes, method, url, peer, mime
logformat soc %ts.%03tu %6tr %>a %[un %Ss/%03>Hs %<st %rm %ru %Sh/%<a %mt
# Regular files in /var/log/squid; the image's entrypoint runs `tail -F` on them
# to forward to container stdout. Writing to files (not /dev/stdout) is required
# because squid's parent-dir writability check can't traverse a symlink to /dev.
access_log stdio:/var/log/squid/access.log soc
cache_log /var/log/squid/cache.log
cache deny all

# No disk cache — a proxy for telemetry, not performance.
cache_dir null /tmp

# Don't leak internal identity via Via / X-Forwarded-For to public destinations —
# keep attribution inside our logs only.
forwarded_for delete
via off

# Hide hostname from error pages.
visible_hostname squid.soc-playground.local
