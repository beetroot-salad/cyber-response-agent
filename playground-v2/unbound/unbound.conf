# Recursive resolver for the playground. Query logging is the load-bearing telemetry —
# this is the DNS-log source for Zeek-independent DNS-event correlation (v2 §Telemetry).
# Upstream: public resolvers over Do53 (batch 6 scope is producing log shape; DoT to
# upstream + DNSSEC validation can land in a later hardening pass).

server:
    verbosity: 1
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Playground has no untrusted clients inside the docker network — no ACL trimming
    # needed. Revisit if/when a host container has a public egress route.
    access-control: 0.0.0.0/0 allow

    # Log every query + reply to stdout — container log capture is the shipping path.
    # `verbosity: 1` keeps startup + operational noise minimal; queries/replies are explicit flags.
    log-queries: yes
    log-replies: yes
    log-servfail: yes
    log-local-actions: yes
    log-identity: "unbound"
    log-time-ascii: yes
    use-syslog: no
    logfile: ""

    # Default unbound privilege-drop + chroot clashes with alpine's minimal filesystem;
    # disable chroot, keep the username drop. Running as root inside a throwaway
    # container is an acceptable playground trade-off.
    chroot: ""
    username: "unbound"
    directory: "/etc/unbound"
    pidfile: "/var/lib/unbound/unbound.pid"

    # Playground-internal zone. Batch 7 will add A/AAAA records for role hosts
    # (jump-box, web-tier, db-tier, office-workstation, canary, etc.).
    local-zone: "soc-playground.local." static

forward-zone:
    name: "."
    forward-addr: 1.1.1.1
    forward-addr: 9.9.9.9

remote-control:
    control-enable: no
