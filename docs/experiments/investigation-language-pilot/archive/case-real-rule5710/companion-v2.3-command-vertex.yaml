conclude:
  termination:
    category: severity-ceiling
    # Upgraded from v2.2's exhaustion-escalation. The fidelity report noted
    # severity-ceiling fit equally well; v2.3's ceiling_test.kind=tool-unavailable
    # expresses the actual mechanism precisely, so severity-ceiling is the
    # correct category.
    rationale: |
      Two mechanism hypotheses remain live after exhausting available leads:
      ?monitoring-bait-triggered (+, benign-origin test workload; all 5 predictions
      individually met but no authoritative mechanism grounding) and
      ?monitoring-host-compromise (-, adversarially live, not refutable with --).
      The evidence gap is definitive process ancestry / argv on monitoring-host,
      which the host-query deny-list blocks (/opt/workloads, /etc/cron.d) and
      which process-list cannot reconstruct for already-exited scripts. The
      approved-monitoring-sources anchor's own failure-mode guidance explicitly
      requires escalation for 'approved source, unexpected volume'. No archetype
      matches (monitoring-probe refuted by burst shape; service-account-rotation,
      credential-stuffing, external-bruteforce all disqualified upfront).
  ceiling_test:
    kind: tool-unavailable
    subject: "host_query file-stat on /opt/workloads/ and /etc/cron.d/; process-list argv+parent on monitoring-host"
  ceiling_rationale: |
    host_query tooling deny-list blocks file-stat on /opt/workloads/ and /etc/cron.d/;
    process-list returns command names only (no argv, no parent, no start time).
    These gaps are the precise evidence class needed to distinguish
    ?monitoring-bait-triggered from ?monitoring-host-compromise. The investigation
    cannot advance h-003 to -- without process ancestry, and process ancestry is
    unavailable from the tooling the agent can reach. Secondary discriminators
    that would close the case if accessible: direct inspection of the bait script
    file, the cron entry triggering it, or the bait workload's ownership record.
  disposition: unclear
  confidence: medium
  matched_archetype: null
  summary: |
    SSH invalid-user alert from the sanctioned playground monitoring host
    (172.22.0.10) exhibited a sub-200ms burst of 5 sentinel-username attempts
    at 03:30:49Z, violating the monitoring-probe archetype's cadence requirement.
    24h baseline confirms sanctioned single-attempt cadence on both sides of the
    burst; cadence resumed cleanly at the next tick (03:40:02Z, healthcheck).
    Three hypotheses refuted with --: ?internal-credential-guessing (all 93
    events cycle through sanctioned sentinels over 24h), ?monitoring-loop-broken
    (round-robin rotation then clean resume, not a stuck probe),
    ?compromise-followup (zero successful auths from 172.22.0.10 in 24h + 5m
    forward). Two hypotheses remain live: ?monitoring-bait-triggered (+, best
    supported by burst shape + clean cadence before/after + all 5 predictions
    individually met) and ?monitoring-host-compromise (-, not refuted because
    tooling deny-list blocks process ancestry on monitoring-host). Escalated as
    'approved source, unexpected volume' per approved-monitoring-sources anchor
    failure-mode guidance.
