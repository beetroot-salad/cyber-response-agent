# v2.6 companion — SSH invalid-user from internal cron job (benign, SCREEN match)
# Case: SEC-2026-0413 — wazuh-rule-5710 (SSH invalid user deploy from 10.0.2.15)
#
# Alert: 12 SSH invalid-user attempts from 10.0.2.15 over 5 minutes against
# prod-webserver-01. Source is internal CI/CD network; rate is low and regular.
#
# Key structural features:
# - SCREEN phase (loop 0): approved-monitoring-sources finds 10.0.2.15 as
#   "ci-deploy-01" (known automation host) → classification updated
# - Second SCREEN lead: auth-pattern confirms single username "deploy" at
#   consistent 25s intervals → screen_result: match
# - hypothesize block OMITTED — screen_result: match short-circuits full loop
# - Root cause: username "deploy" was renamed to "deploy-app" on 2026-03-01;
#   cron script on ci-deploy-01 was not updated
# - Termination: trust-root (internal endpoint, attribution ends at known host)
# - Systems: environment-knowledge, wazuh

# ---------------------------------------------------------------------------
# PROLOGUE — CONTEXTUALIZE
# ---------------------------------------------------------------------------

prologue:
  vertices:
    - id: v-001
      type: endpoint
      classification: unknown-endpoint
      identifier: "10.0.2.15 (internal, CI/CD subnet)"
      attributes:
        knowledge: partial
        ip: "10.0.2.15"
        role_hint: "internal host — subnet 10.0.2.0/24 (CI/CD automation network)"
      concerns:
        - "IP is internal but not yet cross-referenced against approved-monitoring-sources; need to confirm it is a known automation host vs. compromised internal machine"
      trust_root: true
      citations: ["siem:event=SEC-2026-0413"]

    - id: v-002
      type: endpoint
      classification: production-server
      identifier: "prod-webserver-01"
      attributes:
        kind: vm
        ip: "10.0.1.10"
        environment: production
        service: "public-facing web application"
      citations: ["siem:event=SEC-2026-0413"]

  edges:
    - id: e-001
      relation: attempted_auth
      source_vertex: v-001
      target_vertex: v-002
      when: { timestamp: "2026-04-13T02:03:07.844Z" }
      status: refuted
      attributes:
        protocol: ssh
        username_attempted: "deploy"
        firedtimes: 12
        window_seconds: 300
        wazuh_rule: "5710"
        full_log: "Apr 13 02:03:07 prod-webserver-01 sshd[14891]: Invalid user deploy from 10.0.2.15 port 54312"
      authority:
        kind: siem-event
        source: "siem:wazuh-rule-5710:event=SEC-2026-0413"
      concerns:
        - "rule.firedtimes=12 is the alert-level counter; auth-pattern lead needed for full sequence and interval analysis"

# ---------------------------------------------------------------------------
# GATHER — SCREEN phase only (no HYPOTHESIZE block — screen_result: match)
# ---------------------------------------------------------------------------

gather:
  # ---- SCREEN leads (loop 0) ----

  - lead:
      id: l-001
      loop: 0
      name: "screen-approved-monitoring-sources"
      target: v-001
      mode: screen
      query_details:
        system: "environment-knowledge"
        template: "knowledge/environment/operations/approved-monitoring-sources.md"
        query: "lookup 10.0.2.15 in approved-monitoring-sources table"
        time_window: "static lookup"
      outcome:
        attribute_updates:
          - vertex: v-001
            updates:
              classification: "known-automation-host"
              approved_monitoring: true
              host_name: "ci-deploy-01"
              purpose: "CI/CD automation — deploy cron jobs and release scripts"
              owner: "platform-engineering"
              notes: "10.0.2.15 registered as ci-deploy-01; added to approved-monitoring-sources 2025-11-14 by platform-engineering"

  - lead:
      id: l-002
      loop: 0
      name: "screen-authentication-pattern"
      target: v-002
      mode: screen
      selection_rationale: "Source is in approved-monitoring-sources as a known automation host. Auth-pattern confirms whether the attempt sequence matches a cron scheduling profile (single username, consistent interval) vs. an anomaly on a known host requiring full investigation. A cron profile → SCREEN match. Credential diversity, variable rate, or multi-username attempts → fall through to full loop."
      query_details:
        system: "wazuh"
        template: "leads/authentication-history/templates/wazuh.md"
        query: "data.srcip:10.0.2.15 AND agent.name:prod-webserver-01 rule:5710, 60min preceding + 10min forward"
        time_window: "2026-04-13T01:03:07Z–02:13:07Z"
      outcome:
        observations:
          vertices: []
          edges:
            - id: e-002
              relation: attempted_auth
              source_vertex: v-001
              target_vertex: v-002
              when:
                start: "2026-04-13T02:03:07Z"
                end: "2026-04-13T02:07:22Z"
              status: refuted
              attributes:
                protocol: ssh
                event_count: 12
                distinct_usernames: [deploy]
                username_count: 1
                successful_logins_forward: 0
                attempt_rate_per_second: 0.04
                burst_shape: "regular cadence, ~25s between attempts — consistent with a cron retry loop"
              authority:
                kind: siem-event
                source: "wazuh:rule=5710:event-window=l2-screen"
        screen_result: match

# ---------------------------------------------------------------------------
# CONCLUDE
# ---------------------------------------------------------------------------

conclude:
  termination:
    category: trust-root
    rationale: |
      SCREEN matched: 10.0.2.15 is ci-deploy-01, a known CI/CD automation host
      (approved-monitoring-sources, owner: platform-engineering). Auth-pattern
      confirms single username "deploy" at ~0.04/s (~25s cadence) — textbook cron
      retry loop, not a scanning or brute-force pattern. Zero successful logins in
      the forward window. Username "deploy" was renamed to "deploy-app" on 2026-03-01
      per a platform-engineering maintenance window; the cron script on ci-deploy-01
      was not updated. Attribution ends at v-001 (internal, identified, owned).
  disposition: benign
  confidence: high
  matched_archetype: misconfigured-automation
  summary: |
    Internal host 10.0.2.15 (ci-deploy-01, CI/CD automation, owned by
    platform-engineering) generated 12 SSH invalid-user attempts against
    prod-webserver-01 over 5 minutes on 2026-04-13T02:03–02:07Z. Single username
    "deploy" at ~0.04/s (~25s intervals) consistent with a cron retry loop.
    SCREEN matched: approved-monitoring-sources confirmed ci-deploy-01 as a known
    automation host; auth-pattern confirmed single-username cron cadence with zero
    successful logins.
    Root cause: username "deploy" was renamed to "deploy-app" on 2026-03-01
    (platform-engineering maintenance); cron script on ci-deploy-01 not updated.
    Recommend: update deploy cron script to use username "deploy-app";
    platform-engineering to notify dependent automation after future username changes.
