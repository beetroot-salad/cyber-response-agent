# v2.3 companion — A.4 S3 list burst (EDGE-AS-OBSERVATION experiment)
# Alert: CT-2026-04-14-003847 | company-customer-exports ListObjectsV2 burst
# Schema: spec-condensed-v2.4.md, with experimental modeling decisions.
#
# EXPERIMENT: this companion tests the "drop command type, action lives on edges"
# hypothesis. Compare against walk-a4-v2.3.yaml (the command-vertex version).
#
# Deltas from walk-a4-v2.3.yaml:
#
# 1. NO `command` vertex. The CloudTrail list burst is modeled as a single
#    `listed` edge from v-001 (iam-role-session) to v-003 (storage), with
#    count + window + api attributes carrying the aggregate observation.
#    Net: one vertex and one edge saved in the prologue.
#
# 2. `listed` relation — proposed addition to §10:
#      listed: session | process → storage | database
#    Semantics: "this actor enumerated the target's contents". v2.3 today
#    has no action-verb relations for storage; §10 would grow a small family
#    (listed, read_object, wrote_object, ...) as cases demand. For MVP this
#    is the first entry.
#
# 3. Marcus's laptop is materialized as v-005 (endpoint, unknown-endpoint).
#    Previous walks put the client IP as a session attribute; this walk
#    follows the "partial-knowledge endpoint" convention from the earlier
#    design discussion — IP-only observations still get an endpoint vertex
#    because investigations reason about endpoints, not raw addresses.
#
# 4. Hypothesis proposed_edges use process/session parents per the
#    triggered_by narrowing (process | session → process | session). No
#    `command` parents; no stretch to the catalog.
#
# 5. Scale-of-reasoning applied in l-003: the process tree materializes
#    v-006 (bash) and v-007 (aws cli) plus the triggered_by chain, but does
#    NOT re-emit the `listed` action at process scale. The prologue's
#    session-scale listed edge (e-002) remains the authoritative record of
#    the list burst. An additional triggered_by edge (e-008, v-001 → v-007)
#    explicitly attributes the iam-role-session to the aws cli process that
#    invoked AssumeRole via instance-profile — that's the only new
#    action-attribution edge l-003 contributes.
#
# 6. Strong resolutions cite e-002 (the listed edge, authoritative-source)
#    as the anchoring supporting edge, directly — no indirection through a
#    command vertex.
#
# What DIDN'T work:
#
# - No `session runs_on endpoint` relation in §10. v-004 (ssh-session) lives
#   on v-002 (ec2 instance), but the only way to express that in v2.3 today
#   is via process-level runs_on (v-006 runs_on v-002) + triggered_by chain
#   (v-006 triggered_by v-004). The session's home is implicit, not explicit.
#   Not blocking but awkward. Candidate for §10 widening: add
#   `runs_on: session → endpoint`.
#
# - The catalog needs action-verb relations for storage/database targets.
#   MVP: just `listed` for this case. Full rollout would add read_object,
#   wrote_object, created, deleted, modified, etc. as cases demand.

# ---------------------------------------------------------------------------
# PROLOGUE — CONTEXTUALIZE
# ---------------------------------------------------------------------------

prologue:
  vertices:
    - id: v-001
      type: session
      classification: iam-role-session
      identifier: "AssumedRole/data-pipeline-svc (session i-0a1b2c3d @2026-04-14T01:58:22Z)"
      attributes:
        role_arn: "arn:aws:iam::123456789012:role/data-pipeline-svc"
        session_name: "i-0a1b2c3d"
        session_start: "2026-04-14T01:58:22Z"
        source_ip: "10.42.17.88"
        mfa_authenticated: false
        role_sharing_note: "~30 batch jobs share this role via instance-profile"
      concerns:
        - "EC2 instance-profile sessions carry no MFA by design; mfa_authenticated=false is expected and carries no discriminating signal"
        - "iam-session-origination-chain is attribution-opaque on EC2 instance profiles — the IAM chain terminates at the instance profile attachment"
      citations: ["cloudtrail:event=CT-2026-04-14-003847"]

    - id: v-002
      type: endpoint
      classification: production-server
      identifier: "i-0a1b2c3d (us-east-1b)"
      attributes:
        kind: ec2-instance
        instance_id: "i-0a1b2c3d"
        private_ip: "10.42.17.88"
        availability_zone: "us-east-1b"
        iam_instance_profile: "arn:aws:iam::123456789012:instance-profile/data-pipeline-svc"
      citations: ["cloudtrail:event=CT-2026-04-14-003847:ec2_context"]

    - id: v-003
      type: storage
      classification: customer-pii-store
      identifier: "s3://company-customer-exports"
      attributes:
        kind: object-store
        provider: aws-s3
        bucket: "company-customer-exports"
        bucket_classification: "customer-pii"
        region: "us-east-1"
        account_id: "123456789012"
        atypical_access_note: "outside role data-pipeline-svc's documented access pattern (typical_buckets: company-internal-reports, company-etl-staging)"
      citations: ["cloudtrail:event=CT-2026-04-14-003847:resource"]

  edges:
    - id: e-001
      relation: initiated_by
      source_vertex: v-001
      target_vertex: v-002
      when: { timestamp: "2026-04-14T01:58:22Z" }
      authority:
        kind: inferred-structural
        source: "cloudtrail:event=CT-2026-04-14-003847:sourceIPAddress=10.42.17.88 matches v-002.private_ip"

    - id: e-002
      relation: listed
      # Action-as-edge: this edge represents the aggregate observation of
      # 17 ListObjectsV2 calls over a 172-second window. Count + window live
      # in attributes; no synthetic command vertex materialized. See §3
      # Scale-of-reasoning + §10 (proposed) `listed` entry.
      source_vertex: v-001
      target_vertex: v-003
      when:
        start: "2026-04-14T02:14:51Z"
        end: "2026-04-14T02:17:43Z"
      attributes:
        api: "s3:ListObjectsV2"
        count: 17
        window_duration_seconds: 172
        prefix: ""
        max_keys: 1000
        user_agent: "aws-sdk-python/1.34.6 Python/3.11.8 Linux/5.15.0-1051-aws"
      authority:
        kind: authoritative-source
        source: "cloudtrail:event=CT-2026-04-14-003847"
      concerns:
        - "no accompanying GetObject calls — this is a pure enumeration, suggesting catalog-building or automated discovery rather than data retrieval"

# ---------------------------------------------------------------------------
# HYPOTHESIZE
# ---------------------------------------------------------------------------

hypothesize:
  hypotheses:
    # All four hypotheses attach to v-001 — the iam-role-session is the
    # entity whose provenance we're investigating. Proposed parents are
    # processes or sessions (not commands) per the triggered_by narrowing.

    - id: h-001
      name: "?scheduled-batch-run"
      attached_to_vertex: v-001
      proposed_edge:
        relation: triggered_by
        parent_vertex:
          type: process
          classification: automation-pipeline-process
          attributes:
            mechanism: "a registered batch job on i-0a1b2c3d (cron/systemd-timer-driven) assumed data-pipeline-svc via instance-profile and issued the S3 list burst as part of a documented ETL step"
      predictions:
        - id: p1
          claim: "a registered nightly batch job consuming data-pipeline-svc is scheduled in the 01:00–05:00 UTC window and is documented to access company-customer-exports"
        - id: p2
          claim: "no concurrent SSH session from a human operator is present on i-0a1b2c3d at the time of the list burst"
      refutation_shape:
        - id: r1
          claim: "the job scheduler has no registered job for data-pipeline-svc that accesses company-customer-exports"
        - id: r2
          claim: "an interactive SSH session from a named operator is active on i-0a1b2c3d during the list burst window"

    - id: h-002
      name: "?ad-hoc-operator-run"
      attached_to_vertex: v-001
      proposed_edge:
        relation: triggered_by
        parent_vertex:
          type: process
          classification: operator-tool-invocation
          attributes:
            mechanism: "a named employee on a compliant MFA-verified device SSH'd into i-0a1b2c3d and manually invoked aws-cli commands from an interactive bash session; the aws-cli process assumed the instance-profile role and issued the S3 list burst"
      predictions:
        - id: p1
          claim: "an interactive SSH session authenticated as a named employee is active on i-0a1b2c3d during the list burst window"
        - id: p2
          claim: "the operator has a documented change ticket or team communication justifying access to company-customer-exports at this time"
        - id: p3
          claim: "the S3 list calls are attributable to commands run in the operator's bash session (visible in the process tree)"
      refutation_shape:
        - id: r1
          claim: "no SSH session from a named employee is present on i-0a1b2c3d during the list burst"
        - id: r2
          claim: "out-of-band confirmation from the attributed operator that no manual session occurred on i-0a1b2c3d at this time"
      concerns:
        - "human presence confirmed via SSH session is necessary but not sufficient; p2 (authorization evidence) requires change-management or communication verification that no automated anchor can directly provide"
        - "r2 is an out-of-band refutation shape — unreachable from the agent's tool envelope. The ceiling mechanism is r2's unreachability."

    - id: h-003
      name: "?compromised-instance"
      attached_to_vertex: v-001
      proposed_edge:
        relation: triggered_by
        parent_vertex:
          type: process
          classification: unclassified-process
          attributes:
            mechanism: "an attacker process running on i-0a1b2c3d used the instance-profile credential locally to assume the role and issue the S3 list burst; the burst is attacker reconnaissance on a PII bucket"
            attacker_controlled: true
      predictions:
        - id: p1
          claim: "anomalous processes (not attributable to running batch jobs or a named operator's SSH session process tree) are present on i-0a1b2c3d at the time of the burst"
        - id: p2
          claim: "ec2-instance-integrity returns a finding indicating unauthorized modification or active attacker tooling on i-0a1b2c3d"
      refutation_shape:
        - id: r1
          claim: "ec2-instance-integrity returns clean on i-0a1b2c3d AND the list calls are fully attributable to a named operator's process tree"
      concerns:
        - "ec2-instance-integrity is partial-authority for the full 'is this instance compromised at any layer' question — covers disk/file/IMDSv2 but not in-memory implants or kernel rootkits"

    - id: h-004
      name: "?compromised-iam-credential"
      attached_to_vertex: v-001
      proposed_edge:
        relation: initiated_by
        parent_vertex:
          type: endpoint
          classification: unknown-endpoint
          attributes:
            knowledge: partial
            attacker_infrastructure: true
            mechanism: "the instance-profile credential was extracted from i-0a1b2c3d and is being used from an external endpoint, making the role session appear to originate at v-002 while the actual caller is elsewhere"
      predictions:
        - id: p1
          claim: "the source IP for the S3 API calls is NOT the registered private IP of i-0a1b2c3d, indicating the credential is being used from an external host"
        - id: p2
          claim: "the instance i-0a1b2c3d is reachable and healthy but shows no SSH session or process activity correlated with the list burst timing"
      refutation_shape:
        - id: r1
          claim: "all S3 API calls originate from i-0a1b2c3d's registered private IP AND concurrent SSH session activity on the instance is correlated with the burst timing"
      concerns:
        - "source IP verification (p1) is immediately testable from CloudTrail; if the IP matches, this hypothesis weakens but is not refuted (instance could be the pivot point)"
        - "full refutation requires out-of-band confirmation that the credential was not exported"

# ---------------------------------------------------------------------------
# GATHER
# ---------------------------------------------------------------------------

gather:
  - lead:
      id: l-001
      loop: 1
      name: "anchor-lookup(job-scheduler)"
      target: v-001
      tests: [h-001]
      observes:
        - hypothesis: h-001
          predictions: [p1]
          refutations: [r1]
      query_details:
        system: job-scheduler
        template: "leads/anchor-lookup/templates/job-scheduler.md"
        query: "registered jobs for role data-pipeline-svc accessing bucket company-customer-exports, active in nightly window 01:00-05:00 UTC"
        time_window: "nightly batch window 01:00–05:00 UTC 2026-04-14"
        substitutions:
          role: "data-pipeline-svc"
          bucket: "company-customer-exports"
      outcome:
        observations:
          vertices: []
          edges: []
        trust_anchor_result:
          anchor_id: job-scheduler
          kind: job-scheduler
          result: refuted
          as_of: "2026-04-14T02:18:00Z"
          authority_for_question: full
      resolutions:
        - hypothesis: h-001
          before: null
          after: "-"
          severity_of_test: severe
          matched_refutation_ids: [r1]
          reasoning: |
            job-scheduler returned no registered job for role=data-pipeline-svc
            accessing bucket=company-customer-exports in any window. r1 directly
            satisfied. Weight transitions to -; not -- because unregistered
            cron/ad-hoc invocations remain possible and the registry is not
            exhaustive for them.
          supporting_edges: [e-002]
          # e-002 is the listed-burst observation — the strong-authority
          # siem-event edge that anchors every resolution in this walk.

  - lead:
