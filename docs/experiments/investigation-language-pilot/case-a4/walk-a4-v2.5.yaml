                source: "v-006 materialized from host-audit stream on i-0a1b2c3d"
            - id: e-007
              relation: triggered_by
              # The iam-role-session v-001 was triggered by the aws cli
              # process v-007 — that's the process that invoked AssumeRole
              # via instance-profile and produced v-001's session credentials.
              # This is the process-scale attribution of the observed session.
              # triggered_by direction: source (v-001, the triggered) → target
              # (v-007, the trigger). §10 fix: triggered_by process|session →
              # process|session.
              source_vertex: v-001
              target_vertex: v-007
              authority:
                kind: inferred-structural
                source: "temporal + process-tree correlation: v-007's cmdline invokes aws cli, which assumes the instance-profile role to produce v-001 at the matching timestamp"
        # NOTE: l-003 does NOT emit an additional `listed` edge at process
        # scale. The prologue's e-002 (session-scale) is the authoritative
