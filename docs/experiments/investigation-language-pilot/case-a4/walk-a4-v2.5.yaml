                session_end: null
                tty: "pts/0"
                authenticated_user: "marcus@company.com"
              concerns:
                - "authenticated_user is an attribute at this scale; elevating to a trust_root'd identity vertex requires a subsequent trust lead (l-004 vpn-mfa). Mechanical-leads-stay-within-data-source (§12 rule 11)."
            - id: v-005
              type: endpoint
              classification: unknown-endpoint
              identifier: "10.20.5.147 (marcus's client, partial knowledge)"
              attributes:
