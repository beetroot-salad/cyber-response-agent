        # principle in practice: the action is observed at the scale the SIEM
        # recorded it (session); finer-grained attribution is added as
        # separate edges without duplicating the action.
      resolutions:
        - hypothesis: h-002
          before: "+"
          after: "+"
          severity_of_test: moderate
          matched_prediction_ids: [p3]
          reasoning: |
            aws cli invocation (v-007) is a child of marcus's bash (v-006),
