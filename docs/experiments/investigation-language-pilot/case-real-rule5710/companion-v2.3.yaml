conclude:
  termination:
    category: severity-ceiling
    rationale: |
      Two mechanism hypotheses remain live after exhausting available leads:
      ?monitoring-bait-triggered (+, benign-origin test workload; all 5
      predictions individually met but no authoritative mechanism grounding)
      and ?monitoring-host-compromise (-, adversarially live, not refutable
      with --). The evidence gap is definitive process ancestry / argv on
      monitoring-host, which the host-query deny-list blocks and which
      process-list cannot reconstruct for already-exited scripts. The
      approved-monitoring-sources anchor explicitly requires escalation for
      'approved source, unexpected volume'.
  ceiling_test:
    kind: tool-unavailable
    subject: "host_query file-stat on /opt/workloads/ and /etc/cron.d/; process-list argv+parent on monitoring-host"
  ceiling_rationale: |
    host_query tooling deny-list blocks file-stat on /opt/workloads/ and
    /etc/cron.d/; process-list returns command names only (no argv, no
    parent, no start time). These gaps are the precise evidence class
    needed to distinguish ?monitoring-bait-triggered from
    ?monitoring-host-compromise. The investigation cannot advance h-003 to
    -- without process ancestry, and process ancestry is unavailable from
    the tooling the agent can reach.
  disposition: unclear
  confidence: medium
  matched_archetype: null
  summary: |
    SSH invalid-user alert from the sanctioned playground monitoring host
    (172.22.0.10) exhibited a sub-200ms burst of 5 sentinel-username
    attempts at 03:30:49Z, violating the monitoring-probe archetype's
    cadence requirement. The observed activity is modeled as three
    attempted_auth edges from v-001 (source endpoint, partial knowledge)
    to v-002 (target-endpoint): e-001 (the triggering alert event), e-002
    (1h+5m window aggregate), e-003 (24h baseline aggregate). 24h baseline
    confirms sanctioned single-attempt cadence on both sides of the burst;
    cadence resumed cleanly at the next tick (03:40:02Z, healthcheck).
    h-001 (?monitoring-loop-broken), h-004 (?internal-credential-guessing),
    and h-005 (?compromise-followup) refuted at --. h-002
    (?monitoring-bait-triggered) caps at + (all predictions met but no
    authoritative mechanism grounding). h-003 (?monitoring-host-compromise)
    caps at - (partial-authority anchor + tool-unavailable for process
    ancestry). Severity-ceiling termination: tool-unavailable ceiling test.
