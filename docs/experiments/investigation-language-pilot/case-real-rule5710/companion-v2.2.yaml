# ---------------------------------------------------------------------------
# PROLOGUE — CONTEXTUALIZE phase
# Vertices and edges derived directly from the alert, before any leads.
# ---------------------------------------------------------------------------

prologue:
  vertices:
    - id: v-001
      type: ip
      classification: internal-monitoring-host
      # Classification extends the seed vocabulary with a deployment-specific
      # slug: ip:internal-monitoring-host.  The spec allows {type}:{slug}
      # provisionals for unrecognized cases.
      identifier: "172.22.0.10"
      attributes:
        role: "playground monitoring host container"
        classification_source: "environment/context/ip-ranges.md"
      citations: ["siem:event=1776137449.1265639"]

    - id: v-002
      type: host
      classification: monitored-endpoint
      identifier: "target-endpoint (172.22.0.2, agent.id=002)"
      attributes:
        agent_name: "target-endpoint"
        agent_id: "002"
        ip: "172.22.0.2"
      citations: ["siem:event=1776137449.1265639"]

    - id: v-003
      type: user
      classification: unclassified-user
      identifier: "sensu"
      attributes:
        username_pattern: "monitoring-sentinel"
        pattern_source: "environment/context/identity-patterns.md"
      concerns:
        - "username 'sensu' matches the monitoring-pattern sentinel list — but pattern-match alone does not confirm legitimate provenance; see h-003 (?monitoring-host-compromise)"
      citations: ["siem:event=1776137449.1265639"]

    - id: v-004
      type: session
      classification: ssh-session
      # NOTE: This is an ATTEMPTED (failed) session, not an established one.
      # The schema has no 'attempted' status on a session vertex — only
      # edge.status can carry 'hypothesized' or 'refuted'.  We model the
      # vertex as the session attempt and note the failure in concerns.
      identifier: "ssh attempt — sensu@target-endpoint from 172.22.0.10:42202"
      attributes:
        src_ip: "172.22.0.10"
        src_port: 42202
        dest_host: "target-endpoint"
        dest_port: 22
        outcome: "failed (invalid user)"
        wazuh_rule: "5710"
        firedtimes: 7
        timestamp: "2026-04-14T03:30:49.588Z"
      concerns:
        - "rule.firedtimes=7 is a rule-level counter, NOT a per-source attempt count — real attempt count requires authentication-history lead"
        - "this is one of multiple sub-200ms burst attempts; the single alert vertex represents the triggering event, not the full burst"
      citations: ["siem:event=1776137449.1265639"]

  edges:
    - id: e-001
      relation: initiated_by
      source_vertex: v-004
      target_vertex: v-001
      when: { timestamp: "2026-04-14T03:30:49.588Z" }
      authority:
        kind: siem-event
        source: "siem:wazuh-rule-5710:event=1776137449.1265639"
      attributes:
        username_attempted: "sensu"
        src_port: 42202

    - id: e-002
      relation: connected_to
      # NOTE: using connected_to as the closest relation in the catalog for
      # "attempt to authenticate to target". The relation catalog has no
      # 'attempted_auth_to' relation; connected_to is the best fit for a
      # network-level SSH attempt edge.  This is a schema bend — see
      # fidelity report.
      source_vertex: v-004
      target_vertex: v-002
      when: { timestamp: "2026-04-14T03:30:49.588Z" }
      status: refuted
      # status: refuted because the authentication failed (invalid user).
      authority:
        kind: siem-event
        source: "siem:wazuh-rule-5710:event=1776137449.1265639"

# ---------------------------------------------------------------------------
# HYPOTHESIZE — loop 1
# Five hypotheses formed after SCREEN returned no_match.
# ---------------------------------------------------------------------------
#
# NOTE ON SCREEN: The SCREEN phase ran four leads and returned no_match.
# v2.2 has no SCREEN slot.  The screen leads are modeled here as loop:0
# leads in the gather section.  The approved-monitoring-sources trust
# anchor fired during SCREEN and produced a REFUTATION — an unusual outcome
# (anchors typically confirm).  That lead is l-002 (loop 0, trust mode).
# See fidelity report §"What required bending the schema".

hypothesize:
  hypotheses:
    - id: h-001
      name: "?monitoring-loop-broken"
      canonical: true
      attached_to_vertex: v-001
      proposed_edge:
        relation: initiated_by
        parent_vertex:
          type: session
          classification: automation-pipeline-process
          attributes:
            mechanism: "cron-driven monitoring probe stuck in a retry loop"
      predictions:
        - id: p1
          claim: "authentication attempts from 172.22.0.10 cluster on a SINGLE sentinel username, not a rotation across the full sentinel set"
        - id: p2
          claim: "the burst cadence is persistent / repetitive rather than a single discrete event"
        - id: p3
          claim: "cron is alive on monitoring-host and monitoring_probe process is visible or recently exited"
        - id: p4
          claim: "no successful authentication from 172.22.0.10 to target-endpoint"
      refutation_shape:
        - id: r1
          claim: "attempts from 172.22.0.10 rotate across MULTIPLE distinct sentinel usernames within the burst window — inconsistent with a single-username retry loop"
        - id: r2
          claim: "burst is a single isolated event with normal cadence on both sides — inconsistent with a stuck loop"
      concerns:
        - "cron-driven loop could still look periodic inside the burst; cadence violation is the sole anomaly"
      weight: null
      status: active

    - id: h-002
      name: "?monitoring-bait-triggered"
      canonical: true
      attached_to_vertex: v-001
      proposed_edge:
        relation: initiated_by
        parent_vertex:
          type: session
          classification: automation-pipeline-process
          attributes:
            mechanism: "manually-triggered monitoring_bait.sh workload (adversarial-evaluation variant, documented in ip-ranges.md)"
      predictions:
        - id: p1
          claim: "authentication attempts use only sanctioned sentinel usernames (bait reuses monitoring identities by design)"
        - id: p2
          claim: "burst is a single discrete event, not sustained — cadence resumes within one sanctioned tick after the burst"
        - id: p3
          claim: "no successful authentication from 172.22.0.10 to target-endpoint"
        - id: p4
          claim: "no non-5710 alerts on monitoring-host in the preceding hours (no compromise precursors)"
        - id: p5
          claim: "cron is alive on monitoring-host (host is a live scheduled-job environment, not hollowed out)"
      refutation_shape:
        - id: r1
          claim: "username rotation includes names OUTSIDE the sanctioned sentinel set"
        - id: r2
          claim: "burst activity is sustained (not a single discrete event) or cadence does not resume after the burst"
        - id: r3
          claim: "a successful authentication from 172.22.0.10 follows the burst"
      concerns:
        - "monitoring_bait.sh and a compromise-that-mimics-bait are observationally near-identical — the disambiguator is absence of compromise precursors, not presence of bait name alone"
        - "if the bait process has already exited at query time, process-list absence cannot refute this hypothesis"
        - "file-stat on /opt/workloads/ and /etc/cron.d/ are deny-listed, blocking direct script verification"
      weight: null
      status: active

    - id: h-003
      name: "?monitoring-host-compromise"
      canonical: true
      attached_to_vertex: v-001
      proposed_edge:
        relation: initiated_by
        parent_vertex:
          type: user
          classification: unknown-attacker
          attributes:
            mechanism: "adversary with access to 172.22.0.10 borrowing the approved source's sentinel username pool to evade detection"
      predictions:
        - id: p1
          claim: "username rotation includes names OUTSIDE the sentinel set (wordlist expansion), OR"
        - id: p2
          claim: "burst activity is sustained over the full observation window, OR"
        - id: p3
          claim: "a successful authentication from 172.22.0.10 follows the burst, OR"
        - id: p4
          claim: "non-5710 alerts (file-integrity, rootkit, process-anomaly) on monitoring-host precede or accompany the burst"
      refutation_shape:
        - id: r1
          claim: "zero non-5710 alerts on monitoring-host across a multi-hour window AND no successful authentication AND no username rotation outside sentinel set AND no sustained burst — collectively constitute weak refutation"
        # NOTE: these refutation conditions are deliberately grouped rather than
        # individually decisive because no single absence is a strong refutation.
        # The investigation treats this as '-' (weakly refuted), not '--'.
      concerns:
        - "adversary may deliberately stay within the sentinel set to exploit the approved-source trust relationship"
        - "absence of compromise indicators is not a direct contradiction — early-stage compromise may not yet produce parallel telemetry"
        - "process-list on monitoring-host returns command names only (no argv, no parent, no start time) — cannot audit deep host state"
        - "file-stat on /opt/workloads/ and /etc/cron.d/ deny-listed — cannot verify process ancestry"
      weight: null
      status: active

    - id: h-004
      name: "?internal-credential-guessing"
      canonical: true
      attached_to_vertex: v-001
      proposed_edge:
        relation: initiated_by
        parent_vertex:
          type: user
          classification: unclassified-user
          attributes:
            mechanism: "authenticated operator on 172.22.0.10 manually attempting SSH logins (typo recovery, misconfigured client)"
      predictions:
        - id: p1
          claim: "authentication attempts use real-looking or wordlist-common usernames (not exclusively monitoring sentinels)"
        - id: p2
          claim: "attempt volume is low (not a rapid sub-second burst)"
      refutation_shape:
        - id: r1
          claim: "ALL observed usernames across the full window are sanctioned monitoring sentinels — no real-looking or wordlist names"
        - id: r2
          claim: "attempt pattern is a sub-second multi-sentinel burst, incompatible with manual typo-recovery"
      weight: null
      status: active

    - id: h-005
      name: "?compromise-followup"
      canonical: true
      # NOTE: this is the mandatory adversarial hypothesis.  v2.2 has no
      # explicit 'mandatory-adversarial' flag on a hypothesis; the closest
      # expression is keeping it active regardless of other evidence and
      # noting in concerns.
      attached_to_vertex: v-002
      proposed_edge:
        relation: authenticated_as
        parent_vertex:
          type: user
          classification: unknown-attacker
          attributes:
            mechanism: "one of the burst attempts leads to a successful SSH login from 172.22.0.10 to target-endpoint"
      predictions:
        - id: p1
          claim: "at least one authentication_success event (wazuh rule 5501 or 5715) from 172.22.0.10 against target-endpoint occurs within the burst window + 5 minutes forward"
      refutation_shape:
        - id: r1
          claim: "zero authentication_success events from 172.22.0.10 against target-endpoint across the full burst window and a forward window of at least 5 minutes"
      concerns:
        - "mandatory adversarial hypothesis — must be explicitly refuted before considering benign disposition"
        - "SCREEN checked 60s forward; must extend forward window to ≥5 minutes for authoritative refutation"
      weight: null
      status: active

# ---------------------------------------------------------------------------
# GATHER — all leads across SCREEN (loop 0), loop 1, and loop 2
# ---------------------------------------------------------------------------

gather:
  # ---- SCREEN leads (loop 0) ----
  # NOTE: v2.2 does not have a SCREEN phase slot.  SCREEN leads are modeled
  # as loop:0 (before loop 1).  The SCREEN phase ran four sub-leads; some
  # are classifiable as 'scope' (source/username classification), one as
  # 'trust' (approved-monitoring-sources anchor).  The composite SCREEN is
  # split into three lead blocks for schema fidelity.

  - lead:
      id: l-001
      loop: 0
      name: "screen-source-username-classification"
      mode: scope
      target: v-001
      # No intended_hypothesis_set — scope mode.
      query_details:
        system: "environment-knowledge"
        template: "leads/source-classification + leads/username-classification"
        query: "classify 172.22.0.10 via ip-ranges.md; classify 'sensu' via identity-patterns.md"
        time_window: "static lookup"
        substitutions:
          srcip: "172.22.0.10"
          srcuser: "sensu"
          target: "target-endpoint"
      concerns:
        - "static lookup against environment docs — not a live query; confidence is authoritative for the classification but does not confirm current behavior"
      outcome:
        observations:
          vertices:
            - id: v-005
              type: anchor-source
              classification: "anchor-source:environment-context"
              identifier: "environment/context/ip-ranges.md + environment/context/identity-patterns.md"
              attributes:
                ip_classification: "172.22.0.10 = internal-monitoring-host"
                username_classification: "'sensu' = monitoring-pattern sentinel"
          edges:
            - id: e-003
              relation: attested_by
              source_vertex: v-001
              target_vertex: v-005
              authority:
                kind: authoritative-source
                source: "environment/context/ip-ranges.md"
            - id: e-004
              relation: attested_by
              source_vertex: v-003
              target_vertex: v-005
              authority:
                kind: authoritative-source
                source: "environment/context/identity-patterns.md"
      # No resolutions — this is a scope lead establishing context, not
      # discriminating hypotheses.  Hypotheses are not yet formed at loop 0.

  - lead:
      id: l-002
      loop: 0
      name: "screen-approved-monitoring-sources-anchor"
      mode: trust
      target: v-001
      intended_hypothesis_set: [h-002, h-003]
      # NOTE: This is the anchor lead that produced a REFUTATION.  It is
      # unusual: trust leads typically confirm (and set trust_root_reached).
      # Here the anchor table confirms the identity triple but the cadence
      # check FAILS per the anchor's own failure-mode guidance, yielding a
      # refutation of the confirmation shape.
      # In v2.2, trust mode is designed for confirmation paths.  A refuting
      # trust lead has no dedicated 'result: refuted' slot at the lead level.
      # We model the anchor observation in outcome.observations and encode the
      # refutation as a resolution with after: "--" on the fast-path (which is
      # implicitly the monitoring-probe archetype match condition, not a named
      # hypothesis here).  The structured anchor result lives in the resolution
      # reasoning string — there is no top-level structured slot.  See fidelity
      # report §"What required bending the schema".
      query_details:
        system: "environment-knowledge"
        template: "knowledge/environment/operations/approved-monitoring-sources.md"
        query: "lookup (172.22.0.10, sensu, target-endpoint) in approved-monitoring-sources table; check cadence requirement"
        time_window: "static lookup + runtime cadence check"
        substitutions:
          srcip: "172.22.0.10"
          srcuser: "sensu"
          target: "target-endpoint"
          observed_attempt_count_5min: 6
          expected_attempt_count_5min: 1
      concerns:
        - "approved-monitoring-sources table confirms the identity triple but the table's own failure-mode guidance triggers: 'source approved but burst volume observed → refutation; escalate as approved source, unexpected volume'"
        - "this lead is trust mode but its result is a refutation, not a confirmation — v2.2 trust mode is designed for confirmation; refuting anchors are a schema gap"
      outcome:
        observations:
          vertices:
            - id: v-006
              type: anchor-source
              classification: "anchor-source:org-authority"
              identifier: "approved-monitoring-sources (org-authority)"
              attributes:
                anchor_kind: "org-authority"
                lookup_result: "identity-triple-approved"
                cadence_check: "FAILED — observed 6 attempts in 5 min; sanctioned cadence = 1 attempt per ~10 min"
                failure_mode_triggered: "source approved but burst volume observed → refutation"
              concerns:
                - "anchor confirms IDENTITY but refutes CADENCE — these are separable facts the anchor stores in a single result field"
          edges:
            - id: e-005
              relation: attested_by
              source_vertex: v-001
              target_vertex: v-006
              authority:
                kind: authoritative-source
                source: "approved-monitoring-sources.md"
              concerns:
                - "the attested_by edge here encodes the identity-triple approval; the cadence refutation is in the vertex attributes, not a separate edge — schema has no 'refuted_by' relation"
        # trust_root_reached is NOT set — anchor refuted, not confirmed.
      resolutions:
        # The SCREEN anchor refutation eliminated the monitoring-probe FAST-PATH.
        # v2.2 has no slot for archetype fast-path elimination as a resolution
        # type.  We encode it as a weak negative update on h-003 (which benefits
        # from the burst evidence) and a weak positive preliminary for h-002.
        # NOTE: h-001/h-004/h-005 are not yet fully formed at SCREEN time; their
        # weights are updated in later leads.  This resolution is necessarily partial.
        - hypothesis: h-002
          before: null
          after: "+"
          severity_of_test: moderate
          matched_prediction_ids: [p1]
          reasoning: "anchor confirms the (172.22.0.10, sensu, target-endpoint) triple is on the approved table — identity is consistent with h-002 (?monitoring-bait-triggered) which reuses sentinel usernames from this same source. The burst shape is also consistent with h-002's predicted discrete injection. Moderate — circumstantial at this stage."
          supporting_edges: [e-005]

        - hypothesis: h-003
          before: null
          after: "-"
          severity_of_test: moderate
          matched_refutation_ids: [r1]
          reasoning: "anchor's cadence failure mode 'source approved but burst volume observed → refutation' weakly refutes ?monitoring-host-compromise in the sense that a monitoring-probe fast-path confirm is unavailable — but the anchor does NOT refute the compromise hypothesis itself. The '-' here reflects that the expected single-attempt cadence is violated but the identity is still approved. This resolution is a schema awkwardness: the anchor refuted the fast-path archetype, not this hypothesis directly. See fidelity report."
          supporting_edges: [e-005]

  - lead:
      id: l-003
      loop: 0
      name: "screen-authentication-history"
      mode: scope
      target: v-002
      query_details:
        system: "wazuh"
        template: "leads/authentication-history/templates/wazuh.md"
        query: "wazuh 5710 events from 172.22.0.10 against target-endpoint, 5 min preceding + 60 sec following alert"
