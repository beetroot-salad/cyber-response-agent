#
# NOTE: The investigation has explicit per-loop ANALYZE blocks with archetype
# fit checks.  v2.2 has no ANALYZE phase slot and no per-loop archetype scan
# slot.  The archetype fit check is summarized in the conclude rationale.
# The ANALYZE reasoning is not separately addressable in the schema.

conclude:
  termination:
    category: exhaustion-escalation
    # NOTE: The investigation's termination is closest to 'exhaustion-escalation'
    # in the v2.2 enum.  The original uses 'adversarial hypothesis not refuted
    # with available tooling' as the primary reason — which maps to the
    # severity-ceiling category as well (tooling deny-list caps what's provable).
    # The investigation explicitly says 'no other archetype fits' and 'leads
    # exhausted'.  We use exhaustion-escalation as the primary category.
    # The ceiling_rationale below captures the tooling-deny-list constraint.
    rationale: >
      Two mechanism hypotheses remain live after exhausting available leads:
      ?monitoring-bait-triggered (+, benign-origin test workload) and
      ?monitoring-host-compromise (-, adversarial not refuted with --).
      The evidence gap is definitive process ancestry / argv on monitoring-host,
      which the host-query deny-list blocks (/opt/workloads, /etc/cron.d) and
      which process-list cannot reconstruct for already-exited scripts.
      No archetype matches (monitoring-probe refuted by burst shape;
      service-account-rotation, credential-stuffing, external-bruteforce all
      disqualified). The approved-monitoring-sources anchor's own failure-mode
      guidance explicitly requires escalation for 'approved source, unexpected
      volume'. Disposition: inconclusive (schema: unclear).
  ceiling_rationale: >
    host-query tooling deny-list blocks file-stat on /opt/workloads/ and
    /etc/cron.d/; process-list returns command names only (no argv, no parent,
    no start time).  These gaps are the precise evidence class needed to
    distinguish ?monitoring-bait-triggered from ?monitoring-host-compromise.
    The investigation cannot advance to -- on h-003 without process ancestry,
    and process ancestry is unavailable.
  disposition: unclear
  # NOTE: Original report uses 'inconclusive'; v2.2 enum is benign | true_positive | unclear.
  # 'unclear' is the closest match.  'inconclusive' has a slightly different
  # framing — it implies both hypotheses are still open, not that the classification
  # itself is unclear.  The nuance is captured in the rationale but lost in the enum.
  confidence: medium
  matched_archetype: null
  summary: >
    SSH invalid-user alert from the sanctioned playground monitoring host
    (172.22.0.10) exhibited a sub-200ms burst of 5 sentinel-username attempts
    at 03:30:49Z, violating the monitoring-probe archetype's cadence requirement.
    24h baseline confirms sanctioned single-attempt cadence on both sides of
    the burst; cadence resumed at the next tick (03:40:02Z, healthcheck).
    Three hypotheses refuted with --: ?internal-credential-guessing (all
    sentinel usernames), ?monitoring-loop-broken (round-robin then clean resume),
    ?compromise-followup (zero successful auths in 24h + 5m forward).
    Two hypotheses remain live: ?monitoring-bait-triggered (+, best-supported
    by burst shape + clean cadence before/after) and ?monitoring-host-compromise
    (-, not refuted because tooling deny-list blocks process ancestry on
    monitoring-host). Escalated as 'approved source, unexpected volume' per
    approved-monitoring-sources anchor failure-mode guidance.
  # NOTE: The original report's structured trust_anchors_consulted block
  # (anchor name, kind, result, citation) has no dedicated slot in v2.2.
  # The anchor leads are modeled as l-002 in the gather section but the
  # structured summary is not recoverable from the conclude block alone.
  # See fidelity report §"What fell on the floor".
