          reasoning: "Five distinct sentinel usernames cycling in sub-200ms bursts — a retry loop on a single sentinel would cluster on ONE username. The 5-sentinel rotation is not characteristic of a stuck probe. Matched r1 (rotation across multiple usernames)."
