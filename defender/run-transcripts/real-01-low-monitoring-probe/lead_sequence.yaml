case_id: real-01-low
alert_ref: alert.json
entries:
  - position: 0
    lead_description:
      goal: Characterize SSH auth events from 172.22.0.10 to target-endpoint over 7 days to determine if pattern is periodic monitoring heartbeat or burst attack.
      what_to_characterize:
        - Total event count and events/hour rate
        - Timing distribution — periodic or bursty
        - Username diversity — only nagios or others
        - Target host diversity — target-endpoint only or multiple hosts
    queries:
      - id: wazuh.auth-events
        params: {srcip: 172.22.0.10, host: target-endpoint, window: 7d}
    result_ref: gather_raw/0.json
  - position: 1
    lead_description:
      goal: "Determine whether 'nagios' SSH attempts are an org-wide pattern (consistent monitoring) or isolated to one source/target pair."
      what_to_characterize:
        - total event count
        - "source IP diversity \u2014 how many distinct source IPs, which ones?"
        - target host diversity — how many distinct target hosts?
        - timing pattern — periodic or burst?
        - "any successful auths for user 'nagios'?"
    queries:
      - id: wazuh.auth-events
        params: {user: nagios, window: 7d}
    result_ref: gather_raw/1.json
