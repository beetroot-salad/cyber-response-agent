case_id: real-04-low-dns
alert_ref: alert.json
entries:
  - position: 0
    lead_description:
      goal: "Retrieve the DNS query history for the domain ghostnebula.net (and any subdomains) from target-endpoint over the past 7 days. Goal: characterize the query volume, cadence, all subdomain variants observed, and whether any other hosts in the environment also queried this domain."
      what_to_characterize:
        - total query count and time span of queries
        - all distinct subdomains of ghostnebula.net observed
        - query cadence/interval pattern
        - whether other hosts queried ghostnebula.net
        - first and last seen timestamps
    queries:
      - id: wazuh.dns-query-history
        params: {domain: ghostnebula.net, host: target-endpoint, window: 7d}
    result_ref: gather_raw/0.json
  - position: 1
    lead_description:
      goal: Characterize the process and activity context on target-endpoint near the alert time to understand what other activity is happening on the host around the DNS alert.
      what_to_characterize:
        - what other rules fired on target-endpoint in the past hour
        - "are there signs of a suspicious process (unusual process names, lateral movement indicators, privilege escalation)"
        - any DNS-related rules other than 100110
        - overall host activity level
    queries:
      - id: wazuh.recent-rule-fires
        params: {host: target-endpoint, window: 1h}
    result_ref: gather_raw/1.json
  - position: 2
    lead_description:
      goal: "Retrieve all Wazuh rule 100110 (high-entropy DNS subdomain) alert events for target-endpoint over the past 7 days, with a breakdown by distinct dns_domain values queried."
      what_to_characterize:
        - All distinct dns_domain values in rule 100110 fires
        - Query count per domain/subdomain
        - Parent domains (the registrable domain under each high-entropy subdomain)
        - "Temporal clustering \u2014 when did each parent domain's queries occur"
        - Whether different parent domains appear in the same time window (simultaneous C2 channels vs sequential)
    queries:
      - id: wazuh.recent-rule-fires
        params: {rule: 100110, host: target-endpoint, window: 7d}
    result_ref: gather_raw/2.json
