structure:
  # `model_context` is retained from spec_graph_647's salt identity; the two
  # comparison-file axes are read directly from compare.py's path construction.
  axes: [model_context, run_id, direction, lead_id]

  actors:
    - {id: wrap, frame: leg, provenance: design}
    - {id: _section, frame: leg, provenance: code}
    - {id: data_section, frame: leg, provenance: code}
    - {id: build_judge_invocation, frame: composition, provenance: code}
    - {id: invoke_actor, frame: composition, provenance: code}
    - {id: invoke_actor_benign, frame: composition, provenance: code}
    - {id: build_lead_user_prompt, frame: composition, provenance: code}
    - {id: _run_findings, frame: composition, provenance: code}
    - {id: _run_actor, frame: composition, provenance: code}
    - {id: build_curator_user_prompt, frame: composition, provenance: code}
    - {id: lead_author.invoke_agent, frame: composition, provenance: code}
    - {id: _invoke_pitfalls_agent, frame: composition, provenance: code}
    - {id: lint_stage_prompt_frames, frame: leg, provenance: design}
    - {id: run_stage, frame: composition, provenance: code}
    - {id: _tool_read_file, frame: leg, provenance: code}
    - {id: _bound_and_wrap, frame: leg, provenance: code}
    - {id: is_untrusted_read, frame: leg, provenance: code}
    - {id: _tool_bash, frame: leg, provenance: code}
    - {id: _format_bash_result, frame: leg, provenance: code}
    - {id: _tool_lesson_read, frame: leg, provenance: code}
    - {id: _tool_template_search, frame: leg, provenance: code}
    - {id: _decide_report_write, frame: leg, provenance: code}
    - {id: _decide_investigation_write, frame: leg, provenance: code}
    - {id: run_investigation, frame: composition, provenance: code}
    - {id: write_comparison_files, frame: composition, provenance: code}
    - {id: orient, frame: leg, provenance: code}
    - {id: tool_write_file, frame: leg, provenance: code}
    - {id: query_tool, frame: leg, provenance: code}
    - {id: gather_dispatch, frame: leg, provenance: code}
    - {id: list_closed_tickets, frame: leg, provenance: code}
    - {id: get_closed_ticket, frame: leg, provenance: code}

  boundaries:
    - id: stage_user_message
      provenance: design
      facets:
        payload:
          parts:
            - {role: reader_contract, source: template:STAGE_READER_CONTRACT, slots: {salt: stage_salt}}
            - {role: logical_section, source: template:STAGE_SECTION, slots: {content: cross_agent_run_output}}
          invariants: [roles-disjoint-sources, all-slots-bound]
          nl: "The prejoined learning-stage user string starts with the reader contract and contains every logical section as an exact-body salted frame."

    - id: instructions
      provenance: code
      facets:
        payload:
          parts:
            - {role: system, source: template:STAGE_SYSTEM_PROMPT}
          invariants: [roles-disjoint-sources, all-slots-bound]
          nl: "The cacheable stage system instructions remain independent of the fresh per-invocation salt."

    - id: stage_salt
      provenance: design
      facets:
        domain:
          type: str
          refinement: {nl: "A fresh uuid4 hexadecimal token minted once for one learning-stage dependency lifetime and never derived from the runtime run token."}
          default: null
          distinguished: []
          falsy_valid: false
          documented_alternatives: []
        identity:
          key_axes: [model_context]
          evidence: {nl: "AgentDeps._for_run resolves one salt per dependency object, and RG-C4's executed multi-turn drive retained that object and salt for the full run_stage call."}
          derivations: []
          sharing: unique-key

    - id: run_salt
      provenance: code
      facets:
        domain:
          type: str
          refinement: {nl: "The runtime investigation token disclosed to MAIN and shared with GATHER, distinct from every learning-stage token."}
          default: null
          distinguished: []
          falsy_valid: false
          documented_alternatives: []
        identity:
          key_axes: [run_id]
          evidence: {nl: "spec_graph_647 and the runtime bind seam establish one run token for the investigation run id."}
          derivations: []
          sharing: unique-key

    - {id: AgentDeps, provenance: code, facets: {}}
    - {id: defender._untrusted, provenance: design, facets: {}}

    - id: learning_tool_output
      provenance: design
      facets:
        payload:
          parts:
            - {role: status, source: template:TOOL_RESULT_STATUS}
            - {role: body, source: template:TOOL_RESULT_BODY, slots: {content: cross_agent_run_output}}
          invariants: [roles-disjoint-sources, all-slots-bound]
          nl: "A model-visible learning tool result whose complete ordinary envelope is one untrusted body under the receiving stage salt."

    - id: read_trust
      provenance: design
      facets:
        access:
          constraints_by_via:
            read-file: {trust: attacker-influenced, constraints: [role-classify, cross-agent-default, salt-wrap]}
            bash: {trust: attacker-influenced, constraints: [role-classify, cross-agent-default, salt-wrap]}
            main: {trust: derived, constraints: [same-agent-raw]}
            lesson-read: {trust: attacker-influenced, constraints: [role-classify, cross-agent-default, salt-wrap]}
            template-search: {trust: attacker-influenced, constraints: [path-classify, salt-wrap]}

    - {id: cross_agent_run_output, provenance: code, facets: {}}
    - {id: report_md, provenance: code, facets: {}}
    - {id: investigation_md, provenance: code, facets: {}}
    - {id: judge_citation_source, provenance: code, facets: {}}

    - id: judge_comparison_files
      provenance: code
      facets:
        identity:
          key_axes: [direction, lead_id]
          evidence: {nl: "compare.py writes <learning_run_dir>/<comparison|comparison_benign>/<lead_id>.md, so direction and lead_id are the full resource key."}
          derivations: []
          sharing: unique-key

  interacts:
    - {from: wrap, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: _section, to: stage_user_message, mode: remove, via: api, provenance: design}
    - {from: data_section, to: stage_user_message, mode: remove, via: api, provenance: design}

    - {from: build_judge_invocation, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: invoke_actor, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: invoke_actor_benign, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: build_lead_user_prompt, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: _run_findings, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: _run_actor, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: build_curator_user_prompt, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: lead_author.invoke_agent, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: _invoke_pitfalls_agent, to: stage_user_message, mode: write, via: api, provenance: design, sends: payload}
    - {from: run_stage, to: stage_user_message, mode: read, via: api, provenance: design}
    - {from: run_stage, to: instructions, mode: read, via: fs, provenance: code}
    - {from: lint_stage_prompt_frames, to: stage_user_message, mode: read, via: fs, provenance: design}

    - {from: wrap, to: stage_salt, mode: read, via: api, provenance: design}
    - {from: run_stage, to: AgentDeps, mode: read, via: api, provenance: code}
    - {from: _bound_and_wrap, to: stage_salt, mode: read, via: api, provenance: design}
    - {from: _tool_bash, to: stage_salt, mode: read, via: api, provenance: design}

    - {from: _tool_read_file, to: learning_tool_output, mode: write, via: read-file, provenance: design, sends: payload}
    - {from: _tool_bash, to: learning_tool_output, mode: write, via: bash, provenance: design, sends: payload}
    - {from: _bound_and_wrap, to: learning_tool_output, mode: write, via: api, provenance: design, sends: payload}
    - {from: _tool_read_file, to: read_trust, mode: read, via: read-file, provenance: design}
    - {from: _tool_bash, to: read_trust, mode: read, via: bash, provenance: design}
    - {from: run_investigation, to: read_trust, mode: read, via: main, provenance: code}
    - {from: _tool_lesson_read, to: read_trust, mode: read, via: lesson-read, provenance: code}
    - {from: _tool_template_search, to: read_trust, mode: read, via: template-search, provenance: code}
    - {from: _tool_read_file, to: cross_agent_run_output, mode: read, via: fs, provenance: design}
    - {from: _tool_bash, to: cross_agent_run_output, mode: read, via: bash, provenance: design}

    - {from: _decide_report_write, to: report_md, mode: write, via: fs, provenance: code}
    - {from: _decide_investigation_write, to: investigation_md, mode: write, via: fs, provenance: code}
    - {from: run_investigation, to: report_md, mode: read, via: fs, provenance: code}
    - {from: run_investigation, to: investigation_md, mode: read, via: fs, provenance: code}
    - {from: build_judge_invocation, to: judge_citation_source, mode: read, via: api, provenance: code}

    - {from: write_comparison_files, to: judge_comparison_files, mode: write, via: fs, provenance: code, interpolates: [direction, lead_id]}
    - {from: _tool_read_file, to: judge_comparison_files, mode: read, via: read-file, provenance: code}
    - {from: _tool_bash, to: judge_comparison_files, mode: read, via: bash, provenance: code}

    # The relocation neighborhood: every direct production importer now reads the
    # shared top-level module; lesson_read reaches it through _bound_and_wrap.
    - {from: orient, to: defender._untrusted, mode: read, via: api, provenance: design}
    - {from: tool_write_file, to: defender._untrusted, mode: read, via: api, provenance: design}
    - {from: query_tool, to: defender._untrusted, mode: read, via: api, provenance: design}
    - {from: gather_dispatch, to: defender._untrusted, mode: read, via: api, provenance: design}
    - {from: _bound_and_wrap, to: defender._untrusted, mode: read, via: api, provenance: design}
    - {from: list_closed_tickets, to: defender._untrusted, mode: read, via: api, provenance: design}
    - {from: get_closed_ticket, to: defender._untrusted, mode: read, via: api, provenance: design}

  drives:
    - {from: invoke_actor, to: build_judge_invocation, provenance: code, multiplicity: serial}
    - {from: build_judge_invocation, to: wrap, provenance: design, multiplicity: serial}
    - {from: invoke_actor, to: wrap, provenance: design, multiplicity: serial}
    - {from: invoke_actor_benign, to: wrap, provenance: design, multiplicity: serial}
    - {from: build_lead_user_prompt, to: wrap, provenance: design, multiplicity: serial}
    - {from: _run_findings, to: wrap, provenance: design, multiplicity: serial}
    - {from: _run_actor, to: wrap, provenance: design, multiplicity: serial}
    - {from: build_curator_user_prompt, to: wrap, provenance: design, multiplicity: serial}
    - {from: lead_author.invoke_agent, to: wrap, provenance: design, multiplicity: serial}
    - {from: _invoke_pitfalls_agent, to: wrap, provenance: design, multiplicity: serial}
    - {from: _tool_read_file, to: _bound_and_wrap, provenance: code, multiplicity: serial}
    - {from: _tool_lesson_read, to: _bound_and_wrap, provenance: code, multiplicity: serial}
    - {from: _bound_and_wrap, to: is_untrusted_read, provenance: code, multiplicity: serial}
    - {from: _tool_template_search, to: is_untrusted_read, provenance: code, multiplicity: serial}
    - {from: _bound_and_wrap, to: wrap, provenance: design, multiplicity: serial}
    - {from: _tool_bash, to: _format_bash_result, provenance: code, multiplicity: serial}
    - {from: _tool_bash, to: wrap, provenance: design, multiplicity: serial}
    - {from: list_closed_tickets, to: wrap, provenance: code, multiplicity: serial}
    - {from: get_closed_ticket, to: wrap, provenance: code, multiplicity: serial}
    - {from: run_stage, to: _tool_read_file, provenance: code, multiplicity: serial}
    - {from: run_stage, to: _tool_bash, provenance: code, multiplicity: serial}

claims:
  # Inherited design claims (ids retained from 20-demands.md).
  - id: C1
    kind: behavior
    claim: "A poisoned investigation hypothesis name carrying </synthesis> passes the real write gate and forges a coverage-manifest sibling in the rendered judge prompt."
    probe: "Real decide_write -> parse_investigation_companion -> render_synthesis -> _section harness over the shipped golden, independently repeated by cold review."
    probe_kind: executed
    observed: "The gate allowed the body; two synthesis close tags and the forged coverage manifest were present."
    verdict: holds
  - id: C2
    kind: behavior
    claim: "The yaml.safe_dump conclusion path independently carries the same synthesis breakout."
    probe: "Poisoned the :T conclude impact_verdict in the same real harness."
    probe_kind: executed
    observed: "The gate allowed the body; two close tags and the forged coverage manifest were present."
    verdict: holds
  - id: C3
    kind: behavior
    claim: "MAIN can read the runtime run salt verbatim from its own orientation prompt."
    probe: "Called orient.orientation with a known salt and searched the result; cold review repeated it."
    probe_kind: executed
    observed: "The exact salt and matching run-untrusted open and close tags were present."
    verdict: holds
  - id: C4
    kind: behavior
    claim: "is_untrusted_read is false for report.md and investigation.md and true for alert.json and gather_raw payloads."
    probe: "Called is_untrusted_read on all four path shapes."
    probe_kind: executed
    observed: "False, false, true, and true respectively."
    verdict: holds
