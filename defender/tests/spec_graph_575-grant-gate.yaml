schema_version: 1
design: '#575 (issue body plus its Resolved-forks addendum)'
base: 09e0a93cd6e43939d89182e97e5a9c567e654f7c
demands:
- id: a1
  kind: behavior
  form: test
  binds:
  - decide_bash
  - Grant.pattern
  - Grant.scope
  outcome:
    nl: A command is allowed only if it matches a grant's pattern AND every operand PROGRAMS extracts
      resolves into that grant's scope.
- id: a2
  kind: negative
  form: test
  binds:
  - Grant.pattern
  - Grant.pins_path
  outcome:
    nl: No unmarked grant's compiled pattern embeds a path; the three program-operand grants carry pins_path=True.
  rejected:
  - nl: 'Write an execute-extractor for python3/rm instead. Rejected: python3 -c puts the flag itself
      in the argv slot, and rm unlinks the LINK rather than resolve()''s target.'
- id: a3
  kind: behavior
  form: test
  binds:
  - under
  outcome:
    nl: under(root, tail) fullmatches against the RESOLVED path.
- id: a4
  kind: negative
  form: test
  binds:
  - GATHER_RAW_SHAPE
  - RUN_NO_RAW_SHAPE
  - CORPUS_MD_SHAPE
  outcome:
    nl: No path shape uses an any-byte-but-NUL class; the machine-generated gather_raw shape is tight
      (gather_raw/l-N/N.json).
- id: a5
  kind: negative
  form: test
  binds:
  - decide_bash
  - Grant.scope
  - read_surface.access[bash]
  outcome:
    nl: A symlink inside run_dir pointing outside it is DENIED for cat on the bash lane.
- id: a6
  kind: behavior
  form: test
  binds:
  - decide_bash
  - Grant.scope
  outcome:
    nl: A symlink inside run_dir pointing to another in-root file is ALLOWED, so a5 denies for escape
      rather than because symlinks are banned. This is a5's positive control.
- id: a7
  kind: behavior
  form: test
  binds:
  - decide_bash
  outcome:
    nl: A symlink loop raises RuntimeError inside resolve() and the gate fails closed with a DENY, never
      an escaping exception.
- id: a8
  kind: behavior
  form: test
  binds:
  - decide_bash
  - Grant.scope
  outcome:
    nl: resolve(strict=False) does not raise on a missing path, so a not-yet-written gather_raw payload
      still scope-matches and gather may cat it.
- id: a9
  kind: behavior
  form: test
  binds:
  - decide_bash
  outcome:
    nl: An embedded-NUL operand raises ValueError inside resolve() and the gate fails closed with a DENY.
- id: a10
  kind: behavior
  form: test
  binds:
  - Grant.scope
  - resolve_roots
  outcome:
    nl: Scope patterns anchor on the RESOLVED root, so a run_dir reached through a symlinked base still
      admits its own files.
- id: a11
  kind: behavior
  form: test
  binds:
  - decide_bash
  outcome:
    nl: A relative operand is rebased on defender_dir.parent, the cwd the executor uses, before it is
      resolved.
- id: a12
  kind: behavior
  form: test
  binds:
  - decide_bash
  outcome:
    nl: 'Every pipe stage is operand-gated: an in-scope cat piped into a cat of /etc/passwd is DENIED
      on the second stage.'
- id: b1
  kind: behavior
  form: test
  binds:
  - PROGRAMS
  - PROGRAMS.domain.distinguished[cat]
  - PROGRAMS.domain.distinguished[OPENS_NOTHING]
  outcome:
    nl: PROGRAMS maps cat to the real extractor and every other granted program to OPENS_NOTHING.
- id: b2
  kind: behavior
  form: test
  binds:
  - compile_policy
  - PROGRAMS.domain.distinguished[absent]
  outcome:
    nl: 'compile_policy RAISES when a grant names a program absent from PROGRAMS: loud at compile, never
      fail-open at first decide.'
- id: b3
  kind: behavior
  form: test
  binds:
  - compile_policy
  - _corpus_author_policy
  outcome:
    nl: Every AgentPolicy in the registry passes the program-table validation, including CORPUS_AUTHOR's,
      which is built directly and never calls compile_policy today.
- id: b4
  kind: domain-outcome
  form: test
  binds:
  - _cat_input_files
  outcome:
    nl: _cat_input_files returns None (DENY) for every unrecognized dash-prefixed token, and the known
      boolean bundles extract their file operands correctly.
- id: b5
  kind: domain-outcome
  form: test
  binds:
  - _cat_input_files
  outcome:
    nl: 'A cat whose operand follows a bare double-dash still DENIES out of scope: post-double-dash tokens
      are appended as file operands and are therefore scope-checked.'
- id: b6
  kind: domain-outcome
  form: test
  binds:
  - _cat_input_files
  outcome:
    nl: A bare dash is stdin and extracts no operand, so the stdin pipe shape still allows.
- id: b7
  kind: negative
  form: test
  binds:
  - PROGRAMS.domain.distinguished[OPENS_NOTHING]
  - read_surface.access[bash]
  outcome:
    nl: Every OPENS_NOTHING program's shape regex admits no file-opening or arg-consuming flag (wc files0-from,
      grep -f/-e/-r/--file, jq -f/-L/--rawfile/--slurpfile, tail -f, head -c FILE all DENY), because the
      gate skips the scope check for them entirely.
- id: b8
  kind: negative
  form: test
  binds:
  - PROGRAMS.domain.distinguished[OPENS_NOTHING]
  - Grant.pattern
  outcome:
    nl: Structurally, no OPENS_NOTHING grant's pattern admits a long option or a dash-prefixed positional,
      so the single-dash-bundle and no-leading-dash conventions become enforced properties a future grammar
      author cannot silently drop.
  rejected:
  - nl: 'Leave it as the convention it is today (gnu_flags.bundle emits single-dash only). Rejected: that
      is exactly what let the judge''s unrestricted cat shape be written.'
- id: c1
  kind: domain-outcome
  form: test
  binds:
  - Grant.pattern
  - read_surface.access[bash]
  outcome:
    nl: The file-operand viewer forms now DENY and their cat-piped equivalents ALLOW, for grep, head,
      tail and wc alike.
- id: c2
  kind: negative
  form: test
  binds:
  - MAIN_DEF.bash_allow
  - GATHER_DEF.bash_allow
  outcome:
    nl: ls and cd are denied in every form for main and gather, while the surviving programs still allow.
- id: c3
  kind: negative
  form: test
  binds:
  - MAIN_DEF.bash_allow
  outcome:
    nl: 'Main has no recursive-descent primitive: recursive ls and recursive grep both deny, so no path
      under run_dir is reachable without naming it.'
- id: c4
  kind: survival
  form: test
  binds:
  - Grant.pattern
  - gather_query_template
  outcome:
    nl: The shipped query template's literal piped-jq command still allows for gather; a shipped template
      the gate denies is a documented dead command.
- id: c5
  kind: domain-outcome
  form: test
  binds:
  - decide_bash
  - RAW_MARKER
  outcome:
    nl: 'The RAW_MARKER substring scan is gone: a main command that merely MENTIONS gather_raw in a grep
      pattern now ALLOWS, where at HEAD it denies purely because the command string contains the literal
      text.'
- id: c6
  kind: survival
  form: test
  binds:
  - CORPUS_AUTHOR_DEF.bash_allow
  - curator_prompt
  outcome:
    nl: 'On the curator lane a grep with a file operand denies, its cat-piped equivalent allows, and ls
      of the lessons dir denies because the corpus manifest shipped in #574 replaces the listing.'
- id: d1
  kind: domain-outcome
  form: test
  binds:
  - GATHER_RAW_SHAPE
  - MAIN_DEF.bash_allow
  - GATHER_DEF.bash_allow
  outcome:
    nl: A cat of a gather_raw payload ALLOWS for gather and DENIES for main, by positive enumeration rather
      than a substring clamp.
- id: d2
  kind: behavior
  form: test
  binds:
  - decide_read
  - read_surface.access[read-tool]
  outcome:
    nl: decide_read of a gather_raw payload DENIES for main with a reason naming gather_raw, and the e2e
      deny-tail substring still matches.
  rejected:
  - nl: 'Relax the e2e assertion to the generic deny reason. Rejected: that silently loosens a security
      assertion.'
- id: d3
  kind: negative
  form: test
  binds:
  - is_untrusted_read
  - GATHER_RAW_SHAPE
  outcome:
    nl: is_untrusted_read is still True for a gather_raw payload so the read stays salt-tag wrapped; removing
      RAW_MARKER must not untag the primary attacker-influenced channel.
- id: d4
  kind: parity
  form: test
  binds:
  - read_surface.access[bash]
  - read_surface.access[read-tool]
  outcome:
    nl: The path-shape tuple decide_read enforces IS the same object the cat grant's scope carries, so
      the two surfaces cannot drift, and a policy whose two lists differ fails the parity harness.
- id: d5
  kind: parity
  form: test
  binds:
  - read_surface.access[bash]
  - read_surface.access[read-tool]
  outcome:
    nl: 'The allow-matrix: for every agent and path in a fixed corpus, the read-tool verdict equals the
      bash-lane cat verdict.'
- id: d6
  kind: negative
  form: test
  binds:
  - read_surface.access[bash]
  - read_surface.access[read-tool]
  - denylist
  outcome:
    nl: 'The secret denylist still applies INSIDE scope: a dot-env file whose name matches the corpus
      markdown shape still denies, and so does an ssh-key path.'
- id: e1
  kind: negative
  form: test
  binds:
  - JUDGE_DEF.bash_allow
  - ticket_grant
  outcome:
    nl: A judge ticket command WITHOUT the require-closed flag DENIES and with it ALLOWS; the mandatory-flag
      lookahead is the security property, and a boolean-flag allowlist would silently make it optional.
- id: e2
  kind: behavior
  form: test
  binds:
  - JUDGE_DEF.bash_allow
  - ticket_grant
  outcome:
    nl: The adversarial judge, bound with no ticket CLI, has no ticket grant at all, so even the well-formed
      require-closed command denies.
- id: e3
  kind: behavior
  form: test
  binds:
  - ticket_grant
  outcome:
    nl: The require-closed flag cannot be smuggled inside a quoted operand, because the NUL token-space
      sentinel keeps every space in the joined argv a true token boundary.
- id: e4
  kind: behavior
  form: test
  binds:
  - ACTOR_DEF.bash_allow
  - LEAD_AUTHOR_DEF.bash_allow
  outcome:
    nl: The actor's pinned python script and the lead author's rm of a skills markdown file still allow,
      while an arbitrary script path and a traversing rm deny.
- id: f1
  kind: seam
  form: test
  binds:
  - BashDecision
  - interacts(tool_bash->bash_exec)
  outcome:
    nl: BashDecision still carries pipelines, adapter_argv and sql_pipe, all three consumed by the tool's
      capture path, and Grant.route tags reader-lane grants only.
- id: f2
  kind: behavior
  form: test
  binds:
  - decide_bash
  - _decide_adapter
  outcome:
    nl: Adapter classification stays structural and runs AFTER the reader lane declines, so the ORDER
      is pinned and not merely the verdict.
- id: f3
  kind: survival
  form: test
  binds:
  - _decide_adapter
  - ADAPTER_DENY_REASON
  - ADAPTER_STANDALONE_REASON
  outcome:
    nl: Both specific adapter deny reasons survive as the substrings the e2e deny-tail asserts.
- id: f4
  kind: behavior
  form: test
  binds:
  - _decide_adapter
  - Route
  outcome:
    nl: The sanctioned two-stage adapter-into-defender-sql pipe allows for gather with a correct split,
      and an adapter piped into a viewer denies.
- id: f5
  kind: negative
  form: test
  binds:
  - runtime_package
  outcome:
    nl: No module under runtime imports a private symbol from the learning package (lazy and function-body
      imports count) and nothing under runtime enumerates agents, while the relocated agents module DOES
      import the six defs, proving the scan can see one.
- id: f6
  kind: shape
  form: test
  binds:
  - interacts(tool_bash->bash_exec).payload
  outcome:
    nl: 'The argv EXECUTED is the argv GATED: run_parsed receives exactly the pipelines the decision carries,
      so no validator/executor parser differential can reopen.'
  rejected:
  - nl: 'Re-parse the command string in the executor. Rejected: that differential is what shell=False
      plus the single-parse decision exist to close.'
- id: g1
  kind: negative
  form: test
  binds:
  - deny_reason
  - _overflow_filter_hint
  outcome:
    nl: 'No deny reason and no overflow hint names a program the agent cannot run: each program-looking
      word is checked against that agent''s OWN lane, not against a hardcoded dead-name list.'
- id: g2
  kind: behavior
  form: test
  binds:
  - _overflow_filter_hint
  - _lane_admits
  outcome:
    nl: The overflow hint still reaches the jq branch for main and gather, the sql branch for the judge,
      and the read-tool fold for the rest, and _lane_admits goes through the real decide seam rather than
      fullmatching over a tuple that now holds Grants.
- id: h1
  kind: behavior
  form: test
  binds:
  - compile_policy_for
  outcome:
    nl: compile_policy_for is idempotent for the same definition and roots.
- id: h2
  kind: uniqueness
  form: test
  binds:
  - compile_policy_for
  - resolve_roots
  outcome:
    nl: 'No cross-run bleed: two run dirs compiled in one process yield policies whose scopes anchor on
      their OWN run dir, which matters because gather binds per dispatch, many times per run.'
- id: h3
  kind: survival
  form: test
  binds:
  - denylist
  outcome:
    nl: An empty denylist axis contributes no lookahead and does not brick the reader lane.
- id: h4
  kind: behavior
  form: test
  binds:
  - compile_policy_for
  - resolve_roots
  - LEAD_AUTHOR_DEF.bash_allow
  outcome:
    nl: 'Grants anchor on the defender_dir and run_dir THREADED IN, never on the import-time PATHS constant:
      a lead author bound with a worktree defender_dir gets an rm grant anchored on the WORKTREE''s skills
      dir, and the main checkout''s skills dir DENIES. Both re-exec drivers (replay_actor, harness_lead)
      relocate the tree anchor onto whatever tree they run in.'
- id: i1
  kind: behavior
  form: test
  binds:
  - defender_policy_cli
  outcome:
    nl: defender-policy show prints each agent's read, write and bash grants with their scopes, and an
      exempt grant reports its PATTERN as the containment rather than a misleading empty scope.
- id: i2
  kind: parity
  form: test
  binds:
  - defender_policy_cli
  - decide_bash
  outcome:
    nl: defender-policy explain reports the same verdict and the same matched-grant or deny-reason as
      decide_bash, so the CLI is a second consumer of the gate and never a second implementation.
- id: i3
  kind: negative
  form: test
  binds:
  - defender_policy_cli
  - NON_ADAPTER_SHIMS
  outcome:
    nl: defender-policy is not a shim in any agent lane, since adding it to the shim taxonomy would hand
      every agent policy introspection for free.
- id: w1
  kind: behavior
  form: waiver
  binds:
  - runtime_package
  outcome:
    nl: 'Net LOC across the permission package and agent_definition does not increase. A review property,
      not observable behavior: checked at human review.'
- id: w2
  kind: behavior
  form: waiver
  binds:
  - interacts(tool_bash->bash_exec)
  outcome:
    nl: A wedging stage such as tail -f is bounded by the bash timeout, not by the gate. b7 pins the DENY;
      the timeout is out of scope.
structure:
  axes:
  - agent_role
  - program
  - operand_path
  - via
  - run_dir
  actors:
  - id: decide_bash
    frame: leg
    provenance: code
  - id: decide_read
    frame: leg
    provenance: code
  - id: compile_policy
    frame: leg
    provenance: code
  - id: compile_policy_for
    frame: composition
    provenance: code
  - id: tool_bash
    frame: composition
    provenance: code
  - id: defender_policy_cli
    frame: leg
    provenance: design
  - id: _corpus_author_policy
    frame: leg
    provenance: code
  - id: run_investigation
    frame: composition
    provenance: code
  - id: replay_actor
    frame: composition
    provenance: code
  - id: harness_lead
    frame: composition
    provenance: code
  boundaries:
  - id: read_surface
    provenance: code
    facets:
      access:
        constraints_by_via:
          bash:
            trust: attacker-influenced
            constraints:
            - confine
            - denylist
            - resolve
          read-tool:
            trust: attacker-influenced
            constraints:
            - confine
            - denylist
            - resolve
      identity:
        key_axes:
        - operand_path
        evidence:
          nl: The resolved operand path is the full key, read off files.read_allowed_path and the cat
            grant's scope, which the design makes the same shape objects.
        sharing: unique-key
  - id: PROGRAMS
    provenance: design
    facets:
      domain:
        type: enum
        refinement:
          nl: Which files does this program's argv open? cat has a real extractor; every other granted
            program opens nothing; an ABSENT program is a compile-time error.
        default: OPENS_NOTHING
        distinguished:
        - cat
        - OPENS_NOTHING
        - absent
        falsy_valid: false
        documented_alternatives: []
  - id: Grant.pattern
    provenance: design
    facets: {}
  - id: Grant.scope
    provenance: design
    facets: {}
  - id: Grant.pins_path
    provenance: design
    facets:
      domain:
        type: bool
        refinement:
          nl: True for the three grants whose operand IS the program (actor python script, rm, judge ticket
            CLI); their pattern legitimately pins a path and carries the mandatory require-closed lookahead.
        default: false
        distinguished:
        - true
        - false
        falsy_valid: true
        documented_alternatives: []
  - id: ticket_grant
    provenance: code
    facets: {}
  - id: denylist
    provenance: code
    facets: {}
  - id: RAW_MARKER
    provenance: code
    facets: {}
  - id: is_untrusted_read
    provenance: code
    facets: {}
  - id: _overflow_filter_hint
    provenance: code
    facets: {}
  - id: deny_reason
    provenance: code
    facets: {}
  - id: _lane_admits
    provenance: code
    facets: {}
  - id: curator_prompt
    provenance: code
    facets: {}
  - id: gather_query_template
    provenance: code
    facets: {}
  - id: runtime_package
    provenance: code
    facets: {}
  - id: BashDecision
    provenance: code
    facets: {}
  - id: BashGrammar
    provenance: code
    facets: {}
  - id: read_shapes
    provenance: code
    facets: {}
  - id: reader_patterns_for
    provenance: code
    facets: {}
  - id: raw_reads
    provenance: code
    facets: {}
  - id: GATHER_RAW_SHAPE
    provenance: design
    facets: {}
  - id: RUN_NO_RAW_SHAPE
    provenance: design
    facets: {}
  - id: CORPUS_MD_SHAPE
    provenance: design
    facets: {}
  - id: under
    provenance: design
    facets: {}
  - id: Route
    provenance: design
    facets: {}
  - id: _cat_input_files
    provenance: code
    facets: {}
  - id: resolve_roots
    provenance: code
    facets: {}
  - id: _decide_adapter
    provenance: code
    facets: {}
  - id: ADAPTER_DENY_REASON
    provenance: code
    facets: {}
  - id: ADAPTER_STANDALONE_REASON
    provenance: code
    facets: {}
  - id: NON_ADAPTER_SHIMS
    provenance: code
    facets: {}
  - id: MAIN_DEF.bash_allow
    provenance: code
    facets: {}
  - id: GATHER_DEF.bash_allow
    provenance: code
    facets: {}
  - id: JUDGE_DEF.bash_allow
    provenance: code
    facets: {}
  - id: ACTOR_DEF.bash_allow
    provenance: code
    facets: {}
  - id: LEAD_AUTHOR_DEF.bash_allow
    provenance: code
    facets: {}
  - id: CORPUS_AUTHOR_DEF.bash_allow
    provenance: code
    facets: {}
  - id: bash_exec
    provenance: code
    facets:
      payload:
        parts:
        - role: argv
          source: const:decision.pipelines
        invariants:
        - all-slots-bound
        nl: 'run_parsed receives exactly the pipelines the gate already parsed: the single-parse decision
          that collapses the validator/executor differential.'
  interacts:
  - from: decide_bash
    to: read_surface
    mode: read
    via: bash
    provenance: design
  - from: decide_read
    to: read_surface
    mode: read
    via: read-tool
    provenance: design
  - from: decide_bash
    to: PROGRAMS
    mode: read
    via: api
    provenance: design
  - from: compile_policy
    to: PROGRAMS
    mode: read
    via: api
    provenance: design
  - from: _corpus_author_policy
    to: PROGRAMS
    mode: read
    via: api
    provenance: design
  - from: decide_bash
    to: Grant.pattern
    mode: read
    via: api
    provenance: design
  - from: decide_bash
    to: Grant.scope
    mode: read
    via: api
    provenance: design
  - from: decide_bash
    to: Grant.pins_path
    mode: read
    via: api
    provenance: design
  - from: decide_bash
    to: ticket_grant
    mode: read
    via: api
    provenance: code
  - from: decide_read
    to: denylist
    mode: read
    via: api
    provenance: code
  - from: decide_bash
    to: denylist
    mode: read
    via: api
    provenance: code
  - from: is_untrusted_read
    to: RAW_MARKER
    mode: read
    via: api
    provenance: code
  - from: tool_bash
    to: bash_exec
    mode: invoke
    via: subprocess
    provenance: code
    sends: payload
    transport: subprocess
  - from: tool_bash
    to: BashDecision
    mode: read
    via: api
    provenance: code
  - from: tool_bash
    to: _overflow_filter_hint
    mode: read
    via: api
    provenance: code
  - from: _overflow_filter_hint
    to: _lane_admits
    mode: read
    via: api
    provenance: code
  - from: defender_policy_cli
    to: decide_bash
    mode: invoke
    via: api
    provenance: design
  - from: decide_bash
    to: RAW_MARKER
    mode: remove
    via: bash
    provenance: design
  - from: decide_read
    to: read_shapes
    mode: remove
    via: read-tool
    provenance: design
  - from: compile_policy
    to: BashGrammar
    mode: remove
    via: api
    provenance: design
  - from: compile_policy
    to: reader_patterns_for
    mode: remove
    via: api
    provenance: design
  - from: decide_bash
    to: raw_reads
    mode: remove
    via: api
    provenance: design
  - from: curator_prompt
    to: read_surface
    mode: read
    via: bash
    provenance: code
  - from: gather_query_template
    to: read_surface
    mode: read
    via: bash
    provenance: code
  - from: deny_reason
    to: read_surface
    mode: read
    via: bash
    provenance: code
  drives:
  - from: compile_policy_for
    to: compile_policy
    provenance: code
    multiplicity: serial
  - from: run_investigation
    to: tool_bash
    provenance: code
    multiplicity: serial
  - from: tool_bash
    to: decide_bash
    provenance: code
    multiplicity: serial
  - from: replay_actor
    to: run_investigation
    provenance: code
    multiplicity: serial
  - from: harness_lead
    to: compile_policy_for
    provenance: code
    multiplicity: serial
gate:
  evaluated:
  - rule: R0
    fired: true
  - rule: R1
    fired: true
  - rule: R2
    fired: false
  - rule: R3
    fired: true
  - rule: R4
    fired: true
  - rule: R5
    fired: true
  obligations:
