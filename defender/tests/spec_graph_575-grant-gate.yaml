  holes:
  - rule: R0
    element: Grant.pins_path
    resolved_to: a2
    resolution: 'The design''s no-pattern-embeds-a-path invariant is FALSE for three grants whose operand
      IS the program (actor python script, rm path, judge ticket CLI). Human chose an explicit pins_path
      exemption marker over execute-extractors: python -c puts the flag in the argv slot; rm unlinks the
      LINK not resolve()''s target; and require-closed is a MANDATORY flag that a boolean-flag allowlist
      would silently make optional. The invariant becomes: no UNMARKED pattern embeds a path.'
  - rule: R0
    element: _corpus_author_policy
    resolved_to: b3
    resolution: 'CORPUS_AUTHOR builds AgentPolicy DIRECTLY, so compile_policy''s fail-loud PROGRAMS check
      never fires for the one denylist-free lane; and its prompts need grep WITH a file operand, which
      a global OPENS_NOTHING mapping makes a fail-open. Human chose: keep cat the sole opener and PROGRAMS
      global; move the curator prompts to cat-into-grep and replace ls with the #574 manifest; validate
      EVERY policy against the table.'
  - rule: R0
    element: read_surface.access[read-tool]
    resolved_to: d3
    resolution: 'read_shapes and raw_reads were to be deleted with NO stated replacement on the read tool:
      decide_read would fall back to root-only (main could read_file any gather_raw payload) and is_untrusted_read
      would stop salt-tagging the attacker-influenced channel. Human chose a broad-minus-carve-out read
      scope (the run subtree minus gather_raw, plus the tight machine-generated gather_raw shape), with
      is_untrusted_read keyed on the SHAPE rather than the substring.'
  - rule: R0
    element: GATHER_RAW_SHAPE
    resolved_to: d5
    resolution: 'The design''s path shapes were factually WRONG: the real layout carries a lead-id directory
      level the design omitted, plus a sibling leads-table file; and alert.json and the queries table
      were missing entirely, while main''s write_allow is already the WHOLE run subtree, so a four-shape
      read enumeration was both a narrowing and incoherent with writes. Re-grounded against record_query.py.'
  - rule: R0
    element: Route
    resolved_to: f2
    resolution: 'Route was specified as a per-Grant field, but the adapter-sql capture is a TWO-stage
      relation while a Grant matches ONE stage; adapters are not in bash_allow today (they route structurally
      after the reader lane declines, an ordering an existing test pins) and produce two SPECIFIC deny
      reasons the e2e deny-tail asserts as substrings, which a positive-enumeration list cannot produce.
      Human chose: adapter classification stays structural; Grant.route tags reader-lane grants only.'
