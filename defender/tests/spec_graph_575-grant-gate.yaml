handoff:
  forks:
  - 'F0 Decision''s shape: does BashDecision keep adapter_argv and sql_pipe, or switch purely to route?
    RESOLVED: keep them as the route''s payload, because tools consumes them and feeds the circuit breaker.
    Grant.route tags reader-lane grants only. (demand f1)'
  - 'F1 the RAW_MARKER substring scan: dropping it is a SECOND behavior change the issue''s parity criterion
    did not name. VERIFIED against HEAD: main''s cat-report-piped-into-grep-gather_raw DENIES today purely
    because the command string contains the literal text; under positive enumeration it ALLOWS. RESOLVED:
    intended, it is the point of positive enumeration. Pinned as an examined change (demand c5), not a
    regression.'
  - 'F2 is jq retired? The conversation said jq is effectively retired, but the resolved design keeps
    it as a stdin-only filter. DISSOLVED: piped jq works at HEAD for both agents, so stdin-only jq is
    genuinely zero-change, and the one shipped template is ALREADY in the piped form, so there is no template
    rewrite. (demand c4)'
  - 'F3 program-operand grants: RESOLVED to an explicit pins_path exemption. See gate.holes[0]. The judge''s
    mandatory require-closed lookahead is the load-bearing case.'
  - 'F4 the curator lane: RESOLVED to cat-into-grep plus the #574 manifest. See gate.holes[1]. This is
    behavior change #4.'
  - 'F5 the read surface: RESOLVED to broad-minus-carve-out. See gate.holes[2].'
  - 'F6 adapter routing: RESOLVED to leave it structural. See gate.holes[4].'
  deviations:
  - 'The formal-slot closed-vocabulary check was done BY HAND: the #537 spec_graph linter does not exist
    yet.'
  - 'Step 4 (diff-by-address) ran COLLAPSED: the lead aligned the five derivations'' stubs directly rather
    than spawning a separate diff agent. Two misreadings were caught and corrected in the process. An
    enumerator claimed a post-double-dash operand is not extracted (it is: post-double-dash tokens are
    appended, so believing it would have shipped a fail-open; pinned as demand b5), and another claimed
    a broken symlink raises OSError (it does not: resolve with strict=False returns the target, so it
    denies via SCOPE; pinned as a8).'
  - 'grep''s arg-consuming flag facts (demand b7) come from gnu_flags.py plus GNU documentation, NOT from
    the runtime binary: the dev box ships ugrep, not GNU grep. cat, wc, head and tail WERE verified against
    coreutils 9.7, which matches the runtime image. Per the #579/#581 lesson, b7 must be re-validated
    against the RUNTIME container''s grep before merge.'
  behavior_change_ledger:
  - 1. The file-operand form of grep, head, tail, wc and jq now requires a cat-pipe prefix (demand c1).
  - '2. ls and cd are gone: main, gather, AND the curator lane (demands c2, c6).'
  - 3. The RAW_MARKER substring scan is gone, so a command merely MENTIONING gather_raw is no longer denied
    for that reason (demand c5).
  - '4. The curator''s grep-with-file becomes cat-into-grep, and its ls of the lessons dir becomes the
    #574 manifest (demand c6).'
