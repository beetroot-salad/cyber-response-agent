# ---------------------------------------------------------------------------
gate:
  evaluated:
    - {rule: R0, fired: true}    # incl. the bidirectional prose reconciliation (ran; see holes h3)
    - {rule: R1, fired: true}
    - {rule: R2, fired: true}
    - {rule: R3, fired: true}
    - {rule: R4, fired: true}
    - {rule: R5, fired: true}    # incl. the judgment extension (considered; minted m10)

  obligations:
    - rule: R0
      element: "forward_check_tool"
      witness: "the design gives the verify transport no injection seam; a fake cannot enter without monkeypatch, which CI ratchets. The only seam pydantic-ai leaves — a tool is handed only (ctx, args) — is a per-call deps field (curator_deps_check carries it as run_verify)."
      discharged_by: m15_verify_transport_is_a_deps_seam

    - rule: R1
      element: "interacts(verify_stage->verify_model).payload"
      witness: "The verify edge sends a payload-facet boundary and NOT ONE of the six derivations bound its composition; nothing asserts the system and user turns come from disjoint sources or that every slot is substituted."
      discharged_by: m1_verify_payload_shape

    - rule: R2
      element: "verify_trace_root.identity"
      witness: "One writer (verify_stage) driven over multiple invocations by a concurrent drives edge; interpolates [error_prefix, lesson_stem, check_index] must cover key_axes [source_run_id, error_prefix, lesson_stem, direction]. The pid derivation is injective:false (constant in-process), so it covers nothing; direction is absent from the name. Bound at the composition frame (curator_agent), asserted under a genuine interleaving because multiplicity is concurrent."
      discharged_by: d11_trace_names_distinct_per_check

    - rule: R2
      element: "verify_trace_root.identity"
      witness: "Positive control for the uniqueness demand: both writes must land as distinct REAL content, else `no collision` passes vacuously when nothing was written."
      discharged_by: m2_env_checks_write_no_trace

    - rule: R3
      element: "lesson_path.access[tool-arg]"
      witness: "A third via reaches a boundary two vias already reach, and the established write-tool via enforces a denylist the new via does not state. Per-cell parity: denylist."
      discharged_by: m3_tool_arg_denylist_parity

    - rule: R3
      element: "lesson_path.access[tool-arg]"
      witness: "Per-cell parity: resolve-before-containment. The bash via is textual with no resolve(); the write-tool via resolves. A textual test on the new via is a symlink escape."
      discharged_by: m3b_tool_arg_resolve_parity

    - rule: R4
      element: "VERIFY_BATCH_WORKERS.domain.distinguished[0]"
      witness: "falsy_valid is false and the port changes the failure mode: ThreadPoolExecutor(0) raised immediately; asyncio.Semaphore(0) blocks forever. The falsy member must be exercised."
      discharged_by: m4_workers_zero_fails_loud

    - rule: R4
      element: "VERIFIER_TIMEOUT.domain.distinguished[0]"
      witness: "falsy_valid is true; an `x or DEFAULT` coercion would silently swallow a deliberate 0."
      discharged_by: m5_verifier_timeout_zero_is_honored

    - rule: R4
      element: "VERIFIER_MODEL.domain.alternatives[claude-haiku-4-5]"
      witness: "A documented alternative with crosses_validation true; the spec would otherwise test only the shipped default column."
      discharged_by: m6_verifier_model_alternative_crosses

    - rule: R4
      element: "VERIFIER_EFFORT.domain.alternatives[none]"
      witness: "A documented alternative with crosses_validation false — Fireworks-only. Pin the crossing: it must fail loud and legibly, not be silently accepted."
      discharged_by: m7_verifier_effort_none_is_provider_gated

    - rule: R5
      element: "cli_mains"
      witness: "Removed element with live in-edges: the eval harness, conftest, the env curators' command, and the subprocess-import test cases all depend on it. Survival: the pure helpers remain importable and the harness completes via its substitute."
      discharged_by: m9_verify_forward_helpers_survive_as_a_library

    - rule: R5
      element: "batch_py"
      witness: "Removed element with live in-edges: two curator prompts and two run.py command templates. Survival: the N-lesson single-call verification workflow still completes."
      discharged_by: d23_curator_verifies_n_lessons_in_one_call

    - rule: R5
      element: "resolve_verifier_python"
      witness: "Removed element with four live in-edges, one of which is an existing test asserting it SURVIVES (test_curator_glm_survival.py:375-418). That assertion inverts."
      discharged_by: d26_no_curator_resolves_a_verifier_interpreter

    - rule: R5
      element: "verifier_pattern"
      witness: "Removed facet on curator_bash_lane, whose boundary has live in-edges. Survival: the surviving bash lane still admits rm and the viewers."
      discharged_by: d25b_surviving_bash_lane_still_works

    - rule: R5
      element: "VERIFY_BATCH_TIMEOUT"
      witness: "A config surface removed with no demand naming it; a deployment that still sets it silently no-ops."
      discharged_by: w3_verify_batch_timeout_removed_without_a_survival_test

    - rule: R5
      element: "curator_deps_corpus_dir"
      witness: "Judgment extension (considered, fired): the delta ADDS a confinement obligation to a new operand lane. Is the security-critical caller left constructible in the newly-unsafe state — a CuratorDeps with no corpus to confine the lesson operand against? Mint safe-by-construction: the constructor must raise, not merely behave when configured right."
      discharged_by: m10_curator_deps_cannot_be_built_without_a_corpus_confine

    - rule: R0
      element: "interacts(curator_orchestrator->curator_agent).payload"
      witness: "d27 demands the BUILT user payload carry no command template, but the design gives the prompt builder no injection seam: invoke_agent builds the prompt inline and calls run_curator_stage with production defaults, so a fake can only enter via monkeypatch.setattr, which CI ratchets. The seam is part of the contract."
      discharged_by: m16_user_prompt_builder_is_a_seam

  holes:
    - rule: R0
      element: "lesson_path.access[tool-arg].constraints"
      resolution: "RESOLVED (F-VIA): the tool-arg lane takes write-tool parity — resolve() before containment, plus the secret/ground-truth denylist, plus the corpus confine. A lesson_path escaping the corpus is a policy deny (ModelRetry), not a per-pair ERROR."
      resolved_to: m3_tool_arg_denylist_parity

    - rule: R0
      element: "source_id.access[tool-arg].constraints"
      resolution: "RESOLVED (F-ID): the id is confined to the batch's own queued rows. An unqueued id is that pair's ERROR line, not a deny — a single bad id must not abort the batch. The bundle is never read either way."
      resolved_to: m11_source_id_confined_to_queued_rows

    - rule: R0
      element: "run_stage_seam"
      resolution: "RESOLVED (F-BYPASS): the tool bypasses engine.forward_check and calls the inner transport directly; the key is sourced once at the curator spawn and the trace is keyed on a per-check counter. The CLI-facing forward_check() is deleted with the four main()s. The design sentence is superseded."
      resolved_to: d13_key_sourced_once_per_spawn

    - rule: R0
      element: "forward_check_tool"
      resolution: "RESOLVED (F-ASYNC): d21 pins the OBSERVABLE only — no nested-loop RuntimeError, in-flight count bounded, env check does not serialize the fan-out. The async-core split is the recorded recommendation (it buys cancellability); write-code-from-spec chooses the mechanism."
      resolved_to: d21_no_nested_event_loop_crash

  pre_discharged:
    - {rule: R2, element: "curator_trace_root.identity", by: d12_curator_trace_in_a_separate_root}
    - {rule: R4, element: "AUTHOR_REQUEST_LIMIT.domain.default", by: d15_verify_requests_do_not_consume_curator_request_cap}
    - {rule: R4, element: "LEARNING_VERIFIER_PYTHON.domain.distinguished[]", by: d26_no_curator_resolves_a_verifier_interpreter}

actor_waivers:
  replay_actor: >-
    defender/learning/ops/replay_actor.py re-execs and relocates PATHS, but it drives the frozen-generation
    actor replay over lead_repository; it has no edge to the curators or to verify_forward (grounding swept
    ops/ for verify_forward references and found none). Out of scope for #558.
  harness_lead: >-
    defender/evals/harness_lead.py re-execs and relocates PATHS, but it drives the LEAD author
    (learning/leads/lead_author.py), a different writer stage with its own corpus and no forward-check.
    Out of scope for #558. The findings-curator harness (evals/harness.py) IS modelled, as actor `harness`.

handoff:
  forks:
    - >-
      F-BYPASS (silent branch; only the strong author raised it). The design asserted twice that
      `engine.forward_check` was out of scope, but d13 (key sourced once per spawn) and d11 (distinct
      per-check traces) both require changing it: it calls source_first_party_key per check (engine.py:170)
      and keys its trace on os.getpid() (engine.py:178). RESOLVED: the tool BYPASSES it and calls the inner
      transport directly; the CLI-facing forward_check() is deleted alongside the four main()s. The design
      sentence "Out: the engine.forward_check contract itself" is superseded.
    - >-
      F-ID (gap; only the strong author bound it). The id/run_id operand is a second model-supplied argument
      selecting which case bundle is read into the metered prompt and the trace; the bash lane's regex allowed
      any trailing args, so it was never gated. RESOLVED: confine the id to the batch's own queued rows. An
      unqueued id is that pair's ERROR line (a data fault), NOT a ModelRetry deny — chosen deliberately so a
      single bad id does not abort the whole batch. Containment holds either way: the bundle is never read.
    - >-
      F-VIA (silent branch; the adversarial lens flagged it open, two other lenses stated it settled). The
      lesson_path operand now reaches the corpus via three lanes with different constraints: bash (textual
      anti-`..`, no resolve(), NO denylist), write-tool (resolve, denylist, .md suffix, write-subset-read), and
      the new tool-arg lane, which the design never gated. RESOLVED: the tool-arg lane takes WRITE-TOOL PARITY
      — resolve() before containment plus the secret/ground-truth denylist. A lesson_path escaping the corpus is
      a policy DENY (ModelRetry, matching every other tool in tools.py), not a per-pair ERROR.
    - >-
      F-ASYNC (fork; the design mandated a mechanism the observable cannot distinguish). A SYNC pydantic-ai tool
      body is offloaded to a worker thread (_function_schema.py:82-87), where asyncio.run does not raise — so
      "no nested-loop crash" passes for both the async-core split and a sync-tool-plus-thread-pool. RESOLVED:
      d21 pins the OBSERVABLE only (no RuntimeError, in-flight count bounded, the env check does not serialize
      the fan-out). The async-core split is the RECOMMENDED mechanism (it buys cancellability: the outer
      AUTHOR_TIMEOUT can interrupt an in-flight check; worker threads cannot be cancelled). write-code-from-spec
      chooses.
    - >-
      F-TRACE-KEY (auto-resolved, not escalated). The d11 collision is fixed with a per-check COUNTER
      (check_index), not by adding `direction` to the trace name: direction alone does not disambiguate two
      different findings that yield the same lesson stem in the same direction. The counter is total.
    - >-
      F-STALEGRAPH (auto-resolved under the user's standing "delete/migrate the tests" decision).
      defender/tests/spec_graph_curator-glm-port.yaml (the #556 graph) pins `resolve_verifier_python` survival
      and the forward-check bash grant; #558 INVERTS both. Its two inverted demands and their realized tests are
      migrated into this spec rather than left to contradict it.
    - >-
      FORK-A (adjudicated at step 4, not escalated). The dependency and concurrency lenses both predicted "one
      raising check cancels its siblings" — which is what a bare asyncio.gather plus pydantic-ai's
      except-BaseException actually does (_agent_graph.py:1950-1956). d7 states the required behavior; the lenses
      described the failure mode of the naive implementation. Both survive as tests: d7 (behavior) and
      m14 (the mechanism trap).

  deviations:
    - >-
      FIVE lensed enumerators instead of four (dependency, input-surface, lifecycle, adversarial-input,
      concurrency). Concurrency was promoted out of lifecycle rather than folded into it: the design admits
      genuine parallel invocation into a truncate-mode shared sink, which is the R2 shape. Deviation is upward
      (more coverage), recorded for honesty about the ensemble's shape.
    - >-
      COLLAPSED DIFF. No separate step-4 alignment agent was spawned; the alignment was done in-context after
      ALL 91 stubs were collected (never incrementally). Forks, silent branches, gaps, consensus and lens errors
      are recorded in scratchpad/step4-align.md and summarized in `forks` above.
    - >-
      MANUAL SLOT CHECK. The formal-slot validation against schema.md's closed vocabularies (kinds, forms, modes,
      vias, invariant vocabularies) was hand-checked; the spec_graph linter for it is future work (#537). The two
      mechanical checks that DO exist — check_binds.py and check_actors.py — both pass.
    - >-
      LENS ERRORS RECORDED, NOT ESCALATED. The concurrency lens claimed concurrent checks share one
      VERIFY_REQUEST_LIMIT counter; the brief establishes UsageLimits is per-agent.run (usage.py:378-382), so
      d15 stands and the stub was dropped. The dependency lens conflated the production drain (main checkout,
      correct DEFAULT_PATHS) with the in-process test contexts; the strong author's decomposition (A2) was used.
    - >-
      STEP-9 REPAIR, not a loosening. test_d27 originally asserted on the three prompt.md files — the SYSTEM
      prompt, a different artifact from the demand's address (the BUILT user payload). The payload surface was
      unreachable: invoke_agent builds the prompt inline and calls run_curator_stage with production defaults,
      so a fake could only enter via monkeypatch.setattr, which CI ratchets. Per the skill, the missing seam
      became a demand (m16) and d27 was repaired to call the target, binding both surfaces plus a positive
      control that the builder emits a non-empty payload.
    - >-
      The strong author ran on a frontier model (Opus), UNLENSED, as the skill requires. The unknown-unknown
      region did NOT run degraded. It produced the three findings no lens reached: the engine.forward_check
      scope contradiction (F-BYPASS), the unconfined id operand (F-ID), and the fact that the env check writes
      no RequestLogger at all — which makes d11 an A/B-only demand and gives m2 its positive-control shape.
