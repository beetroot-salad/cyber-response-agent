          nl: "A length-prefixed binary framing carrying RAW BYTES in both directions: MAGIC|rc|len(out)|len(err)|out_bytes|err_bytes, decoded into BoxResult(rc:int, out:bytes, err:bytes). Not JSON (cannot carry arbitrary bytes without base64), not pickle (would deserialize on the trusted-parse side). The fault signal is the FRAME'S ABSENCE — any unframed stdout is by definition daemon text."
