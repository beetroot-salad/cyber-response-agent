  deviations:
    - "The third answerer terminated on an output-token limit after ~36 of 181 premises. The ambiguity measurement is 3-way on those and 2-way on the remainder — divergence is still detected, but without majority voting. Answerers one and two completed in full."
    - "The formal closed-vocabulary slot check was performed by hand; the spec_graph linter does not exist yet."
    - "NULL-STUB COVERAGE IS PARTIAL IN THIS ENVIRONMENT: 42 tests fail on their own demand-specific assertion, 10 pass (each classified in nullstub_passes), and 25 SKIP because this sandbox is docker-outside-of-Docker — F8's startup sentinel cannot pass when bind sources resolve on a filesystem the test process cannot see. A skipped test binds nothing here. Those 25 run for real on a native daemon, including CI ubuntu-latest, and their discrimination is UNVERIFIED until then."
    - "The suite was authored by three parallel agents. They diverged on the executor method name (run vs run_parsed); reconciled to run_parsed, which is what M7 and the existing bash_exec.run_parsed both name. Caught by a cross-file API check, not by either author — the composition failure a throughput cut invites."
    - "test_scrub_raises_on_a_fifo_socket_or_device_node binds only PARTIALLY: it proves FIFO, socket and device nodes all raise, but cannot distinguish H4's allowlist from an equivalent denylist, because no test can construct an st_mode type nobody enumerated. The allowlist SHAPE must be enforced at code review. The H4 motivating case is bound as a TERMINATION assertion (a join deadline), so an implementation that opens the FIFO fails instead of hanging CI."
    - "The ordering and crash-teardown demands are asserted against the AST of run.py main() — statement order and control-flow shape, never line numbers — because main() has no injection seam for the box or the scrub and driving it end-to-end needs model credentials."
    - "C41 and three other claims could not be probed in this environment (docker-outside-of-Docker, live network egress). Listed under deferred."
    - "The worktree was missing its defender/.venv symlink, which every sibling worktree has. Without it 16 tests fail on ModuleNotFoundError: pydantic_ai — a provisioning gap, not a defect. The symlink was created (gitignored, zero repo diff); the real baseline is 2203 passed, 8 skipped, 0 failed."
    - "R6 fired on judgment, not on its formal trigger, because the rendered sinks were absent from the extracted graph. model_context was added afterwards. A clean R6 on the original graph would have certified the blind spot — recorded because it is the extraction-completeness failure mode, the gate's single point of failure."
