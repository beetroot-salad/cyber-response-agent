# ============================================================================
# CLAIMS — the ledger. Every load-bearing statement about EXISTING reality,
# probed not asserted. probe_kind is the instrument ACTUALLY used and is gated
# against `kind`: a behavior/primitive/reachability claim may NOT close on
# `read`. Inherited entries keep their discuss-doc ids (C-prefixed).
# ============================================================================
claims:
  # ---- REFUTED — the suite may not assert this content ----
  - id: C39
    kind: behavior
    claim: "Docker writes its OWN errors to the container's stdout with CRLF, leaving stderr empty, at rc=127."
    probe: "docker run --rm alpine:latest /nonexistent-binary-xyz, capturing stdout and stderr separately and hexdumping line endings"
    probe_kind: executed
    observed: "rc=127 as claimed, but stdout=0 bytes and stderr=347 bytes with plain LF. Exactly inverted. Docker server 29.5.3."
    verdict: refuted
    note: "O17/M16 exist BECAUSE of this claim. The obligation survives; its witness does not. It also retires F9's options (a) text-match and (b) rc-classification, which were heuristics built on this exact shape — they would have been pinned to a version that has already changed. The length-prefixed framing is version-independent."
  - id: C19_rglob
    kind: primitive
    claim: "skills/invlang/corpus.py:160 calls rglob('investigation.md'), and rglob descends symlinked directories."
    probe: "built a temp tree with linkdir -> real/ and ran Path(d).rglob('*'); then read _corpus.py"
    probe_kind: executed
    observed: "rglob yields ['real','linkdir','real/inner.txt'] — it lists the symlink but does NOT descend. And _corpus.py line 160 is blank; the file contains no rglob call at all, only non-recursive .glob()."
    verdict: refuted
    note: "A grounding error, propagated into enumeration. The premise built on it was dropped. The symlinked-directory family survives RE-SITED on shutil.copytree(symlinks=False) — see C_copytree_launders."
  - id: C_parse_dollar_paren
    kind: behavior
    claim: "bash_exec.parse preserves $(...) as one literal argv token, like quotes, backticks and globs."
    probe: "bash_exec.parse('echo $(whoami)')"
    probe_kind: executed
    observed: "['echo', '$', '(', 'whoami', ')'] — four tokens. Quotes ('a b'), backticks (`y`) and globs (*.txt) ARE each preserved as one token."
    verdict: refuted
    note: "A uniform 'all four shell-metacharacter classes cross as single literal tokens' assertion is false. This asymmetry is at the HOST parse, upstream of the box entirely."
  - id: C_logger_close_guaranteed
    kind: referential
    claim: "logger.close() is guaranteed on the crash path by a try/finally around the agent loop."
    probe: "read driver.py:505-570; grep -n 'try:|finally:|logger.close' runtime/driver.py"
    probe_kind: read
    observed: "No finally: exists. logger.close() sits after a try/except catching only UsageLimitExceeded and RunAborted; any other exception propagates past it."
    verdict: refuted
    note: "Makes the scrub-vs-open-fd composition real rather than hypothetical: on a genuine crash the llm_requests.jsonl fd is not merely open, it is leaked."
  - id: C_620_red
    kind: behavior
    claim: "test_620_consumers is RED BY CONSTRUCTION against an unbuilt runtime.verbs.verb surface (per its own docstring)."
    probe: "pytest tests/ -k 620 -m 'not live' -q"
    probe_kind: executed
    observed: "47 passed, 2051 deselected."
    verdict: refuted
    note: "Stale docstring."
  - id: C48_gittracked
    kind: referential
    claim: "visualize_run.py's symlink-following copy lands in the GIT-TRACKED defender/run-visualizations/, so the dereferenced output is committed."
    probe: "git ls-files defender/run-visualizations && cat defender/run-visualizations/.gitignore"
    probe_kind: read
    observed: "Exactly one tracked file: .gitignore, whose content is '*.html'. The mirrored pages are git-ignored."
    verdict: refuted
    note: "The dereference is real and the sink is the repo working tree, but nothing is committed by an ordinary git add. O8's witness must be restated — the STRONGER witnesses are persist.py:210,217 (durable learning state dir) and workspace_map.py:79 (the model's own context, in-process, upstream of the scrub)."

  # ---- HOLDS — executed, safe to cite ----
  - {id: C36a, kind: primitive, claim: "A non-UTF-8 argv element crosses docker exec silently rewritten to U+FFFD at rc=0.", probe: "subprocess.run(['docker','exec',C,'od','-An','-tx1'], with b'\\xff\\xfe\\x80' as an argv element)", probe_kind: executed, observed: "rc=0; hex 'ef bf bd' x3 — three replacement characters, one per invalid byte.", verdict: holds}
  - {id: C36b, kind: primitive, claim: "An embedded NUL in argv is rejected by Python's subprocess before docker sees it.", probe: "subprocess.run(['docker','exec',C,'echo','a\\x00b'])", probe_kind: executed, observed: "ValueError: embedded null byte", verdict: holds}
  - {id: C40, kind: primitive, claim: "--tmpfs implies noexec (a script there fails rc=126); a bind mount IS exec-able.", probe: "ran a chmod+x script from --tmpfs /tmp and from a bind-mounted dir", probe_kind: executed, observed: "tmpfs: 'Permission denied', exit 126. bind: 'ran-ok', exit 0.", verdict: holds}
  - {id: C43a, kind: behavior, claim: "docker rm -f on a missing name is rc=0 but writes 'Error response from daemon' to STDERR.", probe: "docker rm -f this-container-does-not-exist-xyz123", probe_kind: executed, observed: "rc=0, stdout empty, stderr 'Error response from daemon: No such container: ...'", verdict: holds, note: "A reaper keying on stderr misfires on the SUCCESS path. Check the return code."}
  - {id: C43b, kind: behavior, claim: "STOPPED containers collide on name at rc=125.", probe: "created a container, stopped it, docker run again with the same name", probe_kind: executed, observed: "rc=125, 'Conflict. The container name ... is already in use'", verdict: holds, note: "Makes the pre-create reap necessary, not tidy."}
  - {id: C35a, kind: behavior, claim: "cwd does NOT persist across docker exec calls; /tmp DOES.", probe: "exec sh -c 'cd /tmp && pwd' then a fresh exec pwd; touch /tmp/marker in exec 1, ls it in exec 2", probe_kind: executed, observed: "exec1 '/tmp', exec2 '/'. Marker file found in exec 2.", verdict: holds, note: "REFUTES the design's 'cwd and /tmp persist' rationale in half. cwd must be re-applied per call via docker exec -w."}
  - {id: C35b, kind: behavior, claim: "docker exec -w <missing> is rc=127; docker run -w <missing> silently CREATES the directory.", probe: "both invocations against a nonexistent workdir", probe_kind: executed, observed: "exec -w: rc=127 'OCI runtime exec failed ... chdir to cwd'. run -w: rc=0, pwd prints it, ls shows it exists.", verdict: holds}
  - {id: C53a, kind: primitive, claim: "os.walk(followlinks=False) yields a symlink-to-a-DIRECTORY under `dirs`, not `files`.", probe: "built a temp tree with symlink-to-dir, symlink-to-file and a hardlinked regular file; walked it", probe_kind: executed, observed: "dirs: ['realdir','link_to_dir']; files: ['hardlinked.txt','regfile.txt','link_to_file']", verdict: holds, note: "M10's (*dirs, *files) iteration is LOAD-BEARING — a files-only walk misses the symlinked dir entirely."}
  - {id: C53b, kind: primitive, claim: "Directory nlink is filesystem-dependent, so an unguarded st_nlink>1 test yields false positives on directories.", probe: "same temp tree; printed every st_nlink", probe_kind: executed, observed: "realdir nlink=2; symlink nlink=1; the hardlinked regular pair each nlink=2", verdict: holds, note: "The S_ISREG guard before the nlink test is REQUIRED, not decorative."}
  - {id: C56a, kind: primitive, claim: "EROFS surfaces as a bare OSError, not a PermissionError subclass.", probe: "write to /sys/kernel/notes (read-only sysfs)", probe_kind: executed, observed: "type(e) is OSError exactly; errno 30; isinstance(e, PermissionError) False", verdict: holds}
  - {id: C56b, kind: primitive, claim: "ENOSPC surfaces as a bare OSError.", probe: "write to /dev/full", probe_kind: executed, observed: "type is exactly OSError, errno 28", verdict: holds}
  - {id: C56c, kind: primitive, claim: "ENETUNREACH surfaces as a bare OSError.", probe: "connect(('fc00::1',80)) with no IPv6 route", probe_kind: executed, observed: "errno 101, type(e) is OSError exactly", verdict: holds}
  - {id: C56d, kind: primitive, claim: "The DNS errno values -3 (EAI_AGAIN) and -2 (EAI_NONAME) are absent from errno.errorcode.", probe: "errno.errorcode lookup for -2 and -3", probe_kind: executed, observed: "-3 in errno.errorcode == False; .get(-3) is None; same for -2", verdict: holds, note: "Any errno->name lookup for the DNS case must not assume errno.errorcode contains it."}
  - {id: C18_copytree_dangling, kind: primitive, claim: "shutil.copytree(symlinks=False) on a tree containing a DANGLING symlink raises.", probe: "copytree over a temp dir containing a symlink to /nonexistent", probe_kind: executed, observed: "shutil.Error listing the failure — it collects, partial-copies, then raises at the end", verdict: holds}
