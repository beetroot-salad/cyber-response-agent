  cold_reconciler:
    - "CG-1 REPAIRED IN THIS DIFF: stop_box was never ordered against scrub. The scrub's entire TOCTOU-free argument rests on 'no live writer' and its own docstring says so, yet nothing pinned it — a teardown after the post-steps satisfied every other assertion while the scrub walked a tree a live box was still writing. Three premises asked; none had become a demand. Now asserted in test_scrub_runs_before_the_first_run_dir_consumer."
    - "CG-2 OPEN: observe.write_trace is an actor with a write edge to run_dir and binds ZERO demands. It is a truncating unguarded write_text fired INSIDE run_investigation, i.e. upstream of the scrub by construction. The box can replace tool_trace.jsonl with a symlink (host write lands outside run_dir) or a FIFO (the open blocks forever and the run never reaches the scrub). Same shape for RequestLogger's open if start_box precedes it."
    - "CG-3 OPEN: no demand binds llm_requests_jsonl. Composed with the REFUTED C_logger_close_guaranteed, the fd is not merely open on a crash but LEAKED — the box unlinks the path, the host writes on to an orphaned inode, and the scrub lstats the new name and passes clean."
