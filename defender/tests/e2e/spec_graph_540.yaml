    - "CG-5 OPEN: _do_cd's target.resolve() is the one place the executor dereferences a path the gate did not re-check — after decide_bash returned, in a package whose stated purpose is eliminating exactly that differential. The cwd demands pin the ANCHOR at three sites; none pins the post-gate dereference. C21 (image-present links resolve in-box) makes it live."
    - "CG-6 OPEN: learn_drain binds no demand. The queue marker carries a resolved run_dir path read by a different process at unbounded delay, and evals/harness_lead.py:103 copytrees a whole real run dir WITHOUT passing through run.py, so the scrub never runs on that path at all."
    - "CG-7 OPEN: a UDS the box CREATES inside the rw bind is a host-connectable egress channel that --network=none does not govern. d_no_socket_mounted_inward covers only the inward direction."
    - "AM-1: the ordering demands pin AST statement order and except-clause shape, not behaviour — they pass on a scrub() that returns without walking, or one hoisted into a helper the AST walk no longer sees. Recorded as an instrument limitation; the demand kinds read as if they pinned behaviour."
