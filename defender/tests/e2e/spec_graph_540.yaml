# ============================================================================
# NOTE ON STATE: this file is the structure + ledger half, written at step 5.
# The demand list, gate record and handoff are completed after the answerers
# and the gate run. Do not consume it as final until `gate.evaluated` is
# populated for R0-R6.
# ============================================================================

# ============================================================================
# DEMANDS — the spec proper. `form: test` demands are POINTERS: the
# observable-outcome prose lives in the named test's docstring, which is what
# check_binds scans. `clause`/`waiver` carry their own `outcome`.
# ============================================================================
demands:
  # ---- #0 the box executor's contract (human-resolved; see handoff.forks) ----
  - {id: d0_box_result_contract, kind: behavior, form: test, discharged_by: test_box_returns_boxresult_dataclass_not_a_tuple,
     binds: ["interacts(BoxExecutor->box_wire).response", box_wire.payload]}
  - {id: d0_frame_absence_is_the_fault_signal, kind: negative, form: test, discharged_by: test_unframed_stdout_is_never_returned_as_program_output,
     binds: ["interacts(BoxExecutor->box_wire).response"]}
  - {id: d0_program_rc_survives_inside_the_frame, kind: behavior, form: test, discharged_by: test_program_rc_127_inside_the_frame_reaches_the_model,
     binds: ["interacts(BoxExecutor->box_wire).response"]}   # POSITIVE CONTROL for d0_frame_absence
  - {id: d0_bytes_cross_untranscoded, kind: shape, form: test, discharged_by: test_program_output_bytes_cross_the_frame_untranscoded,
     binds: [box_wire.payload]}
  - {id: d0_boxfault_raises_never_returns, kind: behavior, form: test, discharged_by: test_infrastructure_failure_raises_boxfault,
     binds: ["interacts(BoxExecutor->box_wire).response"]}
  - {id: d0_malformed_frame_fails_closed, kind: negative, form: test, discharged_by: test_malformed_frame_never_becomes_a_different_command,
     binds: [box_wire.payload, "interacts(box_entrypoint->box_wire)"]}
  - {id: d0_no_pickle_on_the_boundary, kind: negative, form: test, discharged_by: test_no_pickle_on_the_box_boundary,
     binds: [box_wire.payload]}

  # ---- O7 / NO15 — byte-exact or fail ----
  - {id: d_hostile_argv_crosses_byte_exact, kind: behavior, form: test, discharged_by: test_hostile_argv_crosses_byte_exact,
     binds: [box_wire.payload, bash_exec_pipeline.domain]}
  - {id: d_non_utf8_argv_rejected_loudly, kind: negative, form: test, discharged_by: test_non_utf8_argv_rejected_rather_than_transcoded,
     binds: [box_wire.payload]}
  - {id: d_embedded_nul_rejected, kind: negative, form: test, discharged_by: test_embedded_nul_argv_rejected,
     binds: [box_wire.payload]}
  - {id: d_no_second_parse_in_the_box, kind: negative, form: test, discharged_by: test_box_accepts_no_raw_command_string,
     binds: ["interacts(box_entrypoint->box_wire)", bash_exec_pipeline.domain]}
  - {id: d_command_substitution_splits_at_parse, kind: behavior, form: test, discharged_by: test_command_substitution_splits_into_four_tokens_at_the_host_parse,
     binds: [bash_exec_pipeline.domain]}   # R-B13: NOT preserved as one literal token, unlike quotes/backticks/globs

  # ---- O1 / O5 / O6 — the filesystem boundary ----
  - {id: d_outside_paths_absent_not_denied, kind: negative, form: test, discharged_by: test_host_path_outside_the_binds_is_absent,
     binds: ["run_dir.access[box-write]", "defender_dir.access[box-read]"]}
  - {id: d_binds_are_readable, kind: behavior, form: test, discharged_by: test_run_dir_and_defender_dir_are_readable_in_box,
     binds: ["defender_dir.access[box-read]"]}   # POSITIVE CONTROL
  - {id: d_defender_dir_write_is_erofs, kind: negative, form: test, discharged_by: test_write_under_defender_dir_fails_erofs_by_errno,
     binds: ["defender_dir.access[box-write]"]}
  - {id: d_defender_dir_import_succeeds, kind: behavior, form: test, discharged_by: test_defender_dir_imports_from_the_ro_bind,
     binds: ["defender_dir.access[box-read]"]}   # POSITIVE CONTROL for d_defender_dir_write_is_erofs
  - {id: d_write_set_is_one_directory, kind: negative, form: test, discharged_by: test_another_runs_run_dir_is_absent,
     binds: [run_dir.identity, "run_dir.access[box-write]"]}
  - {id: d_run_dir_write_reaches_the_host, kind: behavior, form: test, discharged_by: test_bytes_written_in_box_appear_on_the_host,
     binds: ["run_dir.access[box-write]"]}       # POSITIVE CONTROL
  - {id: d_dotdot_cannot_escape_run_dir, kind: negative, form: test, discharged_by: test_dotdot_operand_cannot_name_a_sibling_run,
     binds: [cwd_anchor.identity, "run_dir.access[box-write]"]}

  # ---- O2 — the network boundary ----
  - {id: d_no_outbound_tcp, kind: negative, form: test, discharged_by: test_no_outbound_tcp_connect_succeeds,
     binds: ["box_network.access[box-connect]"]}
  - {id: d_no_outbound_ipv6, kind: negative, form: test, discharged_by: test_no_outbound_ipv6_connect_succeeds,
     binds: ["box_network.access[box-connect]"]}
  - {id: d_no_outbound_udp, kind: negative, form: test, discharged_by: test_no_udp_sendto_reaches_a_destination,
     binds: ["box_network.access[box-connect]"]}
  - {id: d_dns_fails_by_gaierror, kind: negative, form: test, discharged_by: test_dns_resolution_fails_from_inside_the_box,
     binds: ["box_network.access[box-connect]"]}
  - {id: d_egress_control_proves_the_channel, kind: behavior, form: test, discharged_by: test_the_same_egress_attempt_succeeds_outside_the_box,
     binds: ["box_network.access[box-connect]"]}   # POSITIVE CONTROL — without it every negative above passes vacuously
  - {id: d_egress_fault_asserted_by_errno, kind: behavior, form: test, discharged_by: test_egress_failure_is_a_bare_oserror_asserted_by_errno,
     binds: ["box_network.access[box-connect]"]}
  - {id: d_no_socket_mounted_inward, kind: negative, form: test, discharged_by: test_no_unix_socket_is_mounted_into_the_box,
     binds: [box_network]}

  # ---- O3 — secrets ----
  - {id: d_no_host_secret_in_box_env, kind: negative, form: test, discharged_by: test_no_host_secret_is_present_in_the_box_env,
     binds: ["box_env.access[box-read]", box_env.domain]}
  - {id: d_box_env_is_a_positive_allowlist, kind: shape, form: test, discharged_by: test_box_env_contains_exactly_the_allowlist,
     binds: [box_env.domain]}   # POSITIVE CONTROL for d_no_host_secret_in_box_env
  - {id: d_host_side_key_strip_unchanged, kind: survival, form: test, discharged_by: test_run_env_provider_key_strip_still_governs_host_subprocesses,
     binds: [run_env]}

  # ---- O4 — the boundary is structural, not the matcher ----
  - {id: d_boundary_holds_with_the_gate_disabled, kind: domain-outcome, form: test, discharged_by: test_boundary_holds_with_decide_bash_approving_everything,
     binds: ["bash_gate.access[bash]", "run_dir.access[box-write]", "box_network.access[box-connect]", "box_env.access[box-read]"]}
  - {id: d_never_falls_back_in_process, kind: negative, form: test, discharged_by: test_no_box_failure_path_executes_in_process,
     binds: [BoxExecutor, "drives(_tool_bash->BoxExecutor)"]}
  - {id: d_allow_unsandboxed_is_the_only_opt_out, kind: behavior, form: test, discharged_by: test_allow_unsandboxed_is_the_sole_loud_opt_out,
     binds: [BoxSpec.domain]}   # POSITIVE CONTROL for d_never_falls_back_in_process

  # ---- O8 / O9 — the reap-time scrub ----
  - {id: d_scrub_raises_on_symlink, kind: behavior, form: test, discharged_by: test_scrub_raises_on_a_planted_symlink,
     binds: ["interacts(scrub->run_dir)"]}
  - {id: d_scrub_catches_symlink_to_directory, kind: behavior, form: test, discharged_by: test_scrub_catches_a_symlink_to_a_directory,
     binds: ["interacts(scrub->run_dir)"]}   # C53: lands under `dirs`, so (*dirs,*files) is load-bearing
  - {id: d_scrub_raises_on_within_bind_hardlink, kind: behavior, form: test, discharged_by: test_scrub_raises_on_a_within_bind_hardlink,
     binds: ["interacts(scrub->run_dir)"]}
  - {id: d_scrub_s_isreg_guard_required, kind: negative, form: test, discharged_by: test_scrub_does_not_flag_a_directory_by_nlink,
     binds: ["interacts(scrub->run_dir)"]}   # C53b: directory nlink is fs-dependent
  - {id: d_scrub_never_sanitizes, kind: negative, form: test, discharged_by: test_scrub_removes_and_rewrites_nothing,
     binds: ["interacts(scrub->run_dir)"]}
  - {id: d_clean_tree_passes_scrub, kind: behavior, form: test, discharged_by: test_a_clean_run_dir_passes_the_scrub,
     binds: ["interacts(scrub->run_dir)"]}   # POSITIVE CONTROL for the whole scrub family
  - {id: d_scrub_precedes_first_consumer, kind: seam, form: test, discharged_by: test_scrub_runs_before_the_first_run_dir_consumer,
     binds: ["drives(run_main->run_investigation)", "interacts(scrub->run_dir)", "interacts(run_main->run_dir)"]}
  - {id: d_no_consumer_runs_on_a_tainted_tree, kind: negative, form: test, discharged_by: test_no_consumer_runs_when_the_scrub_raises,
     binds: ["interacts(run_main->run_dir)", "interacts(visualize_run->run_dir)", "interacts(persist_copy_shared_inputs->run_dir)"]}

  # ---- O10 / O11 — lifecycle, fail-closed, teardown ----
  - {id: d_construction_failure_refuses_the_run, kind: behavior, form: test, discharged_by: test_box_construction_failure_refuses_the_run,
     binds: [start_box, "drives(run_main->start_box)"]}
  - {id: d_startup_probes_rather_than_detects, kind: behavior, form: test, discharged_by: test_startup_attempts_a_box_rather_than_detecting_a_binary,
     binds: [start_box]}
  - {id: d_path_identity_sentinel, kind: behavior, form: test, discharged_by: test_path_identity_sentinel_fails_closed,
     binds: [start_box, "run_dir.access[box-write]"]}
  - {id: d_mid_run_exec_failure_is_a_tool_error, kind: behavior, form: test, discharged_by: test_mid_run_exec_failure_degrades_to_a_tool_error,
     binds: [BoxExecutor, "interacts(BoxExecutor->box_wire).response"]}
  - {id: d_container_name_is_run_id_derived, kind: shape, form: test, discharged_by: test_container_name_is_defender_run_run_id,
     binds: [container_name.identity]}
  - {id: d_box_torn_down_on_crash, kind: behavior, form: test, discharged_by: test_box_does_not_outlive_a_crashed_driver,
     binds: [stop_box, "drives(run_main->stop_box)"]}
  - {id: d_teardown_is_idempotent, kind: behavior, form: test, discharged_by: test_teardown_of_an_absent_box_succeeds,
     binds: [stop_box]}
  - {id: d_reaper_keys_on_return_code_not_stderr, kind: negative, form: test, discharged_by: test_reaper_does_not_treat_stderr_as_failure,
     binds: [stop_box]}   # C43: the idempotent SUCCESS path writes to stderr at rc=0
  - {id: d_pre_create_reap_clears_a_stopped_collision, kind: behavior, form: test, discharged_by: test_a_stopped_box_of_the_same_name_does_not_block_a_new_run,
     binds: [container_name.identity, start_box]}

  # ---- O12 / M9 — the repertoire and the three-site cwd ----
  - {id: d_relative_operand_names_one_file_at_three_sites, kind: parity, form: test, discharged_by: test_relative_operand_names_the_same_file_at_all_three_sites,
     binds: [cwd_anchor.identity, decide_bash, _resolve_operand, BoxExecutor]}
  - {id: d_cwd_is_reapplied_per_exec, kind: shape, form: test, discharged_by: test_cwd_is_reapplied_per_call_and_does_not_persist,
     binds: [cwd_anchor.identity, BoxExecutor]}   # C35: cwd does NOT persist; /tmp does
  - {id: d_cwd_exists_before_first_exec, kind: behavior, form: test, discharged_by: test_the_chosen_cwd_exists_before_the_first_exec,
     binds: [start_box, cwd_anchor.identity]}
  - {id: d_repertoire_runs_in_box, kind: domain-outcome, form: test, discharged_by: test_the_granted_bash_repertoire_runs_inside_the_box,
     binds: [BoxSpec.domain, "defender_dir.access[box-read]"]}
  - {id: d_namespace_package_imports_in_box, kind: shape, form: test, discharged_by: test_defender_namespace_package_imports_in_the_box,
     binds: ["defender_dir.access[box-read]", box_entrypoint]}

  # ---- O14 / F1 / F3 — the knob, the tmpfs ----
  - {id: d_boxspec_carries_three_replaceables, kind: seam, form: test, discharged_by: test_boxspec_carries_runtime_rootfs_and_lifecycle,
     binds: [BoxSpec.domain]}
  - {id: d_boundary_holds_at_the_runc_floor, kind: parity, form: test, discharged_by: test_boundary_holds_under_both_runc_and_runsc,
     binds: ["BoxSpec.domain.alternatives[runc]", "BoxSpec.domain.distinguished[runsc]"]}
  - {id: d_tmpfs_is_noexec, kind: negative, form: test, discharged_by: test_a_script_on_the_tmpfs_cannot_execute,
     binds: ["box_tmpfs.domain.distinguished[noexec]"]}
  - {id: d_rw_bind_remains_exec_able, kind: behavior, form: test, discharged_by: test_a_script_on_the_rw_bind_executes,
     binds: ["run_dir.access[box-write]"]}   # POSITIVE CONTROL for d_tmpfs_is_noexec
  - {id: d_tmpfs_is_size_capped, kind: domain-outcome, form: test, discharged_by: test_tmpfs_exhaustion_fails_the_run_loudly,
     binds: ["box_tmpfs.domain.distinguished[size_cap]"]}

  # ---- O15 — what must NOT change ----
  - {id: d_decide_bash_still_runs_host_side, kind: survival, form: test, discharged_by: test_decide_bash_runs_host_side_before_every_box_call,
     binds: ["bash_gate.access[bash]", "interacts(_tool_bash->bash_gate)"]}
  - {id: d_read_denylist_survives, kind: survival, form: test, discharged_by: test_ground_truth_read_denylist_still_denies_on_both_surfaces,
     binds: ["bash_policy_denylist.access[bash]", "bash_policy_denylist.access[read-tool]"]}
  - {id: d_main_cannot_read_gather_raw, kind: survival, form: test, discharged_by: test_main_loop_still_cannot_read_gather_raw,
     binds: [gather_raw.identity, "bash_gate.access[bash]"]}

  # ---- the deps seam ----
  - {id: d_tool_bash_executes_through_the_box_seam, kind: seam, form: test, discharged_by: test_tool_bash_executes_through_the_injected_box_seam,
     binds: ["AgentDeps.access[bind]", _tool_bash, "drives(_tool_bash->BoxExecutor)"]}

  # ---- step-7 resolutions: obligations minted from the gate's residue ----
  # H4 — the scrub allowlists rather than denylists st_mode types.
  - {id: d_scrub_allowlists_regular_and_dir_only, kind: negative, form: test, discharged_by: test_scrub_raises_on_a_fifo_socket_or_device_node,
     binds: ["interacts(scrub->run_dir)"]}
  - {id: d_scrub_permits_regular_files_and_directories, kind: behavior, form: test, discharged_by: test_scrub_passes_regular_files_and_real_directories,
     binds: ["interacts(scrub->run_dir)"]}   # POSITIVE CONTROL for the allowlist
  # H3 — every bash-enabled role gets a box; gather_only.py is deleted.
  - {id: d_every_bash_enabled_role_has_a_box, kind: parity, form: test, discharged_by: test_every_bash_enabled_role_executes_through_a_box,
     binds: ["AgentDeps.access[bind]", "drives(_tool_bash->BoxExecutor)"]}
  - {id: d_gather_only_removal_survives, kind: survival, form: test, discharged_by: test_gather_only_workflow_completes_via_its_substitute,
     binds: ["AgentDeps.access[direct-ctor]", gather_only_script]}
  # R6 obligations (recommendation taken; see handoff.forks)
  - {id: d_box_filename_cannot_forge_a_workspace_map_section, kind: negative, form: test, discharged_by: test_a_box_authored_filename_cannot_forge_a_workspace_map_section,
     binds: ["interacts(workspace_map->run_dir)", model_context.payload]}
  - {id: d_workspace_map_renders_a_benign_name_intact, kind: behavior, form: test, discharged_by: test_workspace_map_renders_an_ordinary_filename_intact,
     binds: [model_context.payload]}   # POSITIVE CONTROL
  - {id: d_hostile_run_id_fails_loudly, kind: negative, form: test, discharged_by: test_hostile_run_id_fails_rather_than_splitting_the_bind_spec,
     binds: [container_name.identity, run_dir.identity]}
  # R2 obligations — the four shared sinks the box now co-writes
  - {id: d_box_write_cannot_overwrite_a_claimed_lead, kind: uniqueness, form: test, discharged_by: test_a_box_write_cannot_overwrite_a_claimed_lead_sidecar,
     binds: [gather_raw.identity, "interacts(BoxExecutor->gather_raw)"]}
  - {id: d_run_id_collision_refuses_rather_than_reaping_a_sibling, kind: uniqueness, form: test, discharged_by: test_a_colliding_run_id_refuses_rather_than_reaping_a_live_sibling,
     binds: [container_name.identity, run_dir.identity]}
  # R4 — the falsy domain member
  - {id: d_empty_pipeline_crosses_as_a_valid_frame, kind: domain-outcome, form: test, discharged_by: test_an_empty_pipeline_crosses_as_a_valid_zero_rc_frame,
     binds: ["bash_exec_pipeline.domain.distinguished[first]", box_wire.payload]}
  # R5 — the workflow the delta subtracts
  - {id: d_e2e_bash_corpus_still_completes, kind: survival, form: test, discharged_by: test_the_existing_e2e_bash_corpus_completes_through_the_box,
     binds: [bash_exec_run_parsed, "drives(_tool_bash->BoxExecutor)", replay_actor]}
  # O2 — loopback and bind/listen resolved as IN CONTRACT
  - {id: d_loopback_is_in_contract, kind: behavior, form: test, discharged_by: test_loopback_between_two_boxed_processes_is_permitted,
     binds: ["box_network.access[box-loopback]"]}

  # gate obligation #19 — daemon text reaching the model must arrive labelled
  - {id: d_infrastructure_fault_text_reaches_the_model_labelled, kind: shape, form: test, discharged_by: test_infrastructure_fault_text_reaches_the_model_labelled,
     binds: ["interacts(BoxExecutor->box_wire).response"]}

  # ---- waivers: examined noes, recorded (step 7) ----
  - {id: w_salt_relocation_is_out_of_scope, kind: negative, form: waiver,
     outcome: {nl: "The per-run salt is readable from inside the box because meta.json lives in run_dir, which is the rw bind. This spec does NOT close it: the human resolved that meta.json is removed from the run dir in a separate session. Until that lands, the injection-tagging defence is degraded — a boxed process can read the salt and forge or close <run-{salt}-...> delimiters. Recorded as a cross-session dependency, not an oversight."},
     binds: ["run_meta_salt.access[box-read]"]}
  - {id: w_scrub_certifies_link_shape_only, kind: negative, form: waiver,
     outcome: {nl: "A clean scrub certifies LINK SHAPE ONLY and licenses no content-provenance assumption. Nothing in this scope constrains the CONTENT the box writes into run_dir: a boxed process can forge executed_queries.jsonl rows, fabricate a {lead_id}.lead.json that never went through the O_EXCL claim, and rewrite any artifact. Sixteen host consumers read that tree and none uses a symlink-safe primitive. O8 is narrowed in writing to link-safety; content provenance is filed as a follow-up."},
     binds: ["interacts(scrub->run_dir)", gather_raw.identity, executed_queries_jsonl.identity]}
  - {id: w_host_consumer_confinement_out_of_scope, kind: negative, form: waiver,
     outcome: {nl: "Host-side consumer confinement (Landlock / openat2 RESOLVE_BENEATH for the renderer and learning loop) is excluded by the human's scoping decision (NO1). The accepted risk has named witnesses: persist.py:210,217 copying into the DURABLE learning state dir, and workspace_map.py:79 dereferencing into the model's own context window in-process, upstream of the scrub."},
     binds: ["run_dir.access[host-read]"]}
  - {id: w_microvm_tier_deferred, kind: negative, form: waiver,
     outcome: {nl: "The microVM tier (NO7) is deferred, not rejected, so crosses_validation stays unresolved rather than being probed. Costed reason: Hetzner Cloud documents no nested virtualisation on any instance line, so the tier requires Server Auction bare metal."},
     binds: ["BoxSpec.domain.alternatives[microvm]"]}
  - {id: w_no_socket_positive_control, kind: negative, form: waiver,
     outcome: {nl: "d_no_socket_mounted_inward has no paired positive control, because building one would mean mounting a socket into the box — the exact thing the negative forbids. The capability is known to exist (a bind-mounted host UDS is connectable under --host-uds=open) but is deliberately unused. Waived explicitly rather than left as a silently vacuous negative."},
     binds: [box_network]}

  # ---- clauses (deliberate prose deferrals — do NOT discharge a gate obligation) ----
  - {id: c_teardown_verb_is_not_reap, kind: shape, form: clause,
     outcome: {nl: "The box teardown function is named with a verb other than 'reap', because 'reap' already means waitpid-on-pipeline-children in bash_exec._reap_upstream — the same module scope this work modifies."},
     binds: [stop_box]}
  - {id: c_no_apt_update_network_gate, kind: negative, form: clause,
     outcome: {nl: "No rootfs build step uses apt-get update's exit code as a network sanity gate, because it exits 0 with no network and only install fails at rc=100."},
     binds: [BoxSpec.domain]}
  - {id: c_no_reliance_on_in_box_permission_bits, kind: negative, form: clause,
     outcome: {nl: "No in-box logic leans on file permission bits or uid, because the guest runs as uid 0 with dac_override; the mount list is the boundary."},
     binds: ["run_dir.access[box-write]"]}

# ============================================================================
# STRUCTURE — the address space. `provenance: code` is the grounded
# neighborhood (census-backed, see claims); `design` is demand-implied.
# ============================================================================
structure:
  axes: [run_id, lead_id, seq, alert_stem, via]

  actors:
    # --- existing, grounded ---
    - {id: run_main,            frame: composition, provenance: code}   # defender/run.py main() :132-185
    - {id: run_investigation,   frame: composition, provenance: code}   # driver.py :494-563
    - {id: _tool_bash,          frame: leg,         provenance: code}   # tools.py :260-293
    - {id: decide_bash,         frame: leg,         provenance: code}   # permission/bash.py :281-329
    - {id: bash_exec_run_parsed, frame: leg,        provenance: code}   # bash_exec.py :306-352
    - {id: _resolve_operand,    frame: leg,         provenance: code}   # tools.py :304-313
    - {id: materialize_run_dir, frame: leg,         provenance: code}   # run_common.py :47-72
    - {id: run_env,             frame: leg,         provenance: code}   # run_common.py :75-102
    # --- run_dir consumers (census CC14: 16 sites; the design named 2) ---
    - {id: workspace_map,       frame: leg,         provenance: code}   # IN-RUN, in-process, feeds model msg 0
    - {id: visualize_run,       frame: leg,         provenance: code}   # 3rd process via run_common.visualize
    - {id: lead_repository_stage_tables, frame: leg, provenance: code}  # copytree, symlinks unset
    - {id: persist_copy_shared_inputs,   frame: leg, provenance: code}  # DURABLE learning state dir
    - {id: learn_drain,         frame: composition, provenance: code}   # loop.py --learn-drain, separate process
    - {id: evals_harness_lead,  frame: composition, provenance: code}   # copies a whole real run dir; own worktree+venv
    # check_actors found this one: it re-execs lead_repository + run as a subprocess,
