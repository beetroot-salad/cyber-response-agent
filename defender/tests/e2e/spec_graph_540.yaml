# ============================================================================
# GATE — every rule, every run. A rule with no entry reads as SKIPPED, not clean.
# ============================================================================
gate:
  evaluated:
    - {rule: R0, fired: true,  note: "7 unknown invariants, 3 unresolvable payload-slot addresses, 2 zero-edge actors, a self-referential derivation, 3 dead axes, and 4 normative design sentences binding no element. Bidirectional reconciliation ran. Structural defects fixed in-place; the decisions routed to step 7."}
    - {rule: R1, fired: true,  note: "3 sends-edges into box_wire with no shape demand on the edge payload; and the facet violated its OWN roles-disjoint-sources invariant — request and response both declared const:FRAME_MAGIC, so a reflected frame would decode as the opposite direction. Fixed to REQUEST_MAGIC/RESPONSE_MAGIC."}
    - {rule: R2, fired: true,  note: "6 identity sinks gained a second writer in a SECOND NAMESPACE (BoxExecutor via the rw bind). Zero uniqueness demands existed. Critically: BoxExecutor's declared `interpolates` were a fiction — the box writes MODEL-CHOSEN paths, so it covers no axis by construction, which is exactly the key-coverage failure R2(a) exists to catch. Corrected to `interpolates: []` on all six edges."}
    - {rule: R3, fired: true,  note: "6 multi-via access boundaries. bash_policy_denylist pre-discharged (the only cleanly discharged parity pair). Parity cells minted for the read-tool via and the salt."}
    - {rule: R4, fired: true,  note: "bash_exec_pipeline had 7 unbound distinguished members INCLUDING the falsy one (the empty pipeline, B12). box_tmpfs fully pre-discharged, one binding mis-targeted and corrected. BoxSpec's rootfs/lifecycle axes carry no members — routed as a hole."}
    - {rule: R5, fired: true,  note: "Judgment extension CONSIDERED and FIRED: `bash enabled + box absent` was constructible via four box-less bash=True learning roles plus gather_only.py's direct-ctor bypass of `bind`. Human resolved by porting the learning agents and DELETING gather_only.py — which is itself a removal with live in-edges, so a survival demand is owed. The delta's central subtraction (in-process run_parsed) was invisible to the trigger because the actor carried zero edges."}
    - {rule: R6, fired: true,  note: "FIRED ON JUDGMENT ONLY — the rendered sinks were ABSENT from the graph, so the formal trigger could not have fired and a clean R6 would have CERTIFIED the blind spot. Three attacker-influenced choosers with an empty sanitizer column: run_id spliced into the docker --name grammar and the :-separated bind spec; a box-authored filename rendered raw as `- {child.name}` into model context message 0; and the tag salt readable from the box's read set. model_context added to the graph as a payload-facet boundary."}
  obligations:
    - {rule: R2, element: "gather_raw.identity", witness: "claim_lead's O_CREAT|O_EXCL buys lead_id exclusivity only in the HOST namespace; the box is a second creator in a second namespace and does not go through claim_lead.", discharged_by: d_box_write_cannot_overwrite_a_claimed_lead}
    - {rule: R2, element: "container_name.identity", witness: "F6 states verbatim that the pre-create reap is safe 'only because run_id is unique per run; pin that assumption in a test'. No demand did.", discharged_by: d_run_id_collision_refuses_rather_than_reaping_a_sibling}
    - {rule: R4, element: "bash_exec_pipeline.domain.distinguished[first]", witness: "The falsy member — parse('') returns [] (B12) — must cross as a VALID rc=0 frame and not be confused with a decode failure.", discharged_by: d_empty_pipeline_crosses_as_a_valid_frame}
    - {rule: R5, element: "bash_exec_run_parsed", witness: "The delta removes the in-process execution path that every existing e2e test drives (C58); no survival demand covered the workflow, only the gate.", discharged_by: d_e2e_bash_corpus_still_completes}
    - {rule: R5, element: "gather_only_script", witness: "Deleted per the human's H3 resolution; a removed element with live in-edges owes a survival demand.", discharged_by: d_gather_only_removal_survives}
    - {rule: R5, element: "AgentDeps", witness: "Four bash=True learning roles have no box and gather_only.py bypasses bind, so 'bash enabled, box absent' was representable AND reachable past the single seam.", discharged_by: d_every_bash_enabled_role_has_a_box}
    - {rule: R6, element: "interacts(workspace_map->model_context).payload", witness: "`- {child.name}` is rendered RAW into markdown from sorted(run_dir.iterdir()), in-process and upstream of the scrub. After the delta the chooser is the BOX and the sanitizer column is empty; a newline forges a sibling bullet or a ## heading in message 0.", discharged_by: d_box_filename_cannot_forge_a_workspace_map_section}
    - {rule: R6, element: "container_name.identity", witness: "run_id = f'{ts}-{alert.stem}' with ZERO validation, spliced into the docker --name grammar and into the :-separated bind-spec FRAME. Chooser: the alert filename, which is perimeter data.", discharged_by: d_hostile_run_id_fails_loudly}
    - {rule: R3, element: "run_meta_salt.access[box-read]", witness: "The salt is the unguessable delimiter tag_tool_results.wrap fences untrusted data with, and it sits in the box's READ set. Pre-delta the gate's cat scope confined it; post-delta O4 makes the mount list the boundary and it does not exclude meta.json.", discharged_by: w_salt_relocation_is_out_of_scope}
    - {rule: R4, element: "box_env.domain.distinguished[DEFENDER_RUNS_BASE]", witness: "The allowlist exports DEFENDER_RUNS_BASE, which names run_dir.parent — a path that is NOT mounted, and which under DooD is silently created as an empty dir rather than erroring.", discharged_by: d_box_env_is_a_positive_allowlist}
  holes:
    - {rule: R6, element: "run_meta_salt.access[box-read]", resolution: "HUMAN: meta.json is removed from the run dir in a separate session. Recorded as a cross-session DEPENDENCY — #540's boundary claim is not complete until that lands.", resolved_to: w_salt_relocation_is_out_of_scope}
    - {rule: R0, element: "interacts(scrub->run_dir)", resolution: "HUMAN: O8 is narrowed IN WRITING to link-safety. A clean scrub licenses no content-provenance assumption; content provenance is filed as a follow-up.", resolved_to: w_scrub_certifies_link_shape_only}
    - {rule: R5, element: "AgentDeps.access[direct-ctor]", resolution: "HUMAN: port the learning agents so every bash-enabled role has a box, and DELETE gather_only.py rather than guarding the bypass. Scope expansion beyond the original A/B/C freeze, recorded as such.", resolved_to: d_every_bash_enabled_role_has_a_box}
    - {rule: R0, element: "interacts(scrub->run_dir)", resolution: "HUMAN: the scrub ALLOWLISTS S_ISREG and S_ISDIR and raises on every other st_mode type — an allowlist, not a FIFO/socket/device denylist, so it fails closed on types nobody enumerated.", resolved_to: d_scrub_allowlists_regular_and_dir_only}
    - {rule: R0, element: "box_network.access[box-loopback]", resolution: "Loopback is IN CONTRACT: lo is up under --network=none (C05) and there is no peer outside the box, so O2 is untouched. O2 to be restated to name loopback explicitly rather than bringing lo down and losing intra-box IPC.", resolved_to: d_loopback_is_in_contract}
    - {rule: R0, element: "box_network.access[box-listen]", resolution: "In contract for the same reason — nothing off-box can route to a listener under --network=none.", resolved_to: d_loopback_is_in_contract}
    - {rule: R0, element: "run_dir.access[host-read]", resolution: "Re-grounded rather than asked: the consumer census already established constraints: [] — zero lstat/islink/realpath/O_NOFOLLOW across all 16 consumers.", resolved_to: w_host_consumer_confinement_out_of_scope}
    - {rule: R0, element: "BoxSpec.domain.alternatives[microvm]", resolution: "Deferred tier (NO7); crosses_validation stays unresolved by recorded waiver rather than being probed.", resolved_to: w_microvm_tier_deferred}
    - {rule: R0, element: "DEFENDER_ALLOW_UNSANDBOXED", resolution: "The knob does NOT exist repo-wide (zero hits). It is NEW surface and is the positive control for d_never_falls_back_in_process — the most security-critical negative in the set, which is otherwise vacuous.", resolved_to: d_allow_unsandboxed_is_the_only_opt_out}
  pre_discharged:
    - {rule: R4, element: "box_tmpfs.domain.distinguished[noexec]", by: d_tmpfs_is_noexec, edge: "interacts(start_box->box_tmpfs)"}
    - {rule: R4, element: "box_tmpfs.domain.distinguished[size_cap]", by: d_tmpfs_is_size_capped, edge: "interacts(start_box->box_tmpfs)"}
    - {rule: R4, element: "BoxSpec.domain.alternatives[runc]", by: d_boundary_holds_at_the_runc_floor, edge: "interacts(start_box->BoxSpec)"}
    - {rule: R3, element: "bash_policy_denylist.access[bash]", by: d_read_denylist_survives, edge: "interacts(decide_bash->bash_policy_denylist)"}
    - {rule: R3, element: "cwd_anchor.identity", by: d_relative_operand_names_one_file_at_three_sites, edge: "interacts(decide_bash->cwd_anchor)"}
    - {rule: R2, element: "container_name.identity", by: d_pre_create_reap_clears_a_stopped_collision, edge: "interacts(start_box->container_name)"}

# ============================================================================
# HANDOFF — the baton. Written for the IMPLEMENTER, not the reviewer.
# ============================================================================
handoff:
  forks:
    - "#0 the box executor's contract — RESOLVED to dataclasses at every Python seam (BoxResult/BoxFault/BoxSpec) over a LENGTH-PREFIXED BINARY FRAMING carrying raw bytes. Not JSON (cannot carry arbitrary bytes without base64, and O7 promises byte-exact-or-fail), not pickle (would deserialize on the trusted-parse side). The fault signal is the FRAME'S ABSENCE. This dissolved forks F5 and F9 outright."
    - "F1 the knob — BoxSpec dataclass, three replaceables, default runsc anchored in the dataclass, one env var as the sole external lever."
    - "F2 the scrub keeps BOTH halves — hardlink check justified on the WITHIN-BIND threat (cross-boundary is EXDEV, within-bind succeeds). The S_ISREG guard is required, not decorative."
    - "F3 tmpfs stays noexec and size-capped; exhaustion fails the run loudly (TM class 7, not a security boundary)."
    - "F4 cwd = run_dir, re-applied per call via docker exec -w. cwd does NOT persist (C35 refuted); /tmp does."
    - "F6 fail closed at box start, tool error mid-run, NEVER an in-process fallback."
    - "F8 startup sentinel proves host<->box path identity and fails closed — the only mechanism that catches C46's silent-empty-dir AS a failure."
    - "H1 the salt-secrecy collapse — the human resolved that meta.json is removed from the run dir in a SEPARATE SESSION. See dependencies below."
    - "H2 content trust — O8 narrowed IN WRITING to link-safety; content provenance filed as a follow-up."
    - "H3 absent box — the human chose to PORT THE LEARNING AGENTS so every bash-enabled role has a box, and to DELETE scripts/testing/gather_only.py. This is a deliberate scope expansion beyond the original A/B/C freeze."
    - "H4 special files — the scrub ALLOWLISTS S_ISREG and S_ISDIR and raises on everything else, rather than denylisting FIFO/socket/device."
    - "O2 loopback and bind/listen resolved as IN CONTRACT — no peer exists outside the box."
  refuted:
    - "C39 — Docker does NOT write its errors to stdout with CRLF leaving stderr empty. On server 29.5.3 it writes to STDERR with plain LF and stdout is EMPTY, at rc=127. O17/M16 exist because of this claim; the obligation survives, the witness does not. It also retires F9's heuristic options, which were built on the refuted shape and would have been pinned to a version that already changed."
    - "C35 — cwd does NOT persist across docker exec. /tmp does. Both issue-comment §3 and RSD §What it is now item 3 must be corrected."
    - "C21 — a planted symlink CAN be dereferenced by the box when its target is image-present (/etc/passwd resolves, 839 bytes). ENOENT holds only for image-ABSENT targets, so O9 is a live requirement, not a belt on a closed hole."
    - "C48 — defender/run-visualizations/ is NOT git-tracked for output (git ls-files returns only .gitignore, content '*.html'). The dereference is real but nothing is committed. O8's witness must be restated: the stronger ones are persist.py:210,217 (durable learning state dir) and workspace_map.py:79 (the model's own context, in-process, upstream of the scrub)."
    - "C33 — the mount-ordering trap does not exist. Docker sorts mount destinations by path depth. RSD §Filesystem isolation must DELETE the section; there is nothing for a test to pin."
    - "$(...) is NOT preserved as one literal argv token — parse('echo $(whoami)') yields four tokens ['echo','$','(','whoami',')'], while quotes, backticks and globs ARE each one token. No uniform metacharacter assertion is valid."
    - "logger.close() is NOT finally-guaranteed in driver.py — only UsageLimitExceeded and RunAborted are caught, so any other exception leaks the open llm_requests.jsonl fd. This makes the scrub-vs-open-fd composition real rather than hypothetical."
    - "test_620_consumers is GREEN, not red-by-construction as its own docstring claims."
    - "DEFENDER_ALLOW_UNSANDBOXED does not exist anywhere in the tree (zero hits), though O10 and M12 both discuss it as extant."
  deferred:
    - "C41 — root-owned bind artifacts. Unprobeable in this environment: it is docker-outside-of-Docker, so bind SOURCES resolve on the real daemon host and are invisible to the test process. Settle on a non-DooD host. O13's ACCESS half depends on it and the scrub, renderer and learning loop are all downstream."
    - "C56 DNS under a genuinely absent network (EAI_AGAIN / -3). This sandbox has live egress, so a bogus hostname resolved to -2 EAI_NONAME instead. The errno.errorcode-absence half IS settled."
    - "materialize_run_dir's exists()-then-mkdir TOCTOU. The construction is confirmed non-atomic by reading, but the race was never DRIVEN — a read cannot close a behavior claim."
    - "DEFENDER_RUNS_BASE reachability from inside a box. Search-only; a search cannot close a reachability claim. Load-bearing because run_env sets it to run_dir.parent, which is not mounted."
  dependencies:
    - "meta.json must leave run_dir (separate session). Until it does, the per-run salt is readable from inside the box and the injection-tagging defence is degraded: a boxed process can read the salt and forge or close <run-{salt}-...> delimiters. write-code-from-spec must NOT assume meta.json is present in run_dir."
  nullstub_passes:
    - "test_run_env_provider_key_strip_still_governs_host_subprocesses — SURVIVAL. Touches no box code; green at base IS the contract. It reddens only if the delta breaks the host-side key strip."
    - "test_ground_truth_read_denylist_still_denies_on_both_surfaces — SURVIVAL (O15). Same class."
    - "test_main_loop_still_cannot_read_gather_raw — SURVIVAL (O15). Same class."
    - "test_command_substitution_splits_into_four_tokens_at_the_host_parse — GROUNDING PIN. Pins existing HEAD behaviour (the R-B13 refutation) at the host parse, entirely upstream of the box, so a no-op box cannot change it."
