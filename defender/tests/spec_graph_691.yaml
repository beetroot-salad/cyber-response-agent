  #     side effect). The def declares no corpus_dirs, so the rule cannot reuse a static list (RG-PO5)
  #     — it matches against the three shipped names directly.
  - {id: corpus_name_owns_a_non_lesson_directory, kind: domain-outcome, form: test,
     discharged_by: test_a_single_segment_name_that_is_not_a_shipped_corpus_is_rejected,
     binds: ["corpus_name.domain.distinguished[skills]",
             "corpus_name.domain.distinguished[learning]"],
     cites: [RG-1, RG-PO5, RG-aP10]}

  # ================= M3 / N3 : the explicit tree ============================
  - {id: main_checkout_authoring_state_unbuildable, kind: negative, form: test,
