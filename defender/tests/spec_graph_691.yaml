structure:
  axes: [corpus_name, lesson_slug]

  actors:
    - {id: bind,                frame: leg,         provenance: design}   # the one binding seam (modified: threads roots, requires_corpus)
    - {id: curator_agent,       frame: leg,         provenance: design}   # the in-process GLM spawn (writes .md, runs bash, reads lessons)
    - {id: curator_spawn,       frame: leg,         provenance: code}     # CuratorDeps.for_run at curator_engine.py:174 (M9: thin wrapper over bind)
    - {id: role_census,         frame: composition, provenance: code}     # test_540_exec_seam census iterating AGENTS.values()
    - {id: policy_cli,          frame: leg,         provenance: code}     # scripts/policy_cli.py operator tool
    - {id: forward_check,       frame: leg,         provenance: code}     # the curator's forward_check @agent.tool (reads tool_config, gates a write)
    - {id: author_drain,        frame: composition, provenance: code}     # the drain that fans the four spawn configs serially
    - {id: operator_entrypoint, frame: leg,         provenance: code}     # the four __main__ CLI entrypoints (incl. benign_actor/env.py)

  boundaries:
    - {id: CORPUS_AUTHOR_DEF, provenance: design, facets: {}}   # requires_explicit_tree/anchors_on_tree/requires_confine/requires_corpus/deps_cls/write_shapes/bash_shapes
    - {id: RunScope,          provenance: design, facets: {}}   # grows corpus_name (provisional id, fork f6/F89: a bind INPUT)
    - {id: AgentDeps,         provenance: design, facets: {}}   # grows roots (f2) + tool_config (f4)
    - {id: CuratorDeps,       provenance: design, facets: {}}   # the six bare fields collapse: five into tool_config, corpus_dir derived (f1)
    - {id: ResolvedRoots,     provenance: design, facets: {}}   # retained on deps (M6); grows a spawn-corpus field (f3). corpus_roots is dead code (RG-aP10)
    - {id: tool_config,       provenance: design, facets: {}}   # the named slot (M4, provisional id): inert-by-default, loud at first use (M5)
    - {id: ForwardCheckConfig, provenance: design, facets: {}}  # occupies the slot; carries the five non-corpus fields only (F51)
    - {id: AGENTS,            provenance: code,   facets: {}}    # the role registry
    - {id: read_confine,      provenance: design, facets: {}}   # requires_confine=(lessons, lessons-actor, lessons-environment) - R4's O6 mechanism
    - {id: main_checkout,     provenance: code,   facets: {}}   # PATHS.defender_dir - S4's asset (r3, amended: also the run_dir's state root)
    - {id: run_dir,           provenance: code,   facets: {}}   # <MAIN>/defender/learning/_pending; run_id=='_pending' for all four spawns (r4 amended)
    - {id: lessons_loaded_jsonl, provenance: code, facets: {}}  # <run_dir>/lessons_loaded.jsonl (f8); L12 asserts on it
    - {id: sibling_corpus,    provenance: code,   facets: {}}   # a corpus other than the spawn's own (read ALLOW under the confine, write/rm DENY)
    - id: corpus_name
      provenance: design
      facets:
        domain:
          type: str
          refinement: {nl: "the per-spawn corpus name: relative, single-segment (len(Path(name).parts)==1); M7 rejects '', '.', multi-segment, absolute, '..'-bearing; §7 D2 (MD-6) ADDS exact-match membership against the three shipped corpora, so a single-segment NON-shipped name (skills, learning) is now also rejected, and a name whose shape normalises to a non-shipped single segment (./x -> x) is a membership reject too — the ./x member's accept case is exercised on a shipped name (./lessons); a strict char class is the write-vs-read parity tightening (MD-7/D3)"}
          default: null           # F83 → optional-with-sentinel: corpus_name is an optional RunScope field whose sentinel is None ("no corpus named"). None ≠ '' — M8 owns None (missing name, legible raise for a declaring role; a bare RunScope() non-corpus caller survives), M7 owns '' and every supplied degenerate value (F86). The R0 unknown is CLOSED.
          distinguished: ["", ".", "a/b", "..", "/etc/passwd", "./x", "skills", "learning"]
          falsy_valid: false
          documented_alternatives: []
    - id: corpus_dir
      provenance: code            # the existing lesson-corpus resource; its write/read scoping is what the design re-anchors (design-provenance edges)
      facets:
        identity:
          key_axes: [corpus_name, lesson_slug]
          evidence: {nl: "one flat <corpus>/<slug>.md per lesson - read off the three prompts ('one flat corpus, no subdirectories') and build_write_allow(corpus_dir, suffix='.md') whose tail is /[^\\x00]*\\.md (brief r1). Two of the four spawn configs (author_actor_benign, author_actor_env) both write corpus_name=lessons-environment (f9/F40), so corpus_name is a full-key axis, not a spawn identifier"}
          sharing: unique-key
        access:
          constraints_by_via:
            write-tool:    {trust: attacker-influenced, constraints: [confine]}   # write_file -> decide_write, resolved-path fullmatch vs <corpus>/**.md
            edit-tool:     {trust: attacker-influenced, constraints: [confine]}   # edit_file -> decide_read THEN decide_write (f5); read gate means O6 narrows edits too
            bash-rm:       {trust: attacker-influenced, constraints: [confine]}   # the rm grant (pins_path, no scope) - DOES NOT resolve() today (RG-adv4/MD-3)
            forward-check: {trust: attacker-influenced, constraints: [confine]}   # _gate_lesson_path -> decide_write with no content (x4/K3, unchanged by O6)
            lesson-read:   {trust: attacker-influenced, constraints: [confine]}   # decide_read - spans the three-corpus confine (siblings ALLOW), docs/SKILL DENY
            bash-cat:      {trust: attacker-influenced, constraints: [confine]}   # decide_bash cat scope - own corpus only (sibling DENY): the deliberate divergence from lesson-read

  interacts:
    - {from: bind, to: CORPUS_AUTHOR_DEF, mode: read,   via: api, provenance: design}
    - {from: bind, to: RunScope,          mode: read,   via: api, provenance: design}
    - {from: bind, to: corpus_name,       mode: read,   via: api, provenance: design}   # R4: read of a domain-facet boundary
    - {from: bind, to: ResolvedRoots,     mode: invoke, via: api, provenance: design}   # compiles + retains the roots (M6)
    - {from: bind, to: CuratorDeps,       mode: invoke, via: api, provenance: design}   # constructs the policy-correct deps, slot unset (M5)
    - {from: curator_agent, to: corpus_dir, mode: write,  via: write-tool,   provenance: design, interpolates: [corpus_name, lesson_slug]}
    - {from: curator_agent, to: corpus_dir, mode: write,  via: edit-tool,    provenance: design, interpolates: [corpus_name, lesson_slug]}
    - {from: curator_agent, to: corpus_dir, mode: remove, via: bash-rm,      provenance: design, interpolates: [corpus_name, lesson_slug]}
    - {from: curator_agent, to: corpus_dir, mode: read,   via: lesson-read,  provenance: design}
    - {from: curator_agent, to: corpus_dir, mode: read,   via: bash-cat,     provenance: design}
    - {from: forward_check, to: corpus_dir, mode: write,  via: forward-check, provenance: code}   # the fourth write-capable lane (unchanged by O6, in the census)
    - {from: curator_agent, to: sibling_corpus, mode: read,  via: lesson-read, provenance: design}   # cross-corpus read ALLOW under the confine (L8/L12)
    - {from: curator_agent, to: sibling_corpus, mode: write, via: write-tool, provenance: design}   # DENY (S1)
    - {from: curator_agent, to: run_dir,    mode: write, via: write-tool, provenance: design}       # DENY (the regression the done-criterion names)
    - {from: curator_agent, to: run_dir,    mode: read,  via: lesson-read, provenance: design}      # own run dir stays ALLOW under R4
    - {from: curator_agent, to: main_checkout, mode: write, via: write-tool, provenance: design}    # DENY (S4)
    - {from: curator_agent, to: lessons_loaded_jsonl, mode: write, via: fs, provenance: code}       # _record_lesson_load, fires only after decide_read allows (RG-PO1)
    - {from: forward_check, to: tool_config, mode: read, via: api, provenance: design}
    - {from: role_census,   to: AGENTS,      mode: read, via: api, provenance: code}

  drives:
    - {from: role_census,         to: bind,          provenance: design, multiplicity: serial}
    - {from: policy_cli,          to: bind,          provenance: design, multiplicity: serial}
    - {from: curator_spawn,       to: bind,          provenance: design, multiplicity: serial}
    - {from: operator_entrypoint, to: bind,          provenance: design, multiplicity: serial}
    - {from: author_drain,        to: curator_agent, provenance: code,   multiplicity: serial}   # fans the four spawn configs; two into lessons-environment (R2)

gate:
  evaluated:
    - {rule: R0, fired: true}    # mechanical: one uncited invariant (corpus_name.domain.default); bidirectional prose
                                 # reconciliation (judgment half) run — no phantom design sentence, no untraced delta
                                 # element found beyond the tracked forks (F40/F30/f7 already carried in handoff)
    - {rule: R1, fired: false}   # clean: no payload-facet boundary exists anywhere in this graph (an access-scoping
                                 # spec, not a content/prompt-splice one) — same reason R1 prints zero hits under --residue
    - {rule: R2, fired: true}
    - {rule: R3, fired: true}
    - {rule: R4, fired: true}
    - {rule: R5, fired: true, cites: [RG-1, RG-adv4]}   # judgment extension considered: MD-1/MD-3 are exactly the
                                 # tightening/safe-by-construction shape (a name the old surface silently served is
                                 # now a denied writer, and a lane that silently defeated containment now must resolve()
                                 # + recheck) — both already encoded as form:test demands, not merely believed
    - {rule: R6, fired: true, cites: [x6]}   # judgment trust walk run over every rendered sink corpus_name/lesson_slug
                                 # reach (compiled write/read/rm patterns, bash argv) — mostly pre-discharged; one open
                                 # finding (the write-lane's permissive filename tail vs the read-lane, x6) routes to
                                 # the existing f7/F77 fork, already labelled R6 in handoff.forks

  obligations: []   # every mechanical hit below either already has a discharging test (pre_discharged) or is a
                     # decision the human must make before a test can be written (holes) — the assembler's reground
                     # mints (MD-1..MD-6) already cover every fresh test this delta owes

  holes:
    - {rule: R0, element: corpus_name.domain.default,
       resolution: "F83 — CLOSED at §7 to optional-with-sentinel: corpus_name is an OPTIONAL RunScope
         field defaulting to the None sentinel ('no corpus named'), preserving every bare RunScope()
         caller (c19/g19: three exist). The graph's lone `unknown` is now a decided value
         (corpus_name.domain.default = null). None ≠ '' — M8 owns None (a declaring role with no name
         raises legibly), M7 owns '' and every supplied degenerate value (F86).",
       resolved_to: corpus_name_supplied_to_a_non_declaring_role, cites: [c19, g19]}
    - {rule: R2, element: corpus_dir.identity,
       resolution: "F40 — §7 D4 PINNED the observable (concurrent same-corpus spawns must not corrupt
         the shared _pending sink; a deterministic single-writer-lock demand preferred). Key coverage is
         not the gap — both writer edges interpolate [corpus_name, lesson_slug], spanning the rule's axes.
         The uniqueness/ordering demand at the composition frame (author_drain) COULD NOT be authored
         deterministically: no executed claim establishes a lock or interleaving on _pending, so a probe
         is requested (MD-10, form:clause) rather than a flaky timing test invented (author charge). See
         80-author-digest.md ## Red flags.",
       resolved_to: md10_concurrent_same_corpus_spawns_probe_request, cites: [RG-aP10]}
    - {rule: R4, element: "corpus_name.domain.distinguished[skills]",
       resolution: "F30/MD-6 — §7 D2 DECIDED to ADD the exact-match membership rule (reject any name not
         exactly in the three shipped corpora). `corpus_name_owns_a_non_lesson_directory` is now a
         form:test pinning the rejection of `skills` at bind (F30/P64/P109/F108 closed together).",
       resolved_to: corpus_name_owns_a_non_lesson_directory}
    - {rule: R4, element: "corpus_name.domain.distinguished[learning]",
       resolution: "Same decision as [skills] (F30/MD-6, §7 D2) — sharper impact: `learning` roots the
         write scope over defender/learning/_pending, a production state directory, not merely another
         lesson-shaped corpus; the membership rule rejects it at bind.",
       resolved_to: corpus_name_owns_a_non_lesson_directory}
    - {rule: R6, element: "corpus_dir.access[write-tool]",
       resolution: "f7/F77 — the write lane's filename tail ([^\\x00]*\\.md) admits a newline/arbitrary-byte
         lesson filename the read lane then denies (x6: 'x\\ny.md' write=True read=False). §7 D3 DECIDED
         the direction: NARROW the write lane to the read segment class ([\\w.@=+-]+), via one shared
         derivation, foreclosing the frame-injection channel. The parity demand
         (write_lane_and_read_lane_admit_same_names) pins that the two lanes admit exactly the same names;
         its test pins the correction (write REFUSES a name outside the read class — not the refuted x6
         write=True behavior).",
       resolved_to: write_lane_and_read_lane_admit_same_names, cites: [x6]}

  pre_discharged:
    - {rule: R3, element: "corpus_dir.access[write-tool]", by: md1_non_shipped_name_write_denied_by_confine,
       edge: "interacts(curator_agent->corpus_dir via write-tool)", cites: [RG-1]}
    - {rule: R3, element: "corpus_dir.access[edit-tool]", by: md3_four_write_lanes_deny_a_symlink_out_of_corpus,
       edge: "interacts(curator_agent->corpus_dir via edit-tool)", cites: [RG-adv4]}
    - {rule: R3, element: "corpus_dir.access[bash-rm]", by: rm_lane_scoped_to_same_corpus_as_write,
       edge: "interacts(curator_agent->corpus_dir via bash-rm)", cites: [c16, g9]}
    - {rule: R3, element: "corpus_dir.access[forward-check]", by: md3_four_write_lanes_deny_a_symlink_out_of_corpus,
       edge: "interacts(forward_check->corpus_dir via forward-check)", cites: [RG-adv4, x4]}
    - {rule: R3, element: "corpus_dir.access[lesson-read]", by: read_view_three_corpora_shell_stays_one,
       edge: "interacts(curator_agent->corpus_dir via lesson-read)", cites: [x2, g12]}
    - {rule: R3, element: "corpus_dir.access[bash-cat]", by: committed_read_vs_shell_reachability_diff,
       edge: "interacts(curator_agent->corpus_dir via bash-cat)", cites: [x2, g12]}

