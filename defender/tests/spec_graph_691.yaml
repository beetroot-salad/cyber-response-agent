       agreement as MD-9; unify-lists vs reconcile-prefix stays the implementer's."},
     cites: [g9]}

  # ================= §7 D4 : the three scope-expansion pins beyond bindability =========
  #  The human pinned ALL FOUR Q4 findings (70-resolutions D4), widening #691's scope. MD-8/MD-9
  #  pin an OBSERVABLE while leaving the MECHANISM to the implementer (70-resolutions Red flags);
  #  MD-10 could not be written deterministically from any executed claim and is RED-FLAGGED with a
  #  probe request rather than invented as a timing test (author fault-hierarchy rule 3).
  # --- MD-8 (F11): the forward_check verifier spawned from a worktree curator must not resolve its
  #     roots to the MAIN checkout. OBSERVABLE pinned; requires_explicit_tree on VERIFY_DEF vs
  #     threading the curator's tree is the implementer's (g19/P6: engine.py:59 binds VERIFY_DEF
  #     with no tree, falling back to PATHS.defender_dir today).
  - {id: md8_verifier_does_not_reach_main_checkout, kind: negative, form: test,
     discharged_by: test_the_forward_check_verifier_does_not_reach_the_main_checkout,
     binds: ["interacts(bind->CORPUS_AUTHOR_DEF)", "main_checkout"], cites: [g19]}
  # --- MD-9 (F37/P33/S120): the post-run audit's corpus derivation (verify_agent_state ->
  #     changes_outside) agrees with the write-lane gate's for every accepted name. OBSERVABLE
  #     pinned; unify-lists vs reconcile-prefix is the implementer's. Regression pin: agreement
  #     holds today for the three shipped names (the drift MD-6 forecloses for the accepted set) —
  #     drives BOTH real primitives and requires their inside/outside verdicts to match.
  - {id: md9_audit_derivation_agrees_with_gate, kind: parity, form: test,
     discharged_by: test_the_post_run_audit_agrees_with_the_write_gate_for_every_accepted_name,
     binds: ["corpus_dir.identity", "corpus_dir.access[write-tool]"], cites: [g9]}
  # --- MD-10 (F40): concurrent same-corpus spawns must not corrupt the shared _pending sink. §7 D4
  #     pinned the observable and PREFERRED a deterministic single-writer-lock demand. NO executed
  #     ledger claim establishes a lock or a deterministic interleaving on _pending (RG-aP10/RG-PO7
  #     observe the shared sink but probe no concurrency invariant), so per the author charge this is
  #     a form:clause carrying a PROBE REQUEST, not an invented flaky timing test. See handoff.forks
  #     + 80-author-digest.md ## Red flags.
  - {id: md10_concurrent_same_corpus_spawns_probe_request, kind: uniqueness, form: clause,
     binds: ["corpus_dir.identity", "drives(author_drain->curator_agent)"],
     outcome: {nl: "PROBE REQUESTED (NOT authored — author fault-hierarchy rule 3). Two spawn
       configs (author_actor_benign, author_actor_env) author lessons-environment in one batch and
       every spawn shares one <MAIN>/defender/learning/_pending sink (RG-aP10). §7 D4 pinned that
       concurrent same-corpus spawns must not corrupt it, preferring a deterministic single-writer-
       lock demand. No executed claim establishes whether _pending writes are lock-serialized or
       interleaved, so a deterministic demand cannot be authored: a probe must execute two
       concurrent same-corpus drains against one _pending and observe whether the sink is
       lock-guarded (deterministic demand owed) or racy (a genuine-interleaving demand owed).
       write-code-from-spec/the human minute this once the probe lands — do NOT ship a timing test."},
     cites: [RG-aP10]}

