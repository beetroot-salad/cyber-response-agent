     discharged_by: test_bind_returns_a_corpus_scoped_curator_deps,
     binds: ["interacts(bind->CORPUS_AUTHOR_DEF)", "interacts(bind->RunScope)",
             "interacts(bind->ResolvedRoots)", "interacts(bind->CuratorDeps)",
             "CuratorDeps", "corpus_dir"]}
  - {id: lower_level_seam_parity, kind: seam, form: test,
     discharged_by: test_the_policy_is_compiled_through_the_lower_level_entry_point,
     binds: ["interacts(bind->CuratorDeps)", "CuratorDeps"]}
  - {id: deps_copied_with_one_field_replaced, kind: behavior, form: test,
     discharged_by: test_a_bound_deps_is_copied_with_one_field_replaced,
     binds: ["CuratorDeps", "ResolvedRoots"]}
  - {id: binding_the_same_spawn_twice, kind: behavior, form: test,
     discharged_by: test_binding_the_same_spawn_twice,
     binds: ["interacts(bind->CuratorDeps)", "ResolvedRoots"]}
  - {id: bind_idempotent_across_retry, kind: behavior, form: test,
     discharged_by: test_bind_is_idempotent_across_a_retried_spawn,
     binds: ["interacts(bind->CuratorDeps)", "ResolvedRoots"]}
