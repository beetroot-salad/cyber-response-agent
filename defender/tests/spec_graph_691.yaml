schema_version: 1
design: "691"
base: a7481659   # the fork commit write-code-from-spec's gate diffs against

# ---------------------------------------------------------------------------
# The spec is written against the AMENDED contract, not design-691.md's original:
#   15-corrections R1/R2/K1-K9, 36-resolutions R4 (SUPERSEDES R1: O6 = read_confine =
#   the three lesson corpora, read_allow EMPTY, cat grant untouched) / R5 / R6,
#   35-reground (r1/r3/r4/f8/g19), 47-consolidated (6 minted MD demands, M7/M8 target
#   behaviour, ResolvedRoots.corpus_roots dead code, benign_actor/env.py the 4th
#   entrypoint). Provisional structure ids (RunScope.corpus_name, AgentDeps.roots,
#   AgentDeps.tool_config, ResolvedRoots spawn-corpus field) carry forks f1-f4/f7 — the
#   name is the join key; write-code-from-spec reconciles the code's spelling.
# ---------------------------------------------------------------------------

demands:

