  - {id: four_spellings_of_one_corpus_name, kind: behavior, form: clause,
     binds: ["corpus_dir.identity"],
     outcome: {nl: "The corpus name has FOUR derivations: the authoring gate build_write_allow,
       the rm-lane _corpus_spellings, the cat-scope under(corpus) — all functions of corpus_dir —
