  - {id: write_operand_leading_dot_slash, kind: behavior, form: test,
     discharged_by: test_a_write_operand_path_is_given_relative_with_a_leading_dot_slash,
     binds: ["corpus_dir.access[write-tool]"]}
  # --- MD-1 (RG-1 / RF1 → §7 D1): a write scope rooting outside its own read confine is unbuildable.
  #     §7 D1 RESOLVED F18/F20 to REFUSE AT BIND (safe-by-construction — a scope that cannot author is
  #     unbuildable), NOT the silent runtime denial the pre-§7 name implied; and STRUCK R4's "write
  #     byte-identical to today" clause (RG-1 refuted it). Discharged by the ISOLATING witness (F-1,
  #     92-reconciliation): a SHIPPED name (MD-6-accepted) bound with a read_confine that EXCLUDES it,
  #     so ONLY MD-1's confine-containment check can refuse it — independent of MD-6's membership rule.
  #     (The earlier non-shipped `skills` witness, test_a_non_shipped_corpus_name_write_is_denied_by_
  #     confine_containment, is subsumed by MD-6's bind-rejection test and retained as a redundant pin.)
  - {id: md1_non_shipped_name_write_denied_by_confine, kind: negative, form: test,
     discharged_by: test_a_shipped_corpus_write_is_denied_when_its_read_confine_excludes_it,
     binds: ["interacts(bind->CORPUS_AUTHOR_DEF)", "corpus_dir.access[write-tool]", "read_confine"],
     cites: [RG-1]}

  # ================= S3 / M7 : the rm lane + the four write-capable lanes =====
  - {id: rm_lane_scoped_to_same_corpus_as_write, kind: parity, form: test,
     discharged_by: test_the_rm_lane_is_scoped_to_the_same_corpus_as_the_write_lane,
     binds: ["corpus_dir.access[bash-rm]", "corpus_dir.access[write-tool]"]}
  # --- MD-3 (RG-adv4, the standout): the rm grant never resolve()s, so a symlink out of
  #     corpus the other three write lanes DENY, rm deletes. A real correctness fix.
  - {id: md3_four_write_lanes_deny_a_symlink_out_of_corpus, kind: parity, form: test,
     discharged_by: test_all_four_write_lanes_deny_a_symlink_out_of_corpus,
     binds: ["corpus_dir.access[bash-rm]", "corpus_dir.access[write-tool]",
             "corpus_dir.access[edit-tool]", "corpus_dir.access[forward-check]"]}
  # --- MD-4 (RG-adv3): rm matches the shell-TOKENIZED argv; $()/backtick DENY because
  #     the tokenizer splits them before _claim, NOT because of _stage_unsafe (dead code).
  - {id: md4_rm_grant_matches_shell_tokenized_argv, kind: behavior, form: test,
     discharged_by: test_the_rm_grant_matches_the_shell_tokenized_argv,
     binds: ["corpus_dir.access[bash-rm]"]}
  # --- MD-5 (RG-ispo4): the positive control the degenerate-name negative (below) lacks.
  - {id: md5_single_operand_in_corpus_rm_admitted, kind: behavior, form: test,
     discharged_by: test_a_single_operand_in_corpus_rm_is_admitted,
     binds: ["corpus_dir.access[bash-rm]"]}
  - {id: rm_under_a_degenerate_empty_or_dot_name, kind: negative, form: test,
