  - {id: cwd_anchor_and_tree_reproduce_todays, kind: behavior, form: test,
     discharged_by: test_bound_curator_anchoring_matches_the_for_run_anchoring,
     binds: ["CuratorDeps", "interacts(bind->ResolvedRoots)"]}

  # ================= O1 / M9 : the generic census ============================
