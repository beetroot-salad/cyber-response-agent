    - {from: replay_harness,    to: run_investigation,  provenance: code, multiplicity: serial}
    - {from: harness,           to: loop,               provenance: code, multiplicity: serial}
    - {from: harness_lead,      to: loop,               provenance: code, multiplicity: serial}
    - {from: replay_actor,      to: loop,               provenance: code, multiplicity: serial}

