    # backed by any reference — learning/ops/replay_actor.py names neither run_common nor
    # materialize_run_dir. The edge modelled "the pinned worktree SHIPS the file", which is
    # not a read and not an interaction. The claim it was standing in for is d32's, and d32
    # binds the run_common boundary directly.

    # the deleted out-of-package caller
    - {from: gather_only, to: run_common, mode: invoke, via: api, provenance: code}
    - {from: gather_only, to: meta_json,  mode: read,   via: fs,  provenance: code}

    # prose
    - {from: orient, to: SKILL_md,    mode: read, via: fs, provenance: code}
    - {from: orient, to: prose_sites, mode: read, via: fs, provenance: design}

  drives:
    - {from: run_investigation, to: orient,             provenance: code, multiplicity: serial}
    - {from: run_investigation, to: gather_dispatch,    provenance: code, multiplicity: concurrent}
    - {from: run_investigation, to: query_tool,         provenance: code, multiplicity: serial}
    - {from: run_investigation, to: tool_write_file,    provenance: code, multiplicity: serial}
    - {from: run_investigation, to: materialize_run_dir, provenance: design, multiplicity: serial}
    - {from: orient,            to: workspace_map,      provenance: code, multiplicity: serial}
    - {from: gather_only,       to: materialize_run_dir, provenance: code, multiplicity: serial}
