    - {from: gather_dispatch, to: salt, mode: read,   via: api, provenance: code}
    - {from: lesson_read,     to: salt, mode: read,   via: api, provenance: code}
    - {from: orient,          to: untrusted_content, mode: read, via: fs, provenance: code}
    - {from: query_tool,      to: untrusted_content, mode: read, via: bash, provenance: code}
    - {from: tool_write_file, to: untrusted_content, mode: read, via: fs, provenance: code}

    # message 0
    - {from: orient,        to: message_zero_orientation, mode: write, via: api, provenance: code, sends: payload}
    - {from: workspace_map, to: run_dir, mode: read, via: fs, provenance: code}
    - {from: workspace_map, to: alert_stem_source, mode: read, via: fs, provenance: code}

    # the relocated symbol and the retired module
    - {from: orient,          to: untrusted_module, mode: read, via: api, provenance: design}
    - {from: tool_write_file, to: untrusted_module, mode: read, via: api, provenance: design}
    - {from: query_tool,      to: untrusted_module, mode: read, via: api, provenance: design}
    - {from: gather_dispatch, to: untrusted_module, mode: read, via: api, provenance: design}
    - {from: tag_tool_results_main, to: tag_tool_results, mode: remove, via: api, provenance: design}
    - {from: tag_tool_results_main, to: hooks_run_dir,    mode: remove, via: api, provenance: design}

    # the surviving hooks module's live consumers
    - {from: budget_enforcer,    to: hooks_run_dir, mode: read, via: api, provenance: code}
    - {from: circuit_breaker,    to: hooks_run_dir, mode: read, via: api, provenance: code}
    # record_lesson_load reached `resolve_run_dir` only from its retired `claude -p`
    # entrypoint (#667), so the edge went with the entrypoint — the module's library
    # half (`lesson_name`) needs no run dir. `hooks_run_dir` still stands on the two
    # consumers above; the actor stays, per the tag_tool_results_main idiom.
    - {from: record_lesson_load, to: hooks_run_dir, mode: remove, via: api, provenance: code}
    - {from: budget_enforcer,    to: DEFENDER_RUN_DIR, mode: read, via: env, provenance: code}
    - {from: ticket_adapter,     to: DEFENDER_RUN_DIR, mode: read, via: env, provenance: code}

    # the parallel and scenario builders
    - {from: replay_harness, to: run_dir,   mode: write, via: fs, provenance: code, interpolates: [run_id]}
    - {from: replay_harness, to: meta_json, mode: remove, via: fs, provenance: design}
    - {from: harness,        to: run_dir,   mode: write, via: fs, provenance: code, interpolates: [run_id]}
    - {from: harness_lead,   to: run_dir,   mode: write, via: fs, provenance: code, interpolates: [run_id]}
    - {from: loop,           to: run_dir,   mode: read,  via: fs, provenance: code}
    - {from: replay_actor,   to: run_dir,   mode: read,  via: fs, provenance: code}
