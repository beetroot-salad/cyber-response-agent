schema_version: 1
design: "#647 — delete the inert run-dir meta.json; mint the per-run salt in-process"
base: be8d2c27

# ---------------------------------------------------------------------------
# DEMANDS — the spec proper.
# form: test  → a POINTER {id,kind,form,binds,discharged_by}, NO outcome. The
#               observable-outcome prose lives in the named test's docstring
#               (step 8 authors it; check_binds scans it there).
# form: clause | waiver → carries `outcome`.
# ---------------------------------------------------------------------------
demands:

  # --- Demand #0: the return contract -------------------------------------
  - {id: d0_builder_returns_run_dir_and_salt, kind: behavior, form: test,
     discharged_by: test_materialize_run_dir_returns_run_dir_then_salt_on_the_success_lane,
     binds: ["materialize_run_dir", "interacts(materialize_run_dir->run_dir)",
             "interacts(materialize_run_dir->salt)"]}

  - {id: d1_return_pair_is_promised_on_the_success_lane_only, kind: seam, form: test,
     discharged_by: test_builder_early_exit_lanes_fire_before_any_salt_is_minted,
     binds: ["materialize_run_dir", "interacts(materialize_run_dir->salt)"]}

  - {id: d2_run_py_unpacks_both_elements_in_order, kind: behavior, form: test,
     discharged_by: test_run_py_unpacks_the_pair_and_threads_both_elements_onward,
     binds: ["run_investigation", "interacts(run_investigation->run_dir)",
             "interacts(run_investigation->salt)"]}

  # --- The origin pin (C39 — the obligation this change actually creates) ---
  - {id: d3_salt_origin_reaches_run_investigation, kind: behavior, form: test,
     discharged_by: test_salt_returned_by_the_builder_is_the_salt_that_reaches_run_investigation,
     binds: ["interacts(materialize_run_dir->salt)", "interacts(run_investigation->salt)",
             "drives(run_investigation->orient)"]}

  # --- Coherence: one token per model context ------------------------------
  - {id: d4_salt_coherence_under_a_real_mint, kind: parity, form: test,
     discharged_by: test_every_salted_surface_in_one_model_context_carries_the_minted_token,
     binds: ["salt.access[api]", "salt.access[fs]", "salt.access[bash]",
             "interacts(orient->wrap)", "interacts(tool_write_file->wrap)",
             "interacts(query_tool->wrap)", "interacts(gather_dispatch->wrap)"]}

  - {id: d5_gather_inherits_the_parent_token, kind: behavior, form: test,
     discharged_by: test_gather_subagent_is_bound_with_the_parent_token_not_a_fresh_mint,
     binds: ["gather_dispatch", "interacts(gather_dispatch->salt)",
             "drives(run_investigation->gather_dispatch)"]}

  # POSITIVE CONTROL for d7 (the negative). A second live token is legitimate.
  - {id: d6_curator_leg_mints_its_own_token, kind: domain-outcome, form: test,
     discharged_by: test_learning_curator_leg_mints_a_fresh_uuid4_salt_distinct_from_the_run_token,
     binds: ["salt.domain.alternatives[salt-is-None]", "lesson_read",
             "interacts(lesson_read->wrap)"]}

  # NEGATIVE — paired positive control: d6_curator_leg_mints_its_own_token.
  - {id: d7_no_main_lane_surface_takes_an_unshared_token, kind: negative, form: test,
     discharged_by: test_no_surface_on_the_run_lane_obtains_a_salt_from_a_source_no_other_surface_knows,
     binds: ["salt.access[api]", "salt.access[fs]", "salt.access[bash]",
             "salt.domain.alternatives[salt-is-None]", "interacts(run_investigation->salt)"]}

  # NEGATIVE — paired positive control: d6_curator_leg_mints_its_own_token
  # (it shows the uuid4 fallback channel works at all).
  - {id: d8_fail_open_fresh_mint_unreachable_from_the_run_lane, kind: negative, form: test,
     discharged_by: test_fail_open_fresh_mint_is_not_reachable_from_run_py_through_the_driver,
     binds: ["salt.domain.alternatives[salt-is-None]", "interacts(run_investigation->salt)",
             "drives(run_investigation->gather_dispatch)"]}

  - {id: d9_empty_salt_is_not_constructible_on_the_run_lane, kind: negative, form: test,
     discharged_by: test_empty_string_salt_is_not_constructible_once_the_disk_read_is_gone,
     binds: ["salt.domain.distinguished[]", "interacts(run_investigation->salt)"]}

  # POSITIVE CONTROL for d9: a real 16-hex token flows and renders correctly.
  - {id: d10_minted_token_shape_is_sixteen_hex, kind: shape, form: test,
     discharged_by: test_minted_salt_is_sixteen_lowercase_hex_characters,
     binds: ["salt.domain.distinguished[secrets-token-hex-8]",
             "interacts(materialize_run_dir->salt)"]}

  # The token's SECURITY property, which d10 does NOT cover: shape, per-run uniqueness and
  # coherence are all satisfied by `random.Random(run_id).getrandbits(64)`, and the run id is
  # `{utc_timestamp}-{alert.stem}` — predictable. The mint must be independent of it.
  - {id: d33_mint_is_independent_of_the_run_id, kind: negative, form: test,
     discharged_by: test_minted_salt_is_independent_of_the_run_id_and_drawn_from_secrets,
     binds: ["salt.domain.distinguished[secrets-token-hex-8]", "salt.identity",
             "interacts(materialize_run_dir->salt)"]}

  # --- The removed file -----------------------------------------------------
  # NEGATIVE — paired positive control: d12_investigation_artifacts_survive.
  - {id: d11_no_meta_json_on_disk_after_a_driven_run, kind: negative, form: test,
     discharged_by: test_a_driven_run_leaves_no_meta_json_in_the_run_dir,
     binds: ["meta_json", "run_dir.identity",
             "interacts(materialize_run_dir->meta_json)"]}

  - {id: d12_investigation_artifacts_survive, kind: survival, form: test,
     discharged_by: test_run_dir_still_carries_every_investigation_artifact_after_the_removal,
     binds: ["run_dir", "run_dir.identity", "interacts(materialize_run_dir->run_dir)"]}

  # --- The NEW pin the human minted at step 7 ------------------------------
  # SCOPE: this pin tracks the listing against the run dir's REAL children and asserts the
  # removed file is gone. It does NOT bless the listing's contents. Specifically it does not
  # bless `ground_truth.yaml`, which workspace_map lists into MAIN's message 0 whenever the
  # fixture carries a sibling one (26 tracked fixtures, incl. every held-out eval case): MAIN
  # is told the answer key exists, though permission/files.py denies reading it by filename.
  # PRE-EXISTING and explicitly OUT OF SCOPE for #647 (human decision). Follow-up: decide
  # whether workspace_map should skip it the way it skips gather_raw.
  - {id: d13_message_zero_run_dir_listing_is_pinned, kind: shape, form: test,
     discharged_by: test_message_zero_orientation_lists_exactly_the_materialized_run_dir_children,
     binds: ["message_zero_orientation.payload", "workspace_map",
             "interacts(workspace_map->run_dir)",
             "interacts(orient->message_zero_orientation)"]}

  - {id: d14_replayed_message_zero_listing_shifts_with_the_harness_write, kind: shape, form: test,
     discharged_by: test_replayed_message_zero_listing_matches_the_production_run_dir_file_set,
     binds: ["message_zero_orientation.payload", "replay_harness",
             "interacts(replay_harness->run_dir)"]}

  # SCOPED, explicitly: the parity claim covers fixtures with NO sibling ground_truth.yaml.
  # materialize_run_dir conditionally copies one (run_common.py:69-71) and the replay harness
  # has no such branch, so on a ground-truth-carrying fixture the two builders PROVABLY diverge
  # by exactly that file. That axis is untouched by this change; the demand claims nothing
  # about it, and the test asserts its own precondition rather than assuming it.
  - {id: d15_both_builders_present_the_same_run_dir_file_set, kind: parity, form: test,
     discharged_by: test_replay_harness_run_dir_and_production_run_dir_present_the_same_file_set,
     binds: ["run_dir.identity", "interacts(materialize_run_dir->run_dir)",
             "interacts(replay_harness->run_dir)"]}

  # --- The relocation -------------------------------------------------------
  - {id: d16_wrap_lives_in_untrusted_module, kind: seam, form: test,
     discharged_by: test_wrap_is_importable_from_defender_runtime_untrusted,
     binds: ["untrusted_module", "wrap"]}

  # RECORDED: byte-identity is asserted for BOTH `untrusted` and `siem-data`, but after this
  # change `siem-data` has NO LIVE PRODUCER — its sole producer was the deleted hook's
  # context_annotation (hooks/tag_tool_results.py:75), and its only other repo-wide
  # occurrences are three assertions in tests/test_tag_tool_results.py, deleted with the
  # module. The assertion is KEPT because the relocation must not change wrap's behaviour for
  # any tag it is called with — wrap takes the tag as a free parameter, so this pins the
  # function's domain, not a live surface. `untrusted` is the only tag any live call site
  # passes post-change.
  - {id: d17_wrap_output_is_byte_identical, kind: shape, form: test,
     discharged_by: test_relocated_wrap_emits_the_same_delimiter_bytes_for_the_same_inputs,
     binds: ["wrap.payload", "interacts(orient->wrap).payload"]}

  # POSITIVE CONTROL for d19 (the orphan negative): the four importers resolve.
  - {id: d18_every_importer_of_wrap_resolves_after_the_move, kind: survival, form: test,
     discharged_by: test_every_importer_of_the_relocated_wrap_resolves_after_the_move,
     binds: ["untrusted_module", "wrap", "tag_tool_results",
             "interacts(orient->wrap)", "interacts(tool_write_file->wrap)",
             "interacts(query_tool->wrap)", "interacts(gather_dispatch->wrap)",
             "interacts(lesson_read->wrap)"]}

  # NEGATIVE — paired positive control: d18_every_importer_of_wrap_resolves_after_the_move.
  # Surface-general on purpose (the enumeration failed twice): derived with a tool,
  # never from a file list.
  - {id: d19_no_symbol_survives_orphaned_by_the_deletion, kind: negative, form: test,
     discharged_by: test_no_symbol_survives_whose_only_reachability_was_the_deleted_entrypoint,
     binds: ["tag_tool_results", "hooks_run_dir", "wrap"]}

  # NEGATIVE — paired positive control: d18_every_importer_of_wrap_resolves_after_the_move
  # (it shows the import channel resolves at all, so a clean sweep is not vacuous).
  - {id: d20_import_of_the_deleted_module_fails_at_collection, kind: negative, form: test,
     discharged_by: test_no_module_in_the_repo_still_imports_the_deleted_hook_module,
     binds: ["tag_tool_results", "interacts(query_tool->wrap)"]}

  # --- The surviving module and the accessor set ---------------------------
  - {id: d21_hooks_run_dir_survives_its_deleted_member, kind: survival, form: test,
     discharged_by: test_update_json_locked_survives_the_sibling_removal,
     binds: ["hooks_run_dir", "interacts(budget_enforcer->hooks_run_dir)",
             "interacts(circuit_breaker->hooks_run_dir)"]}

  - {id: d22_run_paths_exposes_five_accessors, kind: shape, form: test,
     discharged_by: test_run_paths_accessor_set_is_five_after_the_meta_accessor_is_removed,
     binds: ["RunPaths", "interacts(run_investigation->RunPaths)"]}

  # NEGATIVE — paired positive control: d22_run_paths_exposes_five_accessors.
  - {id: d23_no_surviving_reference_to_run_paths_meta, kind: negative, form: test,
     discharged_by: test_no_call_site_anywhere_still_reaches_run_paths_meta_or_the_literal_meta_json,
     binds: ["RunPaths", "meta_json"]}

  # --- The repo-wide caller obligation (surface-general) -------------------
  # NEGATIVE — paired positive control: d2_run_py_unpacks_both_elements_in_order.
  - {id: d24_no_caller_of_the_changed_builder_outside_defender, kind: negative, form: test,
     discharged_by: test_no_module_outside_the_defender_package_imports_run_common,
     binds: ["run_common", "materialize_run_dir", "gather_only"]}

  - {id: d25_gather_only_is_gone, kind: survival, form: test,
     discharged_by: test_the_deleted_manual_gather_harness_leaves_no_dependent_behind,
     binds: ["gather_only", "drives(gather_only->materialize_run_dir)"]}

  # --- Model-facing prose ---------------------------------------------------
  # NEGATIVE — paired positive control: d27_skill_delimiter_clause_survives.
  - {id: d26_no_live_model_facing_prose_names_a_producerless_mechanism, kind: negative, form: test,
     discharged_by: test_no_live_model_facing_prose_names_a_mechanism_with_no_producer,
     binds: ["SKILL_md", "prose_sites", "tag_tool_results"]}

  - {id: d27_skill_delimiter_clause_survives, kind: survival, form: test,
     discharged_by: test_skill_md_run_delimiter_clause_survives_with_its_producer_intact,
     binds: ["SKILL_md", "wrap", "interacts(orient->wrap)"]}

  # NEGATIVE — paired positive control: d27_skill_delimiter_clause_survives. The same
  # sweep must still FIND the surviving delimiter clause, or a sweep that matches
  # nothing would pass vacuously.
  - {id: d28_prose_site_set_is_derived_with_a_tool, kind: negative, form: test,
     discharged_by: test_prose_site_sweep_is_derived_from_the_repo_not_from_a_fixed_list,
     binds: ["prose_sites", "meta_json", "tag_tool_results"]}

  # RECLASSIFIED at repair (human decision, REVERSING the earlier "live prose to fix" call in
  # the F-D hole): docs/design-v3-init-and-connect.md, docs/handlers-refactor-map.md and
  # docs/evaluation-and-chaos-design.md describe a PREDECESSOR codebase that no longer exists,
  # so correcting the one stale line would leave a doc that reads current and is wrong
  # throughout. They are ARCHIVED under docs/archive/ with a stale banner, following #650's
  # precedent for security-model.md. This is also what legitimizes the sweep's docs/archive/
  # exclusion for them.
  - {id: d34_predecessor_docs_are_archived_not_corrected, kind: survival, form: test,
     discharged_by: test_the_three_predecessor_codebase_docs_are_archived_rather_than_corrected,
     binds: ["prose_sites", "meta_json"]}

  # --- The env boundary -----------------------------------------------------
  - {id: d29_run_dir_env_var_survives_with_its_readers, kind: survival, form: test,
     discharged_by: test_defender_run_dir_still_crosses_the_subprocess_boundary_for_its_reader,
     binds: ["DEFENDER_RUN_DIR", "DEFENDER_RUN_DIR.access[env]",
             "interacts(run_investigation->DEFENDER_RUN_DIR)",
             "interacts(ticket_adapter->DEFENDER_RUN_DIR)"]}

  # NEGATIVE — paired positive control: d29_run_dir_env_var_survives_with_its_readers
  # (the subprocess env channel still carries DEFENDER_RUN_DIR, so an empty salt
  # result is not just an empty environment).
  - {id: d30_no_salt_crosses_the_subprocess_boundary, kind: negative, form: test,
     discharged_by: test_the_subprocess_environment_carries_no_path_to_the_run_salt,
     binds: ["DEFENDER_RUN_DIR.access[env]", "salt.access[env]"]}

  # RETIRED by #667. The unset member was a property of `resolve_run_dir`, which #667
  # deleted along with its last consumer (record_lesson_load's `claude -p` entrypoint).
  # There is no resolver left whose unset branch could fail open, so the demand has no
  # subject rather than an undischarged one — the deletion itself is pinned by d21.
  - {id: d31_run_dir_env_var_unset_member, kind: domain-outcome, form: test,
     discharged_by: null, status: retired,
     binds: []}

  # --- Waivers (human decisions recorded at step 7) ------------------------
  # --- Author finding, surfaced by check_actors, NOT yet human-resolved ----
  # clause, deliberately: a clause binding does NOT pre-discharge, so the R5
  # obligation below stays OPEN. This is the run's single waiver candidate.
  - {id: d32_frozen_generation_replay_does_not_reach_the_builder, kind: survival, form: clause,
     outcome: {nl: "The secondary-metric replay driver runs the actor stage inside
       a worktree pinned to an older generation, which still ships the pre-change
       run_common and _run_paths; it works on a staging directory the HEAD harness
       projects rather than on a run dir the changed builder produced, so it never
       calls the changed builder and no frozen worktree can be broken by the new
       return contract."},
     rejected: [{nl: "Pinning a cross-generation compatibility test that drives a
       frozen worktree's builder against HEAD's caller."}],
     binds: ["replay_actor", "materialize_run_dir", "run_common",
             "interacts(replay_actor->run_dir)"]}

  - {id: w1_no_completion_marker_replacement, kind: survival, form: waiver,
     outcome: {nl: "No on-disk marker replaces the removed meta.json write as a
       signal that materialization finished; the run dir carries no completion
       marker and none is owed."},
     rejected: [{nl: "Minting a sentinel file to preserve the incidental
       last-unconditional-write property."}],
     binds: ["meta_json", "run_dir.identity"]}

  - {id: w2_operator_artifact_listing_loses_a_line, kind: survival, form: waiver,
     outcome: {nl: "The operator-facing end-of-run artifact listing printed by
       run.py legitimately loses its meta.json line, exactly as MAIN's
       orientation does, and no test pins that listing."},
     rejected: [{nl: "Pinning the stderr artifact block as a second run-dir
       listing surface."}],
     binds: ["operator_artifact_listing", "run_dir.identity"]}

  - {id: w3_alert_stem_into_the_rendered_run_dir_listing, kind: negative, form: waiver,
     outcome: {nl: "The alert filename's stem reaches the rendered RUN_DIR heading
       and the run-dir listing frame with no sanitizer, and this spec does not pin
       a hostile-stem case; the surface is deferred to issue #648."},
     rejected: [{nl: "Minting a hostile-stem demand at the orientation render
       site inside this change."}],
     binds: ["message_zero_orientation.payload", "alert_stem_source",
             "interacts(workspace_map->run_dir)"]}

  - {id: w4_committed_experiment_fixtures_untouched, kind: survival, form: waiver,
     outcome: {nl: "The 22 committed meta.json fixtures under experiments/ keep
       their contents and their schema; none is read through RunPaths and none is
       reached by this change."},
     binds: ["meta_json"]}

  - {id: w5_evals_scenario_builders_untouched, kind: survival, form: waiver,
     outcome: {nl: "The evals scenario builders copy fixture trees wholesale and
       call neither run-dir builder, so they need no change and this spec pins
       nothing about them."},
     binds: ["harness", "harness_lead", "interacts(harness->run_dir)",
             "interacts(harness_lead->run_dir)"]}

  - {id: w6_replay_harness_builder_stays_divergent, kind: parity, form: waiver,
     outcome: {nl: "The replay harness keeps its own builder signature — it takes
       the token as a parameter and returns a bare path — and convergence with the
       production builder is not owed; only the resulting file set is pinned."},
     binds: ["replay_harness", "interacts(replay_harness->run_dir)"]}

# ---------------------------------------------------------------------------
# STRUCTURE
# ---------------------------------------------------------------------------
structure:
  axes: [run_id, alert_stem, model_context]

  actors:
    - {id: run_investigation, frame: composition, provenance: code}   # run.py + runtime/driver.py
    - {id: materialize_run_dir, frame: leg, provenance: design}       # run_common builder (modified)
    - {id: orient, frame: leg, provenance: code}
    - {id: workspace_map, frame: leg, provenance: code}
    - {id: tool_write_file, frame: leg, provenance: code}             # runtime/tools.py
    - {id: query_tool, frame: leg, provenance: code}
    - {id: gather_dispatch, frame: leg, provenance: code}             # runtime/tools_gather.py
    - {id: lesson_read, frame: leg, provenance: code}                 # the FIFTH salted surface
    - {id: replay_harness, frame: composition, provenance: code}      # tests/e2e/_replay_harness.py
    - {id: harness, frame: composition, provenance: code}             # evals/harness.py
    - {id: harness_lead, frame: composition, provenance: code}        # evals/harness_lead.py
    - {id: loop, frame: composition, provenance: code}                # learning/loop.py
    - {id: gather_only, frame: composition, provenance: code}         # DELETED by this change
    - {id: tag_tool_results_main, frame: leg, provenance: code}       # DELETED (never wired)
    - {id: budget_enforcer, frame: leg, provenance: code}
    - {id: circuit_breaker, frame: leg, provenance: code}
    - {id: record_lesson_load, frame: leg, provenance: code}
    - {id: ticket_adapter, frame: leg, provenance: code}
    - {id: replay_actor, frame: composition, provenance: code}      # learning/ops/replay_actor.py

  boundaries:
    - id: run_dir
      provenance: code
      facets:
        identity:
          key_axes: [run_id]
          evidence: {nl: "Read off run_common.py:52-55 — the run dir is
            `resolve_runs_base() / run_id`, and run_id defaults to
            `{utc_timestamp}-{alert.stem}`; the exists() guard at :56 makes the
            key exclusive."}
          derivations:
            - {value: alert_stem, fn_of: alert_stem, injective: false}
          sharing: unique-key

    - id: meta_json          # REMOVED
      provenance: code
      facets: {}

    - id: salt
      provenance: design
      facets:
        domain:
          type: str
          refinement: {nl: "A per-run trust token. On the run lane it is 16
            lowercase hex characters from secrets.token_hex(8); on the learning
            lane it is a 32-hex uuid4."}
          default: null
          distinguished: ["", "secrets-token-hex-8"]
          falsy_valid: false
          documented_alternatives:
            - {value: "salt-is-None", crosses_validation: true}
        identity:
          key_axes: [model_context]
          evidence: {nl: "Read off agent_definition.bind and tools.py:194 — one
            resolved token per bound deps object, and every surface in one model
            context reads deps.salt; the learning stages bind separately and
            therefore key a different context."}
          sharing: unique-key
        access:
          constraints_by_via:
            api:  {trust: derived, constraints: [salted-wrap]}
            fs:   {trust: derived, constraints: [salted-wrap]}
            bash: {trust: derived, constraints: [salted-wrap]}
            env:  {trust: derived, constraints: [removed-channel]}

    - id: untrusted_content
      provenance: code
      facets:
        access:
          constraints_by_via:
            fs:   {trust: attacker-influenced, constraints: [salted-wrap]}
            bash: {trust: attacker-influenced, constraints: [salted-wrap]}
            api:  {trust: attacker-influenced, constraints: [salted-wrap]}

    - id: wrap
      provenance: design
      facets:
        payload:
          parts:
            - {role: open_frame,  source: const:RUN_DELIMITER_OPEN,  slots: {salt: salt}}
            - {role: body,        source: template:WRAPPED_BODY,     slots: {content: untrusted_content}}
            - {role: close_frame, source: const:RUN_DELIMITER_CLOSE, slots: {salt: salt}}
          invariants: [roles-disjoint-sources, all-slots-bound]
          nl: "The salted quarantine delimiter around one untrusted payload:
            an open frame, the raw content, and a matching close frame — the whole
            thing byte-identical before and after the relocation. DOMAIN
            CONTRACTION, recorded: the `tag` slot took two values before this
            change (`untrusted`, `siem-data`); after it, `siem-data` has no live
            producer at all — its sole producer was the deleted hook's
            context_annotation — so `untrusted` is the only tag any live call site
            passes. The tag remains a free parameter of wrap and d17 still pins
            byte-identity for both, because the relocation must not change the
            function's behaviour anywhere in its domain."

    - id: untrusted_module   # ADDED — defender/runtime/untrusted.py
      provenance: design
      facets: {}

    - id: tag_tool_results   # REMOVED — defender/hooks/tag_tool_results.py
      provenance: code
      facets: {}

    - id: hooks_run_dir      # SURVIVES; loses read_meta_salt
      provenance: code
      facets: {}

    - id: RunPaths           # loses the .meta accessor
      provenance: code
      facets: {}

    - id: run_common
      provenance: code
      facets: {}

    - id: gather_only        # REMOVED — scripts/testing/gather_only.py
      provenance: code
      facets: {}

    - id: message_zero_orientation
      provenance: code
      facets:
        payload:
          parts:
            - {role: raw_alert,   source: template:RAW_ALERT_WRAPPED, slots: {salt: salt}}
            - {role: workspace,   source: template:WORKSPACE_MAP,     slots: {run_dir: run_dir}}
            - {role: alert_stem_frame, source: template:RUN_DIR_HEADING, slots: {stem: alert_stem_source}}
          invariants: [roles-disjoint-sources, all-slots-bound]
          nl: "MAIN's first model request: the untrusted-wrapped raw alert plus
            the workspace map, whose Run dir section enumerates the run dir's
            children (gather_raw excluded). Nothing pins this listing today."

    - id: operator_artifact_listing
      provenance: code
      facets: {}

    - id: alert_stem_source
      provenance: code
      facets: {}

    - id: SKILL_md
      provenance: code
      facets: {}

    - id: prose_sites
      provenance: design
      facets: {}

    - id: DEFENDER_RUN_DIR
      provenance: code
      facets:
        domain:
          type: str
          refinement: {nl: "An absolute path to the run dir, exported into the
            bash tool's subprocess environment; consumers must tolerate it being
            unset or naming a non-directory."}
          default: null
          distinguished: ["unset"]
          falsy_valid: false
          documented_alternatives: []
        access:
          constraints_by_via:
            env: {trust: operator, constraints: [is-dir-guard]}
            api: {trust: operator, constraints: [is-dir-guard]}

  interacts:
    # the builder
    - {from: materialize_run_dir, to: run_dir,   mode: write,  via: fs,  provenance: design, interpolates: [run_id]}
    - {from: materialize_run_dir, to: meta_json, mode: remove, via: fs,  provenance: design}
    - {from: materialize_run_dir, to: salt,      mode: write,  via: api, provenance: design, sends: payload}
    - {from: materialize_run_dir, to: RunPaths,  mode: read,   via: api, provenance: design}

    # the driver
    - {from: run_investigation, to: run_dir,   mode: read,  via: api, provenance: design}
    - {from: run_investigation, to: salt,      mode: read,  via: api, provenance: design}
    - {from: run_investigation, to: RunPaths,  mode: read,  via: api, provenance: design}
    - {from: run_investigation, to: run_common, mode: invoke, via: api, provenance: code}
    - {from: run_investigation, to: DEFENDER_RUN_DIR, mode: write, via: env, provenance: code}
    - {from: run_investigation, to: operator_artifact_listing, mode: write, via: fs, provenance: code, interpolates: [run_id]}

    # the salted surfaces (the five live wraps)
    - {from: orient,          to: wrap, mode: invoke, via: api, provenance: code, sends: payload, transport: llm}
    - {from: tool_write_file, to: wrap, mode: invoke, via: fs,  provenance: code, sends: payload, transport: llm}
    - {from: query_tool,      to: wrap, mode: invoke, via: bash, provenance: code, sends: payload, transport: llm}
    - {from: gather_dispatch, to: wrap, mode: invoke, via: api, provenance: code, sends: payload, transport: llm}
