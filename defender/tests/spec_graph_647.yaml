# ---------------------------------------------------------------------------
# GATE
# ---------------------------------------------------------------------------
gate:
  evaluated:
    - {rule: R0, fired: true}
    - {rule: R1, fired: true}
    - {rule: R2, fired: true}
    - {rule: R3, fired: true}
    - {rule: R4, fired: true}
    - {rule: R5, fired: true}   # dominates — this change is mostly removal
    - {rule: R6, fired: true}

  obligations:
    # --- R1 — unread channel -----------------------------------------------
    - {rule: R1, element: "interacts(orient->wrap).payload",
       witness: "Five edges send a payload to the wrap boundary and the whole
         function is relocating to a new module; no executable shape demand
         pinned the emitted delimiter bytes once test_tag_tool_results.py is
         deleted with the module.",
       discharged_by: d17_wrap_output_is_byte_identical}
    - {rule: R1, element: "interacts(orient->message_zero_orientation)",
       witness: "orient sends the workspace map into message 0 and the run-dir
         listing slot varies with the run dir's file set, which this change
         edits; no shape demand bound that payload before this spec.",
       discharged_by: d13_message_zero_run_dir_listing_is_pinned}

    # --- R2 — shared sink ---------------------------------------------------
    - {rule: R2, element: "run_dir.identity",
       witness: "Three writers reach run_dir — materialize_run_dir, the replay
         harness's materialize, and the evals copytree builders — and the change
         edits two of them separately, so their file sets can diverge silently.",
       discharged_by: d15_both_builders_present_the_same_run_dir_file_set}
    - {rule: R2, element: "salt.identity",
       witness: "Two origins now write the salt boundary (secrets.token_hex on
         the run lane, uuid4 in bind's fallback); key_axes is [model_context],
         so a surface reading the wrong context's token is a cross-key read.",
       discharged_by: d4_salt_coherence_under_a_real_mint}
    - {rule: R2, element: "drives(run_investigation->gather_dispatch)",
       witness: "GATHER is driven concurrently over one run dir and inherits the
         parent token by binding deps.salt; a fresh mint here would fail the
         quarantine open.",
       discharged_by: d5_gather_inherits_the_parent_token}

    # --- R3 — cross-via parity ---------------------------------------------
    - {rule: R3, element: "salt.access[api]",
       witness: "The salted-wrap constraint must hold on every via that reaches
         untrusted content; the api lane (orient's raw alert, gather's return) is
         one cell.",
       discharged_by: d4_salt_coherence_under_a_real_mint}
    - {rule: R3, element: "salt.access[fs]",
       witness: "The fs lane (tools.read_file of gather_raw, lesson_read) is the
         second cell of the salted-wrap constraint.",
       discharged_by: d4_salt_coherence_under_a_real_mint}
    - {rule: R3, element: "salt.access[bash]",
       witness: "The bash lane (query_tool's adapter output) is the third cell;
         a constraint pinned on one surface and absent on its sibling is the
         canonical fail-open.",
       discharged_by: d4_salt_coherence_under_a_real_mint}
    - {rule: R3, element: "salt.access[env]",
       witness: "The env via is REMOVED — read_meta_salt was the only mechanism
         that turned DEFENDER_RUN_DIR into a salt. Nothing must reintroduce a
         salt path across the subprocess boundary.",
       discharged_by: d30_no_salt_crosses_the_subprocess_boundary}

    # --- R4 — domain coverage ----------------------------------------------
    - {rule: R4, element: "salt.domain.distinguished[]",
       witness: "The empty string is a distinguished member: bind keys its
         fallback on `is not None`, so '' passes through unresolved and wrap
         emits <run--untrusted> (P4). The old .get('salt','') read could produce
         it; the new contract must not.",
       discharged_by: d9_empty_salt_is_not_constructible_on_the_run_lane}
    - {rule: R4, element: "salt.domain.distinguished[secrets-token-hex-8]",
       witness: "The shipped default column — a 16-hex token — must be exercised
         as the positive control for the empty-salt negative.",
       discharged_by: d10_minted_token_shape_is_sixteen_hex}
    - {rule: R4, element: "salt.domain.alternatives[salt-is-None]",
       witness: "salt=None is a documented alternative that crosses validation:
         the learning stages rely on it to mint a uuid4, and the run lane must
         never reach it.",
       discharged_by: d6_curator_leg_mints_its_own_token}
    # RETIRED by #667 with d31: `resolve_run_dir` — whose unset branch this named — was
    # deleted with its last consumer. The element has no surviving bearer.
    - {rule: R4, element: "DEFENDER_RUN_DIR.domain.distinguished[unset]",
       witness: "resolve_run_dir survived read_meta_salt's removal and its unset
         member was the branch the deleted fail-open used to paper over. #667 then
         deleted resolve_run_dir itself.",
       discharged_by: d31_run_dir_env_var_unset_member, status: retired}

    # --- R5 — subtraction and conservation (dominant) ----------------------
    - {rule: R5, element: "meta_json",
       witness: "The boundary is removed with live in-edges from run.py's read,
         hooks/_run_dir's read, gather_only's read, the replay harness's write,
         and workspace_map's enumeration. Each dependent needs its own survival
         answer.",
       discharged_by: d11_no_meta_json_on_disk_after_a_driven_run}
    - {rule: R5, element: "interacts(run_investigation->run_dir)",
       witness: "run.py's dependent workflow — obtaining the salt — ran through
         the removed file; its substitute is the returned tuple.",
       discharged_by: d3_salt_origin_reaches_run_investigation}
    - {rule: R5, element: "interacts(workspace_map->run_dir)",
       witness: "workspace_map's enumeration is a live in-edge on the removed
         file: message 0's listing legitimately loses a line, and nothing pins
         that listing today.",
       discharged_by: d13_message_zero_run_dir_listing_is_pinned}
    - {rule: R5, element: "interacts(replay_harness->run_dir)",
       witness: "The harness's meta.json write is a live in-edge; deleting it is
         NOT a pure deletion, because it shifts the replayed message 0 too.",
       discharged_by: d14_replayed_message_zero_listing_shifts_with_the_harness_write}
    - {rule: R5, element: "operator_artifact_listing",
       witness: "run.py's end-of-run stderr artifact block is a SECOND run-dir
         listing surface that loses its meta.json line; the resolutions pin only
         message 0.",
       discharged_by: w2_operator_artifact_listing_loses_a_line}
    - {rule: R5, element: "run_dir.identity",
       witness: "The run dir loses one of four materialized entries; the
         investigation artifacts a driven run produces must be unchanged.",
       discharged_by: d12_investigation_artifacts_survive}
    - {rule: R5, element: "RunPaths",
       witness: "The .meta accessor is removed from a boundary with live
         in-edges from run.py, run_common, and hooks/_run_dir; the class
         docstring's accessor count drops six to five.",
       discharged_by: d22_run_paths_exposes_five_accessors}
    - {rule: R5, element: "meta_json",
       witness: "A symbol-scoped census over RunPaths.meta structurally cannot
         see a `run_dir / \"meta.json\"` string literal — the exact trap that hid
         the second caller twice. The sweep must cover both spellings.",
       discharged_by: d23_no_surviving_reference_to_run_paths_meta}
    - {rule: R5, element: "tag_tool_results",
       witness: "The whole module is removed while four runtime modules import
         its one live symbol; each importer is a dependent whose workflow must
         complete through the relocated substitute.",
       discharged_by: d18_every_importer_of_wrap_resolves_after_the_move}
    - {rule: R5, element: "wrap",
       witness: "The substitute home is a NEW module; the seam must exist before
         any importer can be said to survive.",
       discharged_by: d16_wrap_lives_in_untrusted_module}
    - {rule: R5, element: "interacts(tag_tool_results_main->tag_tool_results)",
       witness: "Deleting the never-wired main() orphans seven sibling symbols
         (G14 corrects the doc's six). No symbol may survive whose only
         reachability was through it.",
       discharged_by: d19_no_symbol_survives_orphaned_by_the_deletion}
    - {rule: R5, element: "tag_tool_results",
       witness: "A missed importer of the deleted module raises at import time
         and takes every unrelated test in that module down with it at
         collection.",
       discharged_by: d20_import_of_the_deleted_module_fails_at_collection}
    - {rule: R5, element: "hooks_run_dir",
       witness: "read_meta_salt is removed from a module whose OTHER symbols have
         live consumers; the flock'd update_json_locked must remain importable and
         functional for them. (#647 counted three consumers of two symbols; #667
         deleted resolve_run_dir and the record_lesson_load consumer with the
         entrypoint that was their only reason to exist, leaving update_json_locked
         and its two.)",
       discharged_by: d21_hooks_run_dir_survives_its_deleted_member}
    - {rule: R5, element: "gather_only",
       witness: "The whole actor is deleted. Its in-edges are the only thing
         that would owe a survival demand, and the census found zero references
         repo-wide (G16) — so what is owed instead is the stronger property the
         deletion buys: no caller outside defender/ survives.",
       discharged_by: d24_no_caller_of_the_changed_builder_outside_defender}
    - {rule: R5, element: "drives(gather_only->materialize_run_dir)",
       witness: "The drive edge into the changed builder is removed; nothing may
         be left behind that still drives the old contract.",
       discharged_by: d25_gather_only_is_gone}
    - {rule: R5, element: "run_common",
       witness: "After the deletion nothing outside defender/ imports
         run_common — a verifiable property that replaces the repo-wide caller
         enumeration two prior sweeps got wrong.",
       discharged_by: d24_no_caller_of_the_changed_builder_outside_defender}
