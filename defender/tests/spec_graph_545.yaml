schema_version: 1
design: "#545 — wire bind/compile_policy into production (AgentDefinition consolidation step two)"
base: 13c08ce0009c20c0a797c287e801b397745321e5

# ─────────────────────────────────────────────────────────────────────────────
# Resolved decisions (step 7 — the human, ycochav):
#   1(a) bind becomes the real DEPS FACTORY: it gains a `salt` seam (salt=None → fresh
#        uuid4 for the stages; a carried salt for MAIN/GATHER) so the reroute preserves
#        the run's untrusted-data trust token.
#   2   LEAD_AUTHOR is made FULLY BINDABLE: bind gains a `repo_root` seam (the worktree),
#        threaded exactly as LeadAuthorDeps.for_run does today; compile_policy grows the
#        worktree-anchored write scope (build_write_allow(<wt>/defender/skills, '.md')) +
#        the rm-of-drafts grant. bind raises if LEAD_AUTHOR and repo_root is None
#        (symmetric with the actor-confine fail-loud).
#   3   read_shapes is CONSUMED in this PR, semantics = read-tool↔bash-lane filename
#        PARITY: read_shapes is populated from the SAME operand grammar the bash reader
#        lane already enforces (_common._file_operand), so decide_read admits exactly the
#        filename set `cat` does. One grammar source, not six invented.
#
# Spec-assumption (seams the design leaves open — write-code-from-spec reconciles):
#   - bind signature: bind(defn, run_dir, *, scope=_DEFAULT_SCOPE, salt=None, repo_root=None)
#   - AgentDeps._for_run gains salt: _for_run(cls, run_dir, policy, *, defender_dir=PATHS, salt=None)
#     (salt=None → uuid4().hex; else carried verbatim).
#   - LEAD_AUTHOR write scope is declared on LEAD_AUTHOR_DEF; compile_policy emits it from
#     the def + repo_root. The tests assert the OBSERVABLE policy (parity vs the factory),
#     so a different field-naming choice is a mechanical test update, not a spec change.
#   - read_shapes becomes an ADDITIVE 10th AgentPolicy field (compile_policy sets it from the
#     def; decide_read filters on policy.read_shapes). It is the INTENDED delta, so the
#     field-for-field parity is over the 9 LEGACY fields only (read_shapes excluded from the
#     parity projection); the read_shapes demands test the new field separately. policy_for
#     stays a kept API with the legacy broad (read_shapes=()) behavior; production ships the
#     tight behavior via bind.
# ─────────────────────────────────────────────────────────────────────────────

axes: [role, run, via, salt_source]

demands:
  # ── Demand #0 — the return-value contract (resolved under decision 1a) ──────
  - id: d0_bind_return_contract
    kind: behavior
    form: test
    outcome: {nl: "bind(defn, run_dir, *, scope, salt=None, repo_root=None) returns the role's AgentDeps subtype (per _deps_class, now including LEAD_AUTHOR) carrying compile_policy's AgentPolicy as .policy, with run_id = run_dir.name, defender_dir = repo_root/defender when repo_root is given else PATHS.defender_dir, and salt = the passed salt when given else a fresh uuid4 hex."}
    binds: ["bind", "AgentPolicy", "salt"]

  # ── Salt carriage (decision 1a) — the injection-defense trust token ─────────
  - id: salt_fresh_by_default
    kind: behavior
    form: test
    outcome: {nl: "bind(defn, run_dir) with no salt mints a fresh 32-hex uuid4 salt (the stages' behavior, preserved), and two such calls yield distinct salts."}
    binds: ["bind", "salt", "salt.domain.distinguished[none]"]
  - id: salt_carried_when_given
    kind: behavior
    form: test
    outcome: {nl: "bind(defn, run_dir, salt=S) returns deps whose .salt == S verbatim — the identity is carried, never re-minted."}
    binds: ["bind", "salt"]
  - id: main_reroute_salt_coherence
    kind: negative
    form: test
    outcome: {nl: "After the MAIN reroute, a driven run wraps its tool output and its alert with the SAME salt (the run's persisted salt), so no run exists whose alert-wrapper salt differs from its tool-output-wrapper salt — the untrusted-data tag the agent is told to distrust stays coherent across both surfaces."}
    binds: ["interacts(run_investigation->salt)", "interacts(orient->salt)", "interacts(run_gather->salt)"]
    rejected: [{nl: "bind mints a fresh uuid4 for MAIN → alert and tool wrappers carry different salts → fail-open on injection tagging"}]
  - id: gather_inherits_parent_salt
    kind: behavior
    form: test
    outcome: {nl: "The GATHER reroute binds with the parent run's salt (bind(GATHER_DEF, run_dir, salt=parent_salt).salt == parent_salt), so the gather subagent's read tags and its return wrapper carry the one salt per run."}
    binds: ["bind", "salt"]
  - id: replay_salt_golden_survives
    kind: survival
    form: test
    outcome: {nl: "Driving the e2e replay harness (which pins the salt in meta.json) after the reroute reproduces salted wrappers carrying that pinned salt — the reroute does not substitute a fresh uuid4 for the pinned salt."}
    binds: ["interacts(run_investigation->salt)"]

  # ── Full-role policy parity (task 1 + acceptance C), all 9 AgentPolicy fields ─
  - id: parity_main
    kind: parity
    form: test
    outcome: {nl: "bind(MAIN_DEF, run_dir).policy equals policy_for('main', run_dir, defender_dir) across ALL NINE AgentPolicy fields, write_allow included."}
    binds: ["AgentPolicy.write_allow", "interacts(bind->AgentPolicy)"]
  - id: parity_gather
    kind: parity
    form: test
    outcome: {nl: "bind(GATHER_DEF, run_dir).policy equals policy_for('gather', run_dir, defender_dir) across all nine fields."}
    binds: ["interacts(bind->AgentPolicy)"]
  - id: parity_judge
    kind: parity
    form: test
    outcome: {nl: "bind(JUDGE_DEF, run_dir, scope=RunScope(add_dirs=cmp)).policy equals _judge_policy(read_roots=cmp, ticket_cli=None) across all nine fields."}
    binds: ["interacts(bind->AgentPolicy)"]
  - id: parity_actor
    kind: parity
    form: test
    outcome: {nl: "bind(ACTOR_DEF, run_dir, scope=RunScope(scripts=…, read_confine=confine)).policy equals _actor_policy(scripts, read_confine=confine) across all nine fields."}
    binds: ["interacts(bind->AgentPolicy)", "AgentPolicy.read_confine"]
  - id: parity_oracle
    kind: parity
    form: test
    outcome: {nl: "bind(ORACLE_DEF, run_dir).policy equals _ORACLE_POLICY (all-deny) across all nine fields."}
    binds: ["interacts(bind->AgentPolicy)"]
  - id: parity_verifier
    kind: parity
    form: test
    outcome: {nl: "bind(VERIFY_DEF, run_dir).policy equals _VERIFY_POLICY (all-deny) across all nine fields."}
    binds: ["interacts(bind->AgentPolicy)"]
  - id: parity_lead_author
    kind: parity
    form: test
    outcome: {nl: "bind(LEAD_AUTHOR_DEF, run_dir, repo_root=wt).policy equals _lead_author_policy(wt/defender/skills) across all nine fields — including write_allow=(build_write_allow(<wt>/defender/skills, suffix='.md'),) and bash_allow=(the rm-of-drafts pattern,)."}
    binds: ["interacts(bind->AgentPolicy)", "AgentPolicy.write_allow"]

  # ── The parity projection must cover write_allow (footgun B, 2nd half) ───────
  - id: policy_fields_covers_write_allow
    kind: behavior
    form: test
    outcome: {nl: "The _policy_fields parity projection in BOTH test files (test_agent_definition.py and test_agent_deps_construction.py) includes write_allow, so two policies differing only in write_allow project UNEQUAL."}
    binds: ["policy_fields"]

  # ── _deps_class maps all 7 roles (footgun C + decision 2) ────────────────────
  - id: deps_class_all_seven
    kind: domain-outcome
    form: test
    outcome: {nl: "_deps_class maps every one of the 7 AgentRole members to its subtype — MAIN→AgentDeps, GATHER→GatherDeps, JUDGE→JudgeDeps, ACTOR→ActorDeps, ORACLE→OracleDeps, VERIFIER→VerifierDeps, LEAD_AUTHOR→LeadAuthorDeps — and bind(ROLE_DEF, …) is an instance of that subtype."}
    binds: ["deps_class", "role.domain.distinguished[LEAD_AUTHOR]"]

  # ── Footgun A — actor confine fail-loud (R5 safe-by-construction) ────────────
  - id: actor_default_scope_fails_loud
    kind: negative
    form: test
    outcome: {nl: "bind(ACTOR_DEF, run_dir) with the default empty-read_confine RunScope RAISES — no ActorDeps is ever constructed via bind whose resolved read roots widen to the whole defender_dir."}
    binds: ["bind", "AgentPolicy.read_confine", "interacts(read_gate->read_confine)"]
    rejected: [{nl: "default the actor confine to run_dir — hides the missing-scope bug instead of failing on it"}]
  - id: actor_confine_positive_control
    kind: behavior
    form: test
    outcome: {nl: "bind(ACTOR_DEF, run_dir, scope=RunScope(scripts=…, read_confine=confine)) succeeds; its policy.read_confine == confine and files._resolved_read_roots does NOT include the whole defender_dir."}
    binds: ["bind", "AgentPolicy.read_confine"]
  - id: main_empty_confine_ok
    kind: behavior
    form: test
    outcome: {nl: "bind(MAIN_DEF, run_dir) with the default empty-confine scope SUCCEEDS — an empty read_confine is not globally banned; main legitimately reads defender_dir. (The empty-confine ban is actor-specific.)"}
    binds: ["bind", "AgentPolicy.read_confine"]

  # ── LEAD_AUTHOR fully bindable (decision 2) ─────────────────────────────────
  - id: lead_author_write_anchored_worktree
    kind: negative
    form: test
    outcome: {nl: "The bound lead-author's write_allow admits <wt>/defender/skills/x.md but NOT run_dir/x.md (wrong root) and NOT <wt>/defender/skills/x.txt (wrong suffix) — the write stays confined to the worktree skills subtree, never widened to the run dir."}
    binds: ["AgentPolicy.write_allow", "interacts(bind->AgentPolicy)"]
    rejected: [{nl: "compile_policy emits build_write_allow(run_dir) for lead-author — whole run dir, no .md suffix (the naive-bind widening)"}]
  - id: lead_author_rm_scope_preserved
    kind: negative
    form: test
    outcome: {nl: "The bound lead-author's bash_allow admits `rm <wt>/defender/skills/<draft>` and denies both a bare `rm` and `rm` of a path outside the skills subtree — the scoped rm grant is not dropped or widened to a general rm."}
    binds: ["AgentPolicy.bash_allow"]
    rejected: [{nl: "a naive compile_policy has no rm arm → bash_allow==() → the rm grant silently vanishes"}]
  - id: lead_author_defender_dir_worktree
    kind: behavior
    form: test
    outcome: {nl: "bind(LEAD_AUTHOR_DEF, run_dir, repo_root=wt) returns LeadAuthorDeps whose defender_dir == wt/defender (the worktree tree the gate resolves reads/writes against), not PATHS.defender_dir."}
    binds: ["bind"]
  - id: lead_author_missing_repo_root_fails_loud
    kind: negative
    form: test
    outcome: {nl: "bind(LEAD_AUTHOR_DEF, run_dir) without repo_root RAISES a clear error (the worktree root is required to anchor the write scope) — symmetric with the actor-confine fail-loud, never a run-dir-anchored fallback."}
    binds: ["bind"]
    rejected: [{nl: "fall back to PATHS.defender_dir/skills — writes to the MAIN checkout, not the worktree"}]

  # ── read_shapes cross-via parity (task 3, decision 3 — R3) ──────────────────
  - id: read_shapes_denies_nonmatching
    kind: negative
    form: test
    outcome: {nl: "For a reader agent whose read_shapes is populated from the operand grammar, decide_read DENIES a read of a file inside the roots whose basename is not admitted by the grammar (e.g. a non-.md file under defender/skills) — matching the bash cat lane's rejection."}
    binds: ["read_gate.access[read-tool]", "read_shapes"]
    rejected: [{nl: "leave decide_read root-only (broad) — a non-.md defender file readable via the read tool but not via cat (the step-one asymmetry)"}]
  - id: read_shapes_allows_corpus_md
    kind: behavior
    form: test
    outcome: {nl: "decide_read ALLOWS a corpus .md file under lessons|skills|examples for the reader agent (positive control: the mechanism fires and the channel distinguishes allow from deny)."}
    binds: ["read_gate.access[read-tool]", "read_shapes"]
  - id: read_shapes_allows_run_dir_file
    kind: behavior
    form: test
    outcome: {nl: "decide_read ALLOWS an arbitrary file directly under run_dir regardless of filename — the run dir is unconditionally in-roots (the read_shapes filter applies to the corpus surface, not the run dir)."}
    binds: ["read_gate.access[read-tool]"]
  - id: read_gate_bash_lane_parity
    kind: parity
    form: test
    outcome: {nl: "For the reader agent, decide_read and the bash cat lane agree on the same probe files: a file the bash lane rejects as a cat operand is denied by decide_read, and a file both admit is admitted by both — the constraint enforced on the bash via is enforced on the read-tool via."}
    binds: ["read_gate.access[read-tool]", "read_gate.access[bash]"]
  - id: empty_read_shapes_no_filtering
    kind: behavior
    form: test
    outcome: {nl: "An agent whose read_shapes is () is unaffected — decide_read applies no filename filter (backward compatibility for non-reader agents), admitting any in-roots file."}
    binds: ["read_gate.access[read-tool]", "read_shapes"]

  # ── Task 2 — grammar contents load-bearing ──────────────────────────────────
  - id: grammar_contents_load_bearing
    kind: behavior
    form: test
    outcome: {nl: "compile_policy builds the reader bash_allow from BashGrammar's declared shims/viewers CONTENTS (two grammars differing in their viewers tuples compile to different bash_allow program sets), not merely from their non-emptiness."}
    binds: ["compile_policy", "interacts(bind->AgentPolicy)"]

  # ── Cleanups + subtraction (R5) ─────────────────────────────────────────────
  - id: factories_removed_from_production
    kind: survival
    form: test
    outcome: {nl: "main_policy / gather_policy / _lead_author_policy have no remaining production (non-test, non-bind) caller after the wiring — the parallel factory path is gone, and every production deps site obtains its AgentDeps via bind."}
    binds: ["run_investigation", "run_gather"]
  - id: reader_patterns_kept_as_api
    kind: survival
    form: test
    outcome: {nl: "reader_patterns and policy_for remain importable/callable as the kept gate API (the canonical grammar spelling and the many gate-test consumers), so removing the parallel factory path does not break the gate suite."}
    binds: ["read_gate.access[bash]"]
  - id: static_model_effort_dead_removed
    kind: survival
    form: clause
    outcome: {nl: "The build path resolves each agent's model/effort from the replace() at the build site (build_agent / build_gather_agent / build_stage_agent), so an agent still builds a working model after the dead static model/effort literals are removed. Downgraded to clause: a behavior-preserving refactor whose only observable — 'build still works' — is already covered by the #538 build tests (test_agent_definition.py); removing an always-replace()d field has no new observable to bind."}
    binds: ["compile_policy"]

  # ── Cross-run isolation (R2) + frozen-def integrity ─────────────────────────
  - id: resolve_roots_per_run_distinct
    kind: uniqueness
    form: test
    outcome: {nl: "Two different run_dirs bound through bind get distinct resolved roots — one run's read_confine never appears in another run's policy (no corpus-only cache key bleed)."}
    binds: ["interacts(bind->run_roots)"]
  - id: registry_def_unchanged_after_build
    kind: behavior
    form: clause
    outcome: {nl: "Building an agent (which replace()s model/effort onto a copy) leaves AGENTS[role] unchanged. Downgraded to clause: AgentDefinition is a frozen dataclass, so replace() returns a copy by construction — the invariant is type-enforced, not a behavior this fold can regress."}
    binds: ["compile_policy"]

  # ── Refuted finding, recorded (not a demand) ────────────────────────────────
  - id: waiver_bash_allow_confine_nonbug
    kind: behavior
    form: waiver
    outcome: {nl: "_bash_allow(agent_definition.py:212) passing read_confine=() to _actor_policy is NOT a bug: that call extracts only .bash_allow (the pinned python3-script patterns), which do not depend on read_confine; the actor's real read_confine flows through compile_policy's roots.read_confine into policy.read_confine. Refuted (adversarial verify) — no test."}
    binds: ["compile_policy"]

structure:
  actors:
    - {id: bind, frame: composition, provenance: design}
    - {id: run_investigation, frame: composition, provenance: code}   # MAIN reroute site
    - {id: run_gather, frame: leg, provenance: code}                  # GATHER reroute site
    - {id: orient, frame: leg, provenance: code}                      # wraps the alert with the run salt
  boundaries:
    - id: AgentPolicy
      provenance: code
      facets:
        # the 9-field sink; write_allow (field 8) is the one the parity projection omitted
        domain: {type: struct, refinement: {nl: "9 fields: bash_allow, jq_operand_gated, adapters, adapter_sql_pipe, raw_reads, read_roots, read_confine, write_allow, deny_reason"}, default: none, distinguished: [], falsy_valid: false, documented_alternatives: []}
    - id: bind
      provenance: design
      facets: {}
    - id: compile_policy
      provenance: design
      facets: {}
    - id: deps_class
      provenance: design
      facets:
        domain: {type: enum, refinement: {nl: "the 7 AgentRole members; LEAD_AUTHOR is the delta arm added in decision 2"}, default: none, distinguished: [LEAD_AUTHOR], falsy_valid: false, documented_alternatives: []}
    - id: salt
      provenance: code
      facets:
        # the untrusted-data trust token — one per run, threaded to deps AND orient
        identity: {key_axes: [run], evidence: {nl: "run_investigation threads one salt to both AgentDeps (driver.py:466 → tool wrap tools.py:289 / gather-return tools_gather.py:349) and _user_prompt→orient (driver.py:469 → orient.py:96 <run-{salt}-untrusted>)"}, sharing: unique-key}
        domain: {type: str, refinement: {nl: "salt source: None→fresh uuid4 (stages), or a carried run salt (MAIN/GATHER)"}, default: none, distinguished: [none], falsy_valid: false, documented_alternatives: []}
    - id: read_gate
      provenance: code
      facets:
        access:
          constraints_by_via:
            read-tool: {trust: attacker-influenced, constraints: [confine, denylist]}   # decide_read — step-one root-only, gains filename filter
            bash: {trust: attacker-influenced, constraints: [confine, denylist, filename-grammar]}  # cat lane already filename-tight (_file_operand)
    - id: read_shapes
      provenance: design
      facets: {}
    - id: policy_fields
      provenance: code
      facets: {}
  interacts:
    - {from: bind, to: AgentPolicy, mode: write, via: api, provenance: design, sends: policy}
    - {from: run_investigation, to: salt, mode: read, via: api, provenance: code}
    - {from: run_gather, to: salt, mode: read, via: api, provenance: code}
    - {from: orient, to: salt, mode: read, via: api, provenance: code}
    - {from: bind, to: read_gate, mode: write, via: api, provenance: design}   # bind→policy→decide_read filename filter
  drives:
    - {from: run_investigation, to: run_gather, provenance: code, multiplicity: serial}

gate:
  evaluated:
    - {rule: R0, fired: true}   # reconciliation + resolved holes (salt carriage, lead-author, read_shapes)
    - {rule: R1, fired: true}   # the salt-tag "payload" — the untrusted-data wrapper carries the run salt
    - {rule: R2, fired: true}   # per-run root isolation (resolve_roots keyed on run_dir) + salt uniqueness
    - {rule: R3, fired: true}   # read_gate cross-via parity (read-tool vs bash) — the read_shapes headline
    - {rule: R4, fired: true}   # role domain (7 members) + salt-source default (None/fresh)
    - {rule: R5, fired: true}   # factory removal survival + actor/lead-author safe-by-construction (judgment extension)
  obligations:
    - {rule: R3, element: "read_gate.access[read-tool]", witness: "decide_read is filename-broad while the bash cat lane is filename-tight; read_shapes must bring the read-tool via to filename parity", discharged_by: read_shapes_denies_nonmatching}
    - {rule: R3, element: "read_gate.access[bash]", witness: "the parity must be asserted over BOTH vias, not just the tightened one", discharged_by: read_gate_bash_lane_parity}
    - {rule: R2, element: "interacts(bind->run_roots)", witness: "resolve_roots must give two runs distinct roots — a corpus-only cache key would bleed one run's confine into another", discharged_by: resolve_roots_per_run_distinct}
    - {rule: R1, element: "interacts(run_investigation->salt)", witness: "the untrusted-data wrapper is a payload whose invariant is 'tagged with the run salt'; a split salt is a silent unread-channel divergence", discharged_by: main_reroute_salt_coherence}
    - {rule: R4, element: "deps_class.domain.distinguished[LEAD_AUTHOR]", witness: "the LEAD_AUTHOR arm is the delta domain member — it must be individually exercised", discharged_by: deps_class_all_seven}
    - {rule: R4, element: "salt.domain.distinguished[none]", witness: "salt=None (the default/falsy member) must be exercised distinctly from a carried salt or an x-or-fresh coercion swallows it", discharged_by: salt_fresh_by_default}
    - {rule: R5, element: "AgentPolicy.read_confine", witness: "the actor-confine tightening leaves a security-critical caller constructible in the unsafe (empty-confine) state via bind — assert it CANNOT be built unsafe (raises)", discharged_by: actor_default_scope_fails_loud}
    - {rule: R5, element: "AgentPolicy.write_allow", witness: "making lead-author bindable risks a run-dir write widening; assert the write stays worktree-confined and the missing repo_root fails loud", discharged_by: lead_author_write_anchored_worktree}
    - {rule: R5, element: run_investigation, witness: "removing main_policy/gather_policy/_lead_author_policy — the workflows must still complete via bind", discharged_by: factories_removed_from_production}
  holes:
    - {rule: R0, element: read_shapes, resolution: "read_shapes content was undecided (empty+unconsumed on all defs). Resolved (decision 3): populate from _common._file_operand → read-tool↔bash filename parity. ONE spot for the human to sanity-check.", resolved_to: read_shapes_denies_nonmatching}
    - {rule: R0, element: "interacts(run_investigation->salt)", resolution: "bind minted a fresh uuid4 → splitting the run salt was undetected by #538. Resolved (decision 1a): bind gains a salt seam.", resolved_to: main_reroute_salt_coherence}
    - {rule: R0, element: "bind (LEAD_AUTHOR arm)", resolution: "lead-author was 'not bound' by construction; fork resolved (decision 2) to fully bindable via a repo_root seam.", resolved_to: parity_lead_author}
  pre_discharged:
    - {rule: R0, element: "resolve_roots corpus '..'/absolute guard", by: "existing test_agent_definition.py:896 (corpus traversal guard) — not re-tested"}

handoff:
  forks:
    - "LEAD_AUTHOR: bindable vs fenced-out. RESOLVED → fully bindable (decision 2), via a repo_root seam threaded as LeadAuthorDeps.for_run does today + a fail-loud guard when repo_root is absent."
    - "bind scope: deps-factory vs policy-source. RESOLVED → deps-factory (decision 1a), bind gains a salt seam; MAIN/GATHER carry the persisted run salt so the injection-defense tag stays coherent."
    - "read_shapes: split vs include. RESOLVED → include (decision 3), semantics = read-tool↔bash filename parity sourced from the existing _common operand grammar."
  deviations:
    - "collapsed diff — the step-4 stub alignment was done inline by the author (all 5 enumerators' stubs collected first), not by a separate diff agent."
    - "one enumerator 'critical bug' (_bash_allow read_confine=()) refuted by adversarial verification and recorded as waiver_bash_allow_confine_nonbug, not spec'd."
    - "manual formal-slot check (no spec_graph linter yet, #537)."
    - "several enumerator stubs were authored under the pre-decision assumptions (LEAD_AUTHOR non-bindable; read_shapes unused) and were re-derived to the resolved shapes per the step-7 flip rule."
