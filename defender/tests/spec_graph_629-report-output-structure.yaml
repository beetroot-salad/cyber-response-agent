schema_version: 1
design: "#629 — decide_write gains a report.md frontmatter+size branch and an investigation.md size bound (intent+design posted as issue comments: https://github.com/beetroot-salad/cyber-response-agent/issues/629)"
base: 07596adf   # spec branch forked from main == 10-brief/20-demands base_commit; tree has not moved

# ---------------------------------------------------------------------------
# Name reconciliation (phase-D join). The three input frontiers coined ids
# independently; unified here by role+origin:
#   - the gate is `decide_write` (files.py:213), modelled as a leg-actor — the
#     575 `decide_bash` precedent. The charge names it "the central boundary";
#     it is reconciled to the gate leg because only an actor bears the OUT-edges
#     that read the per-artifact contract boundaries, and typed facets cannot
#     hold two artifacts' contracts on one boundary. The "per-artifact facets"
#     are the report_md / investigation_md sinks and the contract boundaries
#     (disposition, report_frontmatter, *_size, artifact_key) decide_write reads.
#   - report.md / investigation.md files -> boundaries `report_md`,
#     `investigation_md` (dots are not slug-legal). write tools -> `write_file`,
#     `edit_file` (code: _tool_write_file/_tool_edit_file; contextAlias `tools`).
#   - third caller -> `verify_forward` (_gate_lesson_path, F-A2 seam).
# Change kinds (rules.md Procedure 1, from the DESIGN):
#   - report.md branch  = ADD    (new branch replacing Decision(True) @files.py:287)  -> provenance: design
#   - investigation size = MODIFY (a size facet materializing on the existing
#                                  investigation.md branch @files.py:269)             -> provenance: design
#   - the grounded neighborhood it attaches to (writers, callers, consumers)          -> provenance: code
#
# form:test demands are POINTERS (schema.md): id/kind/form/binds/discharged_by, NO
# inline outcome — the observable prose lives in the named test's docstring, which
# check_binds scans. The seed for each (from the consensus assertion / 20-demands
# seed) is the `# seed:` comment; 45-dispositions.md carries the full assertion,
# keyed by the same test name.
# ---------------------------------------------------------------------------

# ===========================================================================
# DEMANDS — the spec proper.  D0-D6/D1b = the umbrella contract (20-demands.md).
# 38 consensus assertions (45-dispositions.md) = the concrete test cases; each
# carries `# discharges: Dx` and its 45-dispositions section letter. lc6 is the
# concrete golden lifecycle test discharging D5.
# Every fork/silent-branch is an `unknown` invariant in the structure below or a
# handoff.forks OPEN entry — NONE is a resolved demand (charge point 3).
# Plus 4 GATE-MINTED demands (fb12-fb14, cc7) — genuine R4/R6 obligations the
# gate leaf found with no consensus/fork covering them; see `gate.obligations`
# and 60-residue.md. Plus 17 PHASE-E author-minted (section J: ak1-7, dn1-4, fk11,
# fa1, fa3, fork9, fork10, fork12) — one per §7-resolved fork that was a phase-D
# `unknown` invariant / gate.hole; ak5-ak7 are the investigation.md half of the shared
# F-A2/Fork 6 keying rule (mirroring ak1-ak3). 46 (38+8) + 4 + 17 = 67 demands total.
# ===========================================================================
demands:

  # --- D0-D6 / D1b umbrella (20-demands.md, verbatim binds) ---
  - {id: D0, kind: behavior, form: test, discharged_by: test_decide_write_returns_decision,
     binds: ["decide_write", "interacts(write_file->report_md)", "interacts(edit_file->report_md)"]}
     # seed: decide_write returns Decision(False,<non-empty reason>) on any rejection and Decision(True) (reason '') on acceptance; the tool lane raises ModelRetry(decision.reason) iff allow is False. deny <=> .allow False with non-empty .reason.
  - {id: D1, kind: behavior, form: test, discharged_by: test_report_frontmatter_gate,
     binds: ["decide_write", "report_md", "report_frontmatter", "disposition", "interacts(write_file->report_md)"]}
     # seed: a report.md write is denied unless its frontmatter parses under split_frontmatter (leading+closing fence, valid YAML, a mapping) AND disposition is present and in {benign,inconclusive,malicious}.
  - {id: D1b, kind: behavior, form: test, discharged_by: test_report_case_id_confidence_not_required,
     binds: ["decide_write", "report_md", "disposition.domain"]}
     # seed: a report.md with valid disposition but NEITHER case_id NOR confidence still commits (Decision(True)); only disposition is validated. rejected: requiring case_id/confidence over-tightens past test_540_scrub_lifecycle.py:108.
  - {id: D2, kind: behavior, form: test, discharged_by: test_report_size_bounds,
     binds: ["decide_write", "report_md", "report_frontmatter_size", "report_body_size"]}
     # seed: a report.md whose frontmatter exceeds 512 B OR whose post-.strip() body exceeds 8,192 B is denied; at/under both bounds passes. (basis/span UNRESOLVED — forks F1/F2.)
  - {id: D3, kind: behavior, form: test, discharged_by: test_investigation_size_bound,
     binds: ["decide_write", "investigation_md", "investigation_size", "interacts(write_file->investigation_md)"]}
     # seed: an investigation.md whose resulting total (exactly len(proposed_text), no append arithmetic) exceeds 65,536 B is denied; existing invlang validation still runs. (basis UNRESOLVED — F1.)
  - {id: D4, kind: behavior, form: test, discharged_by: test_report_deny_bounces_then_recovers,
     binds: ["decide_write", "interacts(write_file->report_md)", "interacts(edit_file->report_md)"]}
     # seed: an over-bound/malformed report.md write is denied and the reason reaches the model as ModelRetry; a corrected rewrite within bounds then commits. Pins bounce-and-recover THROUGH the driver (mirrors test_invlang_deny_bounces_then_recovers). NOTE (phase-F): discharged_by names a test in tests/e2e/test_report_gate_629.py — a different directory than this artifact's (tests/); spec-graph binds's same-directory scan cannot see it (routed to §7, manually verified: the function exists, non-empty docstring, matching prose).
  - {id: D5, kind: survival, form: test, discharged_by: test_golden_ab_run_still_commits,
     binds: ["decide_write", "report_md", "investigation_md", "interacts(renderer->report_md)"]}
     # seed: a current-shape golden report.md/investigation.md still commits with the SAME disposition and the HTML still renders the analyst's reasoning — bounds clear every current-shape artifact. Positive control for D1-D3. Concretely discharged by lc6. NOTE (phase-F): cross-directory discharged_by, see D4's note.
  - {id: D6, kind: parity, form: test, discharged_by: test_both_write_paths_gate,
     binds: ["interacts(write_file->report_md)", "interacts(edit_file->report_md)", "interacts(write_file->investigation_md)", "interacts(edit_file->investigation_md)"]}
     # seed: BOTH write paths (write_file, edit_file) route their full resulting text through decide_write; neither commits a report.md/investigation.md the gate denies. No second write path bypasses the gate. NOTE (phase-F): cross-directory discharged_by, see D4's note.

  # --- section A: path / branch keying (3) ---
  - {id: pa1, kind: behavior, form: test, discharged_by: test_report_md_at_run_dir_root,
     binds: ["decide_write", "report_md", "artifact_key.domain.distinguished[report.md]", "interacts(write_file->report_md)"]}
     # discharges D1/D2. seed: a report.md at the canonical root — Decision(True) iff content independently satisfies D1+D2, else Decision(False, reason). Keying-scheme-invariant. POSITIVE CONTROL for pa2/pa3.
  - {id: pa2, kind: negative, form: test, discharged_by: test_filename_near_miss_does_not_collide_with_report_md,
     binds: ["decide_write", "artifact_key.domain.distinguished[near-miss]", "report_md"]}
     # discharges D1/D2 (C1). seed: a substring near-miss ("my_report.md","report.md.bak") never enters D1/D2 under exact-match -> Decision(True), unguarded, inert per census-5. positive control = pa1.
  - {id: pa3, kind: negative, form: test, discharged_by: test_main_writes_an_arbitrarily_named_file_into_the_run_dir,
     binds: ["decide_write", "artifact_key.domain.distinguished[arbitrary]", "interacts(write_file->run_dir_other)"]}
     # discharges Scope (R-c/C3/census-5), D6-adjacent. seed: an arbitrarily-named file matches neither key -> Decision(True), unbounded; inert because no consumer globs the run dir. positive control = pa1.

  # --- section B: frontmatter / content shape (11) ---
  - {id: fb1, kind: domain-outcome, form: test, discharged_by: test_report_md_no_leading_fence,
     binds: ["decide_write", "report_frontmatter.domain.distinguished[no-leading-fence]"]}
     # discharges D1. seed: no leading `---` fence -> Decision(False, reason).
  - {id: fb2, kind: domain-outcome, form: test, discharged_by: test_report_md_leading_fence_no_closing_fence,
     binds: ["decide_write", "report_frontmatter.domain.distinguished[no-closing-fence]"]}
     # discharges D1. seed: leading fence but no closing `---` fence -> Decision(False, reason).
  - {id: fb3, kind: domain-outcome, form: test, discharged_by: test_report_md_frontmatter_invalid_yaml,
     binds: ["decide_write", "report_frontmatter.domain.distinguished[invalid-yaml]"]}
     # discharges D1. seed: invalid YAML frontmatter -> Decision(False, reason).
  - {id: fb4, kind: domain-outcome, form: test, discharged_by: test_report_md_frontmatter_valid_yaml_not_a_mapping,
     binds: ["decide_write", "report_frontmatter.domain.distinguished[non-mapping]"]}
     # discharges D1. seed: valid YAML but not a mapping (list/scalar) -> Decision(False, reason).
  - {id: fb5, kind: domain-outcome, form: test, discharged_by: test_report_md_frontmatter_missing_disposition_key,
     binds: ["decide_write", "disposition.domain.distinguished[absent]"]}
     # discharges D1. seed: mapping omits the disposition key -> Decision(False, reason).
  - {id: fb6, kind: domain-outcome, form: test, discharged_by: test_report_md_disposition_outside_enum,
     binds: ["decide_write", "disposition.domain.distinguished[outside-enum]"]}
     # discharges D1. seed: disposition value outside {benign,inconclusive,malicious} -> Decision(False, reason).
  - {id: fb7, kind: behavior, form: test, discharged_by: test_report_md_valid_disposition_no_case_id_no_confidence,
     binds: ["decide_write", "report_md", "disposition.domain"]}
     # discharges D1b. seed: valid disposition, NEITHER case_id NOR confidence -> Decision(True); only disposition required (matches test_540_scrub_lifecycle.py:108).
  - {id: fb8, kind: domain-outcome, form: test, discharged_by: test_report_md_empty_proposed_text,
     binds: ["decide_write", "report_frontmatter.domain.distinguished[empty-text]"]}
     # discharges D1. seed: empty proposed_text -> Decision(False, reason) (no leading fence).
  - {id: fb9, kind: domain-outcome, form: test, discharged_by: test_report_md_whitespace_only_proposed_text,
     binds: ["decide_write", "report_frontmatter.domain.distinguished[whitespace-only]"]}
     # discharges D1. seed: whitespace-only proposed_text -> Decision(False, reason) (no leading fence).
  - {id: fb10, kind: behavior, form: test, discharged_by: test_report_md_valid_frontmatter_empty_body,
     binds: ["decide_write", "report_md", "report_body_size.domain.distinguished[empty-body]"]}
     # discharges D1/D2. seed: valid frontmatter, empty body -> Decision(True); D2's body bound is upper-bound-only, no minimum.
  - {id: fb11, kind: behavior, form: test, discharged_by: test_report_md_body_contains_a_second_fence,
     binds: ["decide_write", "report_frontmatter.domain.distinguished[second-fence-in-body]"]}
     # discharges D1/D2. seed: split_frontmatter splits on the FIRST closing fence only; a second `---` line in the body is inert -> Decision(True) if otherwise in-bound. (behavior of the cited existing parser.)
  - {id: fb12, kind: domain-outcome, form: test, discharged_by: test_report_md_disposition_benign_commits,
     binds: ["decide_write", "disposition.domain.distinguished[benign]"]}
     # GATE-MINTED (R4 obligation, phase-D gate leaf — no prior consensus demand pinned this member). discharges D1. seed: an otherwise-valid, in-bound report.md with `disposition: benign` -> Decision(True). Positive control alongside fb13/fb14; complements fb5 (absent)/fb6 (outside-enum), which pin only the INVALID members.
  - {id: fb13, kind: domain-outcome, form: test, discharged_by: test_report_md_disposition_inconclusive_commits,
     binds: ["decide_write", "disposition.domain.distinguished[inconclusive]"]}
     # GATE-MINTED. discharges D1. seed: an otherwise-valid, in-bound report.md with `disposition: inconclusive` -> Decision(True).
  - {id: fb14, kind: domain-outcome, form: test, discharged_by: test_report_md_disposition_malicious_commits,
     binds: ["decide_write", "disposition.domain.distinguished[malicious]"]}
     # GATE-MINTED. discharges D1. seed: an otherwise-valid, in-bound report.md with `disposition: malicious` -> Decision(True).

  # --- section C: size boundary, non-basis (2; the 3rd, alias amplification, moved to Fork 12) ---
  - {id: sz1, kind: domain-outcome, form: test, discharged_by: test_report_frontmatter_valid_but_over_size_bound,
     binds: ["decide_write", "report_frontmatter_size.domain.distinguished[over-bound]"]}
     # discharges D2. seed: size bound independent of D1 validity — a structurally/enum-valid report over the 512 B frontmatter bound -> Decision(False, reason).
  - {id: sz2, kind: domain-outcome, form: test, discharged_by: test_report_frontmatter_and_body_both_over_bound_simultaneously,
     binds: ["decide_write", "report_frontmatter_size.domain.distinguished[over-bound]", "report_body_size.domain.distinguished[over-bound]"]}
     # discharges D2. seed: at least one bound violated -> Decision(False, reason), regardless of ordering. (which violation wins the one-reason slot is unaddressed but does not change accept/deny.)

  # --- section D: adversarial payload / carrier-capacity (6) — the R6 sink walk ---
  - {id: cc1, kind: behavior, form: test, discharged_by: test_report_body_encodes_high_entropy_payload_within_bound,
     binds: ["decide_write", "report_body_size.domain", "interacts(judge->judge_llm).payload"]}
     # discharges D2 (+B1/B2). seed: in-bound + disposition-valid high-entropy body -> Decision(True); guard is a volume+structure control, not a content oracle (acknowledged residual).
  - {id: cc2, kind: behavior, form: test, discharged_by: test_report_frontmatter_extraneous_key_rides_to_judge_verbatim,
     binds: ["decide_write", "report_md", "interacts(judge->judge_llm).payload"]}
     # discharges D1b. seed: an extraneous frontmatter key rides verbatim to the judge -> Decision(True); only disposition is required.
  - {id: cc3, kind: behavior, form: test, discharged_by: test_report_confidence_field_carries_unvalidated_payload_to_html_render,
     binds: ["decide_write", "report_md", "interacts(renderer->report_md)"]}
     # discharges D1b. seed: a confidence field carries an unvalidated payload to the HTML render unmodified -> Decision(True); confidence is untyped/unenforced.
  - {id: cc4, kind: behavior, form: test, discharged_by: test_report_body_within_bound_reaches_ticket_http_egress,
     binds: ["decide_write", "report_body_size.domain", "interacts(ticket_bridge->ticket_post).payload"]}
     # discharges D2. seed: an in-bound body reaches the ticket bridge reason field verbatim over HTTP -> Decision(True); capped only in volume by D2 (flag-f).
  - {id: cc5, kind: behavior, form: test, discharged_by: test_combined_report_and_investigation_bytes_reaching_judge_uncapped,
     binds: ["decide_write", "report_body_size.domain", "investigation_size.domain", "interacts(judge->judge_llm).payload"]}
     # discharges D2+D3 (independence, R-c). seed: each artifact independently gated; NO combined/summed cross-artifact ceiling -> Decision(True) each.
  - {id: cc6, kind: behavior, form: test, discharged_by: test_investigation_body_encodes_payload_surviving_invlang_and_size_bound,
     binds: ["decide_write", "investigation_size.domain", "invlang_validation"]}
     # discharges D3 (+B1/B2). seed: invlang-structural + D3-in-bound investigation carrying an encoded payload -> Decision(True); guard does not inspect invlang-legal fields (acknowledged residual).
  - {id: cc7, kind: negative, form: test, discharged_by: test_report_body_containing_closing_report_sequence_denied,
     binds: ["decide_write", "report_md", "interacts(judge->judge_llm).payload"]}
     # GATE-MINTED (R6 trust-walk obligation, phase-D gate leaf) — RESOLVED by §7 (70-resolutions.md,
     # cc7) to DENY at the write guard (the gate leaf's original seed proposed an acknowledged
     # residual/Decision(True); §7 reversed that horn — the branch fail-closes on the sequence).
     # seed: an in-bound, disposition-valid report body containing the literal `</report>` delimiter
     # sequence is DENIED (Decision(False, reason)), fail-closed alongside the size bounds —
     # judge/run.py's `_section("report", ...)` (learning/pipeline/_prompt.py:13) splices the body
     # raw into a `<report>...</report>` block with NO tag-delimiter escaping, so an unescaped
     # `</report>` can close the tag early and forge an adjacent judge-prompt section. kind:negative,
     # so the POSITIVE CONTROL (same address) is a body with an opening `<report>`-like token but no
     # closing delimiter, and a plain-prose body — both COMMIT (the gate denies the delimiter
     # sequence, not `<`/`>` generally). The judge-payload surface it binds is the one the content
     # could reach; the deny closes it at the write boundary.

  # --- section E: write mode & report revision (5) ---
  - {id: wm1, kind: domain-outcome, form: test, discharged_by: test_report_over_bound_via_write_file,
     binds: ["decide_write", "report_body_size.domain.distinguished[over-bound]", "interacts(write_file->report_md)"]}
     # discharges D2/D6. seed: an over-bound report.md via write_file -> Decision(False, reason). NOTE (phase-F): cross-directory discharged_by, see D4's note.
  - {id: wm2, kind: behavior, form: test, discharged_by: test_report_over_bound_via_edit_file,
     binds: ["decide_write", "report_body_size.domain.distinguished[over-bound]", "interacts(edit_file->report_md)"]}
     # discharges D2/D6. seed: an over-bound report.md via edit_file -> Decision(False, reason); same checks as write_file, over the full resulting text. NOTE (phase-F): cross-directory discharged_by, see D4's note.
  - {id: wm3, kind: behavior, form: test, discharged_by: test_report_edit_leaves_preexisting_malformed_frontmatter_untouched_by_the_edit,
     binds: ["decide_write", "report_frontmatter.domain", "interacts(edit_file->report_md)"]}
     # discharges D1/D2. seed: edit_file hands the FULL resulting document; a still-malformed untouched frontmatter is re-validated and fails -> Decision(False, reason). NOTE (phase-F): cross-directory discharged_by, see D4's note.
  - {id: wm4, kind: behavior, form: test, discharged_by: test_edit_file_turns_a_committed_valid_report_into_a_malformed_one,
     binds: ["decide_write", "report_frontmatter.domain", "interacts(edit_file->report_md)"]}
     # discharges D1/D2. seed: prior validity confers no exemption; an edit that introduces a fault fails the same demand a first write would -> Decision(False, reason). NOTE (phase-F): cross-directory discharged_by, see D4's note.
  - {id: wm5, kind: behavior, form: test, discharged_by: test_identical_content_rewrite_of_already_valid_report,
     binds: ["decide_write", "report_md", "interacts(write_file->report_md)"]}
     # discharges D1/D2. seed: no memoization; a byte-identical rewrite of an already-valid report is evaluated fresh -> Decision(True) again. NOTE (phase-F): cross-directory discharged_by, see D4's note.

  # --- section F: investigation.md interaction of checks (3) ---
  - {id: ii1, kind: behavior, form: test, discharged_by: test_report_disposition_precedes_supporting_investigation_content,
     binds: ["decide_write", "report_md", "investigation_md"]}
     # discharges D1/D2 vs D3 independence. seed: a valid in-bound report.md is Decision(True) reachable with zero investigation.md content on disk.
  - {id: ii2, kind: behavior, form: test, discharged_by: test_investigation_write_after_report_already_committed,
     binds: ["decide_write", "investigation_md", "interacts(write_file->investigation_md)"]}
     # discharges D3 (independence). seed: investigation.md's write is judged purely on its own merits; report.md's committed state has no bearing.
  - {id: ii3, kind: behavior, form: test, discharged_by: test_denied_write_preserves_prior_disk_content,
     binds: ["decide_write", "interacts(write_file->report_md)", "interacts(edit_file->report_md)"]}
     # discharges D4. seed: Decision computed/returned strictly before p.write_text() in both callers; on denial, prior on-disk content (or absence) is byte-for-byte unchanged. (P4 open: code-level no-other-write-path.) NOTE (phase-F): cross-directory discharged_by, see D4's note.

  # --- section G: lifecycle / state (6; lc6 == D5's concrete golden test) ---
  - {id: lc1, kind: behavior, form: test, discharged_by: test_investigation_crosses_bound_mid_run,
     binds: ["decide_write", "investigation_size.domain.distinguished[over-bound]", "interacts(write_file->investigation_md)"]}
     # discharges D3/D4. seed: at turn K only that call's full resulting text is evaluated; if over bound, Decision(False, reason) for that call only; K-1 prior turns untouched. NOTE (phase-F): cross-directory discharged_by, see D4's note.
  - {id: lc2, kind: behavior, form: test, discharged_by: test_edit_file_splice_pushes_investigation_over_bound,
     binds: ["decide_write", "investigation_size.domain.distinguished[over-bound]", "interacts(edit_file->investigation_md)"]}
     # discharges D3. seed: an edit_file splice pushing investigation over 65,536 B -> Decision(False, reason); gate sees the post-splice WHOLE text, not the delta. NOTE (phase-F): cross-directory discharged_by, see D4's note.
  - {id: lc3, kind: behavior, form: test, discharged_by: test_edit_file_splice_pulls_investigation_under_bound,
     binds: ["decide_write", "investigation_size.domain.distinguished[at-bound]", "interacts(edit_file->investigation_md)"]}
     # discharges D3. seed: a shrinking splice landing <=65,536 B is accepted regardless of the stale over-bound baseline -> Decision(True) (assuming invlang also passes). NOTE (phase-F): cross-directory discharged_by, see D4's note.
  - {id: lc4, kind: behavior, form: test, discharged_by: test_investigation_reaches_bound_single_shot_vs_incremental,
     binds: ["decide_write", "investigation_size.domain", "interacts(write_file->investigation_md)", "interacts(edit_file->investigation_md)"]}
     # discharges D3. seed: single-shot and incremental paths reaching the same final text produce the identical Decision; write history is not observable to decide_write. (P3 open: code-level property.)
  - {id: lc5, kind: behavior, form: test, discharged_by: test_report_committed_before_investigation_finished,
     binds: ["decide_write", "report_md", "investigation_md"]}
     # discharges D1/D2 vs D3 independence. seed: report.md is acceptable while investigation.md is mid-lifecycle; no ordering requirement between the two gates.
  - {id: lc6, kind: survival, form: test, discharged_by: test_golden_ab_run_lifecycle_preserves_disposition,
     binds: ["decide_write", "report_md", "investigation_md", "interacts(renderer->report_md)"]}
     # discharges D5 (concrete). seed: every write in a legit golden sequence returns Decision(True); the run commits with the SAME disposition as baseline; the HTML still renders the analyst's reasoning. NOTE (phase-F): cross-directory discharged_by, see D4's note.

  # --- section H: adversarial probing / retry-budget (1) ---
  - {id: ap1, kind: behavior, form: test, discharged_by: test_repeated_boundary_probing_denies_across_retry_budget,
     binds: ["decide_write", "interacts(write_file->report_md)"]}
     # discharges D4. seed: each write evaluated independently; denied calls each return their own Decision(False, reason); nothing caps the NUMBER of denied attempts — stateless per call by design.

  # --- section I: author cross-cutting: consumer tolerance (1) ---
  - {id: ct1, kind: survival, form: test, discharged_by: test_absent_report_still_reaches_the_tolerant_consumer_fallbacks,
     binds: ["decide_write", "report_md", "interacts(learning_validate->report_md)", "interacts(evals->report_md)"]}
     # discharges Scope (R-c). seed: no decide_write call for a file never written; tolerant fallbacks (parse_report {}/body-only, held_out None, trace_lesson '?') and hard-raising consumers (normalize_disposition, ticket bridge) are all unchanged by #629.

  # --- section J: §7-RESOLVED forks (phase-E author-minted; each pins one 70-resolutions horn
  # that was an `unknown` invariant / gate.hole at phase D — now a real demand with a test) ---
  - {id: ak1, kind: negative, form: test, discharged_by: test_report_case_variant_not_gated,
     binds: ["decide_write", "artifact_key.domain.distinguished[case-variant]", "report_md"]}
     # §7 Fork 6a -> EXACT-MATCH name. seed: a case/whitespace-variant filename ("Report.md","REPORT.MD") is NOT the exact basename report.md -> misses the branch, malformed content commits unguarded (inert per C3). positive control: exact-cased report.md with the same content denies.
  - {id: ak2, kind: negative, form: test, discharged_by: test_report_md_in_subdir_not_gated,
     binds: ["decide_write", "artifact_key.domain.distinguished[subdir]", "report_md"]}
     # §7 Fork 6b -> RUN-DIR ROOT only. seed: `<run_dir>/sub/report.md` resolves to a non-root path -> branch does not fire -> over-bound content commits. positive control: root report.md over-bound denies.
  - {id: ak3, kind: negative, form: test, discharged_by: test_symlink_operand_resolves_before_keying,
     binds: ["decide_write", "artifact_key.domain.distinguished[symlink]", "report_md"]}
     # §7 Fork 6c -> RESOLVE SYMLINKS. seed: the branch keys on the RESOLVED path — a `decoy.md` symlinked to `<run_dir>/report.md` resolves in and IS gated (over-bound -> deny), while a `report.md` symlinked ELSEWHERE resolves away and is NOT gated. Closes the disguise bypass.
  - {id: ak4, kind: negative, form: test, discharged_by: test_forward_check_lesson_named_report_md_not_gated,
     binds: ["decide_write", "verify_forward", "artifact_key.domain.distinguished[report.md]"]}
     # §7 F-A2 -> run-dir-membership keying. seed: a verify_forward lesson operand literally named report.md, in the curator's OWN corpus (not `<run_dir>/report.md`), proposed_text="" -> NOT routed into the report branch (Decision(True)) -> the allow->deny regression is closed. positive control: an empty write to the actual `<run_dir>/report.md` DOES enter the branch and denies.
  # ak5-ak7: the investigation.md half of the SAME §7 F-A2/Fork 6 keying rule (stated over BOTH
  # artifacts verbatim). Mirror ak1/ak2/ak3 so the branch cannot be left keyed name-only for
  # investigation.md (files.py:269) — which would re-open the symlink-disguise size bypass ak3 closes.
  - {id: ak5, kind: negative, form: test, discharged_by: test_investigation_case_variant_not_gated,
     binds: ["decide_write", "artifact_key.domain.distinguished[case-variant]", "investigation_md"]}
     # §7 Fork 6a -> EXACT-MATCH name (investigation half). seed: a case/whitespace-variant filename ("Investigation.md","INVESTIGATION.MD") is NOT the exact basename investigation.md -> misses the branch, over-bound content commits unguarded (inert per C3). positive control: exact-cased investigation.md with the same over-bound content denies.
  - {id: ak6, kind: negative, form: test, discharged_by: test_investigation_md_in_subdir_not_gated,
     binds: ["decide_write", "artifact_key.domain.distinguished[subdir]", "investigation_md"]}
     # §7 Fork 6b -> RUN-DIR ROOT only (investigation half). seed: `<run_dir>/sub/investigation.md` resolves to a non-root path -> branch does not fire -> over-bound content commits. positive control: root investigation.md over-bound denies.
  - {id: ak7, kind: negative, form: test, discharged_by: test_investigation_symlink_operand_resolves_before_keying,
     binds: ["decide_write", "artifact_key.domain.distinguished[symlink]", "investigation_md"]}
     # §7 Fork 6c -> RESOLVE SYMLINKS (investigation half, THE critical leg). seed: the branch keys on the RESOLVED path — a `decoy2.md` symlinked to `<run_dir>/investigation.md` resolves in and IS gated (over-bound -> deny), while an `investigation.md` symlinked ELSEWHERE resolves away and is NOT gated. Closes the disguise size-bypass for investigation.md exactly as ak3 does for report.md; FAILS if the branch is left name-only.
  - {id: dn1, kind: negative, form: test, discharged_by: test_report_disposition_case_variant_denied,
     binds: ["decide_write", "disposition.domain.distinguished[outside-enum]", "report_md"]}
     # §7 Fork 7a -> EXACT-LOWERCASE. seed: "Benign"/"MALICIOUS" is not an exact-lowercase member -> deny; no case-folding. positive control: the exact-lowercase value commits.
  - {id: dn2, kind: negative, form: test, discharged_by: test_report_disposition_surrounding_whitespace_denied,
     binds: ["decide_write", "disposition.domain.distinguished[outside-enum]", "report_md"]}
     # §7 Fork 7b -> no trim. seed: a YAML-quoted `" benign "` (spaces surviving the parse) is not an exact member -> deny. positive control: the untrimmed exact value commits.
  - {id: dn3, kind: negative, form: test, discharged_by: test_report_disposition_non_string_denied,
     binds: ["decide_write", "disposition.domain.distinguished[outside-enum]", "report_md"]}
     # §7 Fork 7c -> not-in-enum. seed: a non-string value (null/int/list/mapping) is treated as not-in-enum and denies CLEANLY — a returned Decision(False), never a `value in ENUM` TypeError escaping (the unhashable-list case). positive control: a string member commits.
  - {id: dn4, kind: negative, form: test, discharged_by: test_report_disposition_duplicate_key_denied,
     binds: ["decide_write", "disposition.domain.distinguished[outside-enum]", "report_md"]}
     # §7 Fork 7d -> not-in-enum. seed: a duplicated `disposition:` key denies even when a last-value-wins parse resolves to a VALID member (both benign) — the gate cannot lean on PyYAML's silent last-key-wins. positive control: a single key commits.
  - {id: fk11, kind: negative, form: test, discharged_by: test_report_disposition_nested_not_found_denied,
     binds: ["decide_write", "report_frontmatter.domain.distinguished[non-mapping]", "disposition.domain.distinguished[absent]"]}
     # §7 Fork 11 -> TOP-LEVEL key lookup. seed: `disposition` nested inside a sibling collection is "missing" under a top-level lookup -> deny. positive control: the same value as a top-level key commits.
  - {id: fa1, kind: negative, form: test, discharged_by: test_report_body_bound_measures_whole_file,
     binds: ["decide_write", "report_body_size.domain.distinguished[over-bound]", "interacts(judge->judge_llm).payload", "interacts(ticket_bridge->ticket_post).payload"]}
     # §7 F-A1 -> WHOLE ON-DISK FILE. seed: the body bound measures the whole file (`len(proposed_text.encode())`), not the post-.strip() body — a tiny stripped body padded with kilobytes of whitespace OUTSIDE the span pushes the whole file over 8,192 B and DENIES, closing the whitespace carrier into the judge/ticket egresses. positive control: the same tiny stripped body without padding commits.
  - {id: fa3, kind: behavior, form: test, discharged_by: test_investigation_over_bound_and_invlang_invalid_single_feedback,
     binds: ["decide_write", "investigation_size.domain.distinguished[over-bound]", "invlang_validation"]}
     # §7 F-A3 -> SIZE-FIRST short-circuit. seed: an investigation.md that is BOTH over 65,536 B AND invlang-invalid yields exactly one Decision(False) whose reason names the SIZE failure — validate_companion never runs on the oversize doc (the invlang signature string is ABSENT from the reason). positive control: a small invlang-invalid doc denies WITH the invlang reason (the invlang branch is still reachable).
  - {id: fork9, kind: behavior, form: test, discharged_by: test_investigation_empty_or_whitespace_commits,
     binds: ["decide_write", "investigation_size.domain", "invlang_validation"]}
     # §7 Fork 9 (re-ground, settled) -> ACCEPTS. seed: empty/whitespace-only investigation.md ACCEPTS — 0 bytes <= bound and validate_companion('' / whitespace, None) == [] (probed) -> Decision(True). positive control: an over-bound investigation denies.
  - {id: fork10, kind: negative, form: test, discharged_by: test_report_body_zero_width_and_combining_mark_density,
     binds: ["decide_write", "report_body_size.domain.distinguished[over-bound]", "report_md"]}
     # §7 Fork 10 (rides F1, residual-risk doc) -> byte basis. seed: a zero-width/combining-mark-dense body UNDER the 8,192 B byte bound commits (density is a residual the volume-only guard does not close); the same density pushed OVER the byte bound denies. Collapses onto F1's byte basis.
  - {id: fork12, kind: behavior, form: test, discharged_by: test_report_frontmatter_yaml_alias_amplification_under_byte_bound,
     binds: ["decide_write", "report_frontmatter_size.domain", "report_md"]}
     # §7 Fork 12 (rides F2 -> RAW span) -> Decision(True). seed: frontmatter using YAML anchors/aliases whose RAW between-fence text is <= 512 B commits, even though the re-serialized parsed mapping expands past 512 B — F2 measures the RAW span, so alias expansion is invisible. The fixture re-probes that the two spans genuinely diverge, so the rejected re-serialized-span horn would deny it and the test would catch it.

# ===========================================================================
# STRUCTURE — the address space
# ===========================================================================
structure:
  axes: [run_dir]      # the identity key for both sinks; the only axis writers interpolate

  actors:
    - {id: decide_write,       frame: leg,         provenance: code}   # MODIFY: the gate (files.py:213); gains the report.md branch + investigation size facet
    - {id: write_file,         frame: leg,         provenance: code}   # _tool_write_file (tools.py:437)
    - {id: edit_file,          frame: leg,         provenance: code}   # _tool_edit_file (tools.py:497)
    - {id: run_investigation,  frame: composition, provenance: code}   # MAIN loop — fans write_file/edit_file over many turns (R2 composition frame)
    - {id: verify_forward,     frame: leg,         provenance: code}   # third caller, _gate_lesson_path (tool.py:138), proposed_text="" — the F-A2 seam
    - {id: judge,              frame: composition, provenance: code}   # inlines report.md VERBATIM into the judge LLM (flag-e); investigation DERIVED
    - {id: ticket_bridge,      frame: leg,         provenance: code}   # reason=body -> POST /tickets (flag-f)
    - {id: renderer,           frame: leg,         provenance: code}   # visualize -> transcript/runtime HTML (flag-g)
    - {id: learning_validate,  frame: leg,         provenance: code}   # normalize_disposition — HARD raise on bad disposition (validate.py:43)
    - {id: evals,              frame: leg,         provenance: code}   # held_out/secondary — SOFT disposition read

  boundaries:
    # --- the two write sinks (grounded; the report.md gate contract is new) ---
    - id: report_md
      provenance: code                                  # the file pre-exists (census-2/3); its GATE is new (design demands)
      facets:
        identity:
          key_axes: [run_dir]
          evidence: {nl: "RunPaths(run_dir).report = run_dir/report.md (_run_paths.py:36); one fixed file per run dir, no interpolation axis beyond run_dir; write_file/edit_file both write the whole resulting text (overwrite)."}
          sharing: unique-key
    - id: investigation_md
      provenance: code                                  # pre-exists; its branch gains a size facet (MODIFY)
      facets:
        identity:
          key_axes: [run_dir]
          evidence: {nl: "RunPaths(run_dir).investigation = run_dir/investigation.md (_run_paths.py:40); one fixed file per run dir."}
          sharing: unique-key

    # --- the branch-keying predicate (ADD) — routes Fork 6 (path-keying) + F-A2 ---
    - id: artifact_key
      provenance: design
      facets:
        domain:
          type: enum
          refinement: {nl: "which write operand enters the new report.md/investigation.md branch. RESOLVED §7 (F-A2/Fork 6): the branch fires only when the operand's RESOLVED path is exactly `<run_dir>/report.md` or `<run_dir>/investigation.md` — exact basename (no case-folding), run-dir ROOT membership, symlinks resolved. A case-variant / subdir / symlink-elsewhere / verify_forward lesson operand is NOT gated (falls through to Decision(True))."}
          default: unguarded-fallthrough                # a non-matching name falls through to Decision(True)
          distinguished: [report.md, investigation.md, near-miss, arbitrary, case-variant, subdir, symlink]
          falsy_valid: false
          documented_alternatives:
            - {value: name-only-key, crosses_validation: false}                 # RESOLVED §7: REJECTED (F-A2 regression); ak1/ak2/ak4
            - {value: name-plus-run_dir-membership, crosses_validation: true}    # RESOLVED §7: ADOPTED (F-A2); ak2/ak4
            - {value: resolved-path-basename, crosses_validation: true}          # RESOLVED §7: ADOPTED (Fork 6c symlink); ak3

    # --- disposition enum (ADD) — routes Fork 7 (normalization) ---
    - id: disposition
      provenance: design
      facets:
        domain:
          type: enum
          refinement: {nl: "DISPOSITION_ENUM = {benign,inconclusive,malicious} (config.py:308); present-and-in-enum is the ONLY enforced frontmatter key. RESOLVED §7 (Fork 7): compared EXACT-LOWERCASE, no normalization; a case-variant / surrounding-whitespace / non-string / duplicate-key value is treated as not-in-enum -> clean Decision(False, reason) (never a `value in ENUM` TypeError escaping)."}
          default: deny-if-absent-or-not-exact-lowercase   # RESOLVED §7: presence + exact-lowercase membership required; anything else denies
          distinguished: [benign, inconclusive, malicious, absent, outside-enum]
          falsy_valid: false
          documented_alternatives:
            - {value: exact-lowercase-match, crosses_validation: true}           # RESOLVED §7: ADOPTED (Fork 7); dn1/fb6
            - {value: case-or-whitespace-normalized, crosses_validation: false}   # RESOLVED §7: REJECTED (Fork 7a/7b); dn1/dn2
            - {value: non-string-value-handling, crosses_validation: true}        # RESOLVED §7: not-in-enum -> clean deny (Fork 7c); dn3
            - {value: duplicate-key-resolution, crosses_validation: true}         # RESOLVED §7: not-in-enum -> deny (Fork 7d); dn4

    # --- frontmatter structural validity (ADD) — routes Fork 11 (nested lookup) ---
    - id: report_frontmatter
      provenance: design
      facets:
        domain:
          type: enum
          refinement: {nl: "split_frontmatter (_frontmatter.py:25-55) must succeed (leading fence, closing fence, valid YAML, a mapping); the distinguished members are its failure modes plus the two benign in-body cases. RESOLVED §7 (Fork 11): `disposition` presence is a TOP-LEVEL key lookup — a nested value (inside a sibling collection) is 'missing' -> Decision(False)."}
          default: valid-mapping
          distinguished: [no-leading-fence, no-closing-fence, invalid-yaml, non-mapping, empty-text, whitespace-only, second-fence-in-body, valid-mapping]
          falsy_valid: false
          documented_alternatives:
            - {value: top-level-disposition-lookup, crosses_validation: true}       # RESOLVED §7: ADOPTED (Fork 11); fk11
            - {value: nested-disposition-traversal, crosses_validation: false}      # RESOLVED §7: REJECTED (Fork 11); fk11

    # --- report frontmatter size (ADD) — routes F1 (basis) + F2 (span) + Fork 12 (alias) ---
    - id: report_frontmatter_size
      provenance: design
      facets:
        domain:
          type: int
          refinement: {nl: "frontmatter <= 512 B. RESOLVED §7 (F1+F2): measured as UTF-8 BYTES of the RAW between-fence text (split_frontmatter's `raw`) — not codepoints, not the full fenced block, not the re-serialized mapping. Fork 12's alias-amplification carrier rides the (rejected) re-serialized span, so a raw-basis measure leaves alias expansion invisible (fork12 -> Decision(True))."}
          default: 512
          distinguished: [at-bound, over-bound]
          falsy_valid: false
          documented_alternatives:
            - {value: utf-8-bytes-of-raw-between-fences, crosses_validation: true}    # RESOLVED §7: ADOPTED (F1+F2); sz1/fork12
            - {value: len-codepoints-of-raw, crosses_validation: false}              # RESOLVED §7: REJECTED (F1)
            - {value: full-fenced-block-span, crosses_validation: false}             # RESOLVED §7: REJECTED (F2)
            - {value: re-serialized-mapping-span, crosses_validation: false}         # RESOLVED §7: REJECTED (F2/Fork 12 alias bomb)

    # --- report body size (ADD) — routes F1 (basis) + F-A1 (stripped-body vs whole-file carrier) ---
    - id: report_body_size
      provenance: design
      facets:
        domain:
          type: int
          refinement: {nl: "body <= 8,192 B. RESOLVED §7 (F1+F-A1): measured as UTF-8 BYTES of the WHOLE on-disk file (`len(proposed_text.encode())`) — the full file the judge/ticket egresses ingest — NOT the post-.strip() body. Closes the whitespace-padding carrier F-A1 named (a stripped-body-only bound left an unbounded channel into two live egresses). Also gates the literal `</report>` delimiter sequence (cc7, a content deny, not a size one)."}
          default: 8192
          distinguished: [at-bound, over-bound, empty-body]
          falsy_valid: true                             # an empty body is valid (fb10 -> Decision(True))
          documented_alternatives:
            - {value: stripped-body-len-codepoints, crosses_validation: false}       # RESOLVED §7: REJECTED (F1/F-A1 doc-literal)
            - {value: stripped-body-utf-8-bytes, crosses_validation: false}          # RESOLVED §7: REJECTED (F-A1 chose whole-file)
            - {value: whole-file-read_text-carrier, crosses_validation: true}        # RESOLVED §7: ADOPTED (F-A1, whole-file bytes); fa1/D2

    # --- investigation size (MODIFY: new facet on the existing branch) — routes F1 ---
    - id: investigation_size
      provenance: design
      facets:
        domain:
          type: int
          refinement: {nl: "resulting total <= 65,536 B, exactly len(proposed_text) — no append arithmetic (both write paths hand the full resulting doc, flag-c). RESOLVED §7 (F1): measured as UTF-8 BYTES. The size check runs FIRST (F-A3, size-first short-circuit) before validate_companion, so a both-over-and-invalid write's single reason names the SIZE failure. Fork 9 re-ground SETTLED: empty/whitespace-only text ACCEPTS (0 B <= bound; validate_companion('' / whitespace, None) == [], probed validate.py:552-586)."}
          default: 65536
          distinguished: [at-bound, over-bound]
          falsy_valid: true                             # RESOLVED §7 (Fork 9): 0 bytes is under the bound AND invlang returns [] for empty/whitespace -> empty COMMITS (fork9)
          documented_alternatives:
            - {value: len-proposed_text-codepoints, crosses_validation: false}       # RESOLVED §7: REJECTED (F1)
            - {value: utf-8-bytes, crosses_validation: true}                         # RESOLVED §7: ADOPTED (F1); D3/fa3/fork9

    # --- existing investigation invlang validation (unchanged; F-A3 ordering rides here) ---
    - id: invlang_validation
      provenance: code
      facets: {}                                        # validate_companion (files.py:269-286); F-A3 RESOLVED §7: SIZE-FIRST short-circuit (the size check runs before validate_companion; fa3)

    # --- R6 rendered/parsed sinks the report body reaches (grounded neighborhood) ---
    - id: judge_llm
      provenance: code
      facets:
        payload:
          parts:
            - {role: system, source: "const:JUDGE_PROMPT"}
            - {role: user,   source: "template:judge_run", slots: {report: report_md, investigation: investigation_md}}
          invariants: [roles-disjoint-sources, all-slots-bound]
          nl: "the judge user turn inlines report.md VERBATIM (the disposition claim being scored, judge/run.py:132) and the parsed investigation synthesis; #629's size bound is the ONLY thing between MAIN-authored content and this LLM sink — chooser = MAIN model, sanitizer = volume-only (the guard is not a content oracle, B1/B2)."
    - id: ticket_post
      provenance: code
      facets:
        payload:
          parts:
            - {role: user, source: "template:case_ticket", slots: {reason: report_md}}
          invariants: [all-slots-bound]
          nl: "reason = report body verbatim -> POST /tickets (case_ticket.py:183, flag-f); the D2 body bound caps this HTTP egress in volume only — chooser = MAIN model, sanitizer = volume-only."

    # --- facetless grounded targets (no contract -> quiet) ---
    - {id: run_dir_other, provenance: design, facets: {}}   # the arbitrary/near-miss run-dir file that misses the key (pa2/pa3 negative controls)
    - {id: report_html,   provenance: code,   facets: {}}   # renderer output (D5/cc3 render target)

  interacts:
    # writers -> sinks (grounded; MAIN already writes both files, census-2)
    - {from: write_file, to: report_md,        mode: write, via: fs, provenance: code, interpolates: [run_dir]}
    - {from: edit_file,  to: report_md,        mode: write, via: fs, provenance: code, interpolates: [run_dir]}
    - {from: write_file, to: investigation_md, mode: write, via: fs, provenance: code, interpolates: [run_dir]}
    - {from: edit_file,  to: investigation_md, mode: write, via: fs, provenance: code, interpolates: [run_dir]}
    - {from: write_file, to: run_dir_other,    mode: write, via: fs, provenance: code, interpolates: [run_dir]}   # pa3 arbitrary-name fall-through

    # the gate reads the per-artifact contracts (the report.md branch = ADD/design; investigation_size = MODIFY/design)
    - {from: decide_write, to: artifact_key,            mode: read, via: api, provenance: design}
    - {from: decide_write, to: report_md,               mode: read, via: fs,  provenance: design}   # inspects proposed_text/name
    - {from: decide_write, to: investigation_md,        mode: read, via: fs,  provenance: design}
    - {from: decide_write, to: disposition,             mode: read, via: api, provenance: design}
    - {from: decide_write, to: report_frontmatter,      mode: read, via: api, provenance: design}
    - {from: decide_write, to: report_frontmatter_size, mode: read, via: api, provenance: design}
    - {from: decide_write, to: report_body_size,        mode: read, via: api, provenance: design}
    - {from: decide_write, to: investigation_size,      mode: read, via: api, provenance: design}   # MODIFY facet
    - {from: decide_write, to: invlang_validation,      mode: read, via: api, provenance: code}     # existing invlang call, unchanged

    # R6 sinks — report body reaches the judge LLM and the ticket HTTP egress
    - {from: judge,         to: report_md,        mode: read,   via: fs,   provenance: code}
    - {from: judge,         to: investigation_md, mode: read,   via: fs,   provenance: code}
    - {from: judge,         to: judge_llm,        mode: invoke, via: api,  provenance: code, sends: payload, transport: llm}
    - {from: ticket_bridge, to: report_md,        mode: read,   via: fs,   provenance: code}
    - {from: ticket_bridge, to: ticket_post,      mode: invoke, via: http, provenance: code, sends: payload, transport: http}

    # other grounded consumers (all fixed-path, census-3/4/5)
    - {from: renderer,          to: report_md,   mode: read,  via: fs, provenance: code}
    - {from: renderer,          to: report_html, mode: write, via: fs, provenance: code, interpolates: [run_dir]}
    - {from: learning_validate, to: report_md,   mode: read,  via: fs, provenance: code}
    - {from: evals,             to: report_md,   mode: read,  via: fs, provenance: code}

  drives:
    - {from: run_investigation, to: write_file,   provenance: code, multiplicity: serial}   # MAIN fans write over turns
    - {from: run_investigation, to: edit_file,    provenance: code, multiplicity: serial}
    - {from: write_file,        to: decide_write, provenance: code, multiplicity: serial}
    - {from: edit_file,         to: decide_write, provenance: code, multiplicity: serial}
    - {from: verify_forward,    to: decide_write, provenance: code, multiplicity: serial}   # third caller, proposed_text="" (F-A2)

# ===========================================================================
# CLAIMS — every load-bearing statement about existing reality, probed not asserted.
# Inherited (C1-C7) keep their design-doc ids; C8-C10 raised in 20-demands;
# census-1..6 the phase-A brief's census probes; P3/P4/fork9/P6 the open probes.
# ===========================================================================
claims:
  # --- inherited from the design doc (via 20-demands.md), re-confirmed at this base ---
  - {id: C1, kind: behavior, claim: "decide_write does filename-keyed per-artifact validation; report.md alone falls through to Decision(True) at files.py:287.",
     probe: "PYTHONPATH=. .venv/bin/python -c: permission.decide_write(run_dir/'report.md', 'no fence at all\\n', run_dir=run_dir, defender_dir=dfn_dir, policy=pol) against HEAD (07596adf)", probe_kind: executed, observed: "Decision(allow=True, reason='') for a malformed (no-fence) report.md at HEAD — confirmed the fall-through by execution, not just by reading files.py:213-287", verdict: holds}
  - {id: C2, kind: census, claim: "both write paths gate the full resulting text as proposed_text; no append mode.",
     probe: "read tools.py:437-452 (write_file->content) and :496-507 (edit_file->new_text=current.replace(old,new,1)); pyrefly-refs decide_write", probe_kind: search, observed: "write_file passes content, edit_file passes new_text (full resulting doc); both then p.write_text; no append arithmetic", verdict: holds}
  - {id: C3, kind: census, claim: "the judge and every other consumer open fixed RunPaths paths; nothing globs the run dir to discover artifacts.",
     probe: "grep glob|iterdir|rglob|listdir over learning/scripts/evals/run_common/runtime (non-test); read each hit", probe_kind: search, observed: "no site enumerates a single run dir for artifacts; the two run_dir.iterdir sites print names only (census-5)", verdict: holds}
  - {id: C4, kind: census, claim: "one canonical frontmatter parser, key-agnostic; disposition enum enforced by consumers, case_id/confidence by none.",
     probe: "grep DISPOSITION_ENUM (non-test); read validate.py:43, case_ticket.py:189/193-199, held_out.py:74", probe_kind: search, observed: "enum hard-raised at validate.py:43 + case_ticket.py:189; case_id derived from run dir; confidence untyped (census-6)", verdict: holds}
  - {id: C5, kind: census, claim: "curators read no report prose — only the closed-enum disposition; the report->judge prose hop is real, report->curator is not.",
     probe: "00-triage F16/F17 census (carried, not re-derived); census-3 judge inline @judge/run.py:132", probe_kind: search, observed: "judge inlines report.md verbatim; curators consume only disposition", verdict: holds}
  - {id: C6, kind: behavior, claim: "baseline green on main @07596adf: 113 passed, 11 skipped.",
