# ===========================================================================
# GATE (gate leaf, phase D step 6). `spec-graph gate --residue` computed 45 R4
# firings over the six domain boundaries (report_frontmatter, disposition,
# artifact_key, report_frontmatter_size, report_body_size, investigation_size);
# 19 are already answered by an existing demand's exact `binds:` (no entry
# needed below — recorded for the record in 60-residue.md's Pre-discharged
# section instead); 2 are judgment pre-discharges (not literally cell-bound,
# but an existing demand's scenario already exercises the member); 4 are
# genuine gaps minted as obligations; 23 are fork/unknown-owned design holes
# (18 of them ALSO an R0 finding — `documented_alternatives[...].crosses_validation:
# unknown` with no recorded hole — so those 18 carry two entries below, one per
# rule, over the same element). R1/R2/R3 do not fire (see evaluated notes).
# `spec-graph gate` (bare) is clean after this block — verified below.
# ===========================================================================
gate:
  evaluated:
    - {rule: R0, fired: true}
      # Formal half fired 18x (report_frontmatter/artifact_key/disposition/*_size
      # `documented_alternatives[].crosses_validation: unknown` with no recorded
      # hole) — all 18 now answered by the R0-tagged hole entries below.
      # Judgment half (bidirectional prose reconciliation) run by hand against
      # 05-design-doc.md's "Intent"/"Demands"/"Scope boundaries" sections:
      # every normative sentence binds >=1 element (D1 frontmatter grammar ->
      # report_frontmatter+disposition; D2 size bounds -> report_frontmatter_size
      # /report_body_size; D3 -> investigation_size; D4 -> D0/D4/C9's ModelRetry
      # chain; D5 -> D5/lc6 incl. the renderer edge; "gate at the write boundary
      # only... covers judge + ticket-bridge egress" -> the R6 sink walk, cc1-cc6;
      # "report.md stays a rendered frontmatter+prose file... six consumers" ->
      # census-3/ct1; "no new required frontmatter keys beyond disposition" ->
      # D1b/fb7/cc2). No extraction gap found. Reverse direction: every
      # design-provenance structure element (artifact_key, disposition,
      # report_frontmatter, report_frontmatter_size, report_body_size,
      # investigation_size) traces to one of the sentences above — no invented
      # scope. "No lead-ref/query-ref typing" (R-a) is explicitly non-observable
      # in the doc itself, correctly generating no element.
    - {rule: R1, fired: false}
      # No `sends` edge is delta-scoped: judge->judge_llm and ticket_bridge->
      # ticket_post both carry `sends: payload`, but the edges, both boundaries,
      # and both actors are `provenance: code` (the grounded neighborhood #629
      # attaches to, not the design delta) — R1's trigger requires the sending
      # edge/its endpoints to be in the delta, and none is. The report-body
      # payload reaching these pre-existing sinks is R6's walk, not R1's.
    - {rule: R2, fired: false}
      # report_md and investigation_md each have 2 writers (write_file, edit_file)
      # — R2's raw writer-count predicate is satisfied — but the boundary, both
      # writer edges, and every `drives` edge into either writer are ALL
      # `provenance: code`: #629 adds no new writer and no new drives edge to
      # either sink (it only adds a read-side CONTRACT decide_write enforces,
      # modelled as decide_write's read edges to the *_size/frontmatter/
      # disposition/artifact_key boundaries, which are not identity-faceted).
      # Not delta-scoped; R2 does not fire.
    - {rule: R3, fired: false}
      # No boundary in this graph declares an `access` facet
      # (`constraints_by_via`) — R3's trigger (>=2 vias reaching one access
      # boundary) has no candidate.
    - {rule: R4, fired: true}
      # 45 firings; routed below (obligations/holes/pre_discharged) and in
      # 60-residue.md.
    - {rule: R5, fired: false, cites: [census-1]}
      # Judgment extension considered (rules.md: "when the delta tightens a
      # constraint... rather than removing anything"). The report.md branch
      # REPLACES the unconditional `Decision(True)` fall-through (files.py:287)
      # with a validated branch — a tightening, not a formal `mode: remove`
      # edge (none exists in `structure.interacts`), so the slot-computed half
      # correctly does not fire. Judgment question: is a security-critical
      # caller left CONSTRUCTIBLE in a newly-unsafe state, or does the
      # tightening silently orphan a workflow a live in-edge depended on?
      # census-1 enumerates decide_write's COMPLETE live-caller set (3
      # production callers — write_file, edit_file, verify_forward; 57 refs,
      # 9 files) — nothing outside that set can reach the tightened branch, so
      # there is no unenumerated caller to check. Of the three: write_file/
      # edit_file are covered by D5/lc6 (legit runs still commit) and D6/wm1-5
      # (no-bypass parity, both paths gated identically) — no orphaned
      # workflow. verify_forward's own allow-><the new branch> exposure (a
      # lesson literally named report.md, proposed_text="") is a REAL
      # tightening-side-effect (F-A2) but it is already routed as a design
      # hole (artifact_key.documented_alternatives[name-plus-run_dir-
      # membership] + the modelled verify_forward->decide_write drive edge) —
      # not a silently-missed orphan. No additional safe-by-construction
      # demand is needed beyond D1-D6 + the F-A2 hole.
    - {rule: R6, fired: true}
      # The rendered-sink trust walk over judge/run.py's prompt build
      # (build_judge_invocation, ~:132-140) and case_ticket.py's ticket
      # payload (read_case_record/alert_to_open_payload, ~:183). Both sinks
      # ingest the report.md content chosen by the MAIN model (attacker/
      # model-influenced chooser); D2's size bound is the only sanitizer
      # (volume, not content) — cc1-cc6 already mint the acknowledged-residual
      # obligations (entropy/opacity, extraneous keys, confidence-field HTML
      # injection, cross-artifact volume independence). This walk's ADDITIONAL
      # finding, not previously modelled: `_section()` (learning/pipeline/
      # _prompt.py) builds the judge's `<report>...</report>` block by raw
      # string concatenation with NO escaping of `<`, `>`, or the literal
      # sequence `</report>` — the FRAME (tag name "report") is a safe
      # constant, but the PAYLOAD is spliced in unescaped. A report body
      # containing `</report>\n<coverage_manifest>FORGED...` can close the
      # tag early and forge an adjacent prompt section (e.g. counterfeiting
      # the "authoritative... ground truth for coverage" manifest the judge
      # is told to trust) — a distinct escape mechanism from cc1 (entropy/
      # opacity, doesn't test structural breakout) or cc2 (extraneous
      # frontmatter key, not a delimiter break). Minted as a new obligation
      # below. The ticket sink (case_ticket.py) is NOT similarly exposed:
      # `reason=body` lands as a plain JSON dict value (`alert_to_open_payload`
      # / `CaseRecord`), not spliced into a delimited template string — no
      # comparable frame-breakout surface there.
      # F-A1 (report_body_size.documented_alternatives[whole-file-read_text-
      # carrier]) is this walk's other live finding: judge/run.py inlines
      # `report.read_text()` — the WHOLE on-disk file, frontmatter fences
      # included — not the D2-bounded stripped body; already routed as an
      # R0+R4 design hole below (SECURITY), reiterated here as R6-critical
      # per the charge.
