# ===========================================================================
gate:
  evaluated:
    - {rule: R0, fired: true,  note: "defender_dir.domain.default = unknown (the tree is per-run, resolved from deps); recorded, not silently nulled. All other invariant fields claimed."}
    - {rule: R1, fired: true,  discharged_by: [query_returns_wrapped_truncated_view_and_payload_note, query_return_wrap_uses_the_run_salt, row_contract_frozen, failure_digest_carries_the_vendor_diagnosis],
       note: "interacts(query_tool->model_context).payload and ->executed_queries.payload are outbound payloads: shape demands minted for both."}
    - {rule: R2, fired: true,  discharged_by: [concurrent_queries_do_not_collide_on_seq, seq_collision_would_misdirect_the_judge, stage_tables_still_round_trips],
       note: "TWO writers interpolate (lead_id, seq) into gather_raw — query_tool and stage_tables — and drives(gather_dispatch->query_tool) is multiplicity: concurrent. This is the rule that computes the seq race; it fired from the graph, not from anyone's memory."}
    - {rule: R3, fired: true,  discharged_by: [gather_bash_keeps_local_computation, main_cannot_reach_a_payload_by_any_surface, query_payload_is_not_double_wrapped_on_read_back],
       note: "gather_raw is reachable via read-tool AND bash; the parity obligation is that the confine + wrap hold on every via."}
    - {rule: R4, fired: true,  discharged_by: [empty_verb_return_is_payload_status_empty, missing_config_is_infra_not_agent_fixable, hung_verb_records_infra_not_a_synthesized_timeout, empty_verbs_declaration_fails_closed_at_the_tool],
       note: "circuit_breaker.domain.distinguished = [0,1,2,64,124] — each exercised; verbs_registry.domain.distinguished[empty] exercised with a positive control."}
    - {rule: R5, fired: true,  discharged_by: [record_query_module_survives_its_cli, ticket_cli_dual_surface_survives, e2e_replay_harness_has_an_injected_verb_seam, stage_tables_still_round_trips, shim_flags_and_non_adapter_shims_are_removed_together],
       note: "REMOVALS with live consumers: parse_params/_derive_verb/main() (record_query survives for derive_system + _passthrough_max_bytes); the shims (adapter_shims() reads bin/ at call time); CAPTURE_ADAPTER* grants; the e2e harness's record_query.subprocess seam."}

