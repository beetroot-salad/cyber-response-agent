  # --- P3 / PB4: retries pinned at every construction site (replaces W1) ----
  - id: retries_pinned_at_every_agent_construction
    kind: seam
    form: test
    discharged_by: test_every_agent_construction_pins_retries_explicitly
    binds: ["DEFAULT_TOOL_RETRIES", "DEFAULT_TOOL_RETRIES.domain",
            "DEFAULT_TOOL_RETRIES.domain.alternatives[1]",
