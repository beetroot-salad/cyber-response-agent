    # R27: truncated_by's domain was pinned only at {budget, None} via the budget path.
    # The PRE-EXISTING UsageLimitExceeded (request-limit) termination must NOT set
    # truncated_by="budget" — an implementation that stamped it on every non-clean exit
    # would mislabel a request-limit run as budget-truncated and suppress its learning.

# ---------------------------------------------------------------------------
# STRUCTURE
# ---------------------------------------------------------------------------
structure:

  # THE AXIS REGISTRY. Every `key_axes` / `interpolates` member below is one of these four,
  # or a `derivations` value derived from one. Membership is R0-checked.
  axes: [run_dir, agent_id, lead_id, artifact_name]

  actors:
    - {id: run_investigation, frame: composition, provenance: code}  # driver.py:494
    - {id: MAIN,              frame: composition, provenance: code}  # MAIN_DEF driver.py:276 — attacker-influenced
    - {id: gather,            frame: composition, provenance: code}  # GATHER_DEF driver.py:296
    - {id: _make_hooks,       frame: leg,         provenance: code}  # driver.py:107 — gains the tool_execute registration
    - {id: update_budget_locked, frame: leg,      provenance: code}  # budget_enforcer.py:45
    - {id: check_budgets,     frame: leg,         provenance: code}  # budget_enforcer.py:82
    - {id: _run_gather,       frame: leg,         provenance: code}  # tools_gather.py:408
    - {id: QueryCapture,      frame: leg,         provenance: code}  # query_tool.py:275
    - {id: query_tool,        frame: leg,         provenance: code}  # the two CONTROL_FLOW_EXCEPTIONS consumers
    - {id: circuit_breaker,   frame: leg,         provenance: code}  # sibling writer under the same lock
    - {id: _pydantic_stage,   frame: composition, provenance: code}  # the six learning-loop agents
    - {id: curator_engine,    frame: composition, provenance: code}  # co-writer: takes build_write_allow(suffix=".md")
    - {id: lead_author_engine, frame: composition, provenance: code} # co-writer: same narrowed form
    - {id: replay_harness,    frame: composition, provenance: code}  # tests/e2e/_replay_harness.py — M12's injection point
    - {id: run_py,            frame: composition, provenance: code}  # defender/run.py — execv re-exec
    - {id: _pipeline,         frame: composition, provenance: code}  # evals/_pipeline.py — two os.environ.copy() hops
    - {id: _copy_shared_inputs, frame: leg,        provenance: code}  # learning/core/persist.py:202
      # ^ W2's refutation. Iterates _SHARED_COPY_ARTIFACTS = ('alert', 'report',
      #   'investigation') and shutil.copy2's each into the learning run dir (:210), so it
      #   AUTHORS A FILE NAMED investigation.md over the fs lane. It never consults
      #   decide_write and never runs the invlang validator — grepped, zero hits for either.
      #   Attached because an executed probe found it, and because the waiver that would have
      #   made it invisible was raised precisely on the premise that no such writer exists.
    - {id: ci_workflow,       frame: composition, provenance: design} # .github/workflows/ci.yml
      # ^ D11 round 5: an EXTERNAL DRIVER, which schema.md names as an actor form ("entry
      #   point, sibling producer, external driver (cron, workflow)") — NOT a boundary. It
      #   gains an `env:` block by design. SC26 read the job at 483b5809: `uv run pytest
      #   tests/ learning/ -v -m "not live"` at :37 with NO env: block at all.
      #   SCOPE CONSEQUENCE, pairing with RF2's: CI collects only tests/ learning/, so this
      #   env block sets the posture of the COLLECTED SUITE and not of the experiments/ call
      #   sites that retries_pinned_at_every_agent_construction and
      #   posture_bit_is_required_at_every_hook_construction must reach by exercise.
    - {id: run_arms,          frame: composition, provenance: code}  # experiments/gather-verifiable-code-289/run_arms.py:103
      # ^ RF2: the THIRD _make_hooks consumer. Invisible three ways (resolver searchPath
      #   excludes experiments/, CI runs only tests/ learning/, no import edge from
      #   defender/). It builds its Agent by hand, bypassing build_agent_core AND
      #   AgentDefinition, so there is no `defn` at that site to carry M2's posture bit.
      #   Attached because reality imposes it and no demand asked for it.

  boundaries:

    # === The enforcement state ============================================
    - id: budget_json
      provenance: code
      facets:
        identity:
          key_axes: [run_dir]
          evidence: {nl: "The path is `run_dir / \"budget.json\"` built at
            budget_enforcer.py:59, and `_make_hooks`'s own docstring (driver.py:109-110)
            says the budget is 'keyed by run_dir, locked'. One file per run dir; MAIN and
            every GATHER subagent increment the same object. Read off the path template and
            the writer, not the implementation."}
          sharing: serialized-append
        domain:
          type: mapping
          refinement: {nl: "The persisted budget state object
            {run_id, tool_calls, subagent_spawns, started_at} built by make_budget_state
            (budget_enforcer.py:36-42), which D2 extends with a run-scoped sentinel
            {run_id, created_at} written before the first tool call: an absent marker is a
            genuine cold start, and a mismatched or absent-after-present marker means the
            file was replaced."}
          default: null
          distinguished: [tool_calls, subagent_spawns, started_at, run_id, created_at]
          falsy_valid: true
          documented_alternatives: []
        access:
          constraints_by_via:
            fs:   {trust: derived,
                   constraints: [flock-serialized-read-modify-write, confine]}
                  # the run's own writer via hooks/_run_dir.update_json_locked
            api:  {trust: attacker-influenced, constraints: [confine]}
                  # THE FINDING. MAIN's write_file/edit_file. PO51 executed:
                  # compile_policy_for(MAIN_DEF) yields the single unrestricted pattern
                  # `<run_dir>(?:/[^\x00]*)?`, decide_write on budget.json -> allow=True,
                  # decide_read likewise (PO54). NO shape filter on the write side. The
                  # brief's access table typed only `fs` and called its writer SOLE; this
                  # cell is the correction.
            bash: {trust: attacker-influenced,
                   constraints: [argv-decompose, program-allowlist]}
                  # PO53 executed: both agents' grant lists expose the same 11 programs,
                  # none of which writes; shell=False makes redirection unavailable. CLOSED
                  # — bound anyway by enforcement_state_not_model_writable.

    - id: circuit_breaker_json
      provenance: code
      facets:
        identity:
          key_axes: [run_dir]
          evidence: {nl: "circuit_breaker.py:33 names `{run_dir}/circuit_breaker.json`
            explicitly; written at :140 through the same update_json_locked primitive."}
          sharing: serialized-append
        access:
          constraints_by_via:
            fs:   {trust: derived, constraints: [flock-serialized-read-modify-write, confine]}
            api:  {trust: attacker-influenced, constraints: [confine]}
                  # SIBLING CONSTRAINT reality imposes and no demand asked for: PO51 probed
                  # decide_write allow=True for this file too. The sibling STOP mechanism's
                  # own state sits in the same authoring region. No demand binds it.

    # === The run's write surface and the carve-out primitive ==============
    - id: run_dir
      provenance: code
      facets:
        identity:
          key_axes: [run_dir, artifact_name]
          evidence: {nl: "MAIN's write scope is build_write_allow(roots.run_dir)
            (_main_write_shape, driver.py:260-264) — the whole subtree, so the artifact
            name is a free axis the model chooses. Read off the compiled pattern
            `<run_dir>(?:/[^\\x00]*)?` (PO51, executed), not off any output template."}
          sharing: unique-key
        access:
          constraints_by_via:
            api: {trust: attacker-influenced,
                  constraints: [confine, invlang-schema-validation-on-investigation-md]}
            fs:  {trust: derived, constraints: [confine]}

    - id: main_write_allow
      provenance: code     # narrowed by design — the carve-out this spec demands
      facets:
        access:
          constraints_by_via:
            api: {trust: attacker-influenced, constraints: [confine]}
                 # today: containment + denylist only (permission/files.py:230-236's own
                 # docstring — NOT the read-side shapes). budget.json is not denylisted.

    - id: build_write_allow
      provenance: code     # permission/files.py:68 — the primitive that already exists
      facets:
        domain:
          type: callable
          refinement: {nl: "build_write_allow(root, *, suffix=None) compiles an agent's
            write_allow. The unrestricted form admits the whole subtree; the suffix form
            admits only matching names."}
          default: "unrestricted-subtree"
          distinguished: ["unrestricted-subtree"]
          falsy_valid: false
          documented_alternatives:
            - {value: 'suffix=".md"', crosses_validation: false}
              # RESOLVED by 76-probes-census Q2 (executed), closing PO56/H1's fact half.
              # crosses_validation: FALSE — the invlang gate is a BASENAME equality check
              # (files.py:269, `if path.name == "investigation.md":`) in a branch that runs
              # AFTER the allowlist arm and reads nothing from it, while the suffix is an
              # re-escaped literal appended to the PATH PATTERN (files.py:77). Orthogonal
              # axes: narrowing strictly shrinks the admitted set and every path still
              # admitted meets the identical basename branch.
              # TWO CORRECTIONS to the residue's H7, both material and both executed:
              #   (i) the .md form does NOT exclude gather_summaries — those files are
              #       `{lead_id}.md` (tools_gather.py:401), not `.json` as H7 stated, and
              #       they come back write=True UNDER the carve-out;
              #  (ii) it admits arbitrary .md at arbitrary DEPTH, including
              #       `gather_raw/evil.md` — a write into the one subtree MAIN is positively
              #       forbidden to READ, because decide_write's containment is
              #       read_allowed_path, which by its own docstring "applies NO path shapes".
              # It is a FILENAME filter, not a subtree narrowing. NOT the form this design
              # takes — see the allow_list alternative below (S2).
            - {value: 'allow_list={investigation.md, report.md}', crosses_validation: false}
              # THE FORM S2 RESOLVED ON. A positive allow-list of exactly the two named
              # conclusions. crosses_validation: false for the same reason as the suffix
              # form — investigation.md is still admitted, so it still meets the basename
              # branch and still validates. `_main_write_shape`'s "+ any case artifact it
              # authors" enumerates to the EMPTY SET (Q2d, executed), so nothing legitimate
              # is lost. Bound by main_write_allow_is_a_positive_allow_list.

    # === Observability sinks the kill must not lose =======================
    - id: request_log
      provenance: code     # {run_dir}/llm_requests.jsonl -> tool_trace.jsonl
      facets:
        identity:
          key_axes: [run_dir, agent_id, artifact_name]
          # H8 RESOLVED (artifact fix): the boundary spans TWO resources —
          # llm_requests.jsonl (per model request, _make_hooks) and tool_trace.jsonl
          # (projected once, run_investigation:560, DERIVED from the first). `artifact_name`
          # is the axis that distinguishes them, which is what made run_investigation's
          # writer read as key-under-covering in T3. Q7 (executed) confirmed BOTH files are
          # model-writable, so the derivation is also the blast-radius multiplier: one write
          # corrupts both.
          evidence: {nl: "One shared observe.RequestLogger is fanned across MAIN + N gathers
            by agent_id — read off driver.py:141 (`agent_id=agent_id` on every logged row)
            and _make_hooks's docstring (:109), which says agent_id tags this instance's
            logged requests as 'main' / 'gather:{lead_id}'. Projected by observe.write_trace
            at driver.py:560, followed by logger.close() at :561."}
          sharing: serialized-append
        access:
          constraints_by_via:
            fs:  {trust: derived, constraints: [confine]}
            api: {trust: attacker-influenced, constraints: [confine]}
                 # CONSEQUENCE-BEARING: PO51 probed decide_write allow=True for
                 # tool_trace.jsonl. The durable audit record every "must be observable
                 # afterwards" answer rests on is authored by the actor it records. No
                 # demand binds it.

    - id: queries_table
      provenance: code     # RunPaths.executed_queries
      facets:
        identity:
          key_axes: [run_dir]
          evidence: {nl: "Written by QueryCapture.wrap_tool_execute (query_tool.py:275),
            one row per executed query call, into the run's own queries table."}
          sharing: serialized-append
        access:
          constraints_by_via:
            fs:  {trust: derived, constraints: [confine]}
            api: {trust: attacker-influenced, constraints: [confine]}
                 # S1's escape facet. Q9 executed: decide_write allow=True, read=True for
                 # executed_queries.jsonl under MAIN's compiled policy. The capture is
                 # deliberately inseparable from the `query` call "so a query that ran cannot
                 # dodge its row" — but that inseparability is enforced on the GATHER side and
                 # is entirely bypassed by a MAIN-side rewrite. Corruption ESCAPES THE RUN:
                 # lead_repository.actor_view is the gray-box projection the adversarial actor
                 # reasons from, so a poisoned table poisons the generated attack stories and,
                 # through the curator, the checked-in lessons corpus. Bound by
                 # enforcement_state_not_model_writable.

    - id: gather_summaries
      provenance: code
      facets:
        identity:
          key_axes: [run_dir, lead_id]
          evidence: {nl: "Path template read off _persist_gather_summary's docstring
            (tools_gather.py:391-392): `{run_dir}/gather_summaries/{lead_id}.md`. Called at
            :501. Best-effort — a failed persist must never break the run."}
          sharing: unique-key
        access:
          constraints_by_via:
            fs:  {trust: derived, constraints: [confine]}
            api: {trust: attacker-influenced, constraints: [confine]}
                 # Q10 executed: write=True AND read=True. This is the POST-COMPACTION
                 # RECOVERY SURFACE — a rewrite here rewrites what the model will later
                 # BELIEVE gather told it, after the original is gone from context. Two
                 # aggravating facts, both executed: the summary is stored PRE-WRAPPED with
                 # the run salt, so the quarantine framing a forged summary would need is
                 # legible from any legitimate one; and is_untrusted_read keys on the
                 # `gather_raw/` PATH SHAPE (files.py:192-200), not on this directory, so it
                 # does not re-tag a gather_summaries read at all.
                 # NOTE the extension: these files are `{lead_id}.md`, which is why the
                 # `.md` suffix carve-out would NOT have closed this path.

    # === Knobs ============================================================
    - id: DEFAULT_LIMITS
      provenance: code     # budget_enforcer.py:28-32 — values changed by design
      facets:
        domain:
          type: mapping
          refinement: {nl: "The inline, single-default cap table. Positive integers only:
            _ratio_warning returns None when cap <= 0 (budget_enforcer.py:64-65), so 0
            DISABLES a limb rather than tripping it immediately (FF15) — the natural
            'trip now' value means the opposite of what a test author would expect."}
          default: 1200
          # RG3/Q4 RESOLVED (hole H3): the slot describes the POST-CHANGE state, so it is
          # 1200 (O4's ~20 min). There was never a contradiction in the design — 1800 is the
          # INCUMBENT value, correct at 483b5809 and mis-filed here. caps_values and
          # docs_match_code now read the same number, and the `# seconds (30 min); warn at
          # 75% (22.5 min)` comment at budget_enforcer.py:31 is edit (3) of M10's four.
          # D10 (§7 round 3): the 1200 is WALL CLOCK FROM RUN START, not tool-calling time.
          distinguished: [wall_clock_timeout, max_tool_calls, max_subagent_spawns,
                          grace_seconds, 0]
          falsy_valid: false
          documented_alternatives: []
        access:
          constraints_by_via:
            env: {trust: operator, constraints: [not-reachable]}
                 # N1: no environment variable changes any cap
            fs:  {trust: operator, constraints: [not-reachable]}
                 # N1: no config file changes any cap
            api: {trust: operator, constraints: [boundary-resolved-then-threaded]}
                 # M12/N1's carve-out: resolved once at run_investigation and threaded
                 # inward through check_budgets' existing `limits` parameter

    - id: DEFENDER_BUDGET_ENFORCE
      provenance: design
      facets:
        domain:
          type: bool
          refinement: {nl: "Read through env_bool (_env.py:56), which reads os.environ
            in-process. Governs POSTURE, not tuning."}
          default: false
          distinguished: [unset, "false", "true", unrecognized]
          falsy_valid: true
          documented_alternatives: []
        access:
          constraints_by_via:
            env:  {trust: operator, constraints: [read-in-process-only]}
            bash: {trust: attacker-influenced,
                   constraints: [argv-decompose, program-allowlist, no-env-mutating-grant]}
                  # FF21: the bash child env is dict(os.environ) minus provider keys, so the
                  # flag is VISIBLE to bash children and unwritable by the model.

    - id: tier
      provenance: design
      facets:
        domain:
          type: enum
          refinement: {nl: "core | tail. TOTAL BY CONSTRUCTION — the default arm is `core`,
            the restrictive one, so a tool added to either ToolSet inherits the tight cap
            rather than falling off a lookup table into a KeyError that
            tool_manager.py:341's `except (ValidationError, ModelRetry)` would not catch.
            The table is keyed on the (tool_name, agent) PAIR, not the tool name alone:
            read_file is tail on MAIN and core on GATHER simultaneously."}
          default: core
          distinguished: [read_file, write_file, edit_file, gather, bash, template_search,
                          query]
          falsy_valid: false
          documented_alternatives: []

    - id: GATHER_REQUEST_LIMIT
      provenance: code     # driver.py:66
      facets:
        domain: {type: int, refinement: {nl: "requests a multi-dimension lead needs"},
                 default: 40, distinguished: [], falsy_valid: false,
                 documented_alternatives: []}

    - id: DEFAULT_TOOL_RETRIES
      provenance: code     # driver.py:76
      facets:
        domain:
          type: int
          refinement: {nl: "Per-tool consecutive-retry ceiling. driver.py:74's comment says
            max_retries=1 'would abort the run on the 2nd back-to-back denial'."}
          default: 10
          distinguished: [10]
          falsy_valid: false
          documented_alternatives:
            - {value: 1, crosses_validation: false}
              # The shipped default does NOT stay valid under it: X1/C3 showed 1 aborts the
              # run on the 2nd consecutive denial. NOT WAIVABLE — see the None entry.
            - {value: None, crosses_validation: false}
              # PB4 (executed) — THE ENTRY W1 MISSED, and the one that killed it as a waiver.
              # `Agent(retries=)`'s framework default is `None`, and `None` resolves to an
              # EFFECTIVE CEILING OF 1: omitting the kwarg and passing 1 abort at the same
              # denial with the same message. The unsafe value is therefore reached by
              # OMISSION, not by selection, so "nothing selects 1" is true and irrelevant.
              # Bound by retries_pinned_at_every_agent_construction.

    - id: os_environ
      provenance: code     # SR7 — the flag's home
      facets:
        access:
          constraints_by_via:
            env:              {trust: operator, constraints: [read-in-process-only]}
            execv:            {trust: derived, constraints: [inherited-wholesale]}
                              # run.py:29-30 — execv (no `e` suffix) inherits os.environ
            subprocess-copy:  {trust: derived, constraints: [inherited-wholesale]}
                              # _pipeline.py:77-81 and :128-131 — two os.environ.copy() hops

    # === Seams and types ==================================================
    - {id: tool_execute, provenance: design, facets: {}}
      # THE TRIP SEAM. `Hooks().on.tool_execute` — the registrable spelling (SC9: 33 names,
      # tool_execute present, wrap_tool_execute ABSENT). The capability-side
      # AbstractCapability.wrap_tool_execute (query_tool.py:275) is the same seam's other
      # face; the spec joins on the name _make_hooks can actually register.

    - id: model
      provenance: design
      facets:
        payload:
          parts:
            - {role: tool-return, source: const:BUDGET_REFUSAL_MESSAGE}
          invariants: [all-slots-bound]
          nl: "The refusal M1b specifies, returned as a ToolReturnPart from the tool_execute
            hook without awaiting the handler: that the stop is PERMANENT for the rest of
            the run, what remains available, and that the model should write its report now.
            Delivered on EVERY refusal, not merely the first."

    - id: gather_result
      provenance: code
      facets:
        payload:
          parts: [str]
          # H2's FACT HALF RESOLVED by 76-probes-census Q5b (executed, read at the cited
          # line). Today's shape is a SINGLE str assembled from three pieces: two authored
          # literals and ONE interpolated exception repr, `({e})`, spliced from an exception
          # raised inside the model-driven gather subagent, then wrapped untrusted with the
          # run salt (_wrap(output, "untrusted", deps.salt), tools_gather.py:493) before
          # reaching MAIN. The `({e})` span is the sole model-influenced one — the hostile
          # value T25 types this sink for. Unblocks R1/T1 and R6/T25.
          # STILL OPEN and unchanged: the M7-WIDENED shape, once UnexpectedModelBehavior is
          # caught here, is a design decision (H2's second half). P1 (executed) narrows what
          # that widening is FOR — a budget refusal inside GATHER never reaches this handler.
          # Historical note: _run_gather converts UsageLimitExceeded to a
          # 'measurement-shaped string' (tools_gather.py:485) and M7 widens that handler to
          # UnexpectedModelBehavior, but the string's composition is nowhere pinned. Two
          # demands (gather_stops_clean, no_gather_stopwatch) assert MAIN 'reads an
          # incomplete lead' off a payload whose parts nothing declares.
          invariants: []
          nl: "The measurement-shaped string a cut-short gather returns to MAIN in place of
            a lead, so MAIN reasons on rather than the run dying with no report."

    - id: AgentDefinition
      provenance: code     # agent_definition.py:131-155 — gains the posture bit by design
      facets:
        domain:
          type: bool
          refinement: {nl: "The new per-role budget-posture DATA bit. Direct precedent:
            requires_confine, requires_explicit_tree and bindable are already
            per-role safe-by-construction bits checked generically in `bind` with no role
            branch (agent_definition.py:131-155, :337-354). Defaulting False fails closed
            for the six learning defs."}
          default: false
          distinguished: ["false", "true"]
          # QUOTED in the §7 fold: unquoted these parse as YAML booleans, so the addresses
          # `AgentDefinition.domain.distinguished[false]` / `[true]` that R4's obligation T19
          # names resolved to nothing. Same class of mechanical address fix as the header's
          # NAME RECONCILIATION block; DEFENDER_BUDGET_ENFORCE already quotes its members.
          falsy_valid: true
          documented_alternatives: []

    - {id: deps_policy, provenance: code, facets: {}}
      # tools.py:137 'Per-agent gate policy is DATA, not a role branch: the gate keys on
      # deps.policy'; :151 'role remains only as an identity label'. The reach the posture
      # bit travels from AgentDefinition to the hook closure.

    - {id: build_agent_core, provenance: code, facets: {}}
      # driver.py:205 — installs _make_hooks on all 8 AgentDefinitions (SC4/C12)

    - {id: budget_kill_exception, provenance: design, facets: {}}
      # M5's OWN type. Must be added to driver.py:549's catch and kept OFF
      # query_tool.CONTROL_FLOW_EXCEPTIONS (X10/RF4). RunAborted is not reusable:
      # RunAborted.__init__(total_failures, systems) builds a connectivity-flavoured
      # message (circuit_breaker.py:94-101).

    - id: CONTROL_FLOW_EXCEPTIONS
      provenance: code     # query_tool.py:103-110
      facets:
        access:
          constraints_by_via:
            reject-path:  {trust: derived, constraints: [re-raise-unconditionally]}
                          # query_tool.py:242, inside the _reject wrapper
            execute-path: {trust: derived, constraints: [re-raise-unconditionally]}
                          # query_tool.py:319, around `await handler(args)`
            # Membership in the tuple is what BOTH sites read, so one absence assertion
            # covers both — but a demand binding only one leaves the other unmodelled and
            # check_binds skips it.

    - id: alert_json
      provenance: code
      facets:
        identity:
          key_axes: [run_dir]
          evidence: {nl: "One `{run_dir}/alert.json` per run — the verbatim copy of the input
            alert that run setup writes before the investigation starts. CLAUDE.md declares
            it 'read-only for the agent'."}
          sharing: unique-key
        access:
          constraints_by_via:
            fs:  {trust: operator, constraints: [confine]}
                 # run setup's own write, before MAIN exists
            api: {trust: attacker-influenced, constraints: [confine]}
                 # Q8 executed: write=True under MAIN's compiled policy. THE READ-ONLY STATUS
                 # IS DOCUMENTATION WITH NO ENFORCEMENT BEHIND IT. A model that edits the
                 # alert edits its own ground truth — and orchestrate.py:403's held-out
                 # -fixture refusal (is_held_out_alert_copy(src.alert)) reads THAT SAME FILE
                 # to decide whether a run may feed the learning corpus, so a rewritten
                 # alert.json can make a held-out eval fixture look like an ordinary case.
      # MINTED IN THE ROUND-4 FOLD, as the precise way to carry NF3 without over-claiming.
      # alert.json is the sixth integrity facet S1's scope names, but it had NO BOUNDARY OF
      # ITS OWN — it was modelled only inside `run_dir`, which also carries the two legitimate
      # conclusions. Re-tagging run_dir's write edges `provenance: design` to reach it would
      # have put report.md and investigation.md in the delta too, which is exactly the
      # over-claim NF3 forbids. Minting the boundary is transcription of Q8's executed facts,
      # not a new decision.

    # === Minted by the §7 resolution fold (round 3) ========================

    - id: accounting_failure_state
      provenance: design     # D4 — NEW detection state; the design had none
      facets:
        domain:
          type: mapping
          refinement: {nl: "The detection state D4 requires. NF4 (§7 round 5) resolved this
            to BOTH mechanisms, each carrying its OWN threshold, not one or the other:
            `consecutive_failures` is a count that RESETS ON SUCCESS and trips at its own
            threshold, and `first_failure_at` is a stamp that does NOT reset and trips on
            elapsed degradation past its own, separate threshold. One failure is isolated and
            costs one call of overshoot; a standing or a persistently intermittent failure
            means enforcement has silently left the run, which is an environment fault the
            run must stop on or mark unmistakably. Recorded as a mechanism ADDITION, not a
            clarification."}
          default: null
          distinguished: [consecutive_failures, first_failure_at, 0]
          falsy_valid: true
          documented_alternatives: []
          # NF4 RESOLVED (§7 round 5) — AND THE FOLD'S OWN DIAGNOSIS WAS OVERTURNED. The
          # round-4 fold read these two members as a MIS-MODELLED EITHER/OR and routed them
          # to §7 as a fork, arguing that only one would ever exist so R4 would go on
          # demanding an exercise for a member no implementation could give it. The human
          # took the other option, and the reasoning holds: THE TWO CLOSE DIFFERENT GAPS. A
          # count resets on success, so it fires only on a standing fault and NEVER on a
          # filesystem failing every other call; a stamp measures elapsed degradation and does
          # not reset, so exactly that intermittent fault trips it eventually. Keeping both
          # makes these members a GENUINE CONJUNCTION, so R4's per-member demand is CORRECT
          # rather than unsatisfiable — both are bound, both are exercised, and neither
          # member is removed.
          # Cost accepted and recorded: two thresholds to tune, and more state on the
          # enforcement path.

    - id: truncated_by
      provenance: design     # D8
      facets:
        domain:
          type: enum
          refinement: {nl: "The mark a killed run carries. `budget` is the value this design
            introduces; absent/null is an untruncated run. Read by the runtime at the
            learning-enqueue boundary — NOT by downstream report.md validation, which is the
            contract the runtime does not own (D8)."}
          default: null
          distinguished: [budget, "None"]
          falsy_valid: true
          documented_alternatives: []

    - id: learn_queue_marker
      provenance: code       # run_common.enqueue_learning — run.py's post-step
      facets:
        identity:
          key_axes: [run_dir]
          evidence: {nl: "run.py drops one learn-queue marker per finished run unless
            --no-learn is passed (defender/CLAUDE.md §Learning loop); the off-process worker
            drains it. One marker per run dir."}
          sharing: unique-key

    - id: DEFENDER_RUNS_BASE
      provenance: code       # the enforced pool's root
      facets:
        domain:
          type: str
          refinement: {nl: "The runtime run-dir root MAIN and GATHER bind under. Q1 probed
            the shipped default as /tmp/defender-runs."}
          default: "/tmp/defender-runs"
          distinguished: []
          falsy_valid: false
          documented_alternatives: []

    - id: DEFENDER_LEARNING_STATE_DIR
      provenance: code       # the unenforced pool's root
      facets:
        domain:
          type: str
          refinement: {nl: "The learning state root every learning stage binds under (its
            runs/ subdir). Q1 probed the shipped default as <repo>/defender/learning, and
            ops/trace_lesson.py:75 names it 'the durable learning runs dir, NOT the
            ephemeral $DEFENDER_RUNS_BASE'. Disjointness from DEFENDER_RUNS_BASE is EMERGENT
            from the two defaults, not asserted anywhere — Q1 collided them deliberately and
            got `SAME DIR? True`, which is what pool_roots_are_disjoint now forbids."}
          default: "<repo>/defender/learning"
          distinguished: []
          falsy_valid: false
          documented_alternatives: []

    # === Documentation surfaces (facetless — no contract, no obligations) ==
    - {id: threat_model_class_7, provenance: code, facets: {}}      # docs/decisions/threat-model.md:179-187 + :223-224
    - {id: budget_enforcer_docstring, provenance: code, facets: {}} # budget_enforcer.py:1-10, :31

  interacts:
    # =======================================================================
    # NF3 (§7 round 4) — WRITE EDGES INTO THE SIX INTEGRITY FACETS ARE TAGGED
    # `provenance: design`; THE FACETS THEMSELVES STAY `provenance: code`.
    # The six: budget_json, circuit_breaker_json, request_log (llm_requests.jsonl +
    # tool_trace.jsonl), queries_table, gather_summaries, alert_json. Fourteen write edges
    # re-tagged, of every via and from every writer — the model's api lane AND the run's own
    # fs writers — because R2's question is about the WRITER SET, and tagging only the
    # attacker-influenced lane would leave the sink's own writers outside the delta and the
    # multi-writer predicate uncomputable.
    # WHY EDGES AND NOT FACETS: the facets exist unmodified by this design. What changed is
    # their CONSEQUENCE — the enforcement posture is what makes forging the record of spend
    # a way to defeat the bound on spend. Edge-level tagging expresses exactly that; facet
    # -level tagging would claim the boundaries themselves are new, which is false.
    # WHAT IT BUYS: before this, `spec-graph gate --residue` computed ZERO R2 triggers over
    # the whole artifact, because every boundary the write-scope findings concern was
    # `provenance: code`. Seven R2 obligations rested entirely on the hand pass's judgment,
    # and a future run would have depended on a strong reader noticing again. See the
    # `gate.evaluated` R2 entry for what the tool computes now.
    # Read edges are deliberately NOT re-tagged: the delta claim is about who can WRITE these
    # records, and widening it to reads would over-claim in the direction NF3 warns about.
    # =======================================================================

    # --- the driver ---------------------------------------------------------
    - {from: run_investigation, to: run_dir, mode: write, via: fs, provenance: code,
       interpolates: [run_dir, artifact_name]}
    - {from: run_investigation, to: budget_json, mode: read, via: fs, provenance: design}
      # the run-ending limb's read. PO58 OPEN: whether it derives from the same on-disk
      # record as the refusing limb, or from in-process state a rewrite cannot reach.
    - {from: run_investigation, to: DEFAULT_LIMITS, mode: read, via: api, provenance: design}
      # M12/N1: resolve once at the boundary, thread inward
    - {from: run_investigation, to: request_log, mode: write, via: fs, provenance: design,
       interpolates: [run_dir]}
    - {from: run_investigation, to: DEFENDER_BUDGET_ENFORCE, mode: read, via: env,
       provenance: design}
    - {from: run_investigation, to: build_write_allow, mode: invoke, via: api,
       provenance: code}
    - {from: run_investigation, to: budget_kill_exception, mode: read, via: api,
       provenance: design}

    # --- the budget library -------------------------------------------------
    - {from: update_budget_locked, to: budget_json, mode: write, via: fs, provenance: design,
       interpolates: [run_dir]}
    - {from: check_budgets, to: budget_json, mode: read, via: fs, provenance: code}
    - {from: check_budgets, to: DEFAULT_LIMITS, mode: read, via: api, provenance: code}

    # --- the hook factory ---------------------------------------------------
    - {from: _make_hooks, to: budget_json, mode: write, via: fs, provenance: design,
       interpolates: [run_dir]}
      # driver.py:118, inside after_tool_execute. The design adds a READ on this same edge
      # at the tool_execute seam. PO57 OPEN: whether the decision re-reads per call or holds
      # a reading across calls — determines whether a mid-run rewrite takes effect
      # immediately or at the next boundary.
    - {from: _make_hooks, to: deps_policy, mode: read, via: api, provenance: design}
    - {from: _make_hooks, to: tool_execute, mode: invoke, via: api, provenance: design}
    - {from: _make_hooks, to: model, mode: write, via: api, provenance: design,
       sends: payload, transport: llm}
    - {from: _make_hooks, to: request_log, mode: write, via: fs, provenance: design,
       interpolates: [run_dir, agent_id, artifact_name]}
      # P4: the seam's own explicit refusal record lands here, rather than borrowing
      # QueryCapture's row shape (refusal_writes_its_own_record).
    - {from: _make_hooks, to: tier, mode: read, via: api, provenance: design}
      # H5 RESOLVED (RG4/Q5a, executed): `hooks.on.tool_execute` is a WRAP-STYLE hook
      # (capabilities/hooks.py:188 — ctx, call: ToolCallPart, tool_def, args, handler), so
      # the tier read is `tier(call.tool_name)` off the ToolCallPart — the SAME value the
      # incumbent accountant reads one hook later (driver.py:118). The refusal short-circuits
      # by RETURNING instead of awaiting `handler`, which is what makes O1's "refused at the
      # execute seam" and O2's "refused calls not counted" mechanically compatible.
      # R4's read-edge trigger and R6's value walk are now computable over `tier`.
    - {from: _make_hooks, to: accounting_failure_state, mode: write, via: fs,
       provenance: design, interpolates: [run_dir]}
      # D4's new detection state, written from the accounting seam's failure path.

    # --- the §7 fold's new edges --------------------------------------------
    - {from: run_investigation, to: DEFAULT_TOOL_RETRIES, mode: read, via: api,
       provenance: code}
      # driver.py:216 — `retries=DEFAULT_TOOL_RETRIES` on the Agent at :210. P3 makes this
      # edge load-bearing rather than incidental: the value must be AFFIRMATIVELY passed.
    - {from: run_arms, to: DEFAULT_TOOL_RETRIES, mode: read, via: api, provenance: code}
      # experiments/gather-verifiable-code-289/run_arms.py:99 — the second Agent construction
      # site, which passes it today and which CI never collects (SC26).
    - {from: run_investigation, to: truncated_by, mode: write, via: api, provenance: design}
      # D8: the killed run's mark.
    - {from: run_py, to: truncated_by, mode: read, via: api, provenance: design}
    - {from: run_py, to: alert_json, mode: write, via: fs, provenance: code,
       interpolates: [run_dir]}
      # run setup's own write, before MAIN exists — the second writer that makes alert_json
      # an R2 shared sink rather than a single-writer file.
    - {from: run_py, to: learn_queue_marker, mode: write, via: fs, provenance: code,
       interpolates: [run_dir]}
      # D8: the enqueue the runtime suppresses itself for a truncated run.
    - {from: _copy_shared_inputs, to: run_dir, mode: write, via: fs, provenance: code,
       interpolates: [run_dir, artifact_name]}
      # W2: the fs-lane write of investigation.md / report.md / alert.json into the learning
      # run dir. `artifact_name` is interpolated here — unlike the model-lane edges, this
      # writer varies its name across a fixed three-member set (persist.py:193).
    - {from: ci_workflow, to: DEFENDER_BUDGET_ENFORCE, mode: write, via: env,
       provenance: design}
      # D11 round 5: the CI job sets the flag for the collected suite.
    - {from: run_investigation, to: DEFENDER_RUNS_BASE, mode: read, via: env,
       provenance: code}
    - {from: _pydantic_stage, to: DEFENDER_LEARNING_STATE_DIR, mode: read, via: env,
       provenance: code}
      # P-disjoint: the two roots whose collision pool_roots_are_disjoint forbids.

    # --- the model's own lane (the writability finding) --------------------
    # H4 RESOLVED (RG2/Q3, executed transcription): all three model-lane write edges carry
    # `interpolates: [run_dir]` and nothing else. MAIN's compiled write_allow is a SINGLE
    # pattern with exactly ONE interpolated variable — the re.escape'd run_dir prefix
    # (files.py:76); the tail `(?:/[^\x00]*)?` is a fixed wildcard that interpolates nothing.
    # `artifact_name` is therefore a FREE axis on this lane, not an interpolated one: the
    # write side has NO per-artifact discrimination at all, and every artifact under the run
    # dir collapses to the same key. That is what makes R2's key-coverage half computable.
    - {from: MAIN, to: budget_json, mode: write, via: api, provenance: design,
       interpolates: [run_dir]}
      # write_file / edit_file. NOT serialized with the fs writer: _tool_write_file
