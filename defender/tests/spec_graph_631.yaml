    # Discharges R2/T4 (run_dir's two-writer uniqueness) and R2/T3's shutdown half.

  # --- D1 (ROUND 4, supersedes round 3): re-check at commit time ------------
  # RETIRED HERE, recorded not silently dropped: `overshoot_bounded_by_one_turn_dispatch`,
  # minted by the round-3 fold to carry D1's "state the bound as a NUMBER" shape. Its id is
  # gone rather than reused, because the name asserts a fact the probe REFUTED — there is no
  # one-turn dispatch bound — and schema.md's naming rule is that a graph id must name what
  # the thing IS, or the join silently attaches a check to a concept that does not exist.
  # Replaced, one-for-one, by the demand below.
  - id: effect_not_committed_after_its_pool_trips
    kind: behavior
    form: test
    discharged_by: test_a_call_that_finished_after_its_pool_tripped_does_not_land_its_effect
    binds: ["tool_execute", "check_budgets", "update_budget_locked",
            "interacts(check_budgets->budget_json)",
            "interacts(update_budget_locked->budget_json)",
            "DEFAULT_LIMITS.domain.distinguished[max_tool_calls]",
            "budget_json.identity", "drives(run_investigation->gather)"]
    positive_control: failed_calls_still_counted
    rejected:
      - {nl: "Accepting the overshoot as bounded slack and stating the bound as a number —
          D1's round-3 answer, SUPERSEDED. It rested on a premise an executed probe
          destroyed: pydantic-ai creates one asyncio task per ToolCallPart with no chunking
          and no cap (_agent_graph.py:1902-1945), so under the hostile-model axiom the
          overshoot is whatever the model emits, and the tool-call cap was defeatable in a
          single turn."}
      - {nl: "Bounding fan-out at the framework instead — marking the tools `sequential=True`
          or setting the parallel-execution-mode context var, both of which exist on
          pydantic-ai 1.107.0 (tool_manager.py:155-168). Serializing tool execution would
          destroy the parallel-gather design this repo already commits to: FF23 records that
          register_gather_tool's docstring instructs the model to issue multiple gather calls
          in one turn precisely so sibling leads dispatch in parallel."}
    moved_by: D1-round4
    # D1 RE-ANSWERED (§7 round 4). THE INCREMENT PATH RE-CHECKS THE POOL AND REFUSES TO
    # COMMIT AN EFFECT WHOSE CAP HAS SINCE TRIPPED. Overshoot is then bounded by the
    # concurrency GENUINELY IN FLIGHT at the moment of the trip, rather than by the model's
    # choice: a hostile 200-call turn has 199 refused at commit.
    # THE OBSERVABLE, and it is what phase E must drive: a call that EXECUTED after its pool
    # tripped does not LAND ITS EFFECT — not that it was never dispatched, which is
    # unachievable at this seam.
    # ACCEPTED COST, recorded in the rationale so it is not read as a defect: the call ran
    # and its result is DISCARDED. Work is wasted; the bound is real.
    # NOTE the positive control's job here — failed_calls_still_counted pins that an ordinary
    # executed call DOES land its increment, without which "refuses to commit" is satisfied
