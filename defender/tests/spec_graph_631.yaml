    form: test
    discharged_by: test_a_write_through_an_alias_to_investigation_md_is_still_validated
    binds: ["run_dir.access[api]", "interacts(MAIN->run_dir)", "main_write_allow.access[api]"]
    positive_control: valid_investigation_md_lands_through_every_path
    # A DISTINCT DEFECT from the fs-lane gap above, and minted separately ON PURPOSE: folding
