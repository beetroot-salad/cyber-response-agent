    - {from: run_arms, to: budget_json, mode: write, via: fs, provenance: design,
       interpolates: [run_dir]}
      # RF2 — it installs _make_hooks by hand, so it inherits the writer

  drives:
    - {from: run_investigation, to: MAIN, provenance: code, multiplicity: serial}
    - {from: run_investigation, to: gather, provenance: code, multiplicity: concurrent}
