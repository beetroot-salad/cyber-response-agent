      # calls in one turn to dispatch SIBLING LEADS IN PARALLEL
    - {from: _run_gather, to: gather, provenance: code, multiplicity: concurrent}
    - {from: _make_hooks, to: QueryCapture, provenance: code, multiplicity: serial}
      # driver.py:205-209 — _make_hooks is PREPENDED, QueryCapture appended. Under
      # short-circuit-only this ordering IS the mechanism, not belt-and-braces.
    - {from: replay_harness, to: run_investigation, provenance: code, multiplicity: serial}
    - {from: run_py, to: run_investigation, provenance: code, multiplicity: serial}
    - {from: _pipeline, to: run_py, provenance: code, multiplicity: serial}
    - {from: run_arms, to: _make_hooks, provenance: code, multiplicity: serial}
      # RF2 — driver._make_hooks(logger, agent_id) called directly, no AgentDefinition.
      # RESOLVED at §7: the posture bit is a REQUIRED parameter and run_arms.py:103 is fixed
      # IN THIS DIFF. Scope consequence carried forward — the diff now touches experiments/,
      # which CI does not run.
      # The OTHER two call sites reach _make_hooks through the `build_agent_core` boundary
