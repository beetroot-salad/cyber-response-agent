    # P3 (§7 round 3) — SAFE-BY-CONSTRUCTION. PB4 (executed) refuted the assumption
    # underneath W1: pydantic-ai's `Agent(retries=)` defaults to `None`, and `None` resolves
    # to an EFFECTIVE CEILING OF 1 — omitting the kwarg and passing 1 abort at the same
    # denial with the same message ("Tool 'work' exceeded max retries count of 1"). So the
    # safe value must be AFFIRMATIVELY PASSED at every Agent construction site, and W1's
    # rationale ("nothing selects 1") is true and IRRELEVANT: nothing has to select it.
    # W1 IS DEAD AS A WAIVER — struck from waiver_candidates, replaced by this demand.
    # Two sites today (driver.py:210, experiments/gather-verifiable-code-289/run_arms.py:99);
    # the demand binds the class, so a third site or a refactor that drops the kwarg fails
