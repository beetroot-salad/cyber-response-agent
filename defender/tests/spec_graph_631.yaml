    - {from: query_tool, to: CONTROL_FLOW_EXCEPTIONS, mode: read, via: api, provenance: code}
    - {from: circuit_breaker, to: circuit_breaker_json, mode: write, via: fs,
       provenance: design, interpolates: [run_dir]}

    # --- learning loop (must stay unenforced) -------------------------------
    - {from: _pydantic_stage, to: build_agent_core, mode: invoke, via: api, provenance: code}
    - {from: _pydantic_stage, to: AgentDefinition, mode: read, via: api, provenance: code}

    # --- sibling constraints: the carve-out precedent -----------------------
    - {from: curator_engine, to: build_write_allow, mode: invoke, via: api, provenance: code}
      # curator_engine.py:204 — takes suffix=".md"
    - {from: lead_author_engine, to: build_write_allow, mode: invoke, via: api,
       provenance: code}
      # lead_author_engine.py:110 — takes suffix=".md"

    # --- process boundaries the flag crosses --------------------------------
    - {from: run_py, to: os_environ, mode: read, via: env, provenance: code}
    - {from: _pipeline, to: os_environ, mode: write, via: env, provenance: code}

    # --- harnesses ----------------------------------------------------------
    - {from: replay_harness, to: DEFAULT_LIMITS, mode: write, via: api, provenance: design}
      # M12: the `verbs`-style optional-kwarg seam (_replay_harness.py:315), under
