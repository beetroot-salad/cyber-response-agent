schema_version: 1
design: "#631 — flip the per-run budget from warning-only accounting to an enforced posture"
base: 483b5809
# NOTE ON THE BASE: 483b5809 sits on `cleanup/retire-remaining-hook-entrypoints`, an
# UNMERGED branch — not on `main`. write-code-from-spec's PR either targets that branch or
# waits for it to land (70-resolutions F2).
#
# LIVE MECHANISM (70-resolutions F3, supersedes F1): SHORT-CIRCUIT ONLY at
# `hooks.on.tool_execute`. There is no `prepare_tools` withdrawal arm anywhere in this
# design (X6 refuted it). Refused calls do NOT increment `tool_calls` (F3b).
#
# ---------------------------------------------------------------------------
# NAME RECONCILIATION (phase D). Grounding, demand extraction, and the disposition
# frontiers coined ids independently. Unified here by role+origin; every id below is the
# symbol the code (or, for design elements, the design) actually spells. Dotted addresses
# minted upstream were re-spelled because `a.b` parses as <boundary>.<facet> and would be
# an unresolvable R0 address:
#   `budget.json`                         -> budget_json
#   `hooks.on.tool_execute`               -> tool_execute        (the exact attribute name on
#                                            `Hooks().on`, SC9/RF3; NOT wrap_tool_execute,
#                                            which is the capability-side spelling)
#   `query_tool.CONTROL_FLOW_EXCEPTIONS`  -> CONTROL_FLOW_EXCEPTIONS
#   `...CONTROL_FLOW_EXCEPTIONS.access[242]`  -> .access[reject-path]   (query_tool.py:242)
#   `...CONTROL_FLOW_EXCEPTIONS.access[319]`  -> .access[execute-path]  (query_tool.py:319)
#   `AgentDeps.policy`                    -> deps_policy         (tools.py:137 `deps.policy`)
#   `MAIN.write_allow`                    -> main_write_allow    (`_main_write_shape`,
#                                            driver.py:260-264)
#   `interacts(hooks.on.tool_execute->model).payload`
#                                         -> interacts(_make_hooks->model).payload
#                                            (`_make_hooks` is the actor that owns the
#                                            registration; the seam is the boundary)
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# DEMANDS — the spec proper. 73 total (72 test, 1 clause, 0 waivers). The +4 test
#   demands are the phase-F hardening fold (§7 round 6, VR1/VR3): the cross-process
#   origin (VR1), open_budget idempotence, the accounting-failure state's location, and
#   truncated_by's non-budget member — each a genuine R27 coverage gap, minted rather
#   than folded into an existing test (one-test-per-demand held).
#   ROUND-4 NOTE: still 63 — `overshoot_bounded_by_one_turn_dispatch` was RETIRED and
#   `effect_not_committed_after_its_pool_trips` minted in its place, one for one (D1
#   reopened). The retirement is recorded at the demand's old site, not silently dropped.
#   form: test   -> a POINTER {id,kind,form,binds,discharged_by}; the observable-outcome
#                   prose lives in the named test's docstring (phase E authors it;
#                   check_binds scans it there).
#   form: clause -> carries `outcome`.
#   form: waiver -> carries `outcome`; minted ONLY at §7 by a human (schema.md). THERE ARE
#                   NONE. The one that existed — ci_flag_wiring_waived, D11's examined no —
#                   was WITHDRAWN in §7 round 5 when the claim it cited was refuted. Its
#                   withdrawal is recorded at its old site, not silently dropped.
# Provenance of the set: 32 from 20-demands.md (26 minted in round 2, of which 5 moved and
# 2 sharpened; 4 minted on F3's resolution; 2 from the phase C cold pass) + 10 minted at
# phase D from 45-dispositions.md's CONSENSUS block, where the consensus assertion was not
# already carried by an extraction demand + 21 minted by the §7 RESOLUTION FOLD from
# 70-resolutions.md's round-3 batch (.spec-flow/frontiers/78-fold.md). The other 16
# consensus assertions are subsumed and are named individually in `handoff.drops`.
#
# WAIVER ACCOUNTING — FIVE EXAMINED NOS WERE PROPOSED ACROSS THIS SPEC AND NOT ONE STANDS.
# `form: waiver` count: 0. `waiver_candidates`: 0. Every one fell to an EXECUTED PROBE, and
# the record of each is preserved rather than deleted, because a waiver that was examined and
# then overturned is worth more in the artifact than its absence.
#   W1  `DEFAULT_TOOL_RETRIES=1 is not selectable` — REFUTED by PB4: the framework default
#       None resolves to a ceiling of 1, so the unsafe value is reached by OMISSION, not
#       selection. Replaced by retries_pinned_at_every_agent_construction.
#   W4  `gather_summaries distinctness is waivable on lead_id injectivity` — REFUTED by PB7
#       arm D: the uniqueness token is a file inside MAIN's own write region, so removing it
#       makes the id claimable again. T8 stands.
#   D11 `ci_flag_wiring_waived` — the one waiver a human actually MINTED, at §7 round 3, and
#       WITHDRAWN at round 5. `spec-graph claims` flagged it as citing a `deferred` claim; the
#       probe that followed REFUTED C6 outright. Replaced by enforcement_flag_is_on_in_ci.
#   W2  `run_dir.access[fs]`'s invlang asymmetry is correct because the fs lane cannot be
#       driven to author investigation.md — REFUTED by PBW2: _copy_shared_inputs does exactly
#       that, unvalidated, round-tripping text the api lane refuses. AND it could never have
#       closed anyway: the claim is `kind: reachability`, which returns `unrefuted` and never
#       `confirmed`, while the waiver needs the UNIVERSAL — the exact licence the P3/C7 credit
#       was struck for claiming. Replaced by two demands, deliberately kept separate.
#   W3  `queries_table`'s jsonl serialization is a pre-existing surface outside the blast
#       radius — SPLIT. Three limbs HOLD, retired with 17 executed hostile rows (PBW3S); the
#       fourth is REFUTED (PBW3N), a non-finite float emitting a bare Infinity token reachable
#       by an ordinary 1e400. Replaced by query_row_is_well_formed_json, narrower than the
#       candidate.
# THE PATTERN IS WORTH STATING TO WHOEVER READS THIS NEXT: on this spec, "plausibly waivable"
# predicted "the probe finds a live defect" five times out of five. Three of the five were
# caught only because a mechanical check demanded a citation the prose had not supplied.

# ---------------------------------------------------------------------------
# THE SUITE (phase E). Every `discharged_by` below resolves to exactly one test
# function, and every test function resolves to exactly one demand — 72 for 72, checked
# name-by-name. The four modules, and why the split is where it is:
#   defender/tests/test_budget_enforcement_631.py   (18) the budget LIBRARY: the cap
#       table, the state file, the tail band, the validating read, the commit-time
#       re-check, and D4/NF4's accounting-failure detection state. Faults are REAL
#       INPUT THROUGH THE REAL PRIMITIVE — chmod on the run dir, counters authored on
#       disk, real threads and real writer PROCESSES on one flock.
#   defender/tests/test_budget_seams_631.py         (18) the seams: the posture bit,
#       the limits passthrough, the tier table, the flag's input surface, the retry
#       ceiling, the two pool roots, the CI wiring, the enqueue boundary.
#   defender/tests/test_budget_write_scope_631.py    (9) S1/S2's integrity surface and
#       the two authoring paths that reach investigation.md outside the gate.
#   defender/tests/e2e/test_budget_enforcement_631.py (23) the whole runtime seam
#       driven through `driver.run_investigation` on tests/e2e/_replay_harness.py.
# The harness gained ONE thing: `drive(..., limits=…)`, the optional-kwarg passthrough
# for M12/N1's boundary-resolved cap table, in the same shape as `verbs=` (#611). Every
# fake enters through an injection seam; there is not one `monkeypatch.setattr` in the
# suite (`scripts/lint/lint_monkeypatch.py`: 0 new).
# ---------------------------------------------------------------------------
demands:

  # --- Demand #0: the return contract --------------------------------------
  - {id: return_contract_on_trip, kind: behavior, form: test,
     discharged_by: test_budget_trip_returns_summary_and_writes_trace,
     binds: ["run_investigation", "interacts(run_investigation->run_dir)",
             "interacts(run_investigation->budget_json)"]}

  # --- The caps themselves --------------------------------------------------
  - {id: caps_values, kind: domain-outcome, form: test,
     discharged_by: test_default_limits_values,
     binds: ["DEFAULT_LIMITS.domain.distinguished[wall_clock_timeout]",
             "DEFAULT_LIMITS.domain.distinguished[max_tool_calls]",
             "DEFAULT_LIMITS.domain.distinguished[max_subagent_spawns]"]}

  - {id: grace_seconds_value, kind: domain-outcome, form: test,
     discharged_by: test_grace_seconds_value,
     binds: ["DEFAULT_LIMITS.domain.distinguished[grace_seconds]"]}

  # --- The tail band and its two limbs --------------------------------------
  - id: tail_band_ends_on_either_limb
    kind: behavior
    form: test
    discharged_by: test_tail_ends_on_count_or_clock
    binds: ["check_budgets", "interacts(check_budgets->budget_json)",
            "DEFAULT_LIMITS.domain.distinguished[wall_clock_timeout]",
            "DEFAULT_LIMITS.domain.distinguished[grace_seconds]"]
    sharpened_by: F3b
    moved_by: D7
    # F3(b) makes the grace limb load-bearing: refusals no longer advance the count limb,
    # so a model that only re-issues stopped tools never reaches N+10 and the clock is the
    # ONLY thing that ends its tail. Phase E must drive that arm specifically.
    # D7/D10/D12 (§7 round 3): the tail is LIMB-AGNOSTIC — every trip limb opens the same
    # bounded report tail (tail_opens_on_every_trip_limb carries that half). This resolves
    # the M1/M4 text conflict the strong author found: M1's TIER-AGNOSTIC WALL-CLOCK
    # SENTENCE IS THE STALE ONE. O4's ~20 min is wall clock from RUN START, not
    # tool-calling time (caps_values' docstring carries that). `elapsed` reads a MONOTONIC
    # source (elapsed_is_monotonic).

  - id: started_at_fails_closed
    kind: behavior
    form: test
    discharged_by: test_missing_started_at_does_not_restart_the_clock
    binds: ["update_budget_locked", "interacts(update_budget_locked->budget_json)",
            "budget_json.domain.distinguished[started_at]"]
    moved_by: D2
    # D2 (§7 round 3): the run-scoped sentinel {run_id, created_at} SUPERSEDES the
    # `setdefault` backfill as the evidence this demand rests on. Absent marker = genuine
    # cold start; mismatched or absent-after-present = the file was replaced. The assertion
    # ("a recreated budget.json must not silently restart the wall clock") is unchanged; what
    # changed is what the test reads to decide. Pairs with
    # budget_json_carries_a_run_scoped_sentinel and started_at_swallow_does_not_fail_open.
    # The domain member is bound here (was T18's R4 obligation).

  # --- The kill -------------------------------------------------------------
  - id: kill_own_exception_caught
    kind: behavior
    form: test
    discharged_by: test_budget_kill_writes_partial_trace
    binds: ["run_investigation", "interacts(run_investigation->run_dir)",
            "budget_kill_exception", "interacts(run_investigation->budget_kill_exception)"]
    # CONFIRMED AS WRITTEN by probe P6 (75-probes-mechanism, executed 5x + a 3x asyncio.shield
    # adversarial arm). Under concurrent raises both callers genuinely raise, yet exactly ONE
    # BudgetKill propagates and it propagates UNWRAPPED — a plain `except BudgetKill` catches
    # it, which is the shape driver.py's catch already has. No widening to `except*` is owed.
    # The load-bearing detail: the exception passes through an anyio TaskGroup whose native
    # failure form is BaseExceptionGroup; had two kills landed in one group a plain except
    # would have MISSED it and the kill would have escaped the driver. Phase E should assert
    # the single-exception shape under concurrent raises, so a future pydantic-ai bump that
    # stops collapsing the group fails loudly instead of letting the kill escape.

  - id: kill_off_control_flow
    kind: negative
    form: test
    discharged_by: test_budget_kill_is_not_control_flow
    binds: ["CONTROL_FLOW_EXCEPTIONS", "CONTROL_FLOW_EXCEPTIONS.access[reject-path]",
            "CONTROL_FLOW_EXCEPTIONS.access[execute-path]",
            "interacts(_run_gather->gather_result)",
            "interacts(_run_gather->budget_kill_exception)"]
    positive_control: kill_own_exception_caught
    moved_by: X10   # round 2 bound one consumer site; query_tool.py has two

  # --- Posture is data, not role -------------------------------------------
  - {id: policy_bit_not_role, kind: seam, form: test,
     discharged_by: test_enforcement_keys_on_declared_bit,
     binds: ["AgentDefinition", "AgentDefinition.domain",
             "interacts(_make_hooks->deps_policy)"]}

  - {id: learning_agents_unenforced, kind: negative, form: test,
     discharged_by: test_learning_stages_are_accounting_only,
     positive_control: return_contract_on_trip,
     binds: ["interacts(_pydantic_stage->build_agent_core)", "AgentDefinition"]}

  - id: accounting_stays_unconditional
    kind: behavior
    form: test
    discharged_by: test_accounting_runs_regardless_of_posture
    binds: ["update_budget_locked", "check_budgets"]
    moved_by: F3b   # quantifier narrowed to EXECUTED calls; refusals go to
                    # refused_calls_not_counted, or the two demands contradict
    # NF2 (§7 round 4) CONFIRMS THE NARROWING AND CHANGES NOTHING HERE. M8's "accounting
    # stays unconditional" survives with exactly the executed-calls quantifier the round-3
    # fold applied: unconditional is with respect to POSTURE, not with respect to whether a
    # call did work. The refusal path calls neither update_budget_locked nor check_budgets.
    # The stderr-silence assertion this implies lives on refused_calls_not_counted, which is
    # the demand that owns the refusal case — recorded here so a reader arriving at this
    # demand does not write a second, conflicting assertion about the same channel.

  # --- One pool -------------------------------------------------------------
  - {id: one_whole_run_pool, kind: behavior, form: test,
     discharged_by: test_main_and_gather_share_one_budget,
     binds: ["interacts(_make_hooks->budget_json)", "budget_json.identity",
             "interacts(gather->budget_json)"]}

  - id: counters_never_reset
    kind: negative
    form: test
    discharged_by: test_no_trip_state_no_reset
    binds: ["interacts(update_budget_locked->budget_json)", "budget_json.identity"]
    positive_control: one_whole_run_pool
    moved_by: cold-pass-RF6   # sentence NARROWED to the run's own writer; the universal
                              # moved to enforcement_state_not_model_writable

  # --- The flag -------------------------------------------------------------
  - {id: flag_default_off, kind: domain-outcome, form: test,
     discharged_by: test_enforce_flag_defaults_off,
     binds: ["DEFENDER_BUDGET_ENFORCE.domain",
             "DEFENDER_BUDGET_ENFORCE.domain.distinguished[unset]"]}
     # RECONCILIATION FIX (gate leaf, phase D step 6): `.domain.default` is not a bindable
     # address — schema.md's Address forms list only `.domain.distinguished[<v>]` and
     # `.domain.alternatives[<v>]`; `.default` is field-role "obligation content" (schema.md,
     # "Field roles"), not an address. Re-spelled to the facet address `.domain`, same class
     # of fix as the header's NAME RECONCILIATION block. `spec-graph gate` (no flag) reported
     # this as an R0 dangling `binds:` — a mechanical formal finding, not a judgment call.

  - {id: flag_off_no_enforcement, kind: negative, form: test,
     discharged_by: test_flag_off_leaves_run_unenforced,
     positive_control: return_contract_on_trip,
     binds: ["DEFENDER_BUDGET_ENFORCE.domain.distinguished[false]", "run_investigation"]}

  - id: flag_not_model_settable
    kind: negative
    form: test
    discharged_by: test_model_cannot_disable_enforcement
    binds: ["DEFENDER_BUDGET_ENFORCE.access[bash]", "DEFENDER_BUDGET_ENFORCE.access[env]"]
    positive_control: flag_default_off
    moved_by: cold-pass-RF6   # the "writes are clamped to run_dir" clause is DELETED, not
                              # reworded: the clamp is the boundary of the region CONTAINING
                              # the enforcement state. Scope is now the flag and nothing else.

  # --- GATHER ---------------------------------------------------------------
  - id: gather_stops_clean
    kind: behavior
    form: test
    discharged_by: test_gather_abort_becomes_measurement_string
    binds: ["interacts(_run_gather->gather_result)", "drives(run_investigation->gather)",
            "interacts(_run_gather->gather_result).payload"]
    moved_by: P1
    # RE-TARGETED by probe P1 (75-probes-mechanism, executed). A budget refusal inside
    # GATHER is an ordinary ToolReturnPart, NOT an exception: the inner run completes and
    # MAIN reads the subagent's own degraded summary ('PARTIAL SUMMARY: got 1 result, then
    # refused'). The measurement-shaped string is produced by the PRE-EXISTING
    # UsageLimitExceeded limb, reached only when the subagent re-issues the refused tool
    # until the request limit. TWO DISTINCT CODE PATHS — the round-2 seed docstring named the
    # wrong one, and a test written against "a refusal becomes a measurement string" would
    # assert a conversion that never happens.
    # The payload address is bound here, discharging R1/T1 now that H2's fact half is closed
    # (parts: [str]; the sole model-influenced span is the `({e})` exception repr).

  # --- Capability ordering --------------------------------------------------
  - id: hook_ordering_no_phantom_query_row
    kind: negative
    form: test
    discharged_by: test_stopped_query_writes_no_row
    binds: ["interacts(QueryCapture->queries_table)", "drives(_make_hooks->QueryCapture)",
            "tool_execute"]
    positive_control: query_row_positive_control
    sharpened_by: F3a   # both capabilities now wrap the SAME seam; ordering is the mechanism
    warrant: P4
    # P4 (§7 round 3, answering probe J2): CAPABILITY ORDER IS UNCHANGED. _make_hooks stays
    # FIRST at driver.py:205, so M11's no-phantom-row intent survives. The probe (75-probes,
    # P4) executed the ordering both ways and showed the budget short-circuit preempts
    # QueryCapture ENTIRELY under the live order — no breaker record, no queries-table row,
    # no pre-call trip check. The refusal's own record is minted separately
    # (refusal_writes_its_own_record) rather than borrowing QueryCapture's row shape.
    # ACCEPTED RESIDUAL, recorded not fixed: the circuit breaker still does not observe
    # refusals (record_outcome is reachable only through QueryCapture.wrap_tool_execute,
    # query_tool.py:385).

  - {id: query_row_positive_control, kind: behavior, form: test,
     discharged_by: test_executed_query_writes_a_row,
     binds: ["interacts(QueryCapture->queries_table)"]}

  # --- The test seam --------------------------------------------------------
  - {id: limits_seam, kind: seam, form: test,
     discharged_by: test_limits_threaded_from_boundary,
     binds: ["check_budgets", "interacts(run_investigation->DEFAULT_LIMITS)",
             "interacts(replay_harness->DEFAULT_LIMITS)"]}

  - {id: no_operator_config, kind: negative, form: test,
     discharged_by: test_caps_are_not_operator_configurable,
     positive_control: limits_seam,
     binds: ["DEFAULT_LIMITS.domain", "DEFAULT_LIMITS.access[env]",
             "DEFAULT_LIMITS.access[fs]"]}

  - id: e2e_crosses_the_cap
    kind: behavior
    form: test
    discharged_by: test_replay_run_crosses_budget_and_still_reports
    binds: ["run_investigation", "interacts(run_investigation->run_dir)", "check_budgets",
            "drives(replay_harness->run_investigation)",
            "DEFENDER_BUDGET_ENFORCE.domain.distinguished[true]"]
    cross_check: injected_zero_cap_trips_immediately
    # D9 (§7 round 3): an injected cap of 0 must TRIP IMMEDIATELY rather than read as
    # "disabled" — that is what stops THIS demand passing vacuously. PB6 executed the
    # incumbent behaviour: check_budgets(9999 calls, all caps 0) -> [], silently disabled.
    # A harness that injects 0 and observes "no report tail needed" would go green having
    # driven no enforcement at all.
    # T16 discharged here: DEFENDER_BUDGET_ENFORCE.domain.distinguished[true] — the ON
    # column every other demand depends on — is now bound at its own address.

  # --- Tiering --------------------------------------------------------------
  - id: tier_is_total
    kind: behavior
    form: test
    discharged_by: test_unknown_tool_tiers_as_core
    binds: ["tier", "tier.domain", "interacts(_make_hooks->tier)"]
    # RECONCILIATION FIX: `.domain.default` re-spelled to `.domain` — see flag_default_off's
    # note.
    # SCOPE NOTE from probe P7 (75-probes-mechanism), executed: totality protects a
    # REGISTERED tool the tail table forgot. It does NOT cover an undeclared/undispatched
    # ToolSet bit — `ExtendedToolSet(read=True, undispatched=True)` registers exactly
    # ['read_file'], so the bit produces no tool name and never reaches the tier function at
    # all. The safety there is INERTNESS, not the fail-closed default. The two arguments look
    # interchangeable and are not; no doc or demand may cite this one as covering that gap.
    # The `interacts(_make_hooks->tier)` bind closes hole H5 (RG4/Q5a): the seam reads
    # `call.tool_name` off the ToolCallPart the wrap-style hook receives.

  - id: tier_census
    kind: domain-outcome
    form: test
    discharged_by: test_tier_table_over_the_real_census
    binds: ["tier.domain.distinguished[read_file]", "tier.domain.distinguished[write_file]",
            "tier.domain.distinguished[edit_file]", "tier.domain.distinguished[gather]",
            "tier.domain.distinguished[bash]", "tier.domain.distinguished[template_search]",
            "tier.domain.distinguished[query]"]
    cross_check: enforcement_state_not_model_writable
    # SAME FACT SEEN TWICE: the tail window granted to fund the report is granted over the
    # record that bounds the window. If the carve-out lands as a path narrowing this tier
    # set stays exactly as written; demoting write_file out of the tail breaks O2 and is the
    # WRONG repair.

  - {id: gather_request_limit_unchanged, kind: domain-outcome, form: test,
     discharged_by: test_gather_keeps_its_request_limit,
     binds: ["GATHER_REQUEST_LIMIT.domain"]}
     # RECONCILIATION FIX: `.domain.default` re-spelled to `.domain` — see flag_default_off's
     # note.

  - {id: no_gather_stopwatch, kind: negative, form: test,
     discharged_by: test_gather_has_no_per_call_timeout,
     positive_control: gather_request_limit_unchanged,
     binds: ["drives(run_investigation->gather)", "interacts(_run_gather->gather_result)"]}

  # --- Docs (the one recorded clause) ---------------------------------------
  - id: docs_match_code
    kind: behavior
    form: clause
    binds: ["threat_model_class_7", "budget_enforcer_docstring",
            "DEFAULT_LIMITS.domain"]
    # RECONCILIATION FIX: `.domain.default` re-spelled to `.domain` — see flag_default_off's
    # note.
    outcome: {nl: "Four edits land so the prose describes what the code does in whichever
      state the flag leaves it: budget_enforcer's docstring stops declaring itself
      warning-only and stops saying nothing here blocks, it stops naming after_tool_execute
      as its sole consumer now that the tool_execute trip seam is a second one,
      DEFAULT_LIMITS' inline comment stops reading thirty minutes against a twenty-minute
      cap, and threat-model class 7 stops saying the budget warns rather than blocks while
      the Open questions entry asking whether to flip to blocking is removed because this
      design answers it."}
    rejected:
      - {nl: "Re-editing class 7's one-path half at threat-model.md:182-184 — already
          correct at this base and NOT part of this edit set (X9)."}
    moved_by: X9
    # form: clause is a RECORDED DOWNGRADE, not a default — three of the four edits are
    # prose whose correctness no assertion captures. The 30-min comment rides caps_values,
    # which is executable.

  # --- Unblocked by F3 (the trip seam itself) -------------------------------
  - id: tool_refused_at_execute_seam
    was: W1
    kind: behavior
    form: test
    discharged_by: test_stopped_tool_is_refused_not_withdrawn
    binds: ["tool_execute", "interacts(_make_hooks->tool_execute)",
            "interacts(_make_hooks->deps_policy)", "tier"]
    rejected:
      - {nl: "Withdrawing the tool in prepare_tools — probed to shadow the execute seam and
          reintroduce the very retry crash the mechanism exists to avoid (X6)."}
      - {nl: "A before_tool_execute backstop for stale calls — superseded, not merely
          re-anchored. With nothing withdrawn there are no stale calls to backstop, and X2
          showed that hook never fires for a tool the framework has already rejected."}
    moved_by: P3probe
    # SCOPE NARROWED by probe P3 (75-probes-mechanism, executed). pydantic-ai validates a
    # ToolCallPart's args against the tool's schema BEFORE dispatching to ANY execute-family
    # hook: on missing / wrong-typed / extra-field args the seam fires before=0 wrap=0
    # after=0 and a RetryPromptPart appears instead. So this demand is true only for calls
    # whose args are SCHEMA-VALID, and its test must bind valid args. The wording must not
    # claim a stopped tool is refused unconditionally.
    # The residual — a model spamming a stopped tool with INVALID args never sees M1b's
    # message and climbs the retry ceiling — is bounded by P3's §7 resolution: with `retries`
    # affirmatively pinned at 10 (retries_pinned_at_every_agent_construction) the spam runs
    # out at the REQUEST limit and raises UsageLimitExceeded, which run_investigation DOES
    # catch (driver.py:546) and which writes the trace.

  - id: reissue_costs_no_retries
    was: W2
    kind: behavior
    form: test
    discharged_by: test_repeated_reissue_accumulates_no_retries
    binds: ["tool_execute", "run_investigation", "DEFAULT_TOOL_RETRIES.domain"]
    # RECONCILIATION FIX: `.domain.default` re-spelled to `.domain` — see flag_default_off's
    # note.
    # THE DISCRIMINATING DEMAND. Exactly the property withdrawal destroys (X6) and
