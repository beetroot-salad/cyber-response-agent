  # --- VR1: the cross-process origin, R27's first-raised correctness hole ----
  - id: budget_origin_is_cross_process_wall_clock
    kind: domain-outcome
    form: test
    discharged_by: test_budget_origin_is_a_cross_process_wall_clock
    binds: ["budget_json.domain.distinguished[created_at]",
            "budget_json.domain.distinguished[started_at]",
            "interacts(check_budgets->budget_json)",
            "interacts(run_investigation->budget_json)"]
