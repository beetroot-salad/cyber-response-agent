    - {from: MAIN, to: alert_json, mode: write, via: api, provenance: design,
       interpolates: [run_dir]}
      # S1's sixth integrity facet. Q8 executed: write=True. `CLAUDE.md` says run setup
      # "writes it; the agent treats it as read-only" — TREATS, with nothing enforcing it.
    - {from: MAIN, to: DEFENDER_BUDGET_ENFORCE, mode: read, via: bash, provenance: code}

    # --- gather -------------------------------------------------------------
    - {from: gather, to: budget_json, mode: write, via: fs, provenance: design,
       interpolates: [run_dir]}
    - {from: gather, to: gather_summaries, mode: write, via: fs, provenance: design,
