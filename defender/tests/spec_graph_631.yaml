    # VR1 (§7 round 6) REFINES D12, does not reverse it. budget.json is cross-process
    # shared (M8: one pool for MAIN + every GATHER; the torn-read test drives six
    # subprocesses), and time.monotonic() is NOT comparable across processes — which
    # D12's "elapsed is monotonic" silently assumed. Resolved: created_at is persisted
    # as WALL CLOCK (the shared origin) and each process uses its own monotonic source
    # for a within-process delta only; `elapsed = max(wall_delta, local_monotonic_delta)`.
    # D12's backward-step protection survives where it applies (elapsed_is_monotonic);
    # the cross-process comparability it could not provide is now a demand, not an
    # assumption. The origin's cross-process meaning was R27's FIRST-RAISED hole because
    # it is a correctness hole (a wall origin defeated by a fresh-monotonic reader in
    # another process) rather than a coverage one.

