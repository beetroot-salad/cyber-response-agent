  - {id: C6, kind: census, source: discuss, claim: "Observed tool-call counts justify a specific cap — specifically, that real runs land at 10-26 tool calls against a cap of 200 (the characterization D11's round-3 waiver rested on)", probe: "79-probes-dispatch-bound C6 — `find / -iname budget.json`, then narrowed by `git ls-files` to what is actually TRACKED in this worktree, every hit read and compared against DEFAULT_LIMITS. Re-verified independently by the fold leaf: `git ls-files experiments/actor-basin-276/fixtures/ | grep budget.json` returns both files and their contents were read", probe_kind: search, observed: "REFUTED, and the correct number was sitting in this same git tree. The original n=6 (tool_calls 10-26, subagent_spawns=0 in all six) is real but UNTRACKED — it lives only in a leftover archived worktree (.claude/worktrees/gather-verifiable-code-289/), unreachable from a fresh checkout. Searching THIS worktree finds two more, COMMITTED TO GIT: experiments/actor-basin-276/fixtures/falco-net-tool-live/budget.json at tool_calls=191, subagent_spawns=7, and .../sshd-gabe-live/budget.json at tool_calls=182, subagent_spawns=7 — full frozen run-dir captures (alert.json, executed_queries.jsonl, gather_raw/, investigation.md, report.md all present alongside) of real end-to-end loop runs. That is 95.5% and 91.0% of the 200 cap, both well past the 75% warning line at 150. REAL RUNS RANGE AT LEAST 10-191. Note WHICH samples the waiver's number came from: all six show subagent_spawns=0, so none exercised a normal gather-heavy investigation — the low end is drawn from the least-representative slice of the available data. The narrower 'the deny branch never trips' is NOT refuted (max observed 191 < 200) but now rests on a 4.5% margin, not a wide one", verdict: refuted}
