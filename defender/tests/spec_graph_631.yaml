    - {from: _run_gather, to: budget_kill_exception, mode: read, via: api,
       provenance: design}

    # --- capabilities -------------------------------------------------------
    - {from: QueryCapture, to: queries_table, mode: write, via: fs, provenance: design,
       interpolates: [run_dir]}
    - {from: QueryCapture, to: tool_execute, mode: invoke, via: api, provenance: code}
