          argument as the run_dir clamp that was already struck once."}
    # RE-VERIFIED INDEPENDENTLY BY THE FOLD before minting: persist.py:193's tuple, the
    # copy2 at :210, and `grep -c 'decide_write|invlang|validate_companion' persist.py` -> 0.
    # S1/S2 DO NOT CLOSE THIS, and the demand says so rather than leaving a reader to infer
    # it: THE FS LANE NEVER CONSULTS write_allow, so the positive allow-list is invisible to
    # it. The fs cell is not missing a constraint it declined to take — it is missing the GATE
    # THE CONSTRAINT LIVES INSIDE.
    # WHY THIS WAS NEVER WAIVABLE, independent of the refutation: the claim W2 would have
    # cited is `kind: reachability`, and a break-attempt over an enumerated surface returns
    # `unrefuted`, never `confirmed`, while the waiver's argument needs the UNIVERSAL. That is
    # the exact licence the P3/C7 pre-discharge credit was struck for claiming. Its honest
    # route was always a safe-by-construction demand; the probe merely removed the question by
    # making the claim false. Discharges R3 obligation T12.

  - id: invlang_validator_selects_on_the_resolved_path
