  # --- D4: accounting-write failure ----------------------------------------
  - {id: isolated_accounting_write_failure_fails_open, kind: behavior, form: test,
     discharged_by: test_one_failed_accounting_write_costs_one_call_of_overshoot,
     binds: ["interacts(_make_hooks->budget_json)", "accounting_failure_state",
             "accounting_failure_state.domain",
             "accounting_failure_state.domain.distinguished[0]",
             "interacts(_make_hooks->accounting_failure_state)", "update_budget_locked"]}
    # Binds the FALSY member at its own address (R4), and it is the load-bearing one under
    # either D4 mechanism: zero consecutive failures / no first-failure stamp is the healthy
    # state, `falsy_valid` is true, and an implementation that cannot tell "zero failures"
    # from "no state" reads a fresh run as a standing fault or a standing fault as fresh.
    # D4 (§7 round 3): ONE failure costs ONE call of overshoot and nothing more — the
    # counter is monotonic, so the next call re-crosses and trips. The run continues.

  - {id: sustained_accounting_failure_is_an_environment_fault, kind: behavior, form: test,
     discharged_by: test_consecutive_accounting_write_failures_stop_or_mark_the_run,
     binds: ["accounting_failure_state", "accounting_failure_state.domain",
             "accounting_failure_state.domain.distinguished[consecutive_failures]",
             "interacts(_make_hooks->accounting_failure_state)", "budget_kill_exception"]}
    # D4 (§7 round 3) + NF4 (§7 round 5). THE STANDING-FAULT LIMB, re-scoped to the
    # CONSECUTIVE-FAILURE COUNT and its own threshold: consecutive accounting-write failures
    # reaching that threshold stop or unmistakably mark the run. The count RESETS ON SUCCESS,
    # which is the property that keeps it from firing on an intermittent fault — and is
    # exactly why it cannot be the only mechanism. Its sibling below covers the gap it leaves.
    # The id is kept (it was minted for this limb and still names it); what changed is that
    # it now binds ONE member rather than the facet, per R4's per-member discipline.

  - {id: intermittent_accounting_failure_trips_the_elapsed_stamp, kind: behavior, form: test,
     discharged_by: test_an_intermittent_accounting_failure_trips_the_first_failure_stamp,
     binds: ["accounting_failure_state", "accounting_failure_state.domain",
             "accounting_failure_state.domain.distinguished[first_failure_at]",
             "interacts(_make_hooks->accounting_failure_state)", "budget_kill_exception"]}
    # NF4 (§7 round 5) — THE SECOND MECHANISM, minted because the two close DIFFERENT gaps.
    # A first-failure stamp does NOT reset on success, so it measures ELAPSED DEGRADATION:
    # an accounting write that fails every other call never advances the consecutive count
    # past one, and would go undetected forever under the count alone, but trips this limb
    # once the stamp's own (separate) threshold of elapsed time is passed.
    # THE DISCRIMINATING TEST, and phase E must drive it as such: an ALTERNATING
    # failure/success sequence, which the count limb by construction cannot catch. A test
    # that drives only consecutive failures proves nothing here — it would pass against an
    # implementation that shipped the count and skipped the stamp.

  # --- D2: the run-scoped sentinel -----------------------------------------
  - id: budget_json_carries_a_run_scoped_sentinel
