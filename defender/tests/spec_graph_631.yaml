  - {id: C1, kind: behavior, source: discuss, claim: "A ModelRetry raised in before_tool_execute skips after_tool_execute, so the driver's `except Exception` budget guard cannot swallow the denial — and denied calls are invisible to the counter that lives there", probe: "probe_retry.py — deny-then-succeed against FunctionModel, recording which calls reached the after_tool_execute hook", probe_kind: executed, observed: "B1 deny-then-succeed: COMPLETED, after_tool_execute fired for ['work','work'] — the 2 successful calls, never the denied one", verdict: holds}
