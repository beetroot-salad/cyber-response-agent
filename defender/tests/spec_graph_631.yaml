  # --- W3, split: the line protocol holds; non-finite floats do not --------
  - id: query_row_is_well_formed_json
    kind: behavior
    form: test
    discharged_by: test_a_query_row_carrying_a_non_finite_param_is_still_strict_json
    binds: ["queries_table.access[fs]", "interacts(QueryCapture->queries_table)",
            "queries_table.identity"]
    positive_control: query_row_string_params_survive_the_line_protocol
    rejected:
      - {nl: "Waiving the queries-table serialization as a pre-existing surface outside this
          delta's blast radius — W3. Contradicted structurally BEFORE the probe: the delta
          touches this edge through M11's ordering, hook_ordering_no_phantom_query_row binds
          it, and P4 established that a budget short-circuit preempts QueryCapture entirely.
          Contradicted substantively BY the probe: there is a live defect at the address, so
          'unchanged and therefore fine' has nothing to rest on."}
      - {nl: "Sanitizing every param string on the way in — the blanket fix the positive
          control exists to forbid, because it would quietly mangle legitimate query text
          that the protocol already handles correctly."}
    # THE SPLIT IS THE FINDING. Three of the waiver's four limbs HOLD and are retired with
    # evidence (see claim PBW3S): 17 hostile rows — embedded LF/CRLF/CR, synthetic-row
    # injection, VT/FF/FS/GS/RS, NEL U+0085, LS/PS U+2028/U+2029, NUL, a lone surrogate, a
    # quote-and-backslash storm — every one exactly ONE line, 17 written and 17 read back,
    # byte-exact round-trip, no forged row appearing as its own row.
    # THE FOURTH LIMB IS REFUTED: a model-chosen NON-FINITE FLOAT makes the writer emit the
    # bare tokens NaN / Infinity (append_jsonl is `fh.write(json.dumps(row) + "\n")`, _io.py:
    # 158), which are NOT valid RFC-8259 JSON. Every Python reader in this tree accepts them,
    # which is why nothing has ever noticed, and `jq`/Go/Rust do not.
    # REACHABLE BY ACCIDENT, NOT ONLY BY INTENT — this is the witness, and it is why the
    # honest fixture is `{"threshold": 1e400}` rather than an adversarial one: the `query`
    # tool declares `params: dict[str, Any]`, so pydantic accepts the ordinary-looking
    # numeric literal 1e400 and SILENTLY OVERFLOWS it to inf, which the writer emits as a
    # bare `Infinity`. Re-verified by the fold: TypeAdapter(dict[str, Any]) accepts 1e400 ->
    # {'threshold': inf} -> json.dumps emits {"threshold": Infinity}, and a strict reader
    # (json.loads with parse_constant raising) REJECTS it while lenient Python accepts.
    # AND IT ESCAPES THE RUN, which is S1's stated reason for pulling this element in: params
    # ride verbatim into actor_view and out through render_actor_view_yaml as `.inf`, a PyYAML
    # extension, into the artifact that reaches the checked-in lessons corpus.
    # The demand pins the OBSERVABLE, not the mechanism: satisfied either by rejecting the
    # value at the tool boundary or by coercing it before it reaches append_jsonl.
    # Discharges the R3 anchor-cell obligation on queries_table.access[fs].

  - {id: query_row_string_params_survive_the_line_protocol, kind: behavior, form: test,
     discharged_by: test_hostile_string_params_still_produce_exactly_one_row,
     binds: ["queries_table.access[fs]", "interacts(QueryCapture->queries_table)"]}
    # THE POSITIVE CONTROL, and it is load-bearing rather than ceremonial: it is what stops
    # the non-finite fix from being a blanket param sanitizer. Ordinary params round-trip
    # byte-identical, and the sharp string cases — an embedded newline and U+2028 — still
    # produce exactly one line and one row. The mechanism that makes them safe is
    # json.dumps' default ensure_ascii=True, which escapes every character
    # str.splitlines() would honour, INCLUDING the three a bytes-level split would miss
    # (U+0085, U+2028, U+2029) — precisely where the reader's text.splitlines() would
    # otherwise diverge from the writer's newline count.

