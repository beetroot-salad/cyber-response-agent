#   V-A the self-key screen EXTENDS to the list path (identity filter) — d23 binds both
#       tool paths, d24's re-check adds per-item self-key exclusion.
#   V-B d0's truncation bound is the query tool's EXACT passthrough ceiling + the note.
#   V-C the two stale teaching docs (runtime-gates.md:42, state-surface-adapters.md) join
#       d21's census, with the d26 currency test.
#   V-D the Fork B capture-row sink is MODELLED (judge_queries_table + write edges, d27,
#       R2 recomputed); brief F3's registration-ORDER half is d28 (50-graph-digest.md:113's
#       false "rides c11/d21" booking corrected); the salt must be UNPREDICTABLE (a counter
#       fails the per-bind test).
#   V-E g11 re-typed behavior, verdict holds on the EXECUTED probe 66-bashlane-probe.md
#       (drove the real _tool_bash seam: box=None is the single cause); x1's box-denial
#       half executed by the same probe; x4 + r1/r1-extended stay deferred under d18.
#   V-F the cross-leg salt half is w3, Demand{form: waiver} — unexercisable, the
#       adversarial leg has no ticket tools.
#   V-G JUDGE_REQUEST_LIMIT=45 pinned as claim g20; skills/ticket/SKILL.md's status
#       vocabulary is the executable demand d29; d21 enumerates its four named stale
#       tests; SOC_PLAYGROUND_DOCKER_CONTEXT recorded as a no-consequence note (on
#       TICKET_TIMEOUT_SEC's facet — the config family's carrier).
#
# ROUND 3 (76-verify-r2-resolutions.md — round-2 cold findings, all auto-repairs of
# decided intent, none re-decided):
#   C5  Fork E applied to BOTH read tools: the LIST path gets its own open-breaker honor
#       test (test_store_breaker_open_blocks_list_path — immediate failed result, no
#       transport attempt), and the malformed-list breaker trip is driven ALONE so the
#       contribution is per-verb attributable (closes C6b too).
#   C6a d16 pins the teaching INSTRUCTION (cached surface coupled to "context, never
#       confirmation" + the confirmation-denial), with the explicit note beside d16 that
#       Fork D's behavioral half is instruction-level, not suite-enforced.
#   C7  80-author-digest.md's inventory recomputed to the real current counts.
#   CR-m1 d28 asserts the insertion POSITION (source-order census over register_tools'
#       presence table) beside the judge-leg projection; CR-m2 d23's list-fault fallback
#       scoped to the list call's own appended result; CR-m3 the x4 handoff entry split
#       from the g11/x1 resolution record — x4 stays executed-probe-owed.
#
# §7 RESOLUTIONS APPLIED (70-resolutions.md is authoritative; 65-forkd-probe.md executed):
#   Fork A — key meets a DEFINED minimal schema before any store attempt (d10 amended).
#   Fork B — demand #0's provisional record-free reading FLIPPED: full query-tool mirror,
#            capture row + bounded truncation-noted view (d0 de-provisionalized).
#   Fork C — the case's own key excluded at the tool boundary (d23 minted).
#   Fork D — only the live closed-only read confirms; cached gather_raw is context (d16).
#   Fork E — FULL breaker participation: honor + contribute (d6/d8 fixtures amended);
#            business refusals (exit-1) never contribute.
#   Fork F — cut loose, documented (d9); an unfinished attempt is the one attempt (d8).
#   Fork G — client-side per-item closed re-check on the list path (d24 minted).
#   Fork H — O2 scoped record-wise + the self-key payload screen (d25 minted); the
#            residual transitive path is the N-note on ticket_store.domain below.
#   f2     — names CONFIRMED: `closed_tickets`, `get_closed_ticket`, `list_closed_tickets`.
#   Waivers w1/w2 mint the two open R3 cells as examined declines (see gate note).
#   Two design corrections fold into M6's rewrite scope: judge/run.py:80's false
#   "it is open" claim must not survive the rewrite (d15's test pins its absence), and
#   skills/ticket/SKILL.md advertises statuses the server never had (p1).
#
# Name reconciliation (assembler — the graph joins to code BY NAME, schema.md "Coin ids"):
#   cited_policy_read_section -> _cited_policy_read_section  (judge/run.py:60-94)
#   judge_deny_reason         -> _JUDGE_DENY_REASON          (engine_pydantic.py:60-68)
#   judge_bash_grants         -> _judge_bash_shapes          (engine_pydantic.py:111-142)
#   the surviving ticket CLI  -> ticket_adapter_cli          (scripts/adapters/ticket_adapter.py main;
#                                distinct from the REMOVED judge-side ticket_cli plumbing below)
# Negative demands d2/d19 were re-bound from addresses of edges that must NOT exist to the
# element addresses of the surfaces the negatives sweep: a `binds` address must resolve in
# structure, and materializing those edges would assert the very thing each demand denies.
schema_version: 1
design: "#672 — intent-design-672.md: typed closed-ticket tool for the benign judge"
base: 07596adfde6ccfb5ef3eab9a727de13c4c52f39c

# ===========================================================================
# DEMANDS — the spec proper (20-demands.md, verbatim semantics; 20 test + 2 clause
# at phase D; phase E minted d22-d25 + w1/w2, the F round minted d26-d29 + w3 —
# now 28 test + 2 clause + 3 waiver).
# form:test demands are POINTERS — their outcome prose is the docstring seed in
# 20-demands.md, destined for the named test at phase E.
# ===========================================================================
demands:

  # --- #0 THE RETURN CONTRACT — RESOLVED at §7 (Fork B, the flip): the provisional
  # record-free reading was REJECTED. The tools mirror the query tool FULLY: every call
  # writes a capture row into the judge run dir's queries table (an audit trail of judge
  # ticket reads, test-visible, unconditional on result size or outcome), and an
  # oversized view is bounded with a truncation note + the persisted-payload pointer.
  # V-B (F round): the bound is the query tool's OWN passthrough ceiling, EXACTLY —
  # _passthrough_max_bytes() (DEFENDER_GATHER_PASSTHROUGH_MAX_BYTES, shipped 65536;
  # record_query.py:65-68), computed over the payload's compact-JSON serialization as the
  # query-tool capture does (query_tool.py:354,406): one byte over truncates with the note
  # naming the byte size; at the ceiling the view rides inline whole.
  # The Fork B premises are pinned by the sibling scenario tests
  # (test_oversized_payload_bounded_view_and_capture_row, test_list_closed_tickets_result_empty);
  # the sink itself is modelled and demanded at d27 (V-D).
  - id: d0_tool_result_envelope
    kind: behavior
    form: test
    binds: ["interacts(benign_judge->get_closed_ticket).response", "interacts(benign_judge->list_closed_tickets).response"]
    discharged_by: test_tool_result_envelope

  - id: d1_benign_registration
    kind: seam
    form: test
    binds: ["closed_tickets", "interacts(benign_judge->get_closed_ticket)", "interacts(benign_judge->list_closed_tickets)", "JudgeWiring.closed_ticket_read"]
    discharged_by: test_benign_leg_registers_closed_ticket_tools
    # rejected (to the test, phase E): N6 — presence is a ToolSet bit on the built
    # definition, never a conditional in a body; defender-policy show stays out of scope.

  - id: d2_adversarial_absent
    kind: negative      # positive control: d1 (same stage-build seam, wiring bit on)
    form: test
    binds: ["adversarial_judge", "get_closed_ticket", "list_closed_tickets", "closed_tickets.domain.distinguished[false]"]
    discharged_by: test_adversarial_leg_has_no_ticket_tools
    # rejected: N3 — no runtime direction check; the property is absence by registration.

  - id: d3_schema_closed_by_construction
    kind: shape         # exactness subsumes the negative (no require_closed, no status)
    form: test
    binds: ["interacts(benign_judge->get_closed_ticket).payload", "interacts(benign_judge->list_closed_tickets).payload"]
    discharged_by: test_tool_schemas_have_no_status_or_require_closed
    # rejected: N5 — no write verb; adapter stays read-only. Two tools, deliberately no
    # operation discriminator (M1).

  - id: d4_body_pins_closed
    kind: behavior
    form: test
    binds: ["interacts(get_closed_ticket->ticket_store)", "interacts(list_closed_tickets->ticket_store)"]
    discharged_by: test_bodies_hardcode_require_closed

  - id: d5_nonclosed_refused_as_fault
    kind: domain-outcome
    form: test
    binds: ["ticket_store.domain.distinguished[open]", "interacts(benign_judge->get_closed_ticket).response"]
    discharged_by: test_open_ticket_refused_as_failed_result

  - id: d6_unreachable_store_fault
    kind: behavior
    form: test
    binds: ["interacts(get_closed_ticket->ticket_store)", "interacts(benign_judge->get_closed_ticket).response"]
    discharged_by: test_unreachable_store_is_failed_result
    # rejected: scale-dive tradeoff — no outer wall-clock budget; the transport's mandatory
    # inner timeout (x4, TICKET_TIMEOUT_SEC+10) is the only kill, as the query tool accepted.
    # Fork E RESOLVED (§7, departing from the isolation recommendation): FULL breaker
    # participation. An infra fault here is RECORDED against the breaker, and an already-open
    # breaker yields an immediate failed result with NO transport attempt
    # (test_store_breaker_open_when_judge_reads pins the honor direction on this demand).
    # ROUND 3 (C5): the honor arm is pinned on BOTH read tools — Fork E's wording is
    # unqualified over the tool — test_store_breaker_open_blocks_list_path drives the
    # LIST path against the open breaker (immediate failed result, zero transport
    # attempts), and the malformed-list contribute arm (on d7's test) is driven with no
    # sibling get, so list→breaker holds in both directions, per-verb attributable.

  - id: d7_unmapped_fault_enveloped
    kind: behavior
    form: test
    binds: ["interacts(benign_judge->get_closed_ticket).response"]
    discharged_by: test_unmapped_fault_returns_envelope

  - id: d8_single_attempt_no_retry
    kind: negative      # positive control: the attempt observed in d5/d6; minted from O4
    form: test
    binds: ["interacts(get_closed_ticket->ticket_store)"]
    discharged_by: test_store_fault_single_attempt
    # Fork E RESOLVED (§7): the annexed premise's converged "each call pays full price, no
    # breaker participation" assertion was REWRITTEN, not confirmed — repeated judge-side
    # infra failures TRIP the breaker and subsequent reads fail fast with no transport
    # attempt (test_repeated_store_failures_across_one_judge_run pins it on this demand).
    # Fork F RESOLVED: an unfinished (run-cut-off) attempt still counts as the one attempt.

  - id: d9_control_flow_reraise
    kind: behavior
    form: test
    binds: ["get_closed_ticket", "list_closed_tickets"]
    discharged_by: test_control_flow_exceptions_propagate
    # Fork F RESOLVED (§7): cut loose, documented — CancelledError re-raises immediately,
    # no await-to-clean-stop; the transport thread dies on its own inner timeout.

  - id: d10_model_retry_malformed
    kind: behavior
    form: test
    binds: ["interacts(benign_judge->get_closed_ticket).payload"]
    discharged_by: test_malformed_key_model_retry
    # Fork A RESOLVED (§7, refined): the boundary is an explicit, DEFINED key schema —
    # empty, whitespace-only, and path/URL-significant characters (separators, `..`,
    # query delimiters, percent-encoded bytes) reject with a retry-class response and
    # ZERO store attempts; everything else (length, clean non-ASCII) flows opaquely and a
    # store refusal folds into O4. The silent branch (wrong-JSON-type key) pins the same
    # model-visible observable LAYER-AGNOSTICALLY — the test must not assert which layer.

  - id: d11_untrusted_wrap
    kind: shape
    form: test
    binds: ["interacts(benign_judge->get_closed_ticket).response", "interacts(benign_judge->list_closed_tickets).response"]
    discharged_by: test_returns_salt_wrapped_untrusted

  - id: d12_bash_grants_exact
    kind: behavior      # exactness = positive (cat+defender-sql present) and negative (no ticket shape)
    form: test
    binds: ["_judge_bash_shapes"]
    discharged_by: test_judge_bash_grants_exactly_cat_sql

  - id: d13_in_process_host_side
    kind: seam
    form: test          # discharged largely by construction: every drive goes through the deps seam
    binds: ["get_closed_ticket", "list_closed_tickets", "ticket_adapter_verbs"]
    discharged_by: test_tools_drive_verbs_in_process_via_deps
    # rejected: N1 — no network egress through the box (stays --network=none); N4 — the
    # gather-side VERBS registry and six CLI-less adapters untouched.

  - id: d14_cli_surface_survives
    kind: survival
    form: test
    binds: ["ticket_adapter_cli", "interacts(ticket_seeds->ticket_adapter_cli)", "interacts(verify_forward->ticket_adapter_cli)", "ticket_adapter_cli.domain.distinguished[64]"]
    discharged_by: test_cli_exit_codes_survive_for_subprocess_consumers

  - id: d15_teaching_teaches_tool
    kind: behavior
    form: test
    binds: ["_cited_policy_read_section", "benign_prompt"]
    discharged_by: test_teaching_surfaces_teach_tool_not_bash
    # fork f2 RESOLVED (§7): names kept — the taught strings are `list_closed_tickets` /
    # `get_closed_ticket`, matching the registered names literally. §7 design correction 1
    # rides here too: the rewrite must NOT carry forward run.py:80's false "it is open"
    # claim (contradicted by the unconditional close; the Fork C exclusion is structural
    # and state-independent, so the teaching no longer asserts the ticket's state).

  - id: d16_cited_seed_instruction_survives
    kind: survival
    form: test
    binds: ["_cited_policy_read_section"]
    discharged_by: test_cited_seed_instruction_survives
    # The instruction lives in TWO places (judge/run.py:80-84 inside the rewritten section;
    # benign.md:148 outside item 7 — x2): the rewrite must orphan neither. Fork D RESOLVED
    # (§7, probe-backed: 65-forkd-probe.md / p1-p3): only the live closed-only read
    # satisfies "the store confirmed it" — cached gather_raw payloads are CONTEXT, never
    # confirmation, and the rewritten section says so in so many words
    # ("context, never confirmation" — the pinned sentence the test scans for).
    # ROUND 3 (C6a) — the pin is the INSTRUCTION, not a floating phrase: the test requires
    # (a) one sentence coupling the cached surface (cached/gather_raw) to "context, never
    # confirmation", (b) the confirmation-denial anchor "store confirmed", and (c) the
    # affirmative half "only the live … read". EXPLICIT NOTE (recorded beside this demand,
    # honestly): Fork D's BEHAVIORAL half — a judge that nonetheless treats a cached
    # payload as confirmation when reasoning to its verdict — is a property of the model's
    # verdict reasoning, INSTRUCTION-LEVEL ONLY, not suite-enforceable on this tool's
    # surface; no unit test here can bind it. The human's Fork D resolution ratified
    # exactly this prompt-rule shape ("the sentence is wired into the rewritten
    # _cited_policy_read_section so d16 tests it", 70-resolutions.md) — the blind reader's
    # cache-context absence (A14) resolves to that §7 record, not to a suite loss.

  - id: d17_deny_reason_matches_grants
    kind: behavior
    form: test
    binds: ["_JUDGE_DENY_REASON", "_judge_bash_shapes"]
    discharged_by: test_deny_reason_matches_shrunk_grants

  - id: d18_store_route_census
    kind: negative      # positive control: d1+d4 (the typed tools DO reach the store)
    form: test
    binds: ["ticket_store.access[typed-tool]", "ticket_store.access[bash]", "ticket_store.access[read-tool]"]
    discharged_by: test_benign_store_routes_census
    cites: [r1, r1-extended]   # the reachability claims this census re-probes against the BUILT policy
    # rejected: N7 — gather_raw-cached ticket payloads are a pre-existing surface, identical
    # before and after; the judge reads them by design. O2 governs only the live-store read.

  - id: d19_no_query_tool_on_judge
    kind: negative      # minted from N2; positive control: d1
    form: test
    binds: ["benign_judge", "adversarial_judge", "query_tool"]
    discharged_by: test_no_query_tool_on_judge_legs

  - id: d20_bash_plumbing_removed
    kind: negative
    form: clause        # recorded downgrade: field-level absences are implementation structure;
                        # their observable consequences are pinned by d12/d15/d17
    binds: ["RunScope.ticket_cli", "_ticket_grant", "_ticket_cli_path", "policy_cli_judge_demo"]
    outcome: {nl: "The bash-side plumbing is deleted: _ticket_grant and its wiring branch, the RunScope.ticket_cli / ResolvedRoots.ticket_cli threading, the judge-side carrier with its pinned command text and _ticket_cli_path, and policy_cli.py's judge demo scope — removing its latent wrong-script bug (it points at case_history/case_ticket.py, not the real CLI)."}
    rejected: [{nl: "No runtime direction check replaces the grant — the adversarial property is absence by registration (N3)."}]

  - id: d21_stale_censuses_updated
    kind: negative
    form: clause        # recorded downgrade: suite/graph/prose maintenance, not e2e behavior;
                        # conservation rides censuses c11/c15 (defender/CLAUDE.md site: GONE, g4/F9)
    binds: ["ticket_adapter_cli", "_judge_bash_shapes"]
    outcome: {nl: "Every surface still teaching or checking the deleted bash lane is retired or updated per censuses c11/c15. The four NAMED stale tests (V-G, enumerated so the implementer meets a list, not a pointer): e2e/test_query_tool_611.py:1310-1318 (test_ticket_cli_dual_surface_survives — its 'three consumers incl. the judge's grant' claim goes false with M6), test_judge_sql_idioms_corpus.py:323, test_permission.py:688-751, test_benign_direction.py:569-623; plus the grant-regex tests (test_judge_pydantic_engine.py:215-310, test_grant_gate_575.py:717-748 e1-e3, test_bind_sole_seam_551.py:238-262) and learning/test_loop.py:1837-1857's scope.ticket_cli assertion; the spec-graph nodes across spec_graph_575/551/538/611; and the comment/docstring censuses (adapter docstring three-to-two consumers, permission/bash.py:181,331, grant.py:196-206, policy_cli.py:44-49,77-86, _stub_transport.py:78, engine_pydantic.py:5-6,102 — the defender/CLAUDE.md site is already gone, #673). The teaching-doc surfaces (V-C, all four enumerated): judge/run.py:80's false 'is open' claim (pinned by d15's test); skills/ticket/SKILL.md's status vocabulary — the server's real enum is open|in_progress|closed, p1 (now the executable demand d29); docs/runtime-gates.md:42's 'judge's ticket CLI / mandatory --require-closed lookahead' teaching, false under M6; and docs/state-surface-adapters.md, dispositioned as describing the SURVIVING verb surface. The doc-currency halves are enforced by d26's test."}

  # ===========================================================================
  # §7-MINTED DEMANDS (70-resolutions.md): the Fork C/G/H mechanisms, the d22
  # registration census (60-residue.md's test obligation), and the two waivers.
  # ===========================================================================

  - id: d22_registration_reaches_every_call_site
    kind: seam
    form: test          # §7 gate obligation, minted as a STATIC census: all three benign-leg
                        # drivers funnel through the identical invoke_judge -> stage-build
                        # call with no bypass, paired with d1/d2's per-leg behavior checks.
                        # Not the per-entrypoint investigation drive (too heavy); not folded
                        # into d1 (the tools= threading is brand-new plumbing whose per-site
                        # completeness had never been demonstrated).
    binds: ["drives(learning_loop->invoke_judge)", "drives(run_judge_ab->invoke_judge)", "drives(judge_equivalence->invoke_judge)", "closed_tickets", "JudgeWiring.closed_ticket_read"]
    discharged_by: test_closed_ticket_registration_reaches_every_benign_call_site

  - id: d23_self_key_excluded
    kind: negative      # positive controls: d0's success path — any other well-formed closed
                        # key reads through the get edge, and the sibling closed item in the
                        # same listing is servable (asserted inside the same test).
    form: test          # Fork C (§7): the circular-confirmation path is closed STRUCTURALLY.
                        # V-A (F round): EXTENDED to the list path — the self-case's record
                        # is filtered by IDENTITY, per-item, before the envelope; without it
                        # a precedent search can return the case itself (cold C2's hole).
    binds: ["benign_judge", "get_closed_ticket", "list_closed_tickets", "interacts(benign_judge->get_closed_ticket).payload", "interacts(benign_judge->get_closed_ticket).response", "interacts(benign_judge->list_closed_tickets).response"]
    discharged_by: test_case_own_key_refused_at_tool_boundary

  - id: d24_list_item_recheck
    kind: behavior      # Fork G (§7): mirrors onto list the body check get already performs
                        # (c2); keeps O2's outcome wording honest on the response side.
                        # V-A (F round): the re-check is status + SELF-KEY IDENTITY — the
                        # case-under-judgment's own record is excluded per-item even when
                        # genuinely closed; duplicates still survive (no dedup).
    binds: ["interacts(benign_judge->list_closed_tickets).response", "ticket_store.domain.distinguished[open]", "benign_judge"]
    form: test
    discharged_by: test_list_response_non_closed_item_dropped_or_faulted

  - id: d25_self_key_payload_screen
    kind: negative      # positive controls inside the same test: the other-open-key quote
                        # rides wrapped (the record-wise N-note half) and a clean payload
                        # is served (d0's success path).
    form: test          # Fork H (§7): Fork C's exclusion extended to a closed ticket whose
                        # payload names the case's own key — the one transitive instance
                        # whose identifier this seam knows. General free-text screening is
                        # NOT owed; the residual is the N-note on ticket_store.domain.
    binds: ["interacts(benign_judge->get_closed_ticket).response", "salt"]
    discharged_by: test_closed_ticket_naming_self_key_refused

  # ===========================================================================
  # F-ROUND DEMANDS (75-verify-resolutions.md): the V-C currency test, the V-D
  # structural pair (capture sink, registration order), the V-G executable pin,
  # and the V-F waiver.
  # ===========================================================================

  - id: d26_docs_teach_no_removed_lane
    kind: negative      # positive control inside the test: runtime-gates.md still teaches
                        # the live pins_path exemption idiom — the doc survives, the dead
                        # lane goes.
    form: test          # V-C: cold C3's two undispositioned teaching surfaces join the M6
                        # census WITH a currency test — no doc surface still teaches the
                        # removed judge bash command path.
    binds: ["runtime_gates_doc", "state_surface_adapters_doc"]
    discharged_by: test_no_doc_surface_teaches_removed_bash_lane

  - id: d27_capture_row_sink
    kind: behavior      # V-D (mechanical finding 3): the Fork B sink, now modelled — each
                        # call appends its capture row to the JUDGE's queries table (call
                        # order, by-ref payload inside the same run dir), and never to
                        # gather's table in the investigation run dir: the two tables stay
                        # distinct writers' tables, R2's recomputation ground.
    form: test
    binds: ["interacts(get_closed_ticket->judge_queries_table)", "interacts(list_closed_tickets->judge_queries_table)", "judge_queries_table"]
    discharged_by: test_capture_row_written_in_judge_run_dir

  - id: d28_registration_order
    kind: shape         # V-D (mechanical finding 2 / brief F3's order half — previously
                        # dispositioned nowhere and falsely booked onto c11/d21's census,
                        # 50-graph-digest.md:113, corrected): the two tools enter
                        # register_tools' FIXED order at the tail, after query, as
                        # list_closed_tickets then get_closed_ticket — a SEQUENCE pin
                        # where d1/d2 deliberately compare sets. ROUND 3 (CR-m1): the
                        # test now pins the insertion POSITION itself — a source-order
                        # census over register_tools' presence table (the closed_tickets
                        # guard dead last, after query) beside the judge-leg roster
                        # projection (list before get) — because no agent that exists
                        # carries write_file..query, so the projection alone cannot see
                        # a wrong insertion position.
    form: test
    binds: ["closed_tickets", "get_closed_ticket", "list_closed_tickets"]
    discharged_by: test_closed_ticket_tools_registration_order

  - id: d29_skill_status_vocabulary
    kind: behavior      # V-G (mechanical finding 8): §7 design correction 2 becomes
                        # executable — the correction must not ship prose-only in d21's
                        # clause. The SKILL's advertised status enum must equal the
                        # server's real one (open|in_progress|closed).
    form: test
    binds: ["ticket_skill_md", "ticket_store.domain"]
    cites: [p1]
    discharged_by: test_ticket_skill_status_vocabulary_matches_server

  - id: w3_cross_leg_salt_waived
    kind: shape
    form: waiver        # V-F (mechanical finding 1, cross-leg half): an examined decline.
    binds: ["salt"]
    cites: [g18]
    outcome: {nl: "The salt premise's cross-leg half ('per-leg, not derivable across legs') is WAIVED as unexercisable through this delta: the fresh-uuid4-per-stage-bind salt is pre-existing wrap infrastructure (agent_definition.py:387-389, g18) not introduced by #672, and the adversarial leg has no ticket surface (d2/O3), so no ticket-tool drive can observe an adversarial-leg wrap to compare against — the channel that could is outside this spec's delta. The per-bind half IS pinned, including UNPREDICTABILITY (a counter salt fails test_same_case_judged_second_time_fresh_salt_persistent_audit). Recorded as an examined decline, not a silence (75-verify-resolutions V-F)."}

  - id: w1_query_tool_parity_waived
    kind: parity
    form: waiver        # §7 Waiver 1 — the N7 carve-out's R3 cell, examined and declined.
    binds: ["ticket_store.access[query-tool]"]
    cites: [r1, r1-extended, p2]
    outcome: {nl: "Closed-only parity on gather's query-tool route to the same verb bodies is WAIVED as out of scope for #672: require_closed defaults False on both verbs (the model chooses, p2 — executed probe), and payloads persist to gather_raw. Recorded as an examined decline, not a silence. Follow-up warranted at handoff: the Fork D probe makes this the live route by which non-closed ticket content reaches the judge; extending closed-only parity onto the query-tool path is a design change beyond this issue — file it as its own issue."}

  - id: w2_subprocess_cli_parity_waived
    kind: parity
    form: waiver        # §7 Waiver 2 — converts phase C's silent consensus
                        # (test_typed_tool_config_env_divergence_from_cli_callers) into an
                        # examined, human-ratified decline.
    binds: ["ticket_store.access[subprocess-cli]"]
    cites: [c6, g2, x4]
    outcome: {nl: "Constraint parity between the typed tools' ctx.deps-sourced config/env and the ambient environment the two CLI subprocess callers inherit is WAIVED as out of scope for #672: ticket_seeds and verify_forward run at operator trust (the c6/g2 consumer census), the live gap is timeout/env parity (x4 pins the CLI callers' own subprocess timeouts) plus ticket_seeds trusting the server-side --status closed filter without the explicit --require-closed flag — pre-existing, untouched by this design."}

# §7 chose d22's discharge shape as a STATIC census (all three drivers funnel through the
# one invoke_judge seam, no bypass) paired with d1/d2's per-leg behavior checks — the
# per-entrypoint investigation drive was explicitly declined as too heavy, so the
# inspection-only naming of the seam target is a ratified decision, not an oversight.
exercise_waivers:
  d22_registration_reaches_every_call_site: ["invoke_judge"]

# PHASE F (mechanical gate): `spec-graph actors` names `defender/evals/harness_lead.py` as an
# unmodelled driver — it re-executes `lead_author` as a subprocess, relocating the tree anchor
# onto whatever tree it runs in. The check's subprocess arm is deliberately NOT gated on the
# changed set (a re-exec context is a standing repo-wide hazard), so it fires on every graph in
# this repo, not on anything #672 touches. Waived as out of scope, hand-verified: harness_lead
# drives `learning/leads/lead_author.py` only, and neither that module nor anything under
# learning/leads/ imports or reaches `invoke_judge` / `engine_pydantic` / `judge/run.py` — the
# three modules this delta rewrites (verified by grep over defender/learning/leads/ and
# defender/evals/harness_lead.py, phase F). It drives NO actor of this graph, so no execution
# context of THIS change is being silenced to go green. The map cannot carry `cites:` (schema),
# so this rationale is the phase-F hand check rules.md requires.
actor_waivers:
  harness_lead: "eval harness for the lead-author stage; re-execs learning/leads/lead_author.py only, reaches no judge module and no actor of this graph — out of scope for #672, not a driver of this delta"

# ===========================================================================
# STRUCTURE — provenance: code = grounded neighborhood (10-brief.md);
#             design = demand-implied delta. mode: remove edges are M6's deletions.
# ===========================================================================
structure:
  axes: [ticket_key, lead_id, seq]

  actors:
    - {id: learning_loop,     frame: composition, provenance: code}   # learning/loop.py — the live judge driver (imports invoke_judge, loop.py:72)
    - {id: run_judge_ab,      frame: composition, provenance: code}   # evals/run_judge_ab.py — reaches judge/run.py AND engine_pydantic.py in-process
    - {id: judge_equivalence, frame: composition, provenance: code}   # evals/judge_equivalence.py — third benign-leg call site
    # dispositions RED FLAG for the gate: registration must reach EVERY benign call site
    # (the three drivers above); the tools= threading is NEW plumbing (F2) and the doc never
    # enumerates the call sites — per-site completeness asserted, nowhere demonstrated.
    # Weigh a census obligation over these drives edges rather than trust the single-seam inference.
    - {id: invoke_judge,      frame: composition, provenance: code}   # judge/run.py — fans the two legs, concurrently on an inconclusive case
    - {id: benign_judge,      frame: leg,         provenance: code}   # the leg this change re-tools
    - {id: adversarial_judge, frame: leg,         provenance: code}   # carries ticket_cli=None end-to-end today (c9)
    - {id: get_closed_ticket,  frame: leg, provenance: design}        # tool as actor toward the store; also a boundary (the judge-facing seam)
    - {id: list_closed_tickets, frame: leg, provenance: design}
    - {id: run_investigation, frame: composition, provenance: code}   # run.py — box starter (run.py:166) AND ticket-store writer (:148/:208); does NOT drive the judge
    - {id: ticket_enrichment, frame: leg,         provenance: code}   # learning/tickets/ticket_enrichment.py — the second store writer (N5)
    - {id: gather_dispatch,   frame: leg,         provenance: code}   # the sibling reader: query tool -> same verb bodies via ModuleVerbRegistry
    - {id: ticket_seeds,      frame: leg,         provenance: code}   # subprocess CLI caller (ticket_seeds.py:65-90)
    - {id: verify_forward,    frame: leg,         provenance: code}   # subprocess CLI caller (forward.py:119-120)
    - {id: policy_cli,        frame: leg,         provenance: code}   # defender-policy show|explain, operator-only

  boundaries:
    - id: get_closed_ticket
      provenance: design
      facets:
        payload:
          parts: [{role: args, source: model-authored}]
          invariants: []
          nl: "the model-facing call schema is exactly {key} — no require_closed, no status parameter (x8 grounds the verb signature); the key is model-chosen and meets Fork A's DEFINED minimal schema at the tool boundary (§7): empty, whitespace-only, and path/URL-significant characters draw a retry-class response with zero store attempts; everything else flows to the store opaquely (length and clean non-ASCII are explicit non-clauses of the written grammar). The case-under-judgment's own key is additionally excluded here regardless of state (Fork C, d23)."

    - id: list_closed_tickets
      provenance: design
      facets:
        payload:
          parts: [{role: args, source: model-authored}]
          invariants: []
          nl: "the model-facing call schema is exactly {label, q} — no require_closed, no status (x8); filter values with shell/URL metacharacters inherit the pre-existing host-side transport's handling (dispositions — the in-process call removes the model-text-to-argv assembly; the asymmetry against Fork A's key screen is CHOSEN: label/q keep riding list_tickets' urlencoding, no new screen). The response side is inside O2's controlled surface (Fork G, §7): each returned item's status is re-checked client-side before the envelope (d24), and — V-A, F round — the case-under-judgment's OWN record is excluded per-item by IDENTITY even when genuinely closed (the get-path screen mirrored onto list, d23/d24); duplicates still survive (no dedup)."

    - id: closed_tickets      # the NEW ToolSet bit (doc-proposed name — fork f2)
      provenance: design
      facets:
        domain:
          type: bool
          refinement: {nl: "carries the two closed-ticket tools; set per-leg from JudgeWiring.closed_ticket_read on the stage-build replace seam; every ToolSet bit defaults False (x6), so JUDGE_DEF's frozen static default keeps it off — absence by registration is the adversarial defense (N3)"}
          default: false
          distinguished: ["false"]    # the off state MUST be individually exercised (d2)
          falsy_valid: true
          documented_alternatives: []

    - id: JudgeWiring.closed_ticket_read
      provenance: code
      facets:
        domain:
          type: bool
          refinement: {nl: "learning/core/config.py:389-408, default False; True only on the benign Direction (directions.py:41). The tools= threading from this flag through run_stage/build_stage_agent is NEW plumbing — no tools parameter exists on those signatures today (F2/g12); the replace seam (_pydantic_stage.py:66) and registration-follows-defn.tools (driver.py:218) are the carrier (c12)"}
          default: false
          distinguished: []
          falsy_valid: true
          documented_alternatives: []

    - id: ticket_store        # HTTP service behind docker-exec curl — never a file (g16)
      provenance: code
      facets:
        identity:
          key_axes: [ticket_key]
          evidence: {nl: "ticket key = the run-dir basename (case id): POST /tickets, POST /tickets/{key}/transitions, POST /tickets/{key}/comments — read off the writer call sites run.py:148/208 and ticket_enrichment (g10, spec-graph trace resource ticket_store)"}
          sharing: unique-key
        domain:
          type: enum
          refinement: {nl: "ticket lifecycle status as the store reports it (the real server enum is open|in_progress|closed — p1, executed probe); the design's contract is BINARY — closed is readable, everything else refuses: open, in_progress, any unenumerated state, and a status-less 200 all fall on the refuse side, as business refusals that never trip the breaker (Fork E's taxonomy line). Fork C RESOLVED (§7): the case-under-judgment's OWN ticket is a protected asset — its key is excluded at the tool boundary even once closed (d23), and — V-A — the protection covers BOTH tool paths: get refuses the key pre-store, list filters the self item by identity before the envelope. Fork H RESOLVED: O2 is scoped RECORD-WISE, with the targeted self-key payload screen (d25); N-NOTE — the residual transitive path (a closed ticket's free text quoting some OTHER non-closed ticket) is accepted: it rides the salted untrusted envelope unredacted, and general free-text screening is not implementable at this seam and not owed."}
          default: "open"     # the state a ticket is created in (open_case_ticket, run.py:148)
          distinguished: ["open"]   # the answer-key state — MUST be individually exercised (d5)
          falsy_valid: false
          documented_alternatives: []
        access:
          constraints_by_via:
            # the two NEW typed tools, with §7's resolved constraint set: Fork A's key
            # schema, Fork C/H's self-key exclusion + payload screen, Fork G's per-item
            # re-check, and Fork B/E's capture row + breaker (the query tool's machinery,
            # mirrored fully — F4's "seam-only mirror" note is SUPERSEDED).
            typed-tool:     {trust: attacker-influenced, constraints: [closed-pin, salt-wrap, key-schema, self-key-exclusion, item-recheck, capture-row, circuit-breaker]}
            # gather's route to the SAME verb bodies: require_closed is MODEL-CHOSEN, default
            # False — NO closed pin (F6/p2); payloads persist to gather_raw (the N7 carve-out).
            # Closed-only parity on this cell is WAIVED at §7 (w1) — examined, declined,
            # follow-up issue owed at handoff.
            query-tool:     {trust: attacker-influenced, constraints: [verb-allowlist, salt-wrap, capture-row, circuit-breaker]}
            # the M6-REMOVED judge bash lane (see the mode: remove edge): pattern-pinned argv
            # + mandatory --require-closed lookahead; DEAD at the executor today (F1 — the
            # judge binds no box, the inert BoxExecutor refuses first use).
            bash:           {trust: attacker-influenced, constraints: [shape-pin, require-closed-flag]}
            # read_file opens mounted files only — the store is HTTP, no file exists (r1);
            # what this via actually reaches is the gather_raw CACHE, not the live store.
            read-tool:      {trust: attacker-influenced, constraints: [confine, salt-wrap]}
            # ticket_seeds + verify_forward through the SURVIVING CLI (M5/d14); ticket_seeds
            # trusts the server-side --status closed filter (no --require-closed). Parity on
            # this cell is WAIVED at §7 (w2) — operator trust, pre-existing, untouched.
            subprocess-cli: {trust: operator, constraints: [exit-code-contract, subprocess-timeout]}

    - id: ticket_adapter_verbs   # the three VERBS bodies (ticket_adapter.py:64-108) M2 reuses in-process
      provenance: code
      facets: {}

    - id: ticket_adapter_cli     # the surviving argparse CLI over the same verb bodies (M5)
      provenance: code
      facets:
        domain:
          type: int
          refinement: {nl: "the pinned exit-code taxonomy: 0 success, 1 UpstreamFault, 2 TransportFault/ConfigFault, 64 usage error — the classes the subprocess callers and the circuit breaker behind them key on (x3, g8 executed)"}
          default: 0
          distinguished: [0, 1, 2, 64]
          falsy_valid: true
          documented_alternatives: []

    - id: gather_raw             # shared root 2 — the N7 carve-out, identical before and after (g17)
      provenance: code
      facets:
        identity:
          key_axes: [lead_id, seq]
          evidence: {nl: "the query tool's capture writes gather_raw/{lead_id}/{seq}.json, one per query — including unpinned ticket.get-ticket payloads fetched at investigation time (query_tool.py:471-475, g17)"}
          sharing: unique-key
        access:
          constraints_by_via:
            read-tool: {trust: attacker-influenced, constraints: [confine, salt-wrap]}
            bash:      {trust: attacker-influenced, constraints: [confine]}

    - id: judge_queries_table    # the Fork B capture sink, MODELLED at the F round (V-D):
      # executed_queries.jsonl + by-ref payload files in the JUDGE'S learning run dir —
      # distinct from gather's queries table, which lives in the INVESTIGATION run dir
      # (the R2 recomputation's ground: no pre-existing boundary instance gains a 2nd
      # writer; the two new writer edges land on THIS new boundary, whose no-clobber
      # row identity is pinned by test_two_ticket_calls_one_turn_rows_independent).
      provenance: design
      facets:
        identity:
          key_axes: [seq]
          evidence: {nl: "one row appended per tool call to the judge learning run dir's executed_queries.jsonl, in call order, payload persisted by-ref at the row's payload_path INSIDE the same run dir (d27's test observes all three); gather's rows key (lead_id, seq) in the investigation run dir — a different instance with a different writer set, and d27's negative half pins that judge capture never lands there"}
          sharing: serialized-append

    - id: query_tool             # the generic gather tool — must NOT be registered on either judge leg (d19/N2)
      provenance: code
      facets: {}

    - id: _judge_bash_shapes     # the judge's compiled bash grant set — shrinks to cat+defender-sql (O6)
      provenance: design
      facets: {}

    - id: _cited_policy_read_section   # judge/run.py:60-94 — REWRITTEN by M6 (taught argv at 78-79 goes; the does-not-survive instruction at 80-84 must stay — x2/d16)
      provenance: design
      facets: {}

    - id: benign_prompt          # benign.md — item 7 rewritten to teach the typed tools; :148's fuller instruction untouched (d15/d16)
      provenance: design
      facets: {}

    # ---- stale teaching docs joining d21's census at the F round (V-C/V-G; d26/d29 pin) ----
    - {id: runtime_gates_doc,          provenance: code, facets: {}}   # docs/runtime-gates.md — :42 teaches the judge's ticket CLI grant + mandatory --require-closed lookahead; FALSE under M6 (cold C3); d26's test enforces currency
    - {id: state_surface_adapters_doc, provenance: code, facets: {}}   # docs/state-surface-adapters.md:113-114 — dispositioned (V-C): describes the SURVIVING verb surface, a genuine no-op for M6; d26 pins it stays free of the removed command path
    - {id: ticket_skill_md,            provenance: code, facets: {}}   # skills/ticket/SKILL.md — advertises statuses the server never had (p1, executed); d29 is the executable pin on the real enum

    - id: _JUDGE_DENY_REASON     # engine_pydantic.py:60-68 — the stale pinned-closed-ticket-read clause goes; suite net test_grant_gate_575.py:904-916 (F8: the rewrite is forced, not optional)
      provenance: design
      facets: {}

    # ---- M6 removals (d20 binds; live test/doc dependents recorded in d21's clause) ----
    - {id: RunScope.ticket_cli,   provenance: code, facets: {}}   # the ticket_cli threading: JudgeInvocation -> _ToolScope -> RunScope -> ResolvedRoots (agent_definition.py:184,206,246)
    - {id: _ticket_grant,         provenance: code, facets: {}}   # engine_pydantic.py:116-142 + grant branch :111-113
    - {id: _ticket_cli_path,      provenance: code, facets: {}}   # judge/run.py:55-57
    - {id: policy_cli_judge_demo, provenance: code, facets: {}}   # policy_cli.py:50-52 — points at case_history/case_ticket.py, NOT the real CLI: the latent wrong-script bug (F7); same wrong path in test_grant_gate_575's retiring fixture

    - id: salt                   # fresh uuid4 per stage bind (agent_definition.py:387-389, g18); per-leg, not derivable across legs — the envelope's whole anti-forgery defense (dispositions: delimiter-lookalike consensus).
      # F round: the per-bind half is pinned INCLUDING unpredictability (V-D — a counter
      # salt fails the assertion); the cross-leg half is w3, an examined decline (V-F).
      provenance: code
      facets: {}

    - id: TICKET_TIMEOUT_SEC
      provenance: code
      facets:
        domain:
          type: int
          refinement: {nl: "seconds, knowledge/environment/systems/ticket/config.env (shipped 10); per-key run-env override beats the file; missing file/key -> ConfigFault exit-2 class. Subprocess timeout = TIMEOUT_SEC+10 is MANDATORY on every fork and is the ONLY real kill — asyncio.wait_for cannot stop the thread (F5, x4, g16). UNPINNED silences (dispositions): when config resolves relative to calls (per call vs at bind), and parity between the ctx.deps-sourced env and the ambient env the CLI subprocess callers inherit. NO-CONSEQUENCE NOTE (V-G, mechanical finding 6): SOC_PLAYGROUND_DOCKER_CONTEXT (default soc-playground, 10-brief.md:148) retargets the docker context the WHOLE store family's transports exec through — uniformly, not this tool specifically; recorded here on the config family's carrier, not demanded"}
          default: 10
          distinguished: []
          falsy_valid: false
          documented_alternatives: []

    - id: circuit_breaker        # per-run per-system store protection. Fork E RESOLVED (§7,
      # departing from the isolation recommendation): the judge's typed tools participate
      # FULLY — an already-open `ticket` breaker yields an immediate failed result with no
      # transport attempt (honor), and judge-side infra faults (exit 2/124 classes) trip it
      # (contribute); business refusals (exit 1: 404, non-closed) never count. F4's
      # "no queries row, no breaker trip" note is SUPERSEDED along with the record-free d0.
      provenance: code
      facets: {}

  interacts:
    # ---- the delta: the two typed tools (provenance: design) ----
    - {from: benign_judge, to: get_closed_ticket,   mode: invoke, via: api, provenance: design, sends: payload}
    - {from: benign_judge, to: list_closed_tickets, mode: invoke, via: api, provenance: design, sends: payload}
    - {from: get_closed_ticket,   to: ticket_adapter_verbs, mode: invoke, via: api, provenance: design}   # in-process verb call: VerbContext off ctx.deps + asyncio.to_thread (M2/c8)
    - {from: list_closed_tickets, to: ticket_adapter_verbs, mode: invoke, via: api, provenance: design}
    - {from: get_closed_ticket,   to: ticket_store, mode: read, via: typed-tool, provenance: design, sends: params}   # require_closed=True HARD-CODED (d4); host-side docker-exec curl under the transport
    - {from: list_closed_tickets, to: ticket_store, mode: read, via: typed-tool, provenance: design, sends: params}
    - {from: get_closed_ticket,   to: salt, mode: read, via: api, provenance: design}   # success view AND fault detail ride the salted untrusted envelope (O7/d11)
    - {from: list_closed_tickets, to: salt, mode: read, via: api, provenance: design}
    - {from: get_closed_ticket,   to: TICKET_TIMEOUT_SEC, mode: read, via: env, provenance: design}
    - {from: list_closed_tickets, to: TICKET_TIMEOUT_SEC, mode: read, via: env, provenance: design}
    # ---- the delta: the Fork B capture sink (modelled at the F round, V-D) ----
    - {from: get_closed_ticket,   to: judge_queries_table, mode: write, via: fs, provenance: design, interpolates: [seq]}   # one row per call + by-ref payload (d27); the JUDGE's table, never gather's
    - {from: list_closed_tickets, to: judge_queries_table, mode: write, via: fs, provenance: design, interpolates: [seq]}
    # ---- the delta: rewritten teaching + deny surfaces (M6) ----
    - {from: benign_judge, to: _cited_policy_read_section, mode: read, via: llm, provenance: design}
    - {from: benign_judge, to: benign_prompt,       mode: read, via: llm, provenance: design}
    - {from: benign_judge, to: _JUDGE_DENY_REASON,  mode: read, via: llm, provenance: design}
    # ---- the delta: M6 removals (mode: remove) ----
    - {from: benign_judge, to: ticket_store, mode: remove, via: bash, provenance: design}   # the pattern-pinned --require-closed bash lane goes; DEAD at executor already (F1) — restoration, not preservation (x1)
    - {from: invoke_judge, to: RunScope.ticket_cli, mode: remove, via: api, provenance: design}
    - {from: invoke_judge, to: _ticket_cli_path,    mode: remove, via: api, provenance: design}
    - {from: invoke_judge, to: _ticket_grant,       mode: remove, via: api, provenance: design}   # the grant branch runs at bind/policy-compile under the judge driver
    - {from: policy_cli,   to: policy_cli_judge_demo, mode: remove, via: api, provenance: design}
    # ---- grounded neighborhood (provenance: code) ----
    - {from: run_investigation, to: ticket_store, mode: write, via: http, provenance: code, interpolates: [ticket_key]}   # open/close case tickets (run.py:148/208) — writers are OUTSIDE this change (N5)
    - {from: ticket_enrichment, to: ticket_store, mode: write, via: http, provenance: code, interpolates: [ticket_key]}   # annotate/enrich (imported :29-31)
    - {from: gather_dispatch,   to: ticket_store, mode: read,  via: query-tool, provenance: code}   # same verb bodies via ModuleVerbRegistry by-path load (verbs.py:294)
    - {from: gather_dispatch,   to: ticket_skill_md, mode: read, via: llm, provenance: code}   # the per-system reference the gather subagent queries FROM — d29 pins its status enum against the server's (p1)
    - {from: gather_dispatch,   to: gather_raw,   mode: write, via: fs, provenance: code, interpolates: [lead_id, seq]}
    - {from: gather_dispatch,   to: circuit_breaker, mode: invoke, via: api, provenance: code}
    - {from: benign_judge,      to: gather_raw,   mode: read,  via: read-tool, provenance: code}   # read roots = gather_raw + comparison dirs (g18) — the N7 cached surface, unchanged
    - {from: ticket_seeds,      to: ticket_adapter_cli, mode: invoke, via: argv, provenance: code}   # list-tickets --status closed --label X, NO --require-closed, 15s timeout, non-fatal empty pool
    - {from: verify_forward,    to: ticket_adapter_cli, mode: invoke, via: argv, provenance: code}   # get-ticket <id> --require-closed

  drives:
    - {from: learning_loop,     to: invoke_judge, provenance: code, multiplicity: serial}
    - {from: run_judge_ab,      to: invoke_judge, provenance: code, multiplicity: serial}
    - {from: judge_equivalence, to: invoke_judge, provenance: code, multiplicity: serial}
    - {from: invoke_judge, to: benign_judge,      provenance: code, multiplicity: concurrent}   # per-direction legs run concurrently on an inconclusive case (judge/run.py:110-114)
    - {from: invoke_judge, to: adversarial_judge, provenance: code, multiplicity: concurrent}
    - {from: benign_judge, to: get_closed_ticket,   provenance: design, multiplicity: concurrent}   # pydantic-ai parallel tool calls; per-call VerbContext off ctx.deps implies independence (mechanism-implied consensus; no explicit doc guarantee)
    - {from: benign_judge, to: list_closed_tickets, provenance: design, multiplicity: concurrent}
    - {from: run_investigation, to: gather_dispatch,  provenance: code, multiplicity: serial}
    - {from: learning_loop,     to: ticket_enrichment, provenance: code, multiplicity: serial}

