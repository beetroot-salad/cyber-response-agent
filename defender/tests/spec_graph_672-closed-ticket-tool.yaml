# ===========================================================================
# GATE — phase D's gate leaf (spec-graph gate --residue). Computed 12 mechanical
# triggers over the formal slots: R1x4, R3x5, R4x2, R5x1 (R2's predicate found no
# shared-sink delta; R0's formal half — dangling binds, unregistered axes, unheard
# `unknown`s — is clean). 10 of the 12 are pre-discharged below by demands the
# artifact already carries; R3's `query-tool` and `subprocess-cli` cells stay open
# (60-residue.md routes them as waiver candidates — pre-existing surfaces this
# design does not touch). R0's judgment half (bidirectional prose reconciliation)
# and R6 (rendered-sink trust walk) are agent-run, not tool-computed; R5's
# tightening/safe-by-construction extension was walked and found nothing to add.
# PHASE-E UPDATE: the 2 open R3 cells were resolved at §7 as WAIVERS — w1
# (`ticket_store.access[query-tool]`) and w2 (`ticket_store.access[subprocess-cli]`)
# now bind them as Demand{form: waiver} entries, so a bare `spec-graph gate` re-run
# reports 0 unanswered findings; the one R0 test obligation (registration
# completeness) is minted as d22. See 60-residue.md for the original routing.
# ===========================================================================
gate:
  evaluated:
    - {rule: R0, fired: true}    # formal half clean; reconciliation half found one coverage
                                  # gap (registration completeness across the 3 benign call
                                  # sites) — routed as a test obligation, 60-residue.md
    - {rule: R1, fired: true}    # 4/4 pre-discharged below
    - {rule: R2, fired: true}    # RECOMPUTED at the F round (V-D, mechanical finding 3):
                                  # phase D's `fired: false` predated Fork B and could not
                                  # see the then-unmodelled sink. judge_queries_table (new,
                                  # in the delta) carries two writer edges driven under
                                  # multiplicity: concurrent — pre-discharged below by d27
                                  # plus the one-turn row-independence test. No PRE-EXISTING
                                  # instance gains a 2nd writer: judge rows land in the
                                  # LEARNING run dir, gather's in the INVESTIGATION run dir
                                  # (d27's negative half pins exactly that separation).
    - {rule: R3, fired: true}    # 5 cells; 3/5 pre-discharged below, 2/5 open — 60-residue.md
    - {rule: R4, fired: true}    # 2/2 pre-discharged below
    - {rule: R5, fired: true}    # subtraction half: ticket_store, pre-discharged below.
                                  # tightening/safe-by-construction extension walked: every
                                  # tightening move here (M2's require_closed hardcode, M3's
                                  # absence-by-registration default) narrows in the SAFE
                                  # direction — no caller is left constructible in a newly
                                  # -unsafe state; nothing to mint from this half
    - {rule: R6, fired: true}    # the two typed tools' responses are a rendered sink gaining
                                  # delta content (ticket free text, model-chosen `key`); walk
                                  # below, 2/2 pre-discharged

  obligations:
    # ---- R3: the two cells 60-residue routed as waiver candidates, resolved at §7 as
    # recorded waivers (rules.md: an obligation is discharged by an executable demand OR
    # a recorded waiver). The waiver demands carry the rationale and its citations.
    - rule: R3
      element: "ticket_store.access[query-tool]"
      witness: "gather reaches the same verb bodies with require_closed model-chosen, default False (p2) — closed-only parity on this via is declined for #672; follow-up issue owed at handoff"
      discharged_by: w1_query_tool_parity_waived
    - rule: R3
      element: "ticket_store.access[subprocess-cli]"
      witness: "the two CLI subprocess callers run at operator trust; the env/timeout parity gap is pre-existing and untouched by this design"
      discharged_by: w2_subprocess_cli_parity_waived

  pre_discharged:
    # ---- R1: unread channel (4/4) ----
    - rule: R1
      element: "interacts(benign_judge->get_closed_ticket).payload"
      by: d3_schema_closed_by_construction
      edge: "interacts(benign_judge->get_closed_ticket)"
      cites: [x8]
      # d3 pins the model-facing schema to exactly {key}; x8 grounds the verb's real param
      # surface (get_ticket takes key/require_closed — only key is exposed to the model).
    - rule: R1
      element: "interacts(benign_judge->list_closed_tickets).payload"
      by: d3_schema_closed_by_construction
      edge: "interacts(benign_judge->list_closed_tickets)"
      cites: [x8]
      # same demand, same claim: list_tickets takes status/label/q/require_closed — the
      # schema exposes only {label, q}.
    - rule: R1
      element: "interacts(get_closed_ticket->ticket_store).payload"
      by: d4_body_pins_closed
      edge: "interacts(get_closed_ticket->ticket_store)"
      cites: [c2, g5]
      # d4 asserts the body hardcodes require_closed=True; c2/g5 executed-probe exactly that
      # behavior (open ticket -> UpstreamFault exit_code=1, no payload).
    - rule: R1
      element: "interacts(list_closed_tickets->ticket_store).payload"
      by: d4_body_pins_closed
      edge: "interacts(list_closed_tickets->ticket_store)"
      cites: [c3, g6]
      # c3/g6 executed-probe list_tickets(require_closed=True) pinning outgoing status=closed
      # over any stray status arg.

    # ---- R2: shared sink (1/1 — the F-round recompute, V-D) ----
    - rule: R2
      element: judge_queries_table
      by: d27_capture_row_sink
      edge: "interacts(get_closed_ticket->judge_queries_table)"
      cites: [g14]
      # The Fork B sink, modelled at V-D: two writer edges (both typed tools) onto one
      # append-only table, driven under multiplicity: concurrent. d27 pins the write
      # itself (call-order append, by-ref payload inside the judge run dir, and the
      # negative half — nothing lands in gather's table, so no pre-existing instance
      # gains a second writer); test_two_ticket_calls_one_turn_rows_independent pins
      # per-call row/payload-path identity under the one-turn two-writer shape. g14
      # grounds the mirrored capture machinery (queries row + breaker entanglement).

    # ---- R3: cross-via parity, 3 of 5 cells (query-tool, subprocess-cli stay open) ----
    - rule: R3
      element: "ticket_store.access[typed-tool]"
      by: d18_store_route_census
      cites: [r1, r1-extended]
      # d18 is the executable re-probe of r1/r1-extended's inspection-grade sweep — it pins
      # typed-tool as a genuinely live route, the surface the other cells get compared to.
    - rule: R3
      element: "ticket_store.access[bash]"
      by: d18_store_route_census
      cites: [r1, r1-extended, g11]
      # the parity question is moot, not silently skipped: d18's census affirmatively excludes
      # bash from the live route set, and g11 grounds why — the judge's bash lane is
      # dead-at-executor already (no box bound), so nothing live reaches ticket_store this way
      # to compare constraints against.
    - rule: R3
      element: "ticket_store.access[read-tool]"
      by: d18_store_route_census
      cites: [r1, r1-extended]
      # r1/r1-extended: read_file opens mounted files only — this cell actually reaches
      # gather_raw (the N7 cache), never the live HTTP store; d18's census pins the non-reach,
      # so read-tool's missing closed-pin is not a live parity gap on THIS boundary.

    # ---- R4: domain coverage (2/2) ----
    - rule: R4
      element: "closed_tickets.domain.distinguished[false]"
      by: d2_adversarial_absent
      cites: [x6]
      # x6 grounds the off-by-default premise (every ToolSet bit defaults False); d2 exercises
      # the false/off state directly — the adversarial leg built with no ticket tools.
    - rule: R4
      element: "ticket_store.domain.distinguished[open]"
      by: d5_nonclosed_refused_as_fault
      cites: [c2, g5]
      # the answer-key state (O2's asset), executed-probed by c2/g5, exercised by d5.

    # ---- R5: subtraction and conservation (1/1) ----
    - rule: R5
      element: ticket_store
      by: d1_benign_registration
      edge: "interacts(benign_judge->ticket_store)"
      cites: [g11]
      # the only dependent whose workflow actually ran THROUGH the removed bash edge is the
      # benign judge's own ticket read; its substitute is exhaustively covered (d1 registers
      # it, d4-d9 pin its behavior, d18 censuses its routes). g11 grounds why removal costs
      # nothing live: the bash lane was dead-at-executor before this change (F1) — restoration,
      # not preservation. F round: g11 is now EXECUTED (V-E, 66-bashlane-probe.md), so this
      # pre-discharge no longer rests on a read-grade claim. The trigger's OTHER listed dependents (gather_dispatch,
      # run_investigation, ticket_enrichment) never routed through the removed edge at all —
      # they reach ticket_store by unrelated, untouched paths (query-tool, http write) this
      # delta does not touch, so no survival demand is owed on their account.

    # ---- R6: rendered-sink trust walk (judgment; 2/2) ----
    - rule: R6
      element: "interacts(get_closed_ticket->salt)"
      by: d11_untrusted_wrap
      cites: [c13, g14]
      # chooser/sanitizer walk: ticket free text is store-chosen (O2's asset — the answer-key
      # ticket's content); the tool's own `key` argument is model-chosen (its charset is Fork
      # A's separate, already-routed question). The sanitizer is untrusted.wrap: content passes
      # through byte-for-byte, but the FRAME (the `<run-{salt}-tag>` delimiters) is built from
      # the run's server-minted secret, never from a chooser-influenced value — unlike the
      # canonical manifest-heading escape, no chooser can forge the closing tag. d11 pins this
      # for both the success view and the fault detail (c13/g14 ground the mirrored query_tool
      # idiom this design reuses verbatim).
    - rule: R6
      element: "interacts(list_closed_tickets->salt)"
      by: d11_untrusted_wrap
      cites: [c13, g14]
      # same walk; list_closed_tickets can return several tickets in one view — d0's still-
      # provisional response shape (fork f1/Fork B) must keep the WHOLE rendered view inside
      # one wrap, not per-item wraps or an unwrapped list frame, whichever shape §7 picks.

# ===========================================================================
# HANDOFF — written at phase F (the mechanical gate), extended at the F round
# (75-verify-resolutions.md). The suite is RED by construction (50 red / 2 green
# at HEAD); write-code-from-spec makes it green.
# ===========================================================================
