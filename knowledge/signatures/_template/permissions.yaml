# Permissions Configuration Template
# Copy this file to your signature directory and customize
#
# This file defines what actions the investigation agent is allowed to perform
# for alerts matching this signature. The orchestrator enforces these permissions.

# Schema version for future compatibility
schema_version: "1.0"

# -----------------------------------------------------------------------------
# DISPOSITION PERMISSIONS
# -----------------------------------------------------------------------------
# Which dispositions can the agent recommend for auto-close?
# Options: benign, false_positive, true_positive
# Note: 'escalate' is always allowed (fail-safe)
#
# Dispositions NOT listed here will trigger escalation even if agent recommends them

allowed_dispositions:
  - benign
  - false_positive
  # - true_positive  # Uncomment if true positives can be auto-closed (rare)

# -----------------------------------------------------------------------------
# ACTION PERMISSIONS
# -----------------------------------------------------------------------------
# What actions can the agent perform during investigation?
# These are enforced by hooks and the orchestrator.

allowed_actions:
  # Query actions (read-only, generally safe)
  - query_wazuh           # Query SIEM for related events
  - query_knowledge       # Read knowledge base files
  - query_asset_inventory # Look up asset criticality

  # Analysis actions
  - classify_ip           # Determine if IP is internal/external
  - check_username_pattern # Match username against known patterns

  # Advanced actions (enable with caution)
  # - query_identity       # Look up user information
  # - query_threat_intel   # Check external threat intelligence
  # - execute_on_endpoint  # Run commands on target (requires approval)

# -----------------------------------------------------------------------------
# AUTO-CLOSE CONFIGURATION
# -----------------------------------------------------------------------------
# Controls when the orchestrator can auto-close without human review

auto_close:
  # Master switch - if false, all alerts escalate regardless of confidence
  enabled: true

  # Minimum confidence score required for auto-close (0.0 - 1.0)
  # Higher = more conservative (fewer auto-closes)
  min_confidence: 0.90

  # Maximum alerts to auto-close per hour for this signature
  # Prevents runaway automation if something goes wrong
  rate_limit_per_hour: 100

  # Require precedent match for auto-close?
  # If true, alerts with no matching past ticket always escalate
  require_precedent: true

# -----------------------------------------------------------------------------
# ESCALATION RULES
# -----------------------------------------------------------------------------
# Conditions that force escalation regardless of confidence score
# These are "hard stops" - if any is true, escalate immediately

escalation:
  # Always escalate if these conditions are met
  required_for:
    - external_ip              # Source is outside internal network
    - critical_asset           # Target asset has critical classification
    - multiple_usernames       # >1 distinct username attempted
    - high_volume              # >10 events in 5 minute window
    # - after_hours            # Event outside business hours
    # - privileged_account     # Target is admin/root/service account

  # Never auto-close these specific patterns (regex or literal)
  # Use for known-bad indicators that should always get human review
  blocked_patterns:
    usernames:
      - "admin"
      - "root"
      - "administrator"
    source_ips:
      # - "0.0.0.0/8"          # Reserved ranges
      # - specific bad IPs

# -----------------------------------------------------------------------------
# REPRODUCTION CONFIGURATION
# -----------------------------------------------------------------------------
# Controls if/how the reproduction agent can be used for this signature

reproduction:
  # Can this signature's hypotheses be reproduced in sandbox?
  enabled: false

  # What can be reproduced? (used by reproduction agent)
  allowed_scenarios:
    # - scheduled_task        # Test if scheduled job produces artifact
    # - service_behavior      # Test if service produces expected output

  # Additional sandbox restrictions for this signature
  sandbox_overrides:
    # timeout_seconds: 60     # Shorter timeout
    # memory_limit_mb: 256    # Less memory

# -----------------------------------------------------------------------------
# AUDIT REQUIREMENTS
# -----------------------------------------------------------------------------
# What must be logged for compliance/review

audit:
  # Log level: minimal, standard, verbose
  level: standard

  # Fields that must be present in audit log
  required_fields:
    - ticket_id
    - signature_id
    - recommendation
    - confidence_score
    - reasoning
    - evidence

  # Retain audit logs for this many days
  retention_days: 90

# -----------------------------------------------------------------------------
# METADATA
# -----------------------------------------------------------------------------

metadata:
  # Who last modified this config
  last_modified_by: "system"
  last_modified_at: "2024-01-01T00:00:00Z"

  # Notes about this configuration
  notes: |
    This is a template. Copy to your signature directory and customize.
    See documentation for detailed explanations of each setting.
