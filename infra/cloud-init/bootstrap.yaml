#cloud-config
# Bootstrap for the soc-playground VPS.
# Changing this file forces server recreation (Hetzner applies user_data at boot only).

timezone: UTC
hostname: soc-playground

# Prevent cloud-init from regenerating /etc/hosts from its template on every
# boot. We append our service-name entries below via runcmd instead.
manage_etc_hosts: false

package_update: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - unattended-upgrades
  - apt-listchanges

write_files:
  # Enable only security updates automatically.
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  # Elasticsearch requires vm.max_map_count >= 262144.
  - path: /etc/sysctl.d/99-elasticsearch.conf
    permissions: "0644"
    content: |
      vm.max_map_count=262144

runcmd:
  # Docker official apt repository
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
      > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - systemctl enable --now unattended-upgrades
  # Host resolution for containerized services. Agents on the VPS host need to
  # reach `elasticsearch:9200` and `fleet-server:8220` on loopback (where Docker
  # publishes them). Cert DNS SANs cover those names, so TLS works.
  # Idempotent — grep-gated so repeat cloud-init runs on lever-up are safe.
  - grep -q ' elasticsearch' /etc/hosts || printf '127.0.0.1 elasticsearch\n127.0.0.1 fleet-server\n' >> /etc/hosts
  # Bootstrap completion marker — `test -f /etc/soc-playground-bootstrap.ack` confirms success.
  - date -u +"bootstrap complete %FT%TZ" > /etc/soc-playground-bootstrap.ack
