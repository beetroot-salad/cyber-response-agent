        trust_root_reached: v-005

      resolutions:
        - hypothesis: h-001
          before: null
          after: "-"
          severity_of_test: moderate
          matched_refutation_text: "kube-audit returns no exec authorization record in the ±5s window"
          reasoning: "kube-audit returned an exec action from devops-automation-service, which is not a human operator. The prediction expected a human-operator kubectl-exec action. The returned identity is automation, which shifts plausibility away from h-001 (operator-driven) without fully refuting it — operator tooling could have been re-invoked by automation."
          supporting_edges: [e-003, e-004]

        - hypothesis: h-002
          before: null
          after: "++"
          severity_of_test: severe
          matched_prediction_text: "kubectl-audit returns an exec action initiated by an automation identity"
          reasoning: "kube-audit returned a kubectl exec action initiated by devops-automation-service, classified as automation-identity. This is a literal match to the prediction. The exec action is recorded and authority-backed by anchor-backed trust chain. No subsequent shell activity flagged as suspicious in the execution window."
          supporting_edges: [e-003, e-004]

        - hypothesis: h-003
          before: null
          after: "--"
          severity_of_test: severe
          matched_refutation_text: "kube-audit returns a benign exec action from a human operator or authorized automation at alert time"
          reasoning: "kube-audit returned a benign exec action from devops-automation-service with a valid authorization record. This is a literal match to the refutation_shape entry. The exec is legitimate, not post-exploit. Anchor-backed trust_root on v-005 confirms the identity. h-003's core assumption (unauthorized attacker) is refuted."
          supporting_edges: [e-003, e-004]

