              classification: unclassified-session
              attributes:
                initiator_kind: "unknown-attacker"
          predictions:
            - for_absence: "kube-audit returns a benign exec authorization record for this runc:[2:INIT] invocation"
            - for_absence: "no evidence of exploitation artifact (vulnerability scanner, known CVE payload, privilege escalation tool)"
          refutation_shape:
            - "kube-audit returns a benign exec action from a human operator or authorized automation at alert time"
            - "post-shell process activity is consistent with authorized debugging or maintenance"
          concerns:
