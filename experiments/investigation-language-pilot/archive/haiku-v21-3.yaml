          timestamp: "2026-04-14T14:03:27.412Z"

      outcome:
        produced:
          vertices:
            - id: v-003
              abstract_type: process
              classification: host-runtime-shim
              identifier: "runc:[2:INIT] (host k8s-worker-07, pid 2871)"
