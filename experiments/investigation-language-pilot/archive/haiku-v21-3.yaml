              classification: kubectl-exec-session
          predictions:
            - for: vertex-shape
              expected: "kubectl-audit returns an exec action on the container in the ±5s window"
            - for: e-002
              expected: "runc receives exec command with container_id and bash target"
            - for_absence: "no evidence of post-exploit persistence or elevated privilege escalation after shell spawn"
          refutation_shape:
            - "runc:[2:INIT] was triggered by a non-kubectl-exec source"
            - "kube-audit returns no exec authorization record in the ±5s window"
          weight: null

        - id: h-002
          name: "?ci-pipeline-maintenance"
          canonical: true
          attached_to_vertex: v-003
          proposed_edge:
            relation: triggered_by
            parent_vertex:
              abstract_type: session
              classification: kubectl-exec-session
              attributes:
                initiator_kind: "automation-identity"
          predictions:
            - for: vertex-shape
              expected: "kubectl-audit returns an exec action initiated by an automation identity"
            - for_absence: "no suspicious post-shell activity indicating compromise"
          refutation_shape:
