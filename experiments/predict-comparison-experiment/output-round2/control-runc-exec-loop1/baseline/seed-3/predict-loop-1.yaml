      story: |
        A cluster operator (deploy engineer or on-call SRE) issued a
        `kubectl exec` command targeting pod
        `payments-api-7c9d8f5b6-q2vr4` in `payments-prod`, causing
        the Kubernetes API server to instruct the kubelet to open an
        exec stream via runc, which produced the interactive bash
        session the alert captures. The runc parent process and
        interactive TTY (34816) are the canonical host-side
        fingerprint of a `kubectl exec -it` invocation; no other
        routine workload path produces this process ancestry shape.
        No prior-investigation baseline for pod-exec events on this
        pod exists. The authorization question is whether an approved
        change-management ticket or active deploy run covers a kubectl
        exec operation on this pod at the alert timestamp.
      predictions:
        - id: p1
          subject: proposed_edge
          claim: "kube-audit records a pod/exec subresource request against payments-api-7c9d8f5b6-q2vr4 whose timestamp falls within the alert window"
          from_story_link: "operator issued a kubectl exec command targeting the pod, causing the API server to instruct the kubelet"
        - id: p2
          subject: proposed_edge
          claim: "the kube-audit exec record names a human user identity (not a service account) as the initiating subject"
          from_story_link: "a cluster operator issued the kubectl exec command"
      attribute_predictions:
        - id: ap1
          target: proposed_parent
          attribute: user_identity_kind
          claim: "initiating subject is a human operator identity, not a workload service account"
      refutation_shape:
