          refutes_predictions: [p1]
          claim: "no kube-audit pod/exec record for this pod falls within the alert window"
        - id: r2
          refutes_predictions: [p2, ap1]
          claim: "the exec record's initiating subject is a service account or automated pipeline identity, not a human operator"
      authorization_contract:
        - id: ac1
