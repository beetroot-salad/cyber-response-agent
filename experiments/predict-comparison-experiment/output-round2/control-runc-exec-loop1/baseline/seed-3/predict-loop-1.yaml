          anchor_kind: change-management
          predicate: "an open change-management ticket or active deploy run, owned by an approved initiator, explicitly authorizes a kubectl exec operation on payments-prod/payments-api pods within a window containing the alert timestamp"
          on_unauthorized: escalate
          on_indeterminate: escalate
      integrity_waived: "change-management tickets and deploy-run records name the initiator who opened the record; confirming the ticket or run authorizes the exec and identifies the responsible actor in one resolution."
