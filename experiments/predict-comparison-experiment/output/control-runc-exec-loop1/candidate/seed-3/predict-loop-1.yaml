    composite_secondary: [change-management-correlation]
    override_data_source: null
    lead_hints:
      kube-audit-pod-exec: "Query the Kubernetes audit log for pod/exec subresource events on pod payments-api-7c9d8f5b6-q2vr4 (namespace payments-prod) in a ±5min window around 2026-04-26T08:33:20Z. Return: user.username, user.groups, requestReceivedTimestamp, responseStatus.code."
      change-management-correlation: "Check for an open change-management ticket authorizing interactive exec access to payments-prod pods around 2026-04-26T08:33Z. Return: ticket ID, owner, approval status, maintenance window."
