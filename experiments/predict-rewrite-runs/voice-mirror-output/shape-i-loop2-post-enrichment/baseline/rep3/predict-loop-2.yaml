      story: |
        The monitoring daemon on 172.22.0.10 invoked `ssh nagios@target-endpoint`
        as a scheduled health-check tick. Loop 1 established a periodic cadence
        across 11 rule-5710 events over 1h (mean inter-arrival ~576s,
