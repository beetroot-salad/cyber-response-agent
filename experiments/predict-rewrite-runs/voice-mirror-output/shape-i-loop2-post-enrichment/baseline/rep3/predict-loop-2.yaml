        monitoring tool; this alert is on-cadence with that loop-1 baseline.
        The username `nagios` is a monitoring-pattern sentinel name — the string
        a Nagios-class health-check agent supplies when probing target
        availability. sshd on target-endpoint rejected the user because `nagios`
        is not provisioned there, which is the expected outcome for an
        availability probe using a non-local credential.
