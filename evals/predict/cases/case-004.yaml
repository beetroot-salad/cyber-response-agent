case_id: case-004
slice: unknown-hypothesis-discipline
source: synthesized
signature_id: wazuh-rule-100001
loop_n: 1

inputs:
  alert_path: evals/predict/fixtures/case-004/alert.json
  prior_investigation_md: null
  notes: |
    Falco container-escape rule fires with parent_pname=null in the alert
    payload — the discriminator field PREDICT would normally fork on is
    structurally absent. Per feedback memory "Unknown-hypothesis discipline
    > mechanism spiral", PREDICT must NOT noodle on every mechanism that
    could produce pname=null; instead emit a Shape E lead that refills the
    field (process-lineage / syscall-trace lookup). This is the case that
    catches mechanism-spiral — a wrong-shape output here picks Shape M with
    speculative peers (?host-side-exec vs ?container-internal vs
    ?kernel-rootkit) that can't be discriminated against null.

expected:
  shape: E
  shape_rationale: |
    The discriminating field (parent_pname) is null in the alert. No fork
    can be grounded against landed data until the field is refilled. The
    cheapest next step is one lead that fills the gap — process-lineage
    lookup against the host's syscall stream.

  branch_plan_must:
    primary_lead_oneof: [process-lineage, syscall-trace, falco-process-tree]
    readings_min: 2
    advance_to_includes: [escalate, "fork-at-mechanism"]

  hypotheses_must: null

  routing_must:
    selected_lead_oneof: [process-lineage, syscall-trace, falco-process-tree]
    composite_required: false

  prediction_axis:
    discriminator: |
      Whether the missing parent_pname can be recovered from a fuller
      process-lineage source (refill the gap), and what process class it
      reveals.
    acceptable_dimensions: [field-recovery, process-lineage]
    forbidden_dimensions: [authorization, mechanism-speculation-on-null]
    refutation_axis: |
      A reading where lineage lookup recovers a populated parent_pname
      routes the next loop to a mechanism fork on the recovered class; a
      reading where lineage is also empty/truncated routes to trust-root.

  forbidden_patterns:
    - presence_test_refutation
    - baseline_value_leak
    - compound_claim
    - mechanism_spiral  # peer hypotheses with predictions on the null field
    - speculative_peer_fork  # ?host-side-exec vs ?container-internal when no field grounds either
