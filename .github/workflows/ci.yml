name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      # defender/pyproject.toml is package = false — `uv sync` installs the
      # dependencies into defender/.venv without trying to build defender itself
      # as an installable package. The runtime extra (pydantic-ai) is synced so
      # the runtime/ package import-checks during collection and slice-2's
      # hermetic gather tests can run; the llm-marked smoke still skips here.
      - name: Sync defender venv
        working-directory: defender
        run: uv sync --extra dev --extra runtime

      - name: Run unit tests
        working-directory: defender
        # Collect both the learning-loop invariant suite (tests/) AND the
        # orchestrator/loop tests co-located under learning/. The latter were
        # previously dark to CI — only tests/ was collected — so a green run
        # could hide failures in learning/test_loop.py et al.
        run: uv run pytest tests/ learning/ -v -m "not llm and not live"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync defender venv
        working-directory: defender
        run: uv sync --extra dev

      # Hard gate — blocks CI. Keeps the baseline (pyflakes + pycodestyle E)
      # clean repo-wide; extra rule sets are reported in the code-smells job.
      # `--select` on the CLI overrides per-file config, so the gate is uniform.
      - name: Ruff (hard gate — E + F)
        run: defender/.venv/bin/ruff check . --select E,F --ignore E402,E501

      # Defender-scoped extended-rule gate (issue #400). Extended families
      # (bugbear/simplify/complexity/pyupgrade/pytest-style) graduate here from
      # pyproject's extend-select as each family's violations are cleared — one
      # family-group per PR. Scoped to defender/ (not repo-wide like the E,F gate
      # above) because the extended config only governs the defender/ tree;
      # experiments/ + root scripts/ are intentionally out of scope. Explicit
      # --select so per-file config can't weaken it. Grows as families promote.
      - name: Ruff (defender extended — promoted families)
        run: defender/.venv/bin/ruff check defender --select B,SIM,UP,PLR0915 --ignore E402,E501

  code-smells:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync defender venv
        working-directory: defender
        run: uv sync --extra dev

      - name: Set up Node (for jscpd)
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install jscpd
        run: npm install -g jscpd

      # ---- Soft signals: metrics, reported but never block. ----
      # Trend indicators with no clean pass/fail (or redundant with a hard gate
      # below), so they stay `|| true`. defender/ carries its own [tool.ruff]
      # config (extend-select bugbear/simplify/complexity/pyupgrade/pytest-style),
      # so no --config is needed.
      - name: Ruff (extended — bugbear, simplify, complexity, pyupgrade, pytest-style)
        run: defender/.venv/bin/ruff check defender --statistics || true

      - name: Radon — cyclomatic complexity (B and worse)
        run: defender/.venv/bin/radon cc defender -a -nb || true

      - name: Radon — maintainability index (B and worse)
        run: defender/.venv/bin/radon mi defender -nb || true

      - name: Radon — raw size metrics
        run: defender/.venv/bin/radon raw defender -s || true

      # `**/*_cli.py` excludes the per-system data-source adapter shims
      # (scripts/adapters/*_cli.py + their test stubs): they share argparse/CLI
      # scaffolding by design, so their similarity is accepted boilerplate, not
      # the logic duplication this detector is meant to surface.
      - name: jscpd (copy-paste detection — all formats, soft report)
        run: jscpd defender --min-tokens 60 --reporters consoleFull --ignore "**/.venv/**,**/runs/**,**/run-visualizations/**,**/*_cli.py" || true

      # ---- Hard gates: each BLOCKS CI on a NEW smell only. ----
      # The custom lints below are ratcheted against a checked-in, reviewable
      # baseline (scripts/lint/<lint>_baseline.json via scripts/lint/_baseline.py):
      # today's findings are recorded, so a gate fails only on a fingerprint not
      # in its baseline. Exclusions are explicit config, not `|| true`. Run after
      # the soft reports so those always emit first. Invoked with the synced
      # defender venv interpreter so a runner without `python` on PATH can't make
      # a gate silently pass. Regenerate a baseline with the lint's
      # --update-baseline and annotate the new entries in the PR.

      # Python logic duplication. Scoped to --format python so the JSON/markdown
      # fixtures (legitimately ~40% similar) can't pollute the signal. Threshold
      # is a ratchet above today's ~1.4% baseline (adapter CLIs excluded) — it
      # blocks a PR that meaningfully grows copy-pasted Python (the #330 class).
      - name: jscpd Python-duplication gate (hard — blocks CI)
        run: jscpd defender --format python --min-tokens 60 --threshold 3 --reporters consoleFull --ignore "**/.venv/**,**/runs/**,**/run-visualizations/**,**/*_cli.py"

      # Dead code. Wraps vulture (same invocation as the prior soft step) behind
      # the baseline ratchet so only NEW dead code blocks.
      - name: Vulture dead-code gate (baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_vulture.py

      # monkeypatch.setattr in tests — the dependency-injection-avoidance smell;
      # new tests should inject a config/deps seam instead. Pre-existing sites
      # are baselined and paid down over time.
      - name: Monkeypatch-setattr gate (baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_monkeypatch.py

      # Small-helper complement to the jscpd gate: jscpd catches large copy-paste
      # blocks (>=60 tokens) but is blind to 1-5 line helpers copied across
      # modules and to divergent same-named copies (#357/#358/#359/#360).
      - name: Duplicate-helper gate (cross-module dup names — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_duplicate_helpers.py

      # Defender hygiene + discipline gates. Each script is independently
      # inspectable under scripts/lint/lint_*.py; source PRs that prompted each
      # check are cited in the module docstrings.
      - name: Fetch base ref (for stale-ref diff)
        run: git fetch origin main:refs/remotes/origin/main --depth=50 || true

      - name: Hygiene gate (paths, interpreter, hook matchers — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_ci_hygiene.py

      - name: Shippable-surface gate (env-agnostic discipline — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_shippable_surface.py

      - name: Ground-truth-leak gate (baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_ground_truth_leak.py

      - name: Stale-reference gate (vs origin/main — baseline-ratcheted)
        env:
          STALE_REF_BASE: origin/main
        run: defender/.venv/bin/python scripts/lint/lint_stale_refs.py
