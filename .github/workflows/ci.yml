name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv and install dependencies
        run: uv venv && uv pip install -e "soc-agent[dev]"

      - name: Run unit tests
        run: uv run pytest soc-agent/tests/ -v -m "not llm"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv and install dependencies
        run: uv venv && uv pip install -e "soc-agent[dev]"

      # Hard gate — blocks CI. Keeps the baseline (pyflakes + pycodestyle E)
      # clean; extra rule sets are reported in the code-smells job, not here.
      - name: Ruff (hard gate — E + F)
        run: uv run ruff check . --select E,F --ignore E402,E501

      - name: Mock-usage ratchet
        run: uv run python soc-agent/scripts/lint_mock_usage.py

  code-smells:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv and install dev deps
        run: uv venv && uv pip install -e "soc-agent[dev]"

      - name: Set up Node (for jscpd)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jscpd
        run: npm install -g jscpd

      # Code-smell signals are reported, not enforced — surface trends in the
      # job log without blocking PRs. Tighten thresholds incrementally.
      # `--config` forces both trees onto soc-agent's extended ruleset;
      # without it, defender/ would fall back to ruff defaults (no
      # bugbear/simplify/complexity/etc.) because defender/pyproject.toml
      # has no [tool.ruff] section.
      - name: Ruff (extended — bugbear, simplify, complexity, pyupgrade, pytest-style)
        run: uv run ruff check . --config soc-agent/pyproject.toml --statistics || true

      # `--config-file` is required: mypy is run from the repo root,
      # but the project's [tool.mypy] config lives in soc-agent/.
      # Without this, mypy falls back to defaults, sees no `files=...`,
      # and errors with "Missing target" (silently swallowed by `|| true`).
      - name: Mypy (type-check, soft-launch)
        run: uv run mypy --config-file soc-agent/pyproject.toml || true

      - name: Vulture (dead code)
        run: uv run vulture soc-agent defender --min-confidence 80 --exclude 'soc-agent/.venv,soc-agent/tests,defender/.venv,defender/tests' --ignore-names 'key_field,key_value' || true

      - name: Radon — cyclomatic complexity (B and worse)
        run: uv run radon cc soc-agent defender -a -nb || true

      - name: Radon — maintainability index (B and worse)
        run: uv run radon mi soc-agent defender -nb || true

      - name: Radon — raw size metrics
        run: uv run radon raw soc-agent defender -s || true

      - name: jscpd (copy-paste detection)
        run: jscpd soc-agent defender --min-tokens 60 --reporters consoleFull --ignore "**/.venv/**,**/runs/**,**/run-visualizations/**" || true

      # Defender hygiene + discipline lints (soft — reported, not enforced).
      # Each script is independently inspectable under defender/scripts/lint_*.py;
      # source PRs that prompted each check are cited in the module docstrings.
      - name: Fetch base ref (for stale-ref diff)
        run: git fetch origin main:refs/remotes/origin/main --depth=50 || true

      - name: Hygiene lint (paths, interpreter, hook matchers)
        run: python defender/scripts/lint_ci_hygiene.py || true

      - name: Shippable-surface lint (env-agnostic discipline)
        run: python defender/scripts/lint_shippable_surface.py || true

      - name: Static permission smoke (Bash invocations vs run-settings allowlist)
        run: python defender/scripts/lint_static_smoke.py || true

      - name: Ground-truth-leak scan
        run: python defender/scripts/lint_ground_truth_leak.py || true

      - name: Stale-reference scan (vs origin/main)
        env:
          STALE_REF_BASE: origin/main
        run: python defender/scripts/lint_stale_refs.py || true
