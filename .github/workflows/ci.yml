name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      # defender/pyproject.toml is package = false — `uv sync` installs the
      # dependencies into defender/.venv without trying to build defender itself
      # as an installable package. The runtime extra (pydantic-ai) is synced so
      # the runtime/ package import-checks during collection and slice-2's
      # hermetic gather tests can run; the llm-marked smoke still skips here.
      - name: Sync defender venv
        working-directory: defender
        run: uv sync --extra dev --extra runtime

      - name: Run unit tests
        working-directory: defender
        # Collect both the learning-loop invariant suite (tests/) AND the
        # orchestrator/loop tests co-located under learning/. The latter were
        # previously dark to CI — only tests/ was collected — so a green run
        # could hide failures in learning/test_loop.py et al.
        run: uv run pytest tests/ learning/ -v -m "not llm and not live"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync defender venv
        working-directory: defender
        run: uv sync --extra dev

      # Hard gate — blocks CI. Keeps the baseline (pyflakes + pycodestyle E)
      # clean repo-wide; extra rule sets are reported in the code-smells job.
      # `--select` on the CLI overrides per-file config, so the gate is uniform.
      - name: Ruff (hard gate — E + F)
        run: defender/.venv/bin/ruff check . --select E,F --ignore E402,E501

  code-smells:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync defender venv
        working-directory: defender
        run: uv sync --extra dev

      - name: Set up Node (for jscpd)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jscpd
        run: npm install -g jscpd

      # Code-smell signals are reported, not enforced — surface trends in the
      # job log without blocking PRs — with ONE exception: the Python-duplication
      # gate at the end of this job is a hard ratchet (see its step). defender/
      # carries its own [tool.ruff] config (extend-select bugbear/simplify/
      # complexity/pyupgrade/pytest-style), so no --config is needed.
      - name: Ruff (extended — bugbear, simplify, complexity, pyupgrade, pytest-style)
        run: defender/.venv/bin/ruff check defender --statistics || true

      - name: Vulture (dead code)
        run: defender/.venv/bin/vulture defender --min-confidence 80 --exclude 'defender/.venv,defender/tests' --ignore-names 'key_field,key_value' || true

      - name: Radon — cyclomatic complexity (B and worse)
        run: defender/.venv/bin/radon cc defender -a -nb || true

      - name: Radon — maintainability index (B and worse)
        run: defender/.venv/bin/radon mi defender -nb || true

      - name: Radon — raw size metrics
        run: defender/.venv/bin/radon raw defender -s || true

      # `**/*_cli.py` excludes the per-system data-source adapter shims
      # (scripts/adapters/*_cli.py + their test stubs): they share argparse/CLI
      # scaffolding by design, so their similarity is accepted boilerplate, not
      # the logic duplication this detector is meant to surface.
      - name: jscpd (copy-paste detection — all formats, soft report)
        run: jscpd defender --min-tokens 60 --reporters consoleFull --ignore "**/.venv/**,**/runs/**,**/run-visualizations/**,**/*_cli.py" || true

      # Hard gate (the one enforced check in this otherwise-soft job): Python
      # logic duplication. Scoped to --format python so the JSON/markdown
      # fixtures (legitimately ~40% similar) can't pollute the signal. The
      # threshold is a ratchet above today's ~1.4% baseline (adapter CLIs
      # excluded, as in the soft step) — it blocks a PR that meaningfully grows
      # copy-pasted Python (the #330 class of drift), not the existing
      # duplication. Runs last so the soft reports above always emit before this
      # can fail the job.
      - name: jscpd Python-duplication gate (hard — blocks CI)
        run: jscpd defender --format python --min-tokens 60 --threshold 3 --reporters consoleFull --ignore "**/.venv/**,**/runs/**,**/run-visualizations/**,**/*_cli.py"

      # Duplicate-helper lint — the small-helper complement to the jscpd gate
      # above: jscpd catches large copy-paste blocks (>=60 tokens) but is blind
      # to 1-5 line helpers copied across modules and to divergent same-named
      # copies (#357/#358/#359/#360). Ratcheted against a checked-in baseline
      # (scripts/lint/lint_duplicate_helpers_baseline.txt) so only NEW dup names
      # surface. Soft for now; promote to a hard gate once the baseline is drawn
      # down, mirroring how the jscpd gate was introduced.
      - name: Duplicate-helper lint (cross-module dup names — soft report)
        run: python scripts/lint/lint_duplicate_helpers.py || true

      # Defender hygiene + discipline lints (soft — reported, not enforced).
      # Each script is independently inspectable under scripts/lint/lint_*.py;
      # source PRs that prompted each check are cited in the module docstrings.
      - name: Fetch base ref (for stale-ref diff)
        run: git fetch origin main:refs/remotes/origin/main --depth=50 || true

      - name: Hygiene lint (paths, interpreter, hook matchers)
        run: python scripts/lint/lint_ci_hygiene.py || true

      - name: Shippable-surface lint (env-agnostic discipline)
        run: python scripts/lint/lint_shippable_surface.py || true

      - name: Ground-truth-leak scan
        run: python scripts/lint/lint_ground_truth_leak.py || true

      - name: Stale-reference scan (vs origin/main)
        env:
          STALE_REF_BASE: origin/main
        run: python scripts/lint/lint_stale_refs.py || true
