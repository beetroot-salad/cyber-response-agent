name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      # defender/pyproject.toml is package = false — `uv sync` installs the
      # dependencies into defender/.venv without trying to build defender itself
      # as an installable package. The runtime extra (pydantic-ai) is synced so
      # the runtime/ package import-checks during collection and the hermetic
      # e2e replay suite can run.
      - name: Sync defender venv
        working-directory: defender
        run: uv sync --extra dev --extra runtime

      - name: Run unit tests
        working-directory: defender
        # Collect both the learning-loop invariant suite (tests/) AND the
        # orchestrator/loop tests co-located under learning/. The latter were
        # previously dark to CI — only tests/ was collected — so a green run
        # could hide failures in learning/test_loop.py et al.
        run: uv run pytest tests/ learning/ -v -m "not live"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync defender venv
        working-directory: defender
        # --extra runtime: mypy (below) type-checks the whole `defender` tree,
        # including runtime/, against the REAL pydantic-ai types. Without it,
        # ignore_missing_imports collapses every pydantic_ai type to `Any`, so the
        # runtime layer's annotations (ModelFactory, Model, Agent[…]) are
        # unchecked — defeating the #403 mypy gate there. The Anthropic+MCP stack
        # is the cost; the `code-smells` job stays dev-only (its AST gates don't
        # import the tree).
        run: uv sync --extra dev --extra runtime

      # Hard gate — blocks CI. Keeps the baseline (pyflakes + pycodestyle E)
      # clean repo-wide; extra rule sets are reported in the code-smells job.
      # `--select` on the CLI overrides per-file config, so the gate is uniform.
      - name: Ruff (hard gate — E + F)
        run: defender/.venv/bin/ruff check . --select E,F --ignore E402,E501

      # Defender-scoped extended-rule gate (issue #400, drain complete). The full
      # extended family set (bugbear/simplify/complexity/too-many-*/pyupgrade/
      # pytest-style) is now clean in defender/ and blocking. Config-driven (the
      # `select` in defender/pyproject.toml), so the local `ruff check defender`
      # matches CI exactly. Scoped to defender/ (not repo-wide like the E,F gate
      # above) because the extended config only governs the defender/ tree;
      # experiments/ + root scripts/ stay E,F-only by design.
      - name: Ruff (defender extended — full gate)
        run: defender/.venv/bin/ruff check defender

      # Type-check hard gate (issue #403). mypy over the shippable defender/
      # modules (tests + .venv excluded), config in defender/pyproject.toml.
      # Promoted from a non-blocking code-smells signal to this blocking gate once
      # the tree reached zero errors — the ramp's "promote when clean" step (see
      # docs/decisions/defender-mypy-ramp.md), the same graduation the extended
      # ruff families went through (#400). Config pointed explicitly; there's no
      # root pyproject for mypy to discover. The lint venv is --extra dev (no
      # pydantic_ai), so mypy treats it as Any — runtime-only driver.py generic-
      # variance errors are invisible here by design (they're checked locally with
      # the runtime extra synced; the dict-blob typing debt is tracked in #409).
      - name: Mypy (type-check — hard gate)
        run: defender/.venv/bin/mypy --config-file defender/pyproject.toml

  code-smells:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync defender venv
        working-directory: defender
        run: uv sync --extra dev

      - name: Set up Node (for jscpd)
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install jscpd
        run: npm install -g jscpd

      # ---- Soft signals: metrics, reported but never block. ----
      # Trend indicators with no clean pass/fail, so they stay `|| true`. (The
      # extended ruff families AND mypy are now hard-gated in the lint job —
      # #400 / #403; the old soft `ruff --statistics` sweep is retired; radon/
      # jscpd cover what's left.)
      - name: Radon — cyclomatic complexity (B and worse)
        run: defender/.venv/bin/radon cc defender -a -nb || true

      - name: Radon — maintainability index (B and worse)
        run: defender/.venv/bin/radon mi defender -nb || true

      - name: Radon — raw size metrics
        run: defender/.venv/bin/radon raw defender -s || true

      # `**/*_cli.py` excludes the per-system data-source adapter shims
      # (scripts/adapters/*_cli.py + their test stubs): they share argparse/CLI
      # scaffolding by design, so their similarity is accepted boilerplate, not
      # the logic duplication this detector is meant to surface.
      - name: jscpd (copy-paste detection — all formats, soft report)
        run: jscpd defender --min-tokens 60 --reporters consoleFull --ignore "**/.venv/**,**/runs/**,**/run-visualizations/**,**/*_cli.py" || true

      # ---- Hard gates: each BLOCKS CI on a NEW smell only. ----
      # The custom lints below are ratcheted against a checked-in, reviewable
      # baseline (scripts/lint/<lint>_baseline.json via scripts/lint/_baseline.py):
      # today's findings are recorded, so a gate fails only on a fingerprint not
      # in its baseline. Exclusions are explicit config, not `|| true`. Run after
      # the soft reports so those always emit first. Invoked with the synced
      # defender venv interpreter so a runner without `python` on PATH can't make
      # a gate silently pass. Regenerate a baseline with the lint's
      # --update-baseline and annotate the new entries in the PR.

      # Python logic duplication. Scoped to --format python so the JSON/markdown
      # fixtures (legitimately ~40% similar) can't pollute the signal. Threshold
      # is a ratchet above today's ~1.4% baseline (adapter CLIs excluded) — it
      # blocks a PR that meaningfully grows copy-pasted Python (the #330 class).
      - name: jscpd Python-duplication gate (hard — blocks CI)
        run: jscpd defender --format python --min-tokens 60 --threshold 3 --reporters consoleFull --ignore "**/.venv/**,**/runs/**,**/run-visualizations/**,**/*_cli.py"

      # Dead code. Wraps vulture (same invocation as the prior soft step) behind
      # the baseline ratchet so only NEW dead code blocks.
      - name: Vulture dead-code gate (baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_vulture.py

      # monkeypatch.setattr in tests — the dependency-injection-avoidance smell;
      # new tests should inject a config/deps seam instead. Pre-existing sites
      # are baselined and paid down over time.
      - name: Monkeypatch-setattr gate (baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_monkeypatch.py

      # Small-helper complement to the jscpd gate: jscpd catches large copy-paste
      # blocks (>=60 tokens) but is blind to 1-5 line helpers copied across
      # modules and to divergent same-named copies (#357/#358/#359/#360).
      - name: Duplicate-helper gate (cross-module dup names — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_duplicate_helpers.py

      # Hand-rolled per-line json.loads readers + json.dumps+newline appends under
      # defender/ that bypass defender._io.read_jsonl_rows / append_jsonl — both a
      # dedup smell and the #446 torn-line read crash (a JSONDecodeError escapes
      # every drain guard and crashes the worker every tick). New sites must route
      # through the shared _io helpers; the canonical reader/appender are
      # suppressed inline.
      - name: Unsafe JSONL-io gate (tolerant-reader/appender dedup + #446 — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_unsafe_jsonl_io.py

      # Text reads/writes under defender/ that decode or encode under the AMBIENT
      # LOCALE instead of pinning encoding="utf-8" (#588/#589). The corpora are UTF-8
      # and the CLIs print them, so an unpinned read raises where the locale is ascii
      # and an unpinned write silently emits latin-1 bytes the next walk warn-skips as
      # "malformed". Also flags a subprocess text=True pipe with no encoding=. The
      # baseline ships EMPTY: every defender/ site was pinned when the gate landed.
      # Since #602 all three AST gates resolve a callee to its ORIGIN MODULE via
      # scripts/lint/_astlib.py rather than matching how it was spelled, so an alias
      # or a from-import cannot walk past them — and the opener's mode slot/default
      # come from that resolved callee instead of being guessed from the call shape.
      - name: Unpinned text-io gate (utf-8 pin on every text read/write — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_unpinned_text_io.py

      # Hand-rolled git subprocess calls under defender/ that bypass the
      # defender._git facade (git / git_status / git_commit / git_worktree_* /
      # GitError) — a ~8× dedup smell plus the spaced-path porcelain bug the
      # shared -z reader fixes (#460). New sites must route through defender._git;
      # the facade itself is excluded and test fixtures are exempt.
      - name: Raw git-subprocess gate (defender._git facade dedup, #460 — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_raw_git_subprocess.py

      # A parameter re-defaulted in-body via `x = x if x is not None else DEFAULT`
      # to a named/called fallback: an Optional immediately made non-None, with the
      # default knowledge duplicated across call sites (and prone to drift). Anchor
      # the default in ONE place — a signature default (`x: T = DEFAULT`) or a single
      # boundary resolution. Literal fallbacks (`else []`) and new-name DI seams are
      # not flagged; suppress a deliberate site with `# lint-default: ok — <reason>`.
      - name: Unanchored-default gate (single-source param defaults — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_unanchored_default.py

      # Hand-rolled frontmatter fence arithmetic under defender/ that bypasses the
      # canonical grammar in defender/_frontmatter.py (#591): find/split/startswith/
      # regex fence-parse call sites. Five readers each re-derived the fence offsets
      # with a subtly different grammar — a parser differential injected into exactly
      # the primary-vs-secondary divergence signal the eval exists to measure. The
      # baseline ships EMPTY: the five sites were folded when the gate landed.
      - name: Hand-rolled-frontmatter gate (one fence grammar, #591 — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_hand_rolled_frontmatter.py

      # Defender hygiene + discipline gates. Each script is independently
      # inspectable under scripts/lint/lint_*.py; source PRs that prompted each
      # check are cited in the module docstrings.
      - name: Fetch base ref (for stale-ref diff)
        run: git fetch origin main:refs/remotes/origin/main --depth=50 || true

      - name: Hygiene gate (paths, interpreter, hook matchers — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_ci_hygiene.py

      - name: Shippable-surface gate (env-agnostic discipline — baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_shippable_surface.py

      - name: Ground-truth-leak gate (baseline-ratcheted)
        run: defender/.venv/bin/python scripts/lint/lint_ground_truth_leak.py

      - name: Stale-reference gate (vs origin/main — baseline-ratcheted)
        env:
          STALE_REF_BASE: origin/main
        run: defender/.venv/bin/python scripts/lint/lint_stale_refs.py
