<title>flowdeck — dev workflow board</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}

  :root{
    --sans: ui-sans-serif, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace;

    --ground:#eeeef1;
    --panel:#ffffff;
    --col:#f5f5f8;
    --line:#e6e6ec;
    --line-2:#d1d1d9;
    --ink:#191920;
    --ink-2:#545460;
    --ink-3:#8a8a96;
    --accent:#2f6bed;      /* cobalt — single accent (mono); gate emphasis is fill, not a second hue */
    --accent-ink:#ffffff;
    --run:#2f6bed;         /* same cobalt — "the machine is acting" */
    --fail:#cf4b4b;
    --done:#4f9d6b;
    --shadow: 0 1px 2px rgba(28,26,38,.06), 0 4px 14px rgba(28,26,38,.07);
    --shadow-lg: 0 16px 46px rgba(28,26,38,.18);
  }
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]){
    --ground:#0c0d11; --panel:#16181f; --col:#101116; --line:#262931; --line-2:#383c45;
    --ink:#e9eaf0; --ink-2:#a2a6b2; --ink-3:#6b6f7b;
    --accent:#5b8bff; --accent-ink:#0c0d11; --run:#5b8bff; --fail:#e0686d; --done:#5fb07f;
    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.42);
    --shadow-lg: 0 20px 54px rgba(0,0,0,.6);
  }}
  :root[data-theme="dark"]{
    --ground:#0c0d11; --panel:#16181f; --col:#101116; --line:#262931; --line-2:#383c45;
    --ink:#e9eaf0; --ink-2:#a2a6b2; --ink-3:#6b6f7b;
    --accent:#5b8bff; --accent-ink:#0c0d11; --run:#5b8bff; --fail:#e0686d; --done:#5fb07f;
    --shadow: 0 1px 2px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.42);
    --shadow-lg: 0 20px 54px rgba(0,0,0,.6);
  }
  :root{
    --accent-soft: color-mix(in srgb, var(--accent) 13%, transparent);
    --run-soft:    color-mix(in srgb, var(--run) 14%, transparent);
    --run-dim:     color-mix(in srgb, var(--run) 55%, var(--ink-3));
    --fail-soft:   color-mix(in srgb, var(--fail) 13%, transparent);
    --done-soft:   color-mix(in srgb, var(--done) 13%, transparent);
  }

  /* app-shell: the page is exactly the viewport and never scrolls — only the board (x) and columns (y) do */
  body{ font-family:var(--sans); background:var(--ground); color:var(--ink); height:100%; overflow:hidden; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; transition:padding-right .22s cubic-bezier(.4,0,.2,1); }
  body.peek-open{ padding-right:440px; }

  /* ---------- top bar ---------- */
  .topbar{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; padding:11px 18px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand svg{ width:20px; height:20px; display:block; }
  /* fill via CSS, not presentation attrs — var() doesn't resolve in fill="…", it falls back to black (invisible in dark) */
  .brand svg rect{ fill:var(--ink-3); }
  .brand svg rect.on{ fill:var(--accent); }
  .brand-name{ font-family:var(--mono); font-weight:700; font-size:14.5px; letter-spacing:-.01em; }
  .brand-sub{ font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.14em; color:var(--ink-3); border:1px solid var(--line-2); border-radius:5px; padding:2px 5px; }

  .summary{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .chip{ display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11.5px; font-weight:600; padding:5px 11px; border-radius:999px; border:1px solid var(--line-2); color:var(--ink-2); background:var(--panel); }
  .chip .cdot{ width:7px; height:7px; border-radius:999px; background:currentColor; }
  .chip.wait{ color:var(--accent-ink); background:var(--accent); border-color:transparent; }
  .chip.run{ color:var(--run); background:var(--run-soft); border-color:transparent; }

  .controls{ display:flex; align-items:center; gap:8px; margin-left:auto; flex-wrap:wrap; }
  select, .icon-btn{ font-family:var(--mono); font-size:12px; color:var(--ink-2); background:var(--panel); border:1px solid var(--line-2); border-radius:8px; padding:7px 10px; cursor:pointer; }
  select:hover, .icon-btn:hover{ border-color:var(--ink-3); }
  #themeBtn{ display:inline-flex; align-items:center; justify-content:center; }
  #themeBtn svg{ display:block; }
  .btn-new{ font-family:var(--sans); font-weight:600; font-size:12.5px; background:var(--ink); color:var(--panel); border:1px solid var(--ink); border-radius:8px; padding:8px 12px; cursor:pointer; }
  .btn-new:hover{ opacity:.9; }

  /* ---------- board ---------- */
  /* safe center — columns sit centered when they fit, fall back to left-aligned + scrollable when they overflow */
  .board{ flex:1; min-height:0; display:flex; justify-content:safe center; gap:13px; padding:16px 18px 8px; overflow-x:auto; overflow-y:hidden; overscroll-behavior:contain; align-items:flex-start; scrollbar-width:thin; }
  /* max-height:100% of the (now definite-height) board — no magic viewport-minus-chrome number, so the column never runs past the visible area */
  .col{ flex:0 0 264px; width:264px; background:var(--col); border:1px solid var(--line); border-radius:12px; display:flex; flex-direction:column; max-height:100%; }
  .col-head{ display:flex; align-items:baseline; gap:8px; padding:12px 13px 11px; border-bottom:1px solid var(--line); }
  .stage-key{ font-family:var(--mono); font-weight:700; font-size:13px; color:var(--ink); letter-spacing:-.01em; }
  .stage-role{ font-family:var(--mono); font-size:10px; color:var(--ink-3); display:inline-flex; align-items:center; gap:5px; opacity:0; transition:opacity .13s ease; }
  .col:hover .stage-role, .col:focus-within .stage-role{ opacity:1; }
  .stage-role .gdot{ width:5px; height:5px; border-radius:999px; background:var(--accent); }
  .col-count{ margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--ink-3); background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:1px 7px; min-width:22px; text-align:center; }
  /* min-height:0 lets this flex child shrink below its content so overflow-y:auto actually scrolls (else it just overflows the capped column) */
  /* overscroll-behavior:contain stops the wheel from chaining out to the page; scrollbar-gutter:stable reserves the bar's width so it can't flicker on/off */
  .col-body{ padding:10px; display:flex; flex-direction:column; gap:9px; overflow-y:auto; min-height:0; overscroll-behavior:contain; scrollbar-gutter:stable; scrollbar-width:thin; }
  .col-body:empty::after{ content:"—"; color:var(--ink-3); font-family:var(--mono); font-size:12px; display:block; text-align:center; padding:12px 0; }
  /* empty board + a failed poll: a large error, not the quiet empty columns */
  .board-error{ flex:1; min-height:52vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; padding:40px 20px; }
  .board-error .be-mark{ font-size:44px; line-height:1; color:var(--fail); }
  .board-error .be-title{ font-family:var(--mono); font-weight:700; font-size:20px; color:var(--ink); letter-spacing:-.01em; }
  .board-error .be-sub{ font-family:var(--sans); font-size:13.5px; color:var(--ink-2); max-width:340px; line-height:1.5; }
  .board-error .be-sub code{ font-family:var(--mono); font-size:12.5px; background:var(--col); border:1px solid var(--line); border-radius:5px; padding:1px 5px; }
  .col-collapse{ background:transparent; border:none; color:var(--ink-3); cursor:pointer; font-size:15px; line-height:1; padding:0 4px 0 0; margin:-1px 0 0 -2px; }
  .col-collapse:hover{ color:var(--ink); }
  .col.collapsed{ flex:0 0 46px; width:46px; cursor:pointer; }
  .col.collapsed:hover{ border-color:var(--ink-3); }
  .col.collapsed:focus-visible{ outline:2px solid var(--run); outline-offset:2px; }
  .col-rail{ display:flex; flex-direction:column; align-items:center; gap:12px; padding:12px 0; }
  .rail-count{ font-family:var(--mono); font-size:11px; color:var(--ink-3); background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:1px 6px; min-width:22px; text-align:center; }
  .rail-key{ writing-mode:vertical-rl; transform:rotate(180deg); font-family:var(--mono); font-weight:700; font-size:12.5px; color:var(--ink-2); letter-spacing:.02em; }

  /* ---------- card ---------- */
  .card{
    --s:var(--line-2); --s-soft:transparent;
    position:relative; text-align:left; width:100%;
    background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--s);
    border-radius:9px; padding:11px 12px; box-shadow:var(--shadow); cursor:pointer;
    display:flex; flex-direction:column; gap:8px;
    transition:transform .13s ease, box-shadow .13s ease, border-color .13s ease;
  }
  .card:hover{ transform:translateY(-1px); box-shadow:var(--shadow-lg); border-color:color-mix(in srgb, var(--s) 40%, var(--line)); }
  .card:focus-visible{ outline:2px solid var(--run); outline-offset:2px; }
  .card{ cursor:grab; }
  .card:active{ cursor:grabbing; }
  .card.dragging{ opacity:.4; }
  .col.drop-target{ outline:2px dashed var(--run); outline-offset:-3px; }
  .col.drop-target > .col-body{ background:color-mix(in srgb, var(--run) 7%, transparent); border-radius:0 0 12px 12px; }
  /* active (running) — muted, "between" ready and idle; a thin ambient line at the bottom is its only signal */
  .card[data-status="running"]{ --s:var(--run-dim); --s-soft:var(--run-soft); background:color-mix(in srgb, var(--run-dim) 5%, var(--panel)); }
  .card[data-status="running"]::after{ content:""; position:absolute; left:3px; right:3px; bottom:2px; height:2px; border-radius:2px;
    background:linear-gradient(90deg, transparent, var(--run-dim), transparent); background-size:45% 100%; background-repeat:no-repeat; background-position:-45% 0;
    animation:activebar 1.6s ease-in-out infinite; }
  /* ready (needs you) — brightest: bright cobalt edge + wash, bold title */
  .card[data-status="awaiting_human"]{ --s:var(--accent); --s-soft:var(--accent-soft); border-left-width:4px; background:color-mix(in srgb, var(--accent) 15%, var(--panel)); }
  .card[data-status="awaiting_human"] .card-title{ font-weight:650; }
  .card[data-status="failed"]{ --s:var(--fail); --s-soft:var(--fail-soft); border-left-width:4px; background:color-mix(in srgb, var(--fail) 8%, var(--panel)); }
  .card[data-status="failed"] .card-title{ font-weight:650; }
  /* non-active states — recede: no lift, muted title */
  .card[data-status="done"]{ --s:var(--done); --s-soft:var(--done-soft); box-shadow:none; }
  .card[data-status="done"] .card-title{ color:var(--ink-3); }
  .card[data-status="queued"]{ --s:var(--ink-3); border-left-style:dashed; box-shadow:none; }
  .card[data-status="queued"] .card-title{ color:var(--ink-2); }
  .card[data-status="idle"]{ --s:var(--line); box-shadow:none; }
  .card[data-status="idle"] .card-title{ color:var(--ink-2); font-weight:560; }

  .card-top{ display:flex; align-items:center; gap:8px; }
  .issue{ font-family:var(--mono); font-size:12px; font-weight:600; color:var(--ink-2); }
  .repo-tag{ font-family:var(--mono); font-size:10px; color:var(--ink-3); }
  /* icon-only status markers — no text; shape carries meaning */
  .mark{ margin-left:auto; display:inline-flex; align-items:center; justify-content:center; min-width:14px; height:14px; }
  .mark::before{ display:inline-block; line-height:1; }
  .mark.queued::before{ content:""; width:8px; height:8px; border-radius:50%; border:1.5px solid var(--ink-3); box-sizing:border-box; }
  /* ready — bright, static diamond (attention comes from brightness, never motion) */
  .mark.gate::before{ content:""; width:10px; height:10px; background:var(--accent); transform:rotate(45deg); }
  .mark.failed::before{ content:"\2715"; color:var(--fail); font-family:var(--mono); font-weight:700; font-size:12px; }
  /* finished — a solid, static badge that pops even on a receded card */
  .mark.done{ width:16px; height:16px; border-radius:50%; background:var(--done); animation:none; }
  .mark.done::before{ content:"\2713"; color:var(--panel); font-weight:800; font-size:9px; animation:none; }

  .card-title{ font-family:var(--sans); font-weight:600; font-size:14px; line-height:1.32; margin:0; color:var(--ink); text-wrap:balance; }

  .card-meta{ font-family:var(--mono); font-size:10.5px; color:var(--ink-3); display:flex; align-items:center; gap:6px; }
  .card-meta .pr{ color:var(--ink-2); text-decoration:none; }
  .card-meta .pr:hover{ color:var(--run); }
  .card-meta.warn{ color:var(--fail); }

  .activity{ display:none; align-items:center; gap:8px; padding:6px 9px; border-radius:7px; background:var(--s-soft); font-family:var(--mono); font-size:11px; }
  .card:hover .activity, .card:focus-within .activity{ display:flex; }
  .act-step{ color:var(--ink); font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .act-data{ margin-left:auto; color:var(--ink-2); font-variant-numeric:tabular-nums; white-space:nowrap; opacity:0; transition:opacity .13s ease; }
  .card:hover .act-data, .card:focus-within .act-data{ opacity:1; }

  .card-actions{ display:flex; flex-direction:column; gap:7px; }
  .act-more{ display:none; gap:7px; flex-wrap:wrap; }
  .card:hover .act-more, .card:focus-within .act-more{ display:flex; }
  .btn{ font-family:var(--sans); font-weight:600; font-size:11.5px; padding:6px 10px; border-radius:7px; cursor:pointer; border:1px solid var(--line-2); background:var(--panel); color:var(--ink-2); white-space:nowrap; transition:border-color .12s ease, background .12s ease, color .12s ease; }
  .btn:hover{ border-color:var(--ink-3); color:var(--ink); }
  .btn.primary{ background:color-mix(in srgb, var(--run) 12%, var(--panel)); border-color:color-mix(in srgb, var(--run) 30%, var(--line-2)); color:var(--ink); }
  .btn.primary:hover{ background:color-mix(in srgb, var(--run) 20%, var(--panel)); border-color:var(--run); color:var(--ink); }
  .btn.gate{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); box-shadow:0 1px 6px color-mix(in srgb, var(--accent) 40%, transparent); }
  .btn.gate:hover{ filter:brightness(1.05); color:var(--accent-ink); }
  .btn.ghost{ background:transparent; border-color:transparent; }
  .btn.ghost:hover{ border-color:var(--line-2); }

  /* ---------- ledger footer ---------- */
  .ledger{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:9px 18px; border-top:1px solid var(--line); background:var(--panel); font-family:var(--mono); font-size:11px; color:var(--ink-3); }
  /* trouble-only: empty when healthy (the "last synced …" clock already says the board is live) */
  .ledger .sync{ display:inline-flex; align-items:center; gap:7px; color:var(--fail); }
  .ledger .sync .cdot{ width:7px; height:7px; border-radius:999px; background:currentColor; }
  .ledger-toggle{ margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--ink-2); background:transparent; border:1px solid var(--line-2); border-radius:6px; padding:3px 9px; cursor:pointer; }
  .ledger-toggle:hover{ border-color:var(--ink-3); color:var(--ink); }

  /* ---------- scrim, drawer, modal ---------- */
  .scrim{ position:fixed; inset:0; background:rgba(8,10,15,.5); opacity:0; pointer-events:none; transition:opacity .18s ease; z-index:40; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .drawer{ position:fixed; top:0; right:0; height:100vh; width:min(440px, 95vw); background:var(--panel); border-left:1px solid var(--line); box-shadow:var(--shadow-lg); z-index:50; transform:translateX(100%); transition:transform .22s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.show{ transform:translateX(0); }
  .drawer-head{ display:flex; align-items:flex-start; gap:10px; padding:16px 18px 14px; border-bottom:1px solid var(--line); }
  .drawer-head .x{ margin-left:auto; }
  /* flex:1 fills the space between head and pinned actions; min-height:0 lets it scroll a long run history instead of pushing the actions off-screen */
  .drawer-body{ padding:16px 18px 22px; overflow-y:auto; display:flex; flex-direction:column; gap:19px; flex:1 1 auto; min-height:0; }
  .d-title{ font-family:var(--sans); font-weight:600; font-size:15.5px; line-height:1.3; margin:5px 0 0; text-wrap:balance; }
  .d-crumb{ display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; color:var(--ink-3); flex-wrap:wrap; }
  .d-statepill{ display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:999px; font-weight:600; background:var(--s-soft); }
  .d-statepill .pdot{ width:6px; height:6px; border-radius:999px; background:currentColor; display:inline-block; }
  .d-section h4{ font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.11em; color:var(--ink-3); margin:0 0 9px; font-weight:600; }
  .points a{ display:flex; align-items:center; gap:9px; padding:9px 11px; margin-bottom:7px; border:1px solid var(--line); border-radius:8px; text-decoration:none; color:var(--ink); font-size:12.5px; background:var(--col); }
  .points a:hover{ border-color:var(--ink-3); }
  .points a .lead{ font-family:var(--mono); font-size:10.5px; color:var(--ink-3); min-width:58px; text-transform:uppercase; letter-spacing:.05em; }
  .points a .val{ font-family:var(--mono); font-size:11.5px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .points a .ext{ margin-left:auto; color:var(--ink-3); font-family:var(--mono); font-size:11px; white-space:nowrap; }
  .points a .ext.red{ color:var(--fail); } .points a .ext.green{ color:var(--done); }
  .watch{ border:1px solid var(--line); border-radius:9px; overflow:hidden; background:var(--col); }
  .watch-head{ display:flex; align-items:center; gap:8px; padding:8px 11px; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:11px; color:var(--ink-2); }
  .watch-head .dot{ width:8px; height:8px; border-radius:999px; background:var(--run); animation:pulse 1.7s ease-in-out infinite; }
  .watch-body{ padding:11px 12px; font-family:var(--mono); font-size:11.5px; line-height:1.75; color:var(--ink-2); overflow-x:auto; max-height:230px; overflow-y:auto; }
  .watch-body .ln{ white-space:pre; }
  .watch-body .ok{ color:var(--done); } .watch-body .run{ color:var(--run); } .watch-body .bad{ color:var(--fail); } .watch-body .mut{ color:var(--ink-3); }
  .watch-foot{ padding:8px 12px; border-top:1px solid var(--line); font-family:var(--mono); font-size:11px; color:var(--ink-2); font-variant-numeric:tabular-nums; }
  .fail-box{ border:1px solid var(--fail-soft); background:var(--fail-soft); border-radius:9px; padding:12px; }
  .fail-box .cmd{ font-family:var(--mono); font-size:11.5px; background:var(--col); border:1px solid var(--line); border-radius:6px; padding:8px 10px; margin-top:9px; color:var(--ink); overflow-x:auto; white-space:pre; cursor:pointer; }
  .fail-box .cmd:hover{ border-color:var(--ink-3); }
  .gate-box{ border:1px solid var(--accent-soft); background:var(--accent-soft); border-radius:9px; padding:12px; font-size:12.5px; color:var(--ink); line-height:1.5; }
  .gate-box code, .fail-box code{ font-family:var(--mono); font-size:11.5px; }
  .timeline{ display:flex; flex-direction:column; }
  .tl{ display:flex; gap:10px; align-items:flex-start; padding:5px 0; }
  .tl .tdot{ width:9px; height:9px; border-radius:999px; margin-top:4px; flex:0 0 auto; background:var(--ink-3); }
  .tl.ok .tdot{ background:var(--done); } .tl.run .tdot{ background:var(--run); } .tl.bad .tdot{ background:var(--fail); }
  .tl-row{ display:flex; width:100%; gap:8px; align-items:baseline; }
  .tl .tmain{ font-family:var(--mono); font-size:11.5px; color:var(--ink); }
  .tl .tmeta{ font-family:var(--mono); font-size:10.5px; color:var(--ink-3); margin-left:auto; white-space:nowrap; font-variant-numeric:tabular-nums; }
  .drawer-actions{ display:flex; gap:8px; flex-wrap:wrap; padding:14px 18px; border-top:1px solid var(--line); }

  .modal-wrap{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .16s ease; }
  .modal-wrap.show{ opacity:1; pointer-events:auto; }
  .modal{ width:min(460px,96vw); background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow-lg); padding:20px; transform:translateY(8px); transition:transform .16s ease; }
  .modal-wrap.show .modal{ transform:none; }
  .modal h3{ margin:0 0 3px; font-size:16px; } .modal p.hint{ margin:0 0 16px; font-size:12px; color:var(--ink-3); font-family:var(--mono); }
  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:13px; }
  .field label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--ink-3); }
  .field input, .field select, .field textarea{ font-family:var(--sans); font-size:13px; color:var(--ink); background:var(--col); border:1px solid var(--line-2); border-radius:8px; padding:9px 11px; width:100%; }
  .field textarea{ resize:vertical; min-height:64px; font-size:12.5px; }
  .field input:focus, .field textarea:focus, .field select:focus{ outline:2px solid var(--run); outline-offset:1px; border-color:var(--run); }
  .runs-as{ font-family:var(--mono); font-size:11px; color:var(--ink-3); background:var(--col); border:1px solid var(--line); border-radius:7px; padding:8px 10px; margin-bottom:15px; }
  .runs-as code{ color:var(--ink-2); }
  .modal-foot{ display:flex; gap:9px; justify-content:flex-end; }
  .close-x{ background:transparent; border:1px solid var(--line-2); border-radius:7px; width:30px; height:30px; cursor:pointer; color:var(--ink-2); font-size:14px; line-height:1; }
  .close-x:hover{ border-color:var(--ink-3); }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translate(-50%,20px); background:var(--ink); color:var(--panel); font-family:var(--mono); font-size:12px; padding:10px 15px; border-radius:9px; box-shadow:var(--shadow-lg); z-index:80; opacity:0; pointer-events:none; transition:opacity .18s ease, transform .18s ease; max-width:86vw; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
  .toast .tk{ color:var(--accent); }

  @keyframes pulse{ 0%,100%{ opacity:1 } 50%{ opacity:.32 } }
  @keyframes blink{ 0%,49%{ opacity:1 } 50%,100%{ opacity:0 } }
  @keyframes activebar{ to{ background-position:145% 0; } }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } .card[data-status="running"]::after{ background:var(--run-dim); } }
  @media (max-width:560px){ .summary{ order:3; width:100%; } }
  @media (max-width:760px){ body.peek-open{ padding-right:0; } .drawer{ width:100vw; border-left:none; } }
</style>

<header class="topbar">
  <div class="brand">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect x="2" y="4" width="5" height="16" rx="1.6"/>
      <rect x="9.5" y="4" width="5" height="16" rx="1.6"/>
      <rect x="17" y="4" width="5" height="16" rx="1.6"/>
      <rect class="on" x="9.5" y="4" width="5" height="6.4" rx="1.6"/>
    </svg>
    <span class="brand-name">flowdeck</span>
    <span class="brand-sub">local</span>
  </div>
  <div class="summary" id="summary"></div>
  <div class="controls">
    <select id="repoFilter" aria-label="Filter by repository">
      <option>all repos</option>
    </select>

    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme"><svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 2a6 6 0 0 0 0 12z" fill="currentColor"/></svg></button>
  </div>
</header>

<main class="board" id="board"></main>

<footer class="ledger">
  <span class="sync" id="syncStatus"></span>
  <span id="syncAge">last synced 12s ago</span>
  <span id="counts"></span>
  <span>workers 2/2</span>
  <button class="ledger-toggle" id="doneToggle"></button>
</footer>

<div class="modal-wrap" id="modalWrap" aria-hidden="true">
  <div class="modal" role="dialog" aria-label="New issue">
    <h3>New issue</h3>
    <p class="hint">creates a tracked card in backlog</p>
    <div class="field"><label for="ni-title">Title</label><input id="ni-title" placeholder="Short summary of the work"></div>
    <div class="field"><label for="ni-body">Body</label><textarea id="ni-body" placeholder="What needs to happen, and why."></textarea></div>
    <div class="field"><label for="ni-repo">Repository</label><input id="ni-repo" placeholder="owner/name"></div>
    <div class="runs-as">runs <code>gh issue create --label flow</code> — lands as a card the same way a polled issue does</div>
    <div class="modal-foot"><button class="btn ghost" id="niCancel">Cancel</button><button class="btn primary" id="niCreate">Create issue</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const STAGES = [
    { key:"backlog",     role:"intake · poll" },
    { key:"discuss",     role:"you drive" },
    { key:"write_tests", role:"spec", gate:true },
    { key:"write_code",  role:"ship + watch CI" },
    { key:"review",      role:"fix · approve merge", gate:true },
    { key:"done",        role:"merged" },
  ];
  const STAGE_KEYS = STAGES.map(s=>s.key);
  const label = { idle:"idle", queued:"queued", running:"running", awaiting_human:"needs you", failed:"failed", done:"done" };

  const $=s=>document.querySelector(s), board=$("#board"), drawer=$("#drawer"), scrim=$("#scrim"), modalWrap=$("#modalWrap");
  const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

  // ---------- state + transport ----------
  let CARDS=[];
  let POLL=null; // last-poll health from getBoard — { ran, errors, at, okAt }
  let DISCONNECTED=false, refreshFails=0; // board↔server reachability (rides out a single transient blip)
  let repoFilter="all repos", showDone=false, openCardId=null;
  let drawerActionFns=[];
  const COLLAPSIBLE=new Set(["backlog"]); const collapsed=new Set(["backlog"]);

  async function rpc(op,args){
    let res, body=null;
    try{
      res=await fetch("/rpc",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({op,args})});
      body=await res.json().catch(()=>null);
    }catch(_){ return {status:0,body:null}; }
    return {status:res.status,body};
  }

  async function refresh(){
    const {status,body}=await rpc("getBoard");
    if(status===200 && body && Array.isArray(body.cards)){
      refreshFails=0; DISCONNECTED=false; CARDS=body.cards; POLL=body.poll||null; setSync();
    } else {
      // a failed getBoard = the board can't reach its own server; ride out one transient blip.
      if(++refreshFails>=2) DISCONNECTED=true;
    }
    render(); maybeSyncDrawer();
  }

  // Dispatch a UI event guarded by the card's believed (stage,status). A stale CAS is a safe no-op.
  async function dispatch(card,event,note){
    const {status,body}=await rpc("dispatchEvent",{cardId:card.id,event});
    // Never show success for a request that failed — a dead server / 4xx must read as an error, not the note.
    if(status===0) toast("couldn’t reach the board — not applied");
    else if(status>=400) toast(`couldn’t apply — ${body&&body.error?body.error:"server error"}`);
    else if(body && body.ok===false) toast("card moved on — refreshed"); // stale CAS: a safe no-op
    else if(note) toast(note);
    await refresh();
  }
  const guard=c=>({expected_stage:c.stage,expected_status:c.status});
  const goTo   =(c,target,note)=>dispatch(c,{type:"goto",target,...guard(c)},note);
  const cancel =(c,note)=>dispatch(c,{type:"cancel",...guard(c)},note);
  const archive=(c,note)=>dispatch(c,{type:"archive",...guard(c)},note);
  // discuss "Done — proceed" resolves the interactive run over the wire (§2): run_succeeded by run id.
  const proceed=(c,note)=>c.latest_run?dispatch(c,{type:"run_succeeded",run_id:c.latest_run.id},note):toast("no active run");

  const byId=id=>CARDS.find(c=>c.id===id);
  const inRepo=c=>repoFilter==="all repos"||c.repo===repoFilter;
  const visible=()=>CARDS.filter(inRepo);
  const issueUrl=c=>`https://github.com/${c.repo}/issues/${c.issue_number}`;
  const prUrl=c=>`https://github.com/${c.repo}/pull/${c.pr_number}`;

  // ---------- render ----------
  function markHTML(st){
    if(st==="idle"||st==="running") return "";
    const cls={queued:"queued",awaiting_human:"gate",failed:"failed",done:"done"}[st]||"";
    return cls?`<span class="mark ${cls}" role="img" aria-label="${label[st]||st}"></span>`:"";
  }
  function activityHTML(c){
    const r=c.latest_run;
    if(c.stage==="discuss"&&c.status==="running")
      return `<div class="activity"><span class="act-step">● live session</span><span class="act-data">${r&&r.session_id?esc(r.session_id):"~/.claude"}</span></div>`;
    if(c.status==="running"&&r&&r.activity)
      return `<div class="activity"><span class="act-step">▸ ${esc(r.activity.last_step)}</span><span class="act-data">${esc(r.activity.elapsed)}s</span></div>`;
    return "";
  }
  function metaHTML(c){
    const bits=[];
    if(c.pr_number) bits.push(`<a class="pr" href="${prUrl(c)}" target="_blank" rel="noopener">PR #${c.pr_number} ↗</a>`);
    if(c.status==="queued") bits.push(`<span>queued for a worker</span>`);
    if(c.status==="failed") bits.push(`<span>failed · retry from the card</span>`);
    if(!bits.length) return "";
    return `<div class="card-meta ${c.status==="failed"?"warn":""}">${bits.join('<span style="opacity:.45">·</span>')}</div>`;
  }
  function cardHTML(c){
    const act=activityHTML(c);
    const meta=act?"":metaHTML(c);
    const repoTag=repoFilter==="all repos"?`<span class="repo-tag">${esc(c.repo)}</span>`:"";
    return `<article class="card" data-status="${c.status}" data-id="${esc(c.id)}" draggable="true" tabindex="0" role="button" aria-label="issue ${c.issue_number}: ${esc(c.title)}">
      <div class="card-top"><span class="issue">#${c.issue_number}</span>${repoTag}${markHTML(c.status)}</div>
      <h3 class="card-title">${esc(c.title)}</h3>
      ${meta}${act}
    </article>`;
  }
  function render(){
    const vis=visible();
    const pollFailed=!!(POLL&&POLL.ran&&POLL.errors>0);
    updateSyncStatus();
    // Empty board + a failed poll / a dead server → a large error (else the quiet empty columns read as
    // "all clear"). With cards present we keep them visible and let the footer carry the warning.
    if((DISCONNECTED||pollFailed)&&CARDS.length===0){
      const panel=DISCONNECTED
        ? `<div class="be-title">Can’t reach the board</div><div class="be-sub">the flowdeck server isn’t responding</div>`
        : `<div class="be-title">Polling failed</div><div class="be-sub">can’t reach GitHub — check <code>gh auth status</code></div>`;
      const errSig="err:"+(DISCONNECTED?"d":"")+(pollFailed?"p":"");
      if(board.dataset.sig!==errSig){ board.dataset.sig=errSig; board.innerHTML=`<div class="board-error"><div class="be-mark">⚠</div>${panel}</div>`; }
      $("#summary").innerHTML=""; $("#counts").textContent="0 active";
      $("#doneToggle").textContent=showDone?"hide done":"show done (0)"; syncRepoFilter();
      return;
    }
    const stages=STAGES.filter(s=>s.key!=="done"||showDone);
    // Only rebuild the DOM when the board actually changes — render() runs every 1.5s, and replacing
    // board.innerHTML each tick recreates the scrolling .col-body, flashing ("blinking") the scrollbar
    // and dropping any in-progress scroll.
    const sig=repoFilter+"|"+showDone+"|"+[...collapsed].sort().join(",")+"||"+vis.map(c=>[c.stage,c.status,c.id,c.issue_number,c.repo,c.pr_number,(c.latest_run&&c.latest_run.session_id)||"",c.title].join("~")).join(";");
    if(board.dataset.sig!==sig){ board.dataset.sig=sig;
    board.innerHTML=stages.map(s=>{
      const cs=vis.filter(c=>c.stage===s.key);
      if(collapsed.has(s.key)){
        return `<section class="col collapsed" data-stage="${s.key}" role="button" tabindex="0" aria-label="Expand ${s.key}">
          <div class="col-rail"><span class="rail-count">${cs.length}</span><span class="rail-key">${s.key}</span></div></section>`;
      }
      return `<section class="col" data-stage="${s.key}">
        <div class="col-head">${COLLAPSIBLE.has(s.key)?`<button class="col-collapse" data-collapse="${s.key}" aria-label="Collapse ${s.key}">‹</button>`:""}<span class="stage-key">${s.key}</span>
          <span class="stage-role">${s.gate?'<span class="gdot"></span>':""}${s.role}</span>
          <span class="col-count">${cs.length}</span></div>
        <div class="col-body">${cs.map(cardHTML).join("")}</div></section>`;
    }).join(""); }
    const need=vis.filter(c=>c.status==="awaiting_human").length, run=vis.filter(c=>c.status==="running").length;
    $("#summary").innerHTML=`<span class="chip wait"><span class="cdot"></span>${need} need you</span><span class="chip run"><span class="cdot"></span>${run} running</span>`;
    const doneN=vis.filter(c=>c.stage==="done").length;
    $("#counts").textContent=`${vis.filter(c=>c.stage!=="done").length} active`;
    $("#doneToggle").textContent=showDone?"hide done":`show done (${doneN})`;
    syncRepoFilter();
  }
  function syncRepoFilter(){
    const want=["all repos",...[...new Set(CARDS.map(c=>c.repo))].sort()];
    const sel=$("#repoFilter");
    if(sel.dataset.sig===want.join("|")) return;
    sel.dataset.sig=want.join("|");
    sel.innerHTML=want.map(r=>`<option${r===repoFilter?" selected":""}>${esc(r)}</option>`).join("");
  }

  // ---------- drawer ----------
  function drawerActions(c){
    const A=(fn,l,k)=>({fn,label:l,kind:k||"ghost"});
    switch(c.stage+"/"+c.status){
      case "backlog/idle":               return [A(()=>goTo(c,"discuss","Opening a session…"),"Discuss","primary"),A(()=>goTo(c,"write_tests","Skipping to write_tests"),"Skip to tests"),A(()=>archive(c,"Archived"),"Archive")];
      case "discuss/running":            return [A(()=>proceed(c,"Design captured — enqueuing write_tests"),"Done — proceed","gate"),A(()=>cancel(c,"Discarded — parked in discuss"),"Discard")];
      case "discuss/idle":               return [A(()=>goTo(c,"discuss","Reopening the session…"),"Resume discuss","primary"),A(()=>goTo(c,"write_tests","Enqueuing write_tests"),"Advance"),A(()=>archive(c,"Archived"),"Archive")];
      case "write_tests/running":
      case "write_code/running":
      case "review/running":             return [A(()=>cancel(c,"Run cancelled"),"Cancel")];
      case "write_tests/queued":
      case "write_code/queued":
      case "review/queued":              return [A(()=>cancel(c,"Run cancelled"),"Cancel")];
      case "write_tests/awaiting_human": return [A(()=>goTo(c,"write_code","Approved — enqueuing write_code"),"Approve spec","gate"),A(()=>goTo(c,"write_tests","Re-running write_tests"),"Retry"),A(()=>archive(c,"Archived"),"Archive")];
      case "write_tests/failed":
      case "write_code/failed":
      case "review/failed":              return [A(()=>goTo(c,c.stage,"Re-running (attempt +1)"),"Retry","primary"),A(()=>archive(c,"Archived"),"Archive")];
      case "review/awaiting_human":      return [A(()=>goTo(c,"done","Marked done — the merge is yours"),"Mark done","gate"),A(()=>goTo(c,"review","Re-running review"),"Retry"),A(()=>archive(c,"Archived"),"Archive")];
      case "done/done":                  return [A(()=>archive(c,"Archived"),"Archive")];
      default:                           return [A(()=>archive(c,"Archived"),"Archive")];
    }
  }

  async function openDrawer(id){
    openCardId=id;
    const {status,body}=await rpc("getCard",{cardId:id});
    if(status!==200||!body){ toast("card not found"); openCardId=null; return; }
    renderDrawer(body.card,body.runs);
  }
  function maybeSyncDrawer(){
    if(!openCardId) return;
    const c=byId(openCardId); if(!c) return;
    const sig=c.stage+"/"+c.status+"/"+(c.pr_number||"");
    if(drawer.dataset.sig===sig) return; // nothing visible changed — leave the open drawer alone
    openDrawer(openCardId);
  }
  function renderDrawer(c,runs){
    const latest=runs&&runs.length?runs[runs.length-1]:null;
    const forActions={id:c.id,stage:c.stage,status:c.status,repo:c.repo,issue_number:c.issue_number,pr_number:c.pr_number,latest_run:latest?{id:latest.id}:null};
    const actions=drawerActions(forActions);
    drawerActionFns=actions.map(a=>a.fn);
    const acts=actions.map((a,i)=>`<button class="btn ${a.kind}" data-di="${i}">${esc(a.label)}</button>`).join("");

    const points=[];
    points.push(`<a href="${issueUrl(c)}" target="_blank" rel="noopener"><span class="lead">issue</span><span class="val">#${c.issue_number} · ${esc(c.repo)}</span><span class="ext">github ↗</span></a>`);
    if(c.pr_number){ const g=(c.stage==="review"||c.stage==="done"), r=(c.status==="failed");
      points.push(`<a href="${prUrl(c)}" target="_blank" rel="noopener"><span class="lead">pr</span><span class="val">#${c.pr_number}</span><span class="ext ${r?"red":g?"green":""}">github ↗</span></a>`); }
    if(latest&&latest.session_id) points.push(`<a href="#" data-copy="claude --resume ${esc(latest.session_id)}"><span class="lead">session</span><span class="val">${esc(latest.session_id)}</span><span class="ext">resume ⧉</span></a>`);
    if(c.worktree_path) points.push(`<a href="#" data-copy="${esc(c.worktree_path)}"><span class="lead">worktree</span><span class="val">${esc(c.worktree_path)}</span><span class="ext">local ⧉</span></a>`);

    const tl=(runs||[]).map(rn=>{
      const cls=/succeeded/.test(rn.status)?"ok":/running|queued/.test(rn.status)?"run":/failed|cancelled/.test(rn.status)?"bad":"";
      const meta=`${esc(rn.trigger)} · ${esc(rn.status)}${rn.attempt>1?" · try "+rn.attempt:""}`;
      return `<div class="tl ${cls}"><span class="tdot"></span><div class="tl-row"><span class="tmain">${esc(rn.stage)}</span><span class="tmeta">${meta}</span></div></div>`;
    }).join("")||`<div class="tl"><span class="tdot"></span><div class="tl-row"><span class="tmain">no runs yet</span></div></div>`;

    const svar=c.status==="running"?"--run":c.status==="awaiting_human"?"--accent":c.status==="failed"?"--fail":c.status==="done"?"--done":"";
    const softVar=svar?`var(${svar}-soft)`:"transparent";
    drawer.innerHTML=`
      <div class="drawer-head" style="--s-soft:${softVar}"><div>
        <div class="d-crumb"><span class="d-statepill" style="color:${svar?`var(${svar})`:"var(--ink-3)"}"><span class="pdot" style="background:currentColor"></span>${esc(c.stage)} · ${label[c.status]||esc(c.status)}</span></div>
        <h3 class="d-title">${esc(c.title)}</h3>
        <div class="d-crumb" style="margin-top:5px">#${c.issue_number} · ${esc(c.repo)}</div>
      </div><button class="close-x x" id="drawerClose" aria-label="Close">✕</button></div>
      <div class="drawer-body">
        <div class="d-section points"><h4>Points at</h4>${points.join("")}</div>
        <div class="d-section"><h4>Run history</h4><div class="timeline">${tl}</div></div>
      </div>
      <div class="drawer-actions">${acts}</div>`;
    drawer.dataset.sig=c.stage+"/"+c.status+"/"+(c.pr_number||"");
    drawer.classList.add("show"); document.body.classList.add("peek-open"); drawer.setAttribute("aria-hidden","false");
    $("#drawerClose").addEventListener("click",closeAll);
  }
  function closeAll(){ openCardId=null; drawer.dataset.sig=""; drawer.classList.remove("show"); document.body.classList.remove("peek-open"); scrim.classList.remove("show"); drawer.setAttribute("aria-hidden","true"); modalWrap.classList.remove("show"); modalWrap.setAttribute("aria-hidden","true"); }

  // ---------- move (goto) via drag / arrows ----------
  function moveCard(id,stage){ const c=byId(id); if(!c||c.stage===stage) return; goTo(c,stage,`#${c.issue_number} → ${stage}`); }

  // ---------- new issue ----------
  function openModal(){ modalWrap.classList.add("show"); scrim.classList.add("show"); modalWrap.setAttribute("aria-hidden","false"); const rp=$("#ni-repo"); if(!rp.value&&CARDS[0]) rp.value=CARDS[0].repo; $("#ni-title").focus(); }
  async function createIssue(){
    const title=$("#ni-title").value.trim(), repo=$("#ni-repo").value.trim(), bodyv=$("#ni-body").value.trim();
    if(!title||!repo){ toast("title + repo required"); return; }
    closeAll();
    const {status,body}=await rpc("createIssue",{repo,title,body:bodyv||undefined});
    if(status===200&&body&&body.ok){ toast(`created #${body.card.issue_number} in backlog`); $("#ni-title").value=""; $("#ni-body").value=""; }
    else toast("create failed — is gh configured for that repo?");
    await refresh();
  }

  // ---------- toast / sync clock ----------
  let toastT; function toast(msg){ const t=$("#toast"); t.innerHTML=`<span class="tk">▸</span> ${esc(msg)}`; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2400); }
  // human-readable elapsed — seconds roll up to m/h/d so long gaps don't read as "340s ago"
  function dur(s){ s=Math.max(0,Math.round(s)); if(s<60) return s+"s"; if(s<3600) return Math.round(s/60)+"m"; if(s<86400) return Math.round(s/3600)+"h"; return Math.round(s/86400)+"d"; }
  let lastSync=Date.now(); function setSync(){ lastSync=Date.now(); }
  setInterval(()=>{ const age=Math.round((Date.now()-lastSync)/1000); $("#syncAge").textContent=age<2?"synced":"last synced "+dur(age)+" ago"; },1000);

  // ---------- poll health (footer status) ----------
  function ago(iso){ if(!iso) return ""; return dur((Date.now()-Date.parse(iso))/1000)+" ago"; }
  function updateSyncStatus(){
    const el=$("#syncStatus"); if(!el) return;
    const pollFailed=!!(POLL&&POLL.ran&&POLL.errors>0);
    el.classList.toggle("failed",DISCONNECTED||pollFailed);
    // healthy = render nothing; "last synced …" already says the board is live. surface trouble only.
    if(DISCONNECTED) el.innerHTML=`<span class="cdot"></span>disconnected — can’t reach the board`;
    else if(pollFailed){ const ok=POLL&&POLL.okAt?` · last ok ${ago(POLL.okAt)}`:""; el.innerHTML=`<span class="cdot"></span>polling failed${ok}`; }
    else el.innerHTML="";
  }

  // ---------- events ----------
  document.addEventListener("click",e=>{
    const di=e.target.closest("[data-di]"); if(di){ const fn=drawerActionFns[+di.dataset.di]; if(fn) fn(); return; }
    const cp=e.target.closest("[data-copy]"); if(cp){ e.preventDefault(); if(navigator.clipboard) navigator.clipboard.writeText(cp.dataset.copy); toast("copied"); return; }
    if(e.target.closest("a[target='_blank']")) return; // external link — let it open
    const cc=e.target.closest("[data-collapse]"); if(cc){ e.stopPropagation(); collapsed.add(cc.dataset.collapse); render(); return; }
    const rail=e.target.closest(".col.collapsed"); if(rail){ collapsed.delete(rail.dataset.stage); render(); return; }
    const card=e.target.closest(".card"); if(card){ openDrawer(card.dataset.id); }
  });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ closeAll(); return; }
    const rail=e.target.closest&&e.target.closest(".col.collapsed"); if(rail&&(e.key==="Enter"||e.key===" ")){ e.preventDefault(); collapsed.delete(rail.dataset.stage); render(); return; }
    const card=e.target.closest&&e.target.closest(".card"); if(!card) return;
    if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openDrawer(card.dataset.id); }
    else if(e.key==="ArrowRight"||e.key==="ArrowLeft"){ e.preventDefault();
      const c=byId(card.dataset.id); if(!c) return; let i=STAGE_KEYS.indexOf(c.stage)+(e.key==="ArrowRight"?1:-1); i=Math.max(0,Math.min(STAGE_KEYS.length-1,i)); moveCard(c.id,STAGE_KEYS[i]); } });

  let dragId=null;
  board.addEventListener("dragstart",e=>{ const c=e.target.closest(".card"); if(!c) return; dragId=c.dataset.id; c.classList.add("dragging"); if(e.dataTransfer){ e.dataTransfer.effectAllowed="move"; try{ e.dataTransfer.setData("text/plain",dragId); }catch(_){} } });
  board.addEventListener("dragend",e=>{ const c=e.target.closest(".card"); if(c) c.classList.remove("dragging"); document.querySelectorAll(".col.drop-target").forEach(x=>x.classList.remove("drop-target")); dragId=null; });
  board.addEventListener("dragover",e=>{ const col=e.target.closest(".col"); if(!col||dragId==null) return; e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect="move"; document.querySelectorAll(".col.drop-target").forEach(x=>{ if(x!==col) x.classList.remove("drop-target"); }); col.classList.add("drop-target"); });
  board.addEventListener("drop",e=>{ const col=e.target.closest(".col"); if(!col||dragId==null) return; e.preventDefault(); const id=dragId; dragId=null; col.classList.remove("drop-target"); moveCard(id,col.dataset.stage); });

  scrim.addEventListener("click",closeAll);
  $("#newBtn").addEventListener("click",openModal);
  $("#niCancel").addEventListener("click",closeAll);
  $("#niCreate").addEventListener("click",createIssue);
  $("#repoFilter").addEventListener("change",e=>{ repoFilter=e.target.value; render(); });
  $("#doneToggle").addEventListener("click",()=>{ showDone=!showDone; render(); });
  $("#themeBtn").addEventListener("click",()=>{ const cur=document.documentElement.getAttribute("data-theme");
    const next=cur==="dark"?"light":cur==="light"?"dark":(matchMedia("(prefers-color-scheme: dark)").matches?"light":"dark"); document.documentElement.setAttribute("data-theme",next); });

  // ---------- boot ----------
  render();
  refresh();
  setInterval(refresh,1500);
})();
</script>
